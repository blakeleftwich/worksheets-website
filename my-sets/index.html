<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-731029973652990" crossorigin="anonymous"></script>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1TRCP181V6"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Worksheet Sets — Animal Math</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../fonts/fonts.css">
  <script src="../jspdf.umd.min.js"></script>
  <script src="../svg2pdf.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; }

    /* ===== Header ===== */
    .site-header { background: white; border-bottom: 1px solid #e5e7eb; padding: 0 32px; position: sticky; top: 0; z-index: 100; }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .site-logo { text-decoration: none; }
    .site-logo-img { height: 44px; width: auto; display: block; }
    .nav-links { display: flex; gap: 4px; align-items: center; }
    .nav-links a { color: #64748b; text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 16px; border-radius: 8px; transition: all 0.2s; }
    .nav-links a:hover { background: #f1f5f9; color: #1a1a2e; }
    .nav-links a.active { background: #fef3c7; color: #92400e; }

    /* ===== Page Content ===== */
    .page { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
    .page-header h1 { font-family: 'DM Sans', sans-serif; font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .page-header .meta { font-size: 14px; color: #94a3b8; margin-top: 4px; }

    /* ===== Empty State ===== */
    .empty-state { text-align: center; padding: 80px 20px; }
    .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state h2 { font-family: 'DM Sans', sans-serif; font-size: 20px; color: #475569; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: #94a3b8; max-width: 360px; margin: 0 auto 20px; line-height: 1.6; }
    .empty-state a { display: inline-block; background: #f59e0b; color: white; text-decoration: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; }
    .empty-state a:hover { background: #d97706; }

    /* ===== Pack Cards ===== */
    .packs-list { display: flex; flex-direction: column; gap: 16px; }

    .pack-card { background: white; border: 1px solid #e5e7eb; border-radius: 14px; overflow: hidden; transition: all 0.2s; }
    .pack-card:hover { border-color: #fde68a; box-shadow: 0 4px 16px rgba(0,0,0,0.04); }

    .pack-top { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; cursor: pointer; user-select: none; }
    .pack-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
    .pack-info { flex: 1; min-width: 0; }
    .pack-info h3 { font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .pack-info .pack-meta { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .pack-chevron { color: #94a3b8; font-size: 20px; transition: transform 0.2s; flex-shrink: 0; margin-left: 8px; }
    .pack-card.expanded .pack-chevron { transform: rotate(90deg); }

    .pack-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-print-all { background: #f59e0b; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
    .btn-print-all:hover { background: #d97706; }
    .btn-rename { background: none; border: 1px solid #e5e7eb; color: #94a3b8; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .btn-rename:hover { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
    .btn-delete { background: none; border: 1px solid #e5e7eb; color: #94a3b8; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .btn-delete:hover { background: #fef2f2; color: #ef4444; border-color: #fecaca; }

    /* Thumbnail strip */
    .thumb-strip { display: flex; gap: 4px; flex-shrink: 0; }
    .thumb-mini { width: 40px; height: 52px; background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .thumb-mini svg { width: 100%; height: 100%; display: block; }

    /* ===== Detail (expanded) ===== */
    .pack-detail { display: none; border-top: 1px solid #f1f5f9; padding: 16px 20px; }
    .pack-card.expanded .pack-detail { display: block; }

    .ws-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .ws-item { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; text-align: center; position: relative; transition: border-color 0.15s; }
    .ws-item:hover { border-color: #fde68a; }
    .ws-thumb { width: 100%; aspect-ratio: 0.77; background: white; border: 1px solid #e5e7eb; border-radius: 4px; margin-bottom: 8px; overflow: hidden; }
    .ws-thumb svg { width: 100%; height: 100%; display: block; }
    .ws-title { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700; color: #1e293b; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ws-meta { font-size: 10px; color: #94a3b8; }
    .ws-remove { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: white; border: 1px solid #e5e7eb; border-radius: 50%; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #94a3b8; opacity: 0; transition: opacity 0.15s; }
    .ws-item:hover .ws-remove { opacity: 1; }
    .ws-remove:hover { background: #fef2f2; color: #ef4444; border-color: #fecaca; }

    .ws-empty { text-align: center; padding: 24px; color: #94a3b8; font-size: 13px; }

    /* ===== Drag-to-reorder ===== */
    .ws-grid { cursor: default; }
    .ws-item { cursor: grab; transition: border-color 0.15s, transform 0.15s, opacity 0.15s; }
    .ws-item:active { cursor: grabbing; }
    .ws-item.dragging { opacity: 0.4; transform: scale(0.95); }
    .ws-item.drag-over { border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245,158,11,0.3); }
    .ws-drag-handle { position: absolute; top: 4px; left: 4px; width: 22px; height: 22px; font-size: 11px; color: #cbd5e1; display: flex; align-items: center; justify-content: center; cursor: grab; opacity: 0; transition: opacity 0.15s; }
    .ws-item:hover .ws-drag-handle { opacity: 0.7; }
    .ws-drag-handle:hover { color: #94a3b8; opacity: 1 !important; }

    /* ===== Print Preview Overlay ===== */
    .print-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; overflow-y: auto; }
    .print-overlay.visible { display: block; }
    .print-container { max-width: 700px; margin: 32px auto; padding: 0 24px 48px; }
    .print-bar { background: white; border-radius: 12px 12px 0 0; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 10; }
    .print-bar h2 { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700; }
    .print-bar-actions { display: flex; gap: 8px; }
    .print-bar-actions button { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
    .btn-close-print { background: #f1f5f9; color: #475569; }
    .btn-close-print:hover { background: #e2e8f0; }
    .btn-do-print { background: #f59e0b; color: white; }
    .btn-do-print:hover { background: #d97706; }
    .print-pages-wrap { background: #e2e8f0; padding: 24px; border-radius: 0 0 12px 12px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .print-page-item { width: 100%; max-width: 595px; background: white; border-radius: 2px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
    .print-page-item svg { width: 100%; height: auto; display: block; }

    /* ===== Toast ===== */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: white; padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 500; transition: transform 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
    .toast.visible { transform: translateX(-50%) translateY(0); }

    /* ===== Print styles ===== */
    @media print {
      /* Hide everything except the print pages */
      body > *:not(.print-overlay) { display: none !important; }
      .print-overlay { position: static !important; background: none !important; display: block !important; overflow: visible !important; inset: auto !important; }
      .print-container { margin: 0 !important; padding: 0 !important; max-width: none !important; }
      .print-bar { display: none !important; }
      .print-pages-wrap { background: none !important; padding: 0 !important; gap: 0 !important; display: block !important; border-radius: 0 !important; }
      .print-page-item {
        box-shadow: none !important; border-radius: 0 !important;
        page-break-after: always !important; break-after: page !important;
        page-break-inside: avoid !important; break-inside: avoid !important;
        width: 100% !important; padding: 0 !important; margin: 0 !important;
        max-width: none !important;
      }
      .print-page-item:last-child { page-break-after: auto !important; break-after: auto !important; }
      .print-page-item svg { width: 100% !important; height: auto !important; display: block !important; }
      body { background: white !important; margin: 0 !important; padding: 0 !important; }
      .toast { display: none !important; }
    }
    @page {
      size: letter;
      margin: 0.5in 0.4in 0in 0.4in;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .pack-left { flex-direction: column; align-items: flex-start; }
      .thumb-strip { display: none; }
      .ws-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
      .pack-actions { flex-wrap: wrap; }
    }

    /* ===== Answer Key Checkbox ===== */
    .ak-label { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; color: #64748b; cursor: pointer; white-space: nowrap; user-select: none; }
    .ak-label:hover { color: #475569; }
    .ak-checkbox { width: 15px; height: 15px; accent-color: #f59e0b; cursor: pointer; margin: 0; }

    /* ===== Rename Input ===== */
    .rename-input { font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700; border: 2px solid #f59e0b; border-radius: 6px; padding: 2px 8px; outline: none; width: 250px; }

    /* ===== Confirm Modal ===== */
    .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: center; justify-content: center; }
    .confirm-overlay.visible { display: flex; }
    .confirm-box { background: white; border-radius: 16px; padding: 28px 32px 24px; max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.15); text-align: center; animation: confirmIn 0.2s ease; }
    @keyframes confirmIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .confirm-title { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 8px; }
    .confirm-message { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 24px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }
    .confirm-actions button { padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-confirm-cancel { background: #f1f5f9; color: #475569; }
    .btn-confirm-cancel:hover { background: #e2e8f0; }
    .btn-confirm-delete { background: #ef4444; color: white; }
    .btn-confirm-delete:hover { background: #dc2626; }
  </style>
</head>
<body>

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="site-logo">
        <img src="../images/logo.png" alt="Animal Math" class="site-logo-img">
      </a>
      <nav class="nav-links">
        <a href="../printables/index.html">Printables</a>
        <a href="../generators.html">Generators</a>
        <a href="../tools/index.html">Tools</a>
        <a href="../songs/index.html">Songs</a>
        <a href="../apps/index.html">Apps</a>
        <a href="../about.html">About</a>
        <a href="../my-sets/index.html" class="active">My Worksheet Sets</a>
      </nav>
    </div>
  </header>

  <!-- ===== Page ===== -->
  <div class="page">
    <div class="page-header">
      <div>
        <h1>My Worksheet Sets</h1>
        <div class="meta" id="packsMeta"></div>
      </div>
    </div>

    <div id="packsContent"></div>
  </div>

  <!-- ===== Print Preview Overlay ===== -->
  <div class="print-overlay" id="printOverlay">
    <div class="print-container">
      <div class="print-bar">
        <h2 id="printTitle">Set Name</h2>
        <div class="print-bar-actions">
          <button class="btn-close-print" onclick="closePrintPreview()">← Back</button>
          <button class="btn-do-print" onclick="doDownload()" style="background:#1e293b;">⬇ Download PDF</button>
          <button class="btn-do-print" onclick="doPrint()">🖨️ Print</button>
        </div>
      </div>
      <div class="print-pages-wrap" id="printPages"></div>
    </div>
  </div>

  <!-- ===== Confirm Modal ===== -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-title" id="confirmTitle"></div>
      <div class="confirm-message" id="confirmMessage"></div>
      <div class="confirm-actions">
        <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancel</button>
        <button class="btn-confirm-delete" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'animalmath_packs';

    function getPacks() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function savePacks(packs) { localStorage.setItem(STORAGE_KEY, JSON.stringify(packs)); }

    // ===== Render =====
    function render() {
      const packs = getPacks();
      const total = packs.reduce((s, p) => s + p.worksheets.length, 0);
      document.getElementById('packsMeta').textContent =
        packs.length === 0 ? '' : `${packs.length} set${packs.length !== 1 ? 's' : ''} · ${total} worksheet${total !== 1 ? 's' : ''} saved`;

      const content = document.getElementById('packsContent');

      if (packs.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⭐</div>
            <h2>No sets yet</h2>
            <p>Generate a worksheet, then click "Add to Set" to start building custom worksheet sets you can print together.</p>
            <a href="../generators.html">Browse Generators</a>
          </div>`;
        return;
      }

      content.innerHTML = `<div class="packs-list">${packs.map(p => renderPackCard(p)).join('')}</div>`;

      // Attach expand/collapse events
      content.querySelectorAll('.pack-top').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.closest('.pack-actions')) return;
          el.closest('.pack-card').classList.toggle('expanded');
        });
      });

      // Attach drag-to-reorder events
      initDragReorder(content);
    }

    // ===== Drag-to-Reorder =====
    let _dragItem = null;
    function initDragReorder(container) {
      container.querySelectorAll('.ws-item[draggable]').forEach(item => {
        item.addEventListener('dragstart', (e) => {
          _dragItem = item;
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', item.dataset.wsIdx);
        });
        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          container.querySelectorAll('.ws-item').forEach(el => el.classList.remove('drag-over'));
          _dragItem = null;
        });
        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (_dragItem && _dragItem !== item && _dragItem.dataset.packId === item.dataset.packId) {
            item.classList.add('drag-over');
          }
        });
        item.addEventListener('dragleave', () => {
          item.classList.remove('drag-over');
        });
        item.addEventListener('drop', (e) => {
          e.preventDefault();
          item.classList.remove('drag-over');
          if (!_dragItem || _dragItem === item) return;
          if (_dragItem.dataset.packId !== item.dataset.packId) return;

          const packId = item.dataset.packId;
          const fromIdx = parseInt(_dragItem.dataset.wsIdx, 10);
          const toIdx = parseInt(item.dataset.wsIdx, 10);
          if (fromIdx === toIdx) return;

          const packs = getPacks();
          const pack = packs.find(p => p.id === packId);
          if (!pack) return;

          // Reorder the worksheets array
          const [moved] = pack.worksheets.splice(fromIdx, 1);
          pack.worksheets.splice(toIdx, 0, moved);
          savePacks(packs);

          // Re-render the pack detail in-place
          const card = document.querySelector(`.pack-card[data-id="${packId}"]`);
          const wasExpanded = card && card.classList.contains('expanded');
          render();
          if (wasExpanded) {
            setTimeout(() => {
              const c = document.querySelector(`.pack-card[data-id="${packId}"]`);
              if (c) c.classList.add('expanded');
            }, 10);
          }
          showToast('Worksheet order updated');
        });
      });
    }

    function renderPackCard(pack) {
      const date = new Date(pack.created);
      const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const wsCount = pack.worksheets.length;

      // Build mini thumbnails (max 4)
      const thumbs = pack.worksheets.slice(0, 4).map(ws => {
        const svgs = fixSvgRefs(ws.svgData).split('|||SVGSEP|||');
        const firstSvg = svgs[0] || '';
        return `<div class="thumb-mini">${firstSvg}</div>`;
      }).join('');

      // Build worksheet grid
      const wsGrid = wsCount === 0
        ? '<div class="ws-empty">No worksheets in this set yet.</div>'
        : `<div class="ws-grid">${pack.worksheets.map((ws, idx) => renderWsItem(pack.id, ws, idx)).join('')}</div>`;

      return `
        <div class="pack-card" data-id="${pack.id}">
          <div class="pack-top">
            <div class="pack-left">
              <div class="thumb-strip">${thumbs}</div>
              <div class="pack-info">
                <h3>${escHtml(pack.name)} <span class="pack-chevron">›</span></h3>
                <div class="pack-meta">${wsCount} worksheet${wsCount !== 1 ? 's' : ''} · Created ${dateStr}</div>
              </div>
            </div>
            <div class="pack-actions">
              <label class="ak-label" onclick="event.stopPropagation();" title="Include answer keys when printing">
                <input type="checkbox" class="ak-checkbox" data-pack="${pack.id}"> Answer Key
              </label>
              <button class="btn-print-all" onclick="event.stopPropagation(); openPrintPreview('${pack.id}');" ${wsCount === 0 ? 'disabled style="opacity:0.5;cursor:default;"' : ''}>🖨️ Print All</button>
              <button class="btn-rename" onclick="event.stopPropagation(); renamePack('${pack.id}');" title="Rename">✏️</button>
              <button class="btn-delete" onclick="event.stopPropagation(); deletePack('${pack.id}');" title="Delete set">✕</button>
            </div>
          </div>
          <div class="pack-detail">${wsGrid}</div>
        </div>`;
    }

    function renderWsItem(packId, ws, idx) {
      const svgs = fixSvgRefs(ws.svgData).split('|||SVGSEP|||');
      const firstSvg = svgs[0] || '';
      const date = new Date(ws.added);
      const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      return `
        <div class="ws-item" draggable="true" data-pack-id="${packId}" data-ws-id="${ws.id}" data-ws-idx="${idx}">
          <div class="ws-drag-handle" title="Drag to reorder">⠿</div>
          <button class="ws-remove" onclick="removeWorksheet('${packId}', '${ws.id}')" title="Remove">✕</button>
          <div class="ws-thumb">${firstSvg}</div>
          <div class="ws-title">${escHtml(ws.title)}</div>
          <div class="ws-meta">${escHtml(ws.generator)} · ${dateStr}</div>
        </div>`;
    }

    // ===== Confirm Modal =====
    let _confirmCallback = null;
    function showConfirm(title, message, onConfirm) {
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmMessage').textContent = message;
      _confirmCallback = onConfirm;
      document.getElementById('confirmDeleteBtn').onclick = () => { const cb = _confirmCallback; closeConfirm(); if (cb) cb(); };
      document.getElementById('confirmOverlay').classList.add('visible');
    }
    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.remove('visible');
      _confirmCallback = null;
    }
    // Close on overlay click (outside the box)
    document.getElementById('confirmOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeConfirm();
    });
    // Close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('confirmOverlay').classList.contains('visible')) closeConfirm();
    });

    // ===== Actions =====
    function deletePack(packId) {
      const packs = getPacks();
      const pack = packs.find(p => p.id === packId);
      if (!pack) return;
      showConfirm(
        `Delete "${pack.name}"?`,
        `This will remove all ${pack.worksheets.length} worksheet${pack.worksheets.length !== 1 ? 's' : ''} in this set. This cannot be undone.`,
        () => {
          savePacks(packs.filter(p => p.id !== packId));
          showToast(`Deleted "${pack.name}"`);
          render();
        }
      );
    }

    function renamePack(packId) {
      const packs = getPacks();
      const pack = packs.find(p => p.id === packId);
      if (!pack) return;
      const card = document.querySelector(`.pack-card[data-id="${packId}"]`);
      const h3 = card.querySelector('h3');
      const oldName = pack.name;

      // Replace h3 with input
      const input = document.createElement('input');
      input.className = 'rename-input';
      input.value = oldName;
      h3.innerHTML = '';
      h3.appendChild(input);
      input.focus();
      input.select();

      const save = () => {
        const newName = input.value.trim();
        if (newName && newName !== oldName) {
          pack.name = newName;
          savePacks(packs);
          showToast(`Renamed to "${newName}"`);
        }
        render();
      };

      input.addEventListener('blur', save);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') render();
      });
    }

    function removeWorksheet(packId, wsId) {
      const packs = getPacks();
      const pack = packs.find(p => p.id === packId);
      if (!pack) return;
      pack.worksheets = pack.worksheets.filter(w => w.id !== wsId);
      savePacks(packs);
      showToast('Worksheet removed');
      render();
      // Re-expand the pack
      setTimeout(() => {
        const card = document.querySelector(`.pack-card[data-id="${packId}"]`);
        if (card) card.classList.add('expanded');
      }, 10);
    }

    // ===== Print Preview =====
    function updateWsCode(svgHtml, code) {
      // Update the worksheet code in the SVG (the small text at bottom center)
      // The code is rendered as a <text> element near the bottom with class or specific positioning
      // We look for the existing code pattern like "(1)" or "(2)" etc and replace it
      return svgHtml.replace(
        /(<text[^>]*font-family="Fredoka[^"]*"[^>]*font-size="8\.5"[^>]*>)\([^)]*\)(<\/text>)/,
        '$1' + code + '$2'
      );
    }

    function openPrintPreview(packId) {
      const packs = getPacks();
      const pack = packs.find(p => p.id === packId);
      if (!pack || pack.worksheets.length === 0) return;

      // Check the answer key checkbox for this pack
      const akCheckbox = document.querySelector(`.ak-checkbox[data-pack="${packId}"]`);
      const includeAnswerKeys = akCheckbox ? akCheckbox.checked : false;

      document.getElementById('printTitle').textContent = pack.name;
      const pagesWrap = document.getElementById('printPages');
      pagesWrap.innerHTML = '';

      // First: add ALL worksheet pages with sequential codes
      let pageNum = 0;
      pack.worksheets.forEach(ws => {
        const svgs = fixSvgRefs(ws.svgData).split('|||SVGSEP|||');
        svgs.forEach(svg => {
          if (!svg.trim()) return;
          pageNum++;
          const div = document.createElement('div');
          div.className = 'print-page-item';
          div.innerHTML = updateWsCode(svg, '(' + pageNum + ')');
          pagesWrap.appendChild(div);
        });
      });

      // Then: add ALL answer keys at the END with matching codes
      if (includeAnswerKeys) {
        let akPageNum = 0;
        pack.worksheets.forEach(ws => {
          if (ws.answerKeySvgs && ws.answerKeySvgs.length > 0) {
            ws.answerKeySvgs.forEach(akSvg => {
              if (!akSvg.trim()) return;
              akPageNum++;
              const div = document.createElement('div');
              div.className = 'print-page-item';
              div.innerHTML = updateWsCode(fixSvgRefs(akSvg), '(' + akPageNum + ')');
              pagesWrap.appendChild(div);
            });
          } else {
            // Count how many worksheet pages this worksheet had (to keep code numbering in sync)
            const svgs = ws.svgData.split('|||SVGSEP|||').filter(s => s.trim());
            akPageNum += svgs.length;
          }
        });
      }

      document.getElementById('printOverlay').classList.add('visible');
      document.body.style.overflow = 'hidden';
    }

    function closePrintPreview() {
      document.getElementById('printOverlay').classList.remove('visible');
      document.body.style.overflow = '';
    }

    // Font registration for PDF generation (same as generators)
    var _fontCache = {};
    async function registerPdfFonts(pdf) {
      var fontDefs = [
        { file: "../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "100normal","200normal","300normal","400normal","500normal","600normal","700normal","800normal","900normal","100bold","200bold","300bold","400bold","500bold","600bold","700bold","800bold","900bold"] },
        { file: "../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400normal","500normal"] },
        { file: "../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600normal","600bold","700normal","700bold","800normal","900normal"] },
        { file: "../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500normal","600normal","700normal","800normal"] },
        { file: "../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400normal","500normal","600normal","700normal"] },
      ];
      var idx = 0;
      for (var f of fontDefs) {
        try {
          var b64;
          if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
          else {
            var resp = await fetch(f.file);
            var buf = await resp.arrayBuffer();
            var bytes = new Uint8Array(buf);
            var binary = '';
            var chunkSize = 8192;
            for (var c = 0; c < bytes.length; c += chunkSize) {
              binary += String.fromCharCode.apply(null, bytes.subarray(c, c + chunkSize));
            }
            b64 = btoa(binary);
            _fontCache[f.file] = b64;
          }
          for (var s = 0; s < f.styles.length; s++) {
            var vfsName = "f" + (idx++) + ".ttf";
            pdf.addFileToVFS(vfsName, b64);
            pdf.addFont(vfsName, f.name, f.styles[s]);
          }
        } catch(e) { console.warn("Font load failed:", f.file, e); }
      }
    }

    async function buildPdf() {
      var jsPDF = window.jspdf.jsPDF;
      var svgEls = document.querySelectorAll('.print-page-item svg');
      if (!svgEls.length) return null;
      var pdf = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'letter' });
      await registerPdfFonts(pdf);
      for (var i = 0; i < svgEls.length; i++) {
        if (i > 0) pdf.addPage('letter', 'portrait');
        var svgClone = svgEls[i].cloneNode(true);
        svgClone.setAttribute('width', '612');
        svgClone.setAttribute('height', '792');
        svgClone.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
        document.body.appendChild(svgClone);
        try {
          await pdf.svg(svgClone, { x: 0, y: 0, width: 612, height: 792 });
        } finally {
          document.body.removeChild(svgClone);
        }
      }
      return pdf;
    }

    async function doPrint() {
      var pdf = await buildPdf();
      if (!pdf) return;
      var blob = pdf.output('blob');
      var url = URL.createObjectURL(blob);
      var iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = url;
      document.body.appendChild(iframe);
      iframe.addEventListener('load', function() {
        iframe.contentWindow.print();
        setTimeout(function() { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 5000);
      });
    }

    async function doDownload() {
      var pdf = await buildPdf();
      if (!pdf) return;
      var packName = document.querySelector('.pack-title') ? document.querySelector('.pack-title').textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-') : 'worksheet-set';
      pdf.save(packName + '.pdf');
    }

    // ===== Toast =====
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('visible');
      setTimeout(() => t.classList.remove('visible'), 2500);
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // Fix SVG data that was stored with full URL refs instead of #fragment refs.
    // Older versions of the capture code converted href="#icon-X" to href="http://host/page#icon-X".
    // SVG <use href> must be a bare #fragment to reference <symbol> within the same SVG.
    function fixSvgRefs(svgHtml) {
      return svgHtml.replace(/(href=["'])[^"']*?(#[^"']+)(["'])/g, '$1$2$3');
    }

    // ===== Init =====
    render();
  </script>
</body>
</html>
