<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Layout Options</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #1a202c; }

    /* Switcher bar */
    .switcher {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      background: #0f172a; color: white; padding: 10px 24px;
      display: flex; align-items: center; gap: 8px; font-size: 13px; flex-wrap: wrap;
    }
    .switcher span { font-weight: 600; }
    .switcher button {
      padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 11px; font-weight: 600;
    }
    .switcher button.active { background: #f59e0b; color: #1a202c; }
    .switcher button:not(.active) { background: #2d3748; color: #a0aec0; }
    .switcher button:hover:not(.active) { background: #4a5568; color: white; }

    .option { display: none; position: fixed; inset: 0; top: 44px; }
    .option.active { display: block; }

    /* ============================================ */
    /* Shared overlay */
    .modal-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }

    /* ============================================ */
    /* A: Sidebar (from previous mockup) */
    .opt-a .modal-box {
      background: white; border-radius: 16px; max-width: 920px; width: 100%;
      height: 85vh; max-height: 720px; position: relative;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .opt-a .modal-header {
      padding: 20px 24px 16px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0;
    }
    .opt-a .modal-close {
      position: absolute; top: 16px; right: 16px; background: #f1f5f9; border: none;
      width: 32px; height: 32px; border-radius: 8px; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: #64748b;
    }
    .opt-a .m-title { font-family: 'DM Sans'; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .opt-a .m-sub { font-size: 13px; color: #64748b; }
    .opt-a .modal-body { display: flex; flex: 1; min-height: 0; overflow: hidden; }
    .opt-a .modal-sidebar {
      width: 130px; flex-shrink: 0; border-right: 1px solid #f1f5f9;
      overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; background: #fafbfc;
    }
    .opt-a .modal-sidebar canvas {
      width: 100%; border-radius: 4px; border: 2px solid #e2e8f0; cursor: pointer; transition: border-color 0.15s;
    }
    .opt-a .modal-sidebar canvas:hover { border-color: #f59e0b; }
    .opt-a .modal-sidebar canvas.active { border-color: #f59e0b; box-shadow: 0 2px 8px rgba(245,158,11,0.25); }
    .opt-a .modal-sidebar .pg { font-size: 10px; color: #94a3b8; text-align: center; margin-top: -4px; font-weight: 500; }
    .opt-a .modal-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .opt-a .modal-preview { flex: 1; display: flex; align-items: center; justify-content: center; background: #f8fafc; overflow: hidden; min-height: 0; }
    .opt-a .modal-preview canvas { max-width: 100%; max-height: 100%; display: block; }
    .opt-a .modal-footer {
      padding: 14px 24px; border-top: 1px solid #f1f5f9; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .opt-a .dl-btn {
      display: flex; align-items: center; gap: 8px; padding: 11px 28px;
      background: linear-gradient(135deg, #f59e0b, #ea580c); color: white; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .opt-a .dl-btn svg { width: 18px; height: 18px; }

    /* ============================================ */
    /* B: Arrows only (slideshow) */
    .opt-b .modal-box {
      background: white; border-radius: 16px; max-width: 700px; width: 100%;
      height: 85vh; max-height: 720px; position: relative;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .opt-b .modal-header {
      padding: 16px 24px 12px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .opt-b .m-title { font-family: 'DM Sans'; font-size: 18px; font-weight: 700; }
    .opt-b .modal-close {
      background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 8px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748b;
    }
    .opt-b .modal-preview-wrap {
      flex: 1; display: flex; align-items: center; position: relative; min-height: 0; background: #f8fafc;
    }
    .opt-b .modal-preview { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; height: 100%; }
    .opt-b .modal-preview canvas { max-width: 100%; max-height: 100%; display: block; }
    .opt-b .arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 50%; background: white; border: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      font-size: 18px; color: #475569; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 2;
    }
    .opt-b .arrow:hover { background: #f8fafc; border-color: #f59e0b; }
    .opt-b .arrow.left { left: 12px; }
    .opt-b .arrow.right { right: 12px; }
    .opt-b .modal-footer {
      padding: 14px 24px; border-top: 1px solid #f1f5f9; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .opt-b .page-ind { font-size: 13px; color: #64748b; font-weight: 500; }
    .opt-b .dl-btn {
      display: flex; align-items: center; gap: 8px; padding: 10px 24px;
      background: linear-gradient(135deg, #f59e0b, #ea580c); color: white; border: none;
      border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .opt-b .dl-btn svg { width: 16px; height: 16px; }

    /* ============================================ */
    /* C: Numbered dots */
    .opt-c .modal-box {
      background: white; border-radius: 16px; max-width: 700px; width: 100%;
      height: 85vh; max-height: 720px; position: relative;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .opt-c .modal-header {
      padding: 16px 24px 12px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .opt-c .m-title { font-family: 'DM Sans'; font-size: 18px; font-weight: 700; }
    .opt-c .modal-close {
      background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 8px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748b;
    }
    .opt-c .modal-preview { flex: 1; display: flex; align-items: center; justify-content: center; background: #f8fafc; overflow: hidden; min-height: 0; }
    .opt-c .modal-preview canvas { max-width: 100%; max-height: 100%; display: block; }
    .opt-c .modal-footer {
      padding: 14px 24px; border-top: 1px solid #f1f5f9; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 16px;
    }
    .opt-c .dots { display: flex; gap: 6px; align-items: center; }
    .opt-c .dot {
      width: 32px; height: 32px; border-radius: 50%; border: 2px solid #e2e8f0;
      background: white; color: #64748b; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s;
    }
    .opt-c .dot:hover { border-color: #f59e0b; color: #92400e; }
    .opt-c .dot.active { border-color: #f59e0b; background: #fef3c7; color: #92400e; }
    .opt-c .dl-btn {
      display: flex; align-items: center; gap: 8px; padding: 10px 24px;
      background: linear-gradient(135deg, #f59e0b, #ea580c); color: white; border: none;
      border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .opt-c .dl-btn svg { width: 16px; height: 16px; }

    /* ============================================ */
    /* D: Stacked scroll-through */
    .opt-d .modal-box {
      background: white; border-radius: 16px; max-width: 680px; width: 100%;
      height: 88vh; max-height: 760px; position: relative;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .opt-d .modal-header {
      padding: 16px 24px 12px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .opt-d .m-title { font-family: 'DM Sans'; font-size: 18px; font-weight: 700; }
    .opt-d .modal-close {
      background: #f1f5f9; border: none; width: 32px; height: 32px; border-radius: 8px;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748b;
    }
    .opt-d .modal-scroll {
      flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px;
      align-items: center; background: #f8fafc;
    }
    .opt-d .modal-scroll canvas { width: 100%; max-width: 580px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .opt-d .modal-footer {
      padding: 14px 24px; border-top: 1px solid #f1f5f9; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .opt-d .dl-btn {
      display: flex; align-items: center; gap: 8px; padding: 11px 28px;
      background: linear-gradient(135deg, #f59e0b, #ea580c); color: white; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .opt-d .dl-btn svg { width: 18px; height: 18px; }

    /* ============================================ */
    /* E: Compact header + bottom thumbs + side download */
    .opt-e .modal-box {
      background: white; border-radius: 16px; max-width: 920px; width: 100%;
      height: 88vh; max-height: 760px; position: relative;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .opt-e .modal-header {
      padding: 10px 16px; border-bottom: 1px solid #f1f5f9; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .opt-e .m-title-row {
      display: flex; align-items: center; gap: 12px; min-width: 0;
    }
    .opt-e .m-title { font-family: 'DM Sans'; font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .opt-e .m-sub { font-size: 12px; color: #94a3b8; white-space: nowrap; }
    .opt-e .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .opt-e .dl-btn-sm {
      display: flex; align-items: center; gap: 6px; padding: 8px 18px;
      background: linear-gradient(135deg, #f59e0b, #ea580c); color: white; border: none;
      border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .opt-e .dl-btn-sm svg { width: 14px; height: 14px; }
    .opt-e .modal-close {
      background: #f1f5f9; border: none; width: 28px; height: 28px; border-radius: 6px;
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748b; flex-shrink: 0;
    }
    .opt-e .modal-preview {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #f8fafc; overflow: hidden; min-height: 0;
    }
    .opt-e .modal-preview canvas { max-width: 100%; max-height: 100%; display: block; }
    .opt-e .modal-thumbs-bar {
      padding: 10px 16px; border-top: 1px solid #f1f5f9; flex-shrink: 0;
      display: flex; gap: 8px; justify-content: center; align-items: center; background: #fafbfc;
    }
    .opt-e .modal-thumbs-bar canvas {
      height: 72px; width: auto; border-radius: 4px; border: 2px solid #e2e8f0; cursor: pointer; transition: border-color 0.15s;
    }
    .opt-e .modal-thumbs-bar canvas:hover { border-color: #f59e0b; }
    .opt-e .modal-thumbs-bar canvas.active { border-color: #f59e0b; box-shadow: 0 2px 8px rgba(245,158,11,0.25); }

    /* Helper */
    .dl-icon { width: 18px; height: 18px; }
    .label { font-size: 11px; color: #94a3b8; text-align: center; padding: 6px; background: rgba(0,0,0,0.03); border-bottom: 1px solid #f1f5f9; }
  </style>
</head>
<body>
  <div class="switcher">
    <span>Layout:</span>
    <button class="active" onclick="show('a',this)">A: Sidebar</button>
    <button onclick="show('b',this)">B: Arrows</button>
    <button onclick="show('c',this)">C: Numbered Dots</button>
    <button onclick="show('d',this)">D: Stacked Scroll</button>
    <button onclick="show('e',this)">E: Compact + Bottom Thumbs</button>
  </div>

  <!-- A: Sidebar -->
  <div class="option opt-a active" id="opt-a">
    <div class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <button class="modal-close">&times;</button>
          <div class="m-title" id="titleA">Loading...</div>
          <div class="m-sub" id="subA"></div>
        </div>
        <div class="modal-body">
          <div class="modal-sidebar" id="sidebarA"></div>
          <div class="modal-main">
            <div class="modal-preview" id="previewA"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="dl-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Set</button>
        </div>
      </div>
    </div>
  </div>

  <!-- B: Arrows -->
  <div class="option opt-b" id="opt-b">
    <div class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <div class="m-title" id="titleB">Loading...</div>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-preview-wrap">
          <button class="arrow left" id="arrowL">&#8249;</button>
          <div class="modal-preview" id="previewB"></div>
          <button class="arrow right" id="arrowR">&#8250;</button>
        </div>
        <div class="modal-footer">
          <div class="page-ind" id="pageIndB">Page 1 of 5</div>
          <button class="dl-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Set</button>
        </div>
      </div>
    </div>
  </div>

  <!-- C: Numbered Dots -->
  <div class="option opt-c" id="opt-c">
    <div class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <div class="m-title" id="titleC">Loading...</div>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-preview" id="previewC"></div>
        <div class="modal-footer">
          <div class="dots" id="dotsC"></div>
          <button class="dl-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Set</button>
        </div>
      </div>
    </div>
  </div>

  <!-- D: Stacked Scroll -->
  <div class="option opt-d" id="opt-d">
    <div class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <div class="m-title" id="titleD">Loading...</div>
          <button class="modal-close">&times;</button>
        </div>
        <div class="modal-scroll" id="scrollD"></div>
        <div class="modal-footer">
          <button class="dl-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Set</button>
        </div>
      </div>
    </div>
  </div>

  <!-- E: Compact header + bottom thumbs -->
  <div class="option opt-e" id="opt-e">
    <div class="modal-overlay">
      <div class="modal-box">
        <div class="modal-header">
          <div class="m-title-row">
            <div class="m-title" id="titleE">Loading...</div>
            <div class="m-sub" id="subE"></div>
          </div>
          <div class="header-right">
            <button class="dl-btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Set</button>
            <button class="modal-close">&times;</button>
          </div>
        </div>
        <div class="modal-preview" id="previewE"></div>
        <div class="modal-thumbs-bar" id="thumbsE"></div>
      </div>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    var pdfUrl = 'printables/count-and-write-1-to-5/pack.pdf';

    function rp(pdfDoc, pageNum, canvas, maxWidth) {
      return pdfDoc.getPage(pageNum).then(function(page) {
        var vp = page.getViewport({ scale: 1 });
        var s = maxWidth / vp.width;
        var sv = page.getViewport({ scale: s });
        canvas.width = sv.width; canvas.height = sv.height;
        return page.render({ canvasContext: canvas.getContext('2d'), viewport: sv }).promise;
      });
    }

    function show(id, btn) {
      document.querySelectorAll('.option').forEach(function(o) { o.classList.remove('active'); });
      document.getElementById('opt-' + id).classList.add('active');
      document.querySelectorAll('.switcher button').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    }

    pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
      var n = pdf.numPages;
      var title = 'Count & Write 1\u20135';
      var sub = n + ' worksheets \u00B7 Pre-K \u2013 K';

      // === A: Sidebar ===
      document.getElementById('titleA').textContent = title;
      document.getElementById('subA').textContent = sub;
      var sA = document.getElementById('sidebarA');
      var pA = document.getElementById('previewA');
      var bigA = document.createElement('canvas'); pA.appendChild(bigA); rp(pdf, 1, bigA, 700);
      for (var i = 1; i <= n; i++) {
        (function(pg) {
          var t = document.createElement('canvas');
          if (pg === 1) t.classList.add('active');
          t.addEventListener('click', function() {
            sA.querySelectorAll('canvas').forEach(function(c) { c.classList.remove('active'); });
            t.classList.add('active');
            var bc = document.createElement('canvas');
            rp(pdf, pg, bc, 700).then(function() { pA.innerHTML = ''; pA.appendChild(bc); });
          });
          sA.appendChild(t); rp(pdf, pg, t, 130);
          var lb = document.createElement('div'); lb.className = 'pg'; lb.textContent = pg; sA.appendChild(lb);
        })(i);
      }

      // === B: Arrows ===
      document.getElementById('titleB').textContent = title;
      var pB = document.getElementById('previewB');
      var curB = 1;
      var bigB = document.createElement('canvas'); pB.appendChild(bigB); rp(pdf, 1, bigB, 620);
      function goB(pg) {
        curB = pg; document.getElementById('pageIndB').textContent = 'Page ' + pg + ' of ' + n;
        var c = document.createElement('canvas'); rp(pdf, pg, c, 620).then(function() { pB.innerHTML = ''; pB.appendChild(c); });
      }
      document.getElementById('arrowL').addEventListener('click', function() { if (curB > 1) goB(curB - 1); });
      document.getElementById('arrowR').addEventListener('click', function() { if (curB < n) goB(curB + 1); });

      // === C: Dots ===
      document.getElementById('titleC').textContent = title;
      var pC = document.getElementById('previewC');
      var dotsC = document.getElementById('dotsC');
      var bigC = document.createElement('canvas'); pC.appendChild(bigC); rp(pdf, 1, bigC, 620);
      for (var i = 1; i <= n; i++) {
        (function(pg) {
          var dot = document.createElement('div'); dot.className = 'dot'; dot.textContent = pg;
          if (pg === 1) dot.classList.add('active');
          dot.addEventListener('click', function() {
            dotsC.querySelectorAll('.dot').forEach(function(d) { d.classList.remove('active'); });
            dot.classList.add('active');
            var c = document.createElement('canvas'); rp(pdf, pg, c, 620).then(function() { pC.innerHTML = ''; pC.appendChild(c); });
          });
          dotsC.appendChild(dot);
        })(i);
      }

      // === D: Stacked ===
      document.getElementById('titleD').textContent = title;
      var sD = document.getElementById('scrollD');
      for (var i = 1; i <= n; i++) {
        var c = document.createElement('canvas'); sD.appendChild(c); rp(pdf, i, c, 580);
      }

      // === E: Compact + bottom thumbs ===
      document.getElementById('titleE').textContent = title;
      document.getElementById('subE').textContent = sub;
      var pE = document.getElementById('previewE');
      var tE = document.getElementById('thumbsE');
      var bigE = document.createElement('canvas'); pE.appendChild(bigE); rp(pdf, 1, bigE, 740);
      for (var i = 1; i <= n; i++) {
        (function(pg) {
          var t = document.createElement('canvas');
          if (pg === 1) t.classList.add('active');
          t.addEventListener('click', function() {
            tE.querySelectorAll('canvas').forEach(function(c) { c.classList.remove('active'); });
            t.classList.add('active');
            var bc = document.createElement('canvas');
            rp(pdf, pg, bc, 740).then(function() { pE.innerHTML = ''; pE.appendChild(bc); });
          });
          tE.appendChild(t); rp(pdf, pg, t, 80);
        })(i);
      }
    });
  </script>
</body>
</html>
