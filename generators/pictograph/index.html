  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // ===== Element refs =====

    const elAllowHalf = document.getElementById("allowHalf");
    const elMaxValue = document.getElementById("maxValue");
    const elNumQuestions = document.getElementById("numQuestions");

    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");

    const elSubtitleText = document.getElementById("subtitleText");

      advArrow.classList.toggle("open");

    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    // ===== SVG Symbol Drawing =====
    // Each function draws a symbol at (cx, cy) with given size, into an SVG group
    // If half is true, clip to left half

    function drawSymbolIceCream(g, cx, cy, size, half) {
      // Ice cream cone: triangle bottom + circle scoop top
      const s = size;
      const scoopR = s * 0.32;
      const coneTopY = cy - s * 0.05;
      const coneBotY = cy + s * 0.48;
      const coneHalfW = s * 0.26;

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Data generation =====
    function pickCategories(theme, count) {
      let resolvedTheme;
      if (theme === "random") {
        const allThemes = Object.keys(themes);
        resolvedTheme = allThemes[Math.floor(Math.random() * allThemes.length)];
      } else {
        resolvedTheme = theme;
      }
      let pool = [...themes[resolvedTheme].items];
      // Shuffle pool
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      // Clamp count to available items
      const actualCount = Math.min(count, pool.length);
      return { items: pool.slice(0, actualCount), resolvedTheme: resolvedTheme };
    }

    function generateGraphData(opts) {
      const pick = pickCategories(opts.dataTheme, opts.numCategories);
      const categories = pick.items;
      const resolvedTheme = pick.resolvedTheme;
      const keyVal = opts.keyValue;
      const allowHalf = opts.allowHalf;
      const maxVal = opts.maxValue;
      const values = [];

      for (let i = 0; i < categories.length; i++) {
        let v;
        if (allowHalf && keyVal > 1) {
          // Value must be a multiple of keyVal/2 (allows half symbols)
          const halfStep = keyVal / 2;
          const maxSteps = Math.floor(maxVal / halfStep);
          const steps = 1 + Math.floor(Math.random() * Math.max(1, maxSteps));
          v = steps * halfStep;
        } else {
          // Value must be a multiple of keyVal (whole symbols only)
          const maxSteps = Math.floor(maxVal / keyVal);
          const steps = 1 + Math.floor(Math.random() * Math.max(1, maxSteps));
          v = steps * keyVal;
        }
        v = clamp(v, keyVal > 1 && allowHalf ? keyVal / 2 : keyVal, maxVal);
        values.push(v);
      }

      // Ensure at least two different values
      if (values.every(v => v === values[0]) && values.length > 1) {
        const keyStep = (opts.allowHalf && keyVal > 1) ? keyVal / 2 : keyVal;
        let newVal = values[0] + keyStep;
        if (newVal > maxVal) newVal = Math.max(keyStep, values[0] - keyStep);
        values[Math.floor(Math.random() * values.length)] = newVal;
      }

      const questions = generateQuestions(categories, values, opts.numQuestions, resolvedTheme);
      return { categories, values, questions, resolvedTheme };
    }

    function generateQuestions(categories, values, count, resolvedTheme) {
      const questions = [];
      const used = new Set();
      const lang = themes[resolvedTheme];

      // Find max and min indices
      let maxVal = -1, minVal = Infinity;
      let maxIdx = 0, minIdx = 0;
      for (let i = 0; i < values.length; i++) {
        if (values[i] > maxVal) { maxVal = values[i]; maxIdx = i; }
        if (values[i] < minVal) { minVal = values[i]; minIdx = i; }
      }

      const qTypes = [];

      // Type 1: Counting - "How many students chose [category]?"
      for (let i = 0; i < categories.length; i++) {
        qTypes.push({
          type: "count",
          text: "How many " + lang.subject + " " + lang.verb + " " + categories[i] + "?",
          answer: values[i],
          key: "count-" + i
        });
      }

      // Type 2: Most popular
      qTypes.push({
        type: "most",
        text: "Which " + lang.mostPhrase + "?",
        answer: categories[maxIdx],
        key: "most"
      });

      // Type 3: Least popular
      qTypes.push({
        type: "least",
        text: "Which " + lang.leastPhrase + "?",
        answer: categories[minIdx],
        key: "least"
      });

      // Type 4: Comparison - "How many more students chose A than B?"
      for (let i = 0; i < categories.length; i++) {
        for (let j = i + 1; j < categories.length; j++) {
          if (values[i] !== values[j]) {
            const bigger = values[i] > values[j] ? i : j;
            const smaller = values[i] > values[j] ? j : i;
            const phrase = lang.morePhrase.replace("{A}", categories[bigger]).replace("{B}", categories[smaller]);
            qTypes.push({
              type: "difference",
              text: "How many " + phrase + "?",
              answer: Math.abs(values[i] - values[j]),
              key: "diff-" + i + "-" + j
            });
          }
        }
      }

      // Type 5: Total - "How many students were surveyed in all?"
      qTypes.push({
        type: "total",
        text: "How many " + lang.totalPhrase + "?",
        answer: values.reduce((a, b) => a + b, 0),
        key: "total"
      });

      // Ensure variety: try to include one of each type
      const picks = [];
      const countQs = qTypes.filter(q => q.type === "count");
      const compQs = qTypes.filter(q => q.type === "most" || q.type === "least");
      const diffQs = qTypes.filter(q => q.type === "difference");
      const totalQs = qTypes.filter(q => q.type === "total");

      if (countQs.length > 0) {
        const q = countQs[Math.floor(Math.random() * countQs.length)];
        picks.push(q); used.add(q.key);
      }
      if (compQs.length > 0 && picks.length < count) {
        const q = compQs[Math.floor(Math.random() * compQs.length)];
        picks.push(q); used.add(q.key);
      }
      if (diffQs.length > 0 && picks.length < count) {
        const q = diffQs[Math.floor(Math.random() * diffQs.length)];
        picks.push(q); used.add(q.key);
      }
      if (totalQs.length > 0 && picks.length < count) {
        const q = totalQs[Math.floor(Math.random() * totalQs.length)];
        picks.push(q); used.add(q.key);
      }

      // Fill remaining with random unused questions
      const remaining = qTypes.filter(q => !used.has(q.key));
      for (let i = remaining.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
      }
      for (const q of remaining) {
        if (picks.length >= count) break;
        picks.push(q); used.add(q.key);
      }

      // Shuffle final selection
      for (let i = picks.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [picks[i], picks[j]] = [picks[j], picks[i]];
      }

      return picks.slice(0, count);
    }

    function drawPictograph(svg, categories, values, keyVal, allowHalf, themeKey, left, top, width, height) {
      const numCats = categories.length;
      const labelColW = 110; // width for category labels on left
      const chartLeft = left + labelColW;
      const chartW = width - labelColW;

      // Calculate max number of whole symbols any row needs
      let maxSymbols = 0;
      for (let i = 0; i < numCats; i++) {
        const wholeCount = Math.floor(values[i] / keyVal);
        const hasHalf = allowHalf && keyVal > 1 && (values[i] % keyVal !== 0);
        maxSymbols = Math.max(maxSymbols, wholeCount + (hasHalf ? 1 : 0));
      }
      maxSymbols = Math.max(maxSymbols, 1);

      // Key line height
      const keyLineH = 28;
      // Available height for rows
      const rowsAreaH = height - keyLineH - 10;
      const rowH = Math.min(rowsAreaH / numCats, 60);
      const totalRowsH = rowH * numCats;

      // Symbol sizing: fit within row and columns
      const symbolSpacing = Math.min(chartW / maxSymbols, rowH * 0.9);
      const symbolSize = symbolSpacing * 0.78;

      // Center rows vertically in available space
      const rowsStartY = top + (rowsAreaH - totalRowsH) / 2;

      // Draw grid background (alternating light rows)
      for (let i = 0; i < numCats; i++) {
        if (i % 2 === 0) {
          svg.appendChild(svgEl("rect", {
            x: left, y: rowsStartY + i * rowH,
            width: width, height: rowH,
            fill: "#F7FAFC", rx: 2
          }));
        }
      }

      // Draw horizontal grid lines
      for (let i = 0; i <= numCats; i++) {
        svg.appendChild(svgEl("line", {
          x1: left, y1: rowsStartY + i * rowH,
          x2: left + width, y2: rowsStartY + i * rowH,
          stroke: "#CBD5E0", "stroke-width": 0.75
        }));
      }

      // Draw vertical separator between labels and symbols
      svg.appendChild(svgEl("line", {
        x1: chartLeft, y1: rowsStartY,
        x2: chartLeft, y2: rowsStartY + totalRowsH,
        stroke: "#CBD5E0", "stroke-width": 0.75
      }));

      // Draw category labels and symbols
      for (let i = 0; i < numCats; i++) {
        const rowCy = rowsStartY + i * rowH + rowH / 2;

        // Category label
        const catLabel = svgEl("text", {
          x: left + labelColW - 10, y: rowCy + 5,
          "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": 600,
          fill: "#2d3748", "text-anchor": "end"
        });
        catLabel.textContent = categories[i];
        svg.appendChild(catLabel);

        // Draw symbols
        const wholeCount = Math.floor(values[i] / keyVal);
        const hasHalf = allowHalf && keyVal > 1 && (values[i] % keyVal !== 0);
        const symbolStartX = chartLeft + symbolSpacing * 0.55;

        for (let s = 0; s < wholeCount; s++) {
          const sx = symbolStartX + s * symbolSpacing;
          drawSymbol(svg, themeKey, sx, rowCy, symbolSize, false);
        }

        // Draw half symbol if needed
        if (hasHalf) {
          const sx = symbolStartX + wholeCount * symbolSpacing;
          drawSymbol(svg, themeKey, sx, rowCy, symbolSize, true);
        }
      }

      // ===== Key =====
      const keyY = rowsStartY + totalRowsH + 20;

      // Build the key text and symbol inline
      // First, the text "Key: Each"
      const keyTextBefore = svgEl("text", {
        x: left + width / 2 - 60, y: keyY,
        "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": 700,
        fill: "#2d3748", "text-anchor": "end"
      });
      keyTextBefore.textContent = "Key: Each";
      svg.appendChild(keyTextBefore);

      // Draw a small key symbol
      drawSymbol(svg, themeKey, left + width / 2 - 44, keyY - 4, 18, false);

      // Then " = X [subject]"
      const keyTextAfter = svgEl("text", {
        x: left + width / 2 - 28, y: keyY,
        "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": 700,
        fill: "#2d3748", "text-anchor": "start"
      });
      const lang = themes[themeKey];
      keyTextAfter.textContent = " = " + keyVal + " " + lang.subject;
      svg.appendChild(keyTextAfter);

      // If half symbols allowed, add note
      if (allowHalf && keyVal > 1) {
        const halfNote = svgEl("text", {
          x: left + width / 2, y: keyY + 16,
          "font-family": "Fredoka, sans-serif", "font-size": 11, "font-weight": 500,
          fill: "#718096", "text-anchor": "middle"
        });
        halfNote.textContent = "(Half picture = " + (keyVal / 2) + " " + lang.subject + ")";
        svg.appendChild(halfNote);
      }
    }

    // ===== Draw Questions =====
    function drawQuestions(svg, questions, left, top, width, height, showAnswers, numbered, includeExample) {
      const numQ = questions.length;

      // Section label
      const sectionLabel = svgEl("text", {
        x: left, y: top + 4,
        "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": 700,
        fill: "#2d3748"
      });
      sectionLabel.textContent = "Questions:";
      svg.appendChild(sectionLabel);

      // Underline for section
      svg.appendChild(svgEl("line", {
        x1: left, y1: top + 8, x2: left + 76, y2: top + 8,
        stroke: "#f59e0b", "stroke-width": 2
      }));

      const qStartY = top + 28;
      const qSpacing = Math.min((height - 28) / numQ, 52);
      const lineLen = 80;

      for (let i = 0; i < numQ; i++) {
        const q = questions[i];
        const y = qStartY + i * qSpacing;
        const isExample = (i === 0 && includeExample && !showAnswers);

        // Question number and text
        const qText = svgEl("text", {
          x: left + 4, y: y + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": 500,
          fill: "#1a202c"
        });
        qText.textContent = (numbered !== false ? (i + 1) + ". " : "") + q.text;
        svg.appendChild(qText);

        // Answer line
        const lineX = left + width - lineLen - 4;
        const lineStroke = isExample ? "#22c55e" : "#2d3748";
        svg.appendChild(svgEl("line", {
          x1: lineX, y1: y + 16, x2: lineX + lineLen, y2: y + 16,
          stroke: lineStroke, "stroke-width": 1
        }));

        // Example badge
        if (isExample) {
          const badgeX = lineX - 50, badgeY = y + 3;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
          const bt = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          bt.textContent = "Example"; svg.appendChild(bt);
          // Show answer in green
          const ansEl = svgEl("text", {
            x: lineX + lineLen / 2, y: y + 12,
            "font-family": "Fredoka, sans-serif", "font-size": 14, "font-weight": 700,
            fill: "#16a34a", "text-anchor": "middle"
          });
          ansEl.textContent = String(q.answer);
          svg.appendChild(ansEl);
        } else if (showAnswers) {
          const ansEl = svgEl("text", {
            x: lineX + lineLen / 2, y: y + 12,
            "font-family": "Fredoka, sans-serif", "font-size": 14, "font-weight": 700,
            fill: "#3182ce", "text-anchor": "middle"
          });
          ansEl.textContent = String(q.answer);
          svg.appendChild(ansEl);
        }
      }
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      return {
        dataTheme: elDataTheme.value,
        numCategories: parseInt(elNumCategories.value, 10),
        keyValue: parseInt(elKeyValue.value, 10),
        allowHalf: elAllowHalf.value === "yes",
        maxValue: parseInt(elMaxValue.value, 10),
        numQuestions: parseInt(elNumQuestions.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        showHeader: showHeader,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
      };
    }

    // ===== Render functions =====
    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateGraphData(opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateGraphData(opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = "";
      sheetWrap.className = "";
      sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div");
          p.className = "worksheet-page";
          const t = getTitle(themes[currentState.sheets[s].resolvedTheme].title);
          const st = getSubtitle();
          const v = renderWorksheetSVG(currentState.sheets[s], {
            showHeader: opts.showHeader, title: t, subtitle: st, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample
          });
          p.appendChild(v);
          sheetWrap.appendChild(p);
        }
        return;
      }

      // Desktop: grid layout with calculated sizing
      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2;
        const ah = window.innerHeight - 80;
        const gap = 24;
        const mrw = 180;
        let cols;
        if (numSheets <= 3) {
          cols = numSheets;
          if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap)));
        } else {
          cols = Math.min(3, numSheets);
          if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap)));
        }
        const msw = (aw - (cols - 1) * gap) / cols;
        const msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale);
        const sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div");
          p.className = "worksheet-page";
          const t = getTitle(themes[currentState.sheets[s].resolvedTheme].title);
          const st = getSubtitle();
          const v = renderWorksheetSVG(currentState.sheets[s], {
            showHeader: opts.showHeader, title: t, subtitle: st, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample
          });
          v.setAttribute("width", sw);
          v.setAttribute("height", sh);
          p.appendChild(v);
          sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div");
        p.className = "worksheet-page";
        const t = getTitle(themes[currentState.sheets[0].resolvedTheme].title);
        const st = getSubtitle();
        const v = renderWorksheetSVG(currentState.sheets[0], {
          showHeader: opts.showHeader, title: t, subtitle: st, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample
        });
        p.appendChild(v);
        sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }


    // Load and register TTF fonts with jsPDF for embedded vector text in PDFs
    let _fontCache = {};
    // Preload font files on page load so PDF generation is faster
    (function preloadFonts() {
      ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
        fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
          var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
        }).catch(function() {});
      });
    })();
    async function registerPdfFonts(pdf) {
      // svg2pdf strips quotes and fallbacks, so register with clean names only
      // Also register "normal" for undefined-style calls
      const fontDefs = [
        { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
        { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
        { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
      ];
      let idx = 0;
      for (const f of fontDefs) {
        try {
          let b64;
          if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
          else {
            const resp = await fetch(f.file);
            const buf = await resp.arrayBuffer();
            const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
            _fontCache[f.file] = b64;
          }
          for (const style of f.styles) {
            const vfsName = "f" + (idx++) + ".ttf";
            pdf.addFileToVFS(vfsName, b64);
            pdf.addFont(vfsName, f.name, style);
          }
        } catch(e) { console.warn("Font load failed:", f.file, e); }
      }
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                const t = getTitle(themes[currentState.sheets[i].resolvedTheme].title);
                const st = getSubtitle();
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], {
                  showHeader: "none", title: t, subtitle: st, branded: opts.branded, showAnswers: true, numbered: opts.numbered, isAnswerKey: true, includeExample: false
                }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      // Register embedded fonts
      await registerPdfFonts(pdf);

      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }


    // ===== Event Listeners =====
    elDataTheme.addEventListener("change", () => renderWithNewRandomization());
    elNumCategories.addEventListener("change", () => renderWithNewRandomization());
    elKeyValue.addEventListener("change", () => renderWithNewRandomization());
    elAllowHalf.addEventListener("change", () => renderWithNewRandomization());
    elMaxValue.addEventListener("change", () => renderWithNewRandomization());
    elNumQuestions.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());

    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});

    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
    let resizeTimeout;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150);
    });

    // ===== Init =====
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
