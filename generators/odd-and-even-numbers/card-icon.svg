<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f7f8fc"/>
  <!-- Row of numbers like the generator grid -->
  <text x="40" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">3</text>
  <text x="100" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">8</text>
  <text x="160" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">5</text>
  <!-- Answer circles around odd numbers (orange like generator) -->
  <circle cx="40" cy="38" r="18" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="2.5"/>
  <circle cx="160" cy="38" r="18" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="2.5"/>
  <!-- Second row -->
  <text x="40" y="95" text-anchor="middle" font-size="28" font-weight="700" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">2</text>
  <text x="100" y="95" text-anchor="middle" font-size="28" font-weight="700" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">7</text>
  <text x="160" y="95" text-anchor="middle" font-size="28" font-weight="700" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">6</text>
  <!-- Answer circle around odd number -->
  <circle cx="100" cy="88" r="18" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="2.5"/>
  <!-- Labels -->
  <text x="100" y="130" text-anchor="middle" font-size="11" font-weight="700" fill="#9ca3af" font-family="Fredoka, sans-serif">Circle the odd numbers</text>
</svg>