  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elMode = document.getElementById("modeSelect");
    const elRange = document.getElementById("rangeSelect");
    const elIncludeOdd = document.getElementById("includeOdd");
    const elIncludeEven = document.getElementById("includeEven");
    const elCircleTargetGroup = document.getElementById("circleTargetGroup");
    const elNumSheets = document.getElementById("numWorksheets");
    const elAnswerKey = document.getElementById("answerKey");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => {
      advPanel.classList.toggle("open");
      advArrow.classList.toggle("open");
    });

    // ===== State =====
    let currentState = { sheets: [], sheetMeta: [] };

    // ===== Number generation =====
    function generateNumbers(count, maxVal) {
      const numbers = [];
      const seen = new Set();
      let attempts = 0;
      while (numbers.length < count && attempts < count * 100) {
        attempts++;
        const n = Math.floor(Math.random() * maxVal) + 1;
        if (!seen.has(n)) {
          seen.add(n);
          numbers.push(n);
        }
      }
      // If we can't get enough unique numbers, allow duplicates
      while (numbers.length < count) {
        numbers.push(Math.floor(Math.random() * maxVal) + 1);
      }
      // Shuffle
      for (let i = numbers.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
      }
      return numbers;
    }

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return "Odd and Even Numbers";
    }

    function getCircleTarget() {
      return elIncludeOdd.checked ? "odd" : "even";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      const mode = elMode.value;
      if (mode === "circle") return "Circle all the " + getCircleTarget() + " numbers.";
      if (mode === "sort") return "Sort the numbers into odd and even.";
      if (mode === "write") return "Write whether each number is odd or even.";
      return "Circle all the odd numbers.";
    }

    // ===== Gather options =====
    function getProblemsPerSheet() {
      const mode = elMode.value;
      if (mode === "circle") return 20;
      if (mode === "sort") return 12;
      if (mode === "write") return 12;
      return 20;
    }

    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        mode: elMode.value,
        maxVal: parseInt(elRange.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        problemsPerSheet: getProblemsPerSheet(),
        showHeader,
        title,
        subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
        circleTarget: getCircleTarget(),
      };
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(numbers, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, mode, targetType, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 20;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.svg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });

        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const bottomMargin = branded ? 56 : 24;
      const availH = pageH - bottomMargin - topGridY;

      if (mode === "circle") {
        renderCircleMode(svg, numbers, topGridY, availW, availH, margin, pageW, showAnswers, targetType, includeExample);
      } else if (mode === "sort") {

      } else if (mode === "write") {
        renderWriteMode(svg, numbers, topGridY, availW, availH, margin, pageW, showAnswers, numbered, includeExample);
      }

      return svg;
    }

    // ===== Circle Mode =====
    function renderCircleMode(svg, numbers, topGridY, availW, availH, margin, pageW, showAnswers, targetType, includeExample) {
      // No instruction text — subtitle already says it
      const gridTop = topGridY + 10;
      const gridAvailH = availH - (gridTop - topGridY);
      const count = numbers.length;

      // Calculate grid layout
      let cols = 5;
      const rows = Math.ceil(count / cols);

      const cellW = availW / cols;
      const cellH = gridAvailH / rows;
      const fontSize = Math.min(36, Math.max(22, Math.floor(Math.min(cellW, cellH) * 0.45)));

      for (let i = 0; i < count; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cx = margin + col * cellW + cellW / 2;
        const cy = gridTop + row * cellH + cellH / 2;
        const num = numbers[i];
        const isTarget = targetType === "odd" ? (num % 2 !== 0) : (num % 2 === 0);
        const isExample = (i === 0 && includeExample && !showAnswers);

        // Example badge above number
        if (isExample) {
          const badgeX = cx - 21, badgeY = cy - fontSize * 0.6 - 16;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
          const bt = svgEl("text", { x: cx, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          bt.textContent = "Example"; svg.appendChild(bt);
        }

        // Answer key: circle around target numbers
        if (showAnswers && isTarget) {
          const circleR = fontSize * 0.7;
          svg.appendChild(svgEl("circle", {
            cx: cx, cy: cy, r: circleR,
            fill: "rgba(245, 158, 11, 0.15)", stroke: "#f59e0b", "stroke-width": 3
          }));
        }
        // Example: circle around first if target
        if (isExample && isTarget) {
          const circleR = fontSize * 0.7;
          svg.appendChild(svgEl("circle", {
            cx: cx, cy: cy, r: circleR,
            fill: "rgba(34,197,94,0.15)", stroke: "#22c55e", "stroke-width": 3
          }));
        }

        // Draw number — larger, using header font
        const numEl = svgEl("text", {
          x: cx, y: cy + fontSize * 0.35,
          "font-family": "'Google Sans Flex', sans-serif", "font-size": fontSize, "font-weight": 700,
          "text-anchor": "middle",
          fill: (isExample && isTarget) ? "#16a34a" : (showAnswers && isTarget) ? "#f59e0b" : "#1a202c"
        });
        numEl.textContent = num;
        svg.appendChild(numEl);
      }
    }

    // ===== Sort Mode =====
    function renderSortMode(svg, numbers, topGridY, availW, availH, margin, pageW, pageH, showAnswers, bottomMargin, includeExample) {
      // No instruction text — subtitle already says it
      const numRowY = topGridY + 30;
      const count = numbers.length;
      const numFontSize = Math.min(28, Math.max(18, Math.floor(availW / (count * 1.8))));
      const numSpacing = availW / count;

      for (let i = 0; i < count; i++) {
        const x = margin + i * numSpacing + numSpacing / 2;
        const numEl = svgEl("text", {
          x: x, y: numRowY,
          "font-family": "'Google Sans Flex', sans-serif", "font-size": numFontSize, "font-weight": 700,
          "text-anchor": "middle", fill: "#1a202c"
        });
        numEl.textContent = numbers[i];
        svg.appendChild(numEl);
      }

      // Divider line below numbers
      const dividerY = numRowY + 20;
      svg.appendChild(svgEl("line", { x1: margin, y1: dividerY, x2: pageW - margin, y2: dividerY, stroke: "#2d3748", "stroke-width": 1.5 }));

      // Two column layout — bottom stops 2 returns above footer
      const colAreaTop = dividerY + 10;
      const colAreaH = pageH - bottomMargin - colAreaTop - 40;
      const halfW = availW / 2;
      const gapBetween = 20;

      // Center divider line — shortened to match column area
      const centerX = pageW / 2;
      svg.appendChild(svgEl("line", { x1: centerX, y1: colAreaTop, x2: centerX, y2: colAreaTop + colAreaH, stroke: "#cbd5e0", "stroke-width": 1, "stroke-dasharray": "4,4" }));

      // Column headers
      const headerY = colAreaTop + 28;
      const oddHeaderEl = svgEl("text", {
        x: margin + halfW / 2, y: headerY,
        "font-family": "Fredoka, sans-serif", "font-size": 20, "font-weight": 700,
        "text-anchor": "middle", fill: "#2d3748"
      });
      oddHeaderEl.textContent = "Odd";
      svg.appendChild(oddHeaderEl);

      const evenHeaderEl = svgEl("text", {
        x: centerX + halfW / 2, y: headerY,
        "font-family": "Fredoka, sans-serif", "font-size": 20, "font-weight": 700,
        "text-anchor": "middle", fill: "#2d3748"
      });
      evenHeaderEl.textContent = "Even";
      svg.appendChild(evenHeaderEl);

      // Header underline
      const headerLineY = headerY + 8;
      svg.appendChild(svgEl("line", { x1: margin + 20, y1: headerLineY, x2: centerX - 20, y2: headerLineY, stroke: "#2d3748", "stroke-width": 1 }));
      svg.appendChild(svgEl("line", { x1: centerX + 20, y1: headerLineY, x2: pageW - margin - 20, y2: headerLineY, stroke: "#2d3748", "stroke-width": 1 }));

      // Blank lines for student to write answers — fill all the way down
      const lineStartY = headerLineY + 30;
      const oddNums = numbers.filter(n => n % 2 !== 0).sort((a, b) => a - b);
      const evenNums = numbers.filter(n => n % 2 === 0).sort((a, b) => a - b);
      const lineSpacing = 32;
      const colBottom = colAreaTop + colAreaH;
      const maxLines = Math.max(oddNums.length, evenNums.length, Math.floor((colBottom - lineStartY) / lineSpacing) + 1);

      for (let i = 0; i < maxLines; i++) {
        const y = lineStartY + i * lineSpacing;
        // Odd column line
        svg.appendChild(svgEl("line", { x1: margin + 30, y1: y, x2: centerX - 30, y2: y, stroke: "#e2e8f0", "stroke-width": 1 }));
        // Even column line
        svg.appendChild(svgEl("line", { x1: centerX + 30, y1: y, x2: pageW - margin - 30, y2: y, stroke: "#e2e8f0", "stroke-width": 1 }));

        if (showAnswers) {
          if (i < oddNums.length) {
            const ansEl = svgEl("text", {
              x: margin + halfW / 2, y: y - 4,
              "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 700,
              "text-anchor": "middle", fill: "#3182ce"
            });
            ansEl.textContent = oddNums[i];
            svg.appendChild(ansEl);
          }
          if (i < evenNums.length) {
            const ansEl = svgEl("text", {
              x: centerX + halfW / 2, y: y - 4,
              "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 700,
              "text-anchor": "middle", fill: "#3182ce"
            });
            ansEl.textContent = evenNums[i];
            svg.appendChild(ansEl);
          }
        }
      }
    }

    // ===== Write Mode =====
    function renderWriteMode(svg, numbers, topGridY, availW, availH, margin, pageW, showAnswers, numbered, includeExample) {
      const count = numbers.length;
      const cols = 2;
      const rows = Math.ceil(count / cols);
      const colW = availW / cols;
      const usableH = availH - 80; // pull bottom rows up
      const rowH = usableH / rows;

      const fontSize = Math.min(24, Math.max(16, Math.floor(rowH * 0.45)));
      const probNumSize = 10;

      for (let i = 0; i < count; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cellLeft = margin + col * colW;
        const cellTop = topGridY + row * rowH;
        const cy = cellTop + rowH / 2 + fontSize * 0.35;
        const isExample = (i === 0 && includeExample && !showAnswers);

        let x = cellLeft + 12;

        // Problem number
        if (numbered !== false) {
          const probNumY = cy - 0.72 * (fontSize - probNumSize);
          const numLabelEl = svgEl("text", { x: x, y: probNumY, "font-family": "Fredoka, sans-serif", "font-size": probNumSize, "font-weight": 600, fill: "#a0aec0" });
          numLabelEl.textContent = (i + 1) + ".";
          svg.appendChild(numLabelEl);
        }
        x += probNumSize * (count >= 10 ? 2.0 : 1.6);

        // Number
        const numEl = svgEl("text", {
          x: x, y: cy,
          "font-family": "'Google Sans Flex', sans-serif",
          "font-size": fontSize, "font-weight": 700, fill: "#1a202c"
        });
        numEl.textContent = numbers[i];
        svg.appendChild(numEl);
        x += String(numbers[i]).length * fontSize * 0.62 + fontSize * 0.8;

        // "is" label
        const isEl = svgEl("text", {
          x: x, y: cy,
          "font-family": "Fredoka, sans-serif",
          "font-size": fontSize * 0.85, "font-weight": 400, fill: "#4a5568"
        });
        isEl.textContent = "is";
        svg.appendChild(isEl);
        x += fontSize * 1.4;

        // Answer line
        const lineW = Math.min(colW * 0.35, 140);
        svg.appendChild(svgEl("line", {
          x1: x, y1: cy + 4, x2: x + lineW, y2: cy + 4,
          stroke: isExample ? "#22c55e" : "#2d3748", "stroke-width": 1
        }));

        // Example badge
        if (isExample) {
          const badgeX = x + lineW - 44, badgeY = cy - fontSize * 0.7 - 13;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
          const bt = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          bt.textContent = "Example"; svg.appendChild(bt);
        }

        if (isExample) {
          const ansEl = svgEl("text", {
            x: x + lineW / 2, y: cy,
            "text-anchor": "middle",
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": fontSize * 0.85, "font-weight": 700, fill: "#16a34a"
          });
          ansEl.textContent = numbers[i] % 2 === 0 ? "even" : "odd";
          svg.appendChild(ansEl);
        } else if (showAnswers) {
          const ansEl = svgEl("text", {
            x: x + lineW / 2, y: cy,
            "text-anchor": "middle",
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": fontSize * 0.85, "font-weight": 700, fill: "#3182ce"
          });
          ansEl.textContent = numbers[i] % 2 === 0 ? "even" : "odd";
          svg.appendChild(ansEl);
        }
      }
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];

      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateNumbers(opts.problemsPerSheet, opts.maxVal));
        currentState.sheetMeta.push({

        });
      }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateNumbers(opts.problemsPerSheet, opts.maxVal));
        currentState.sheetMeta.push({
          targetType: getTargetType(currentState.sheets.length - 1)
        });
      }
      if (currentState.sheets.length > opts.numWorksheets) {
        currentState.sheets.length = opts.numWorksheets;
        currentState.sheetMeta.length = opts.numWorksheets;
      }
      renderWorksheet();

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], {
            showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded,
            showAnswers: false, mode: opts.mode, targetType: currentState.sheetMeta[s].targetType, numbered: opts.numbered, includeExample: opts.includeExample
          });
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cols - 1) * gap) / cols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], {
            showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded,
            showAnswers: false, mode: opts.mode, targetType: currentState.sheetMeta[s].targetType, numbered: opts.numbered, includeExample: opts.includeExample
          });
          v.setAttribute("width", sw); v.setAttribute("height", sh);
          p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], {
          showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded,
          showAnswers: false, mode: opts.mode, targetType: currentState.sheetMeta[0].targetType, numbered: opts.numbered, includeExample: opts.includeExample
        });
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], {
                  showHeader: "none", title: opts.title, subtitle: opts.subtitle, branded: opts.branded,
                  showAnswers: true, mode: opts.mode, targetType: currentState.sheetMeta[i].targetType, numbered: opts.numbered, isAnswerKey: true, includeExample: false
                }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
<script src="../../favorites.js"></script>
</body>
