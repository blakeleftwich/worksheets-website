  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function isMobile() { return window.innerWidth <= 900; }

    // ===== Element refs =====

    const elNumSheets = document.getElementById("numWorksheets");

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Problem generation =====
    function generateProblems(count, opts) {
      const { maxNum, allowEquals } = opts;
      const problems = [];
      const seen = new Set();

      // Quota-based distribution: ~20% equal (if allowed), rest split between > and <
      let numEqual = 0;
      if (allowEquals) {
        numEqual = Math.max(1, Math.round(count * 0.2));
        if (numEqual > Math.floor(count / 3)) numEqual = Math.floor(count / 3);
      }
      const numGT = Math.ceil((count - numEqual) / 2);
      const numLT = count - numEqual - numGT;

      let gtLeft = numGT, ltLeft = numLT, eqLeft = numEqual;

      let attempts = 0;
      while (problems.length < count && attempts < count * 500) {
        attempts++;

        const available = [];
        if (gtLeft > 0) available.push("gt");
        if (ltLeft > 0) available.push("lt");
        if (eqLeft > 0) available.push("eq");
        if (available.length === 0) break;
        const type = available[Math.floor(Math.random() * available.length)];

        let a, b;
        if (type === "eq") {
          a = Math.floor(Math.random() * (maxNum + 1));
          b = a;
        } else if (type === "gt") {
          // a > b
          if (maxNum < 2) { a = maxNum; b = 0; }
          else {
            a = 1 + Math.floor(Math.random() * maxNum); // 1..maxNum
            b = Math.floor(Math.random() * a);           // 0..a-1
          }
          // For large ranges, avoid pairs that are trivially far apart
          if (maxNum > 20 && (a - b) > Math.ceil(maxNum * 0.6)) continue;
        } else {
          // a < b
          if (maxNum < 2) { a = 0; b = maxNum; }
          else {
            b = 1 + Math.floor(Math.random() * maxNum); // 1..maxNum
            a = Math.floor(Math.random() * b);           // 0..b-1
          }
          if (maxNum > 20 && (b - a) > Math.ceil(maxNum * 0.6)) continue;
        }

        a = clamp(a, 0, maxNum);
        b = clamp(b, 0, maxNum);

        const key = a + "," + b;
        if (seen.has(key)) continue;
        seen.add(key);

        const symbol = a > b ? ">" : a < b ? "<" : "=";
        problems.push({ a, b, symbol });

        if (type === "gt") gtLeft--;
        else if (type === "lt") ltLeft--;
        else eqLeft--;
      }

      // Fallback fill
      let fa = 0;
      while (problems.length < count && fa < count * 500) {
        fa++;
        const a = Math.floor(Math.random() * (maxNum + 1));
        const b = Math.floor(Math.random() * (maxNum + 1));
        if (!allowEquals && a === b) continue;
        const key = a + "," + b;
        if (seen.has(key)) continue;
        seen.add(key);
        const symbol = a > b ? ">" : a < b ? "<" : "=";
        problems.push({ a, b, symbol });
      }

      // Final fallback
      while (problems.length < count) {
        const a = Math.floor(Math.random() * (maxNum + 1));
        const b = Math.floor(Math.random() * maxNum);
        const symbol = a > b ? ">" : a < b ? "<" : "=";
        problems.push({ a, b, symbol });
      }

      // Shuffle
      for (let i = problems.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [problems[i], problems[j]] = [problems[j], problems[i]];
      }
      return problems;
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", {
        width: pageW, height: pageH,
        viewBox: "0 0 " + pageW + " " + pageH,
        xmlns: "http://www.w3.org/2000/svg"
      });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16,
            "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#000000"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#000000", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16,
            "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#000000"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#000000", "stroke-width": 0.75
          }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16,
            "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#000000"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#000000", "stroke-width": 0.75
          }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 14,
            "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#000000"
          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      // ===== Branding =====
      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.jpg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const count = problems.length;
      const bottomMargin = branded ? 56 : 24;
      const gridTop = topGridY;
      const availH = pageH - bottomMargin - gridTop;
      const availW = pageW - margin * 2;

      // ===== Grid layout — 2 columns =====
      const cols = 2;
      const rows = Math.ceil(count / cols);
      const colW = availW / cols;
      const rowH = availH / rows;

      // Determine max value to set font size
      const maxNum = getRangeValue();

      // Font size: larger for small numbers, smaller for large numbers
      let fontSize;
      if (maxNum <= 10) {
        fontSize = clamp(Math.floor(rowH * 0.48), 22, 38);
      } else if (maxNum <= 20) {
        fontSize = clamp(Math.floor(rowH * 0.44), 20, 34);
      } else if (maxNum <= 100) {
        fontSize = clamp(Math.floor(rowH * 0.40), 18, 30);
      } else {
        fontSize = clamp(Math.floor(rowH * 0.36), 16, 26);
      }

      const charW = fontSize * 0.62;
      const boxSize = fontSize * 1.25;

      // Find max digit count for consistent alignment within each column
      const colMaxDigits = new Array(cols).fill(1);
      for (let i = 0; i < problems.length; i++) {
        const col = i % cols;
        const dA = String(problems[i].a).length;
        const dB = String(problems[i].b).length;
        colMaxDigits[col] = Math.max(colMaxDigits[col], dA, dB);
      }

      // Problem number fixed sizing
      const probNumSize = 10;
      const probNumW = numbered !== false ? probNumSize * (count >= 10 ? 2.0 : 1.6) : 0;

      for (let i = 0; i < problems.length; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cellLeft = margin + col * colW;
        const cellTop = gridTop + row * rowH;

        const { a, b, symbol } = problems[i];
        const aStr = String(a);
        const bStr = String(b);
        const maxDigits = colMaxDigits[col];
        const numFieldW = maxDigits * charW;

        // Vertical center of this cell
        const cy = cellTop + rowH / 2 + fontSize * 0.35;
        const centerY = cellTop + rowH / 2;

        // Calculate total content width for centering in the column
        const gapAfterNum = charW * 0.6;
        const gapBetween = charW * 0.7;
        const totalW = probNumW + numFieldW + gapBetween + boxSize + gapBetween + numFieldW;
        const startX = cellLeft + colW / 2 - totalW / 2;

        let x = startX;

        // Problem number
        if (numbered !== false) {
          const probNumY = cy - 0.72 * (fontSize - probNumSize);
          const numEl = svgEl("text", {
            x: x, y: probNumY,
            "font-family": "Fredoka, sans-serif",
            "font-size": String(probNumSize),
            "font-weight": "600",
            fill: "#a0aec0"
          });
          numEl.textContent = (i + 1) + ".";
          svg.appendChild(numEl);
          x += probNumW;
        }

        // Number A — right-aligned within its field
        const aX = x + numFieldW - aStr.length * charW;
        const aEl = svgEl("text", {
          x: aX, y: cy,
          "font-family": "'Google Sans Flex', sans-serif",
          "font-size": String(fontSize),
          "font-weight": "500",
          fill: "#1a202c"
        });
        aEl.textContent = aStr;
        svg.appendChild(aEl);
        x += numFieldW + gapBetween;

        // Box for the symbol
        const boxX = x;
        const boxY = cy - boxSize * 0.78;
        const isExample = (i === 0 && includeExample && !showAnswers);

        if (isExample) {
          // Green-tinted box
          svg.appendChild(svgEl("rect", {
            x: boxX, y: boxY,
            width: boxSize, height: boxSize,
            rx: 4,
            fill: "#f0fdf4",
            stroke: "#22c55e",
            "stroke-width": "1.5"
          }));
          // "Example" badge above box
          const badgeW = 46, badgeH = 13;
          const badgeX = boxX + boxSize / 2 - badgeW / 2;
          const badgeY = boxY - badgeH - 3;
          svg.appendChild(svgEl("rect", {
            x: badgeX, y: badgeY,
            width: badgeW, height: badgeH,
            rx: 3, ry: 3,
            fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75"
          }));
          const badgeText = svgEl("text", {
            x: badgeX + badgeW / 2, y: badgeY + 9.5,
            "text-anchor": "middle",
            "font-family": "Fredoka, sans-serif",
            "font-size": "8",
            "font-weight": "600",
            fill: "#16a34a"
          });
          badgeText.textContent = "Example";
          svg.appendChild(badgeText);
          // Symbol in green
          const symEl = svgEl("text", {
            x: boxX + boxSize / 2, y: cy + fontSize * 0.28,
            "text-anchor": "middle",
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(fontSize * 0.85),
            "font-weight": "500",
            fill: "#16a34a"
          });
          symEl.textContent = symbol;
          svg.appendChild(symEl);
        } else {
          svg.appendChild(svgEl("rect", {
            x: boxX, y: boxY,
            width: boxSize, height: boxSize,
            rx: 4,
            fill: "none",
            stroke: "#2d3748",
            "stroke-width": "1.5"
          }));
          if (showAnswers) {
            const symEl = svgEl("text", {
              x: boxX + boxSize / 2, y: cy + fontSize * 0.28,
              "text-anchor": "middle",
              "font-family": "'Google Sans Flex', sans-serif",
              "font-size": String(fontSize * 0.85),
              "font-weight": "500",
              fill: "#3182ce"
            });
            symEl.textContent = symbol;
            svg.appendChild(symEl);
          }
        }

        x += boxSize + gapBetween;

        // Number B
        const bEl = svgEl("text", {
          x: x, y: cy,
          "font-family": "'Google Sans Flex', sans-serif",
          "font-size": String(fontSize),
          "font-weight": "500",
          fill: "#1a202c"
        });
        bEl.textContent = bStr;
        svg.appendChild(bEl);
      }

      return svg;
    }

    // ===== Gather options =====
    function gatherOptions() {
      return {
        maxNum: getRangeValue(),
        allowEquals: elAllowEquals.checked,
        numWorksheets: parseInt(elNumSheets.value, 10),
        problemsPerSheet: parseInt(elProblems.value, 10),
        showHeader: getHeaderMode(),
        title: getTitle(),
        subtitle: getSubtitle(),
        numbered: elNumbered.checked,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        includeExample: elIncludeExample.checked,
      };
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) {
        currentState.sheets.length = opts.numWorksheets;
      }
      renderWorksheet();
    }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = "";
      sheetWrap.className = "";
      sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div");
          p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], {
            showHeader: opts.showHeader,
            title: opts.title,
            subtitle: opts.subtitle,
            branded: opts.branded,
            showAnswers: false,
            numbered: opts.numbered,
            includeExample: opts.includeExample
          });
          p.appendChild(v);
          sheetWrap.appendChild(p);
        }
        return;
      }

      // Desktop: grid layout with calculated sizing
      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2;
        const ah = window.innerHeight - 80;
        const gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) {
          cols = numSheets;
          if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap)));
        } else {
          cols = Math.min(3, numSheets);
          if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap)));
        }
        const msw = (aw - (cols - 1) * gap) / cols;
        const msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale);
        const sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div");
          p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], {
            showHeader: opts.showHeader,
            title: opts.title,
            subtitle: opts.subtitle,
            branded: opts.branded,
            showAnswers: false,
            numbered: opts.numbered,
            includeExample: opts.includeExample
          });
          v.setAttribute("width", sw);
          v.setAttribute("height", sh);
          p.appendChild(v);
          sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div");
        p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], {
          showHeader: opts.showHeader,
          title: opts.title,
          subtitle: opts.subtitle,
          branded: opts.branded,
          showAnswers: false,
          numbered: opts.numbered,
          includeExample: opts.includeExample
        });
        p.appendChild(v);
        sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], {
                  showHeader: "none",
                  title: opts.title,
                  subtitle: "",
                  branded: opts.branded,
                  showAnswers: true,
                  numbered: opts.numbered,
                  includeExample: false,
                  isAnswerKey: true
                }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.jpg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

    // ===== Event Listeners =====
    elRangeSelect.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elAllowEquals.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
    let resizeTimeout;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        if (currentState.sheets.length > 1) renderWorksheet();
      }, 150);
    });

    // Init
    renderWithNewRandomization();
  
    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
<script src="../../favorites.js"></script>
