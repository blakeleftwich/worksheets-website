  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elMode = document.getElementById("modeSelect");
    const elTheme = document.getElementById("themeSelect");
    const elNumCategories = document.getElementById("numCategories");
    const elIncludeTally = document.getElementById("includeTally");
    const elNumQuestions = document.getElementById("numQuestions");
    const elNumQuestionsGroup = document.getElementById("numQuestionsGroup");
    const elNumSheets = document.getElementById("numWorksheets");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elNumbered = document.getElementById("numbered");
    const elBranded = document.getElementById("branded");
    const elAnswerKey = document.getElementById("answerKey");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle(autoTitle) {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return autoTitle || "";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Use the data table to answer the questions.";
    }

    // ===== Theme data =====
    const themeData = {
      colors: {
        title: "Favorite Colors Survey",
        surveyPrompt: "Ask {n} classmates: What is your favorite color?",
        categories: ["Red", "Blue", "Green", "Yellow", "Purple", "Orange"],
        noun: "color"
      },
      snacks: {
        title: "Favorite Snacks Survey",
        surveyPrompt: "Ask {n} classmates: What is your favorite snack?",
        categories: ["Apples", "Crackers", "Cookies", "Grapes", "Pretzels", "Cheese"],
        noun: "snack"
      },
      animals: {
        title: "Favorite Animals Survey",
        surveyPrompt: "Ask {n} classmates: What is your favorite animal?",
        categories: ["Dogs", "Cats", "Fish", "Birds", "Rabbits", "Turtles"],
        noun: "animal"
      },
      weather: {
        title: "Weather Tracking",
        surveyPrompt: "Track the weather for {n} days. Record the weather each day.",
        categories: ["Sunny", "Cloudy", "Rainy", "Snowy", "Windy", "Stormy"],
        noun: "weather type"
      }
    };

    function getRandomTheme() {
      const keys = Object.keys(themeData);
      return keys[Math.floor(Math.random() * keys.length)];
    }

    // ===== Data generation =====
    function generateTableData(numCats, theme) {
      const resolvedTheme = theme === "random" ? getRandomTheme() : theme;
      const td = themeData[resolvedTheme];
      const mode = elMode.value;
      // Shuffle and pick categories
      const shuffled = [...td.categories].sort(() => Math.random() - 0.5);
      const cats = shuffled.slice(0, numCats);
      // Generate random counts (2-15 for each)
      const counts = cats.map(() => 2 + Math.floor(Math.random() * 14));
      const total = counts.reduce((a, b) => a + b, 0);
      // For collect mode, use a clean round number for the survey prompt
      const promptNum = mode === "collect" ? 10 : total;
      return {
        themeKey: resolvedTheme,
        title: td.title,
        surveyPrompt: td.surveyPrompt.replace("{n}", String(promptNum)),
        categories: cats,
        counts: counts,
        total: total,
        noun: td.noun
      };
    }

    // ===== Question generation for Read mode =====
    function generateReadQuestions(data, numQuestions) {
      const cats = data.categories;
      const counts = data.counts;
      const total = data.total;
      const noun = data.noun;

      // Pool of question generators
      const pool = [];

      // "How many students chose [category]?"
      for (let i = 0; i < cats.length; i++) {
        const ci = i;
        pool.push({
          q: "How many students chose " + cats[ci] + "?",
          a: String(counts[ci]),
          type: "single"
        });
      }

      // "Which [noun] is the most popular?"
      const maxIdx = counts.indexOf(Math.max(...counts));
      pool.push({
        q: "Which " + noun + " is the most popular?",
        a: cats[maxIdx],
        type: "most"
      });

      // "Which [noun] is the least popular?"
      const minIdx = counts.indexOf(Math.min(...counts));
      pool.push({
        q: "Which " + noun + " is the least popular?",
        a: cats[minIdx],
        type: "least"
      });

      // "How many students were asked in all?"
      pool.push({
        q: "How many students were asked in all?",
        a: String(total),
        type: "total"
      });

      // "How many more students chose [A] than [B]?"
      for (let i = 0; i < cats.length; i++) {
        for (let j = i + 1; j < cats.length; j++) {
          if (counts[i] !== counts[j]) {
            const hi = counts[i] > counts[j] ? i : j;
            const lo = counts[i] > counts[j] ? j : i;
            pool.push({
              q: "How many more students chose " + cats[hi] + " than " + cats[lo] + "?",
              a: String(counts[hi] - counts[lo]),
              type: "diff"
            });
          }
        }
      }

      // "How many fewer students chose [A] than [B]?"
      for (let i = 0; i < cats.length; i++) {
        for (let j = i + 1; j < cats.length; j++) {
          if (counts[i] !== counts[j]) {
            const lo = counts[i] < counts[j] ? i : j;
            const hi = counts[i] < counts[j] ? j : i;
            pool.push({
              q: "How many fewer students chose " + cats[lo] + " than " + cats[hi] + "?",
              a: String(counts[hi] - counts[lo]),
              type: "fewer"
            });
          }
        }
      }

      // "How many students chose [A] and [B] combined?"
      for (let i = 0; i < cats.length; i++) {
        for (let j = i + 1; j < cats.length; j++) {
          pool.push({
            q: "How many students chose " + cats[i] + " and " + cats[j] + " combined?",
            a: String(counts[i] + counts[j]),
            type: "combined"
          });
        }
      }

      // Select questions ensuring variety
      // Always include a "single" question first, then diversify
      const usedTypes = new Set();
      const selected = [];

      // Prioritized order: single, most, total, diff/fewer, combined
      const priority = ["single", "most", "total", "diff", "fewer", "combined", "least"];
      const shuffledPool = [...pool].sort(() => Math.random() - 0.5);

      for (const pType of priority) {
        if (selected.length >= numQuestions) break;
        const candidate = shuffledPool.find(q => q.type === pType && !selected.includes(q));
        if (candidate) {
          selected.push(candidate);
          usedTypes.add(pType);
        }
      }

      // Fill remaining from shuffled pool
      for (const q of shuffledPool) {
        if (selected.length >= numQuestions) break;
        if (!selected.includes(q)) {
          selected.push(q);
        }
      }

      return selected.slice(0, numQuestions);
    }

    // ===== Collect mode summary questions =====
    function getCollectQuestions() {
      return [
        { q: "Which category was the most popular?", a: "" },
        { q: "Which category was the least popular?", a: "" },
        { q: "How many responses did you collect in all?", a: "" }
      ];
    }

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Generate sheet data =====
    function generateSheetData() {
      const opts = gatherOptions();
      const data = generateTableData(opts.numCategories, opts.theme);
      const questions = opts.mode === "read"
        ? generateReadQuestions(data, opts.numQuestions)
        : getCollectQuestions();
      return { data, questions };
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      return {
        mode: elMode.value,
        theme: elTheme.value,
        numCategories: parseInt(elNumCategories.value, 10),
        includeTally: elIncludeTally.value === "yes",
        numQuestions: parseInt(elNumQuestions.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        showHeader: showHeader,
        numbered: elNumbered.checked,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        includeExample: elIncludeExample.checked
      };
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(sheetData, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, numbered, includeExample, isAnswerKey } = options;
      const { data, questions } = sheetData;
      const opts = gatherOptions();
      const mode = opts.mode;
      const includeTally = opts.includeTally;

      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      let curY = topGridY;

      // ===== Instructions for Collect mode =====
      if (mode === "collect") {
        const instrEl = svgEl("text", { x: pageW / 2, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": 400, "text-anchor": "middle", fill: "#4a5568", "font-style": "italic" });
        instrEl.textContent = data.surveyPrompt;
        svg.appendChild(instrEl);
        curY += 26;
      }

      // ===== Table =====
      const tableLeft = margin + 20;
      const tableRight = pageW - margin - 20;
      const tableW = tableRight - tableLeft;

      // Column widths
      let colDefs = [];
      if (includeTally) {
        // Category | Tally | Number
        const catW = tableW * 0.35;
        const tallyW = tableW * 0.40;
        const numW = tableW * 0.25;
        colDefs = [
          { label: "Category", width: catW },
          { label: "Tally", width: tallyW },
          { label: "Number", width: numW }
        ];
      } else {
        // Category | Number
        const catW = tableW * 0.55;
        const numW = tableW * 0.45;
        colDefs = [
          { label: "Category", width: catW },
          { label: "Number", width: numW }
        ];
      }

      const headerH = 32;
      const rowH = mode === "collect" ? 40 : 34;
      const numRows = data.categories.length;
      const tableH = headerH + numRows * rowH;

      // Table outline
      svg.appendChild(svgEl("rect", {
        x: tableLeft, y: curY, width: tableW, height: tableH,
        fill: "none", stroke: "#2d3748", "stroke-width": 1.5, rx: 3, ry: 3
      }));

      // Header background
      svg.appendChild(svgEl("rect", {
        x: tableLeft, y: curY, width: tableW, height: headerH,
        fill: "#f59e0b", rx: 3, ry: 3
      }));
      // Cover bottom rounded corners of header
      svg.appendChild(svgEl("rect", {
        x: tableLeft, y: curY + headerH - 6, width: tableW, height: 6,
        fill: "#f59e0b"
      }));

      // Header text
      let colX = tableLeft;
      for (const col of colDefs) {
        const tx = svgEl("text", {
          x: colX + col.width / 2, y: curY + headerH / 2 + 5,
          "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": 700,
          "text-anchor": "middle", fill: "#ffffff"
        });
        tx.textContent = col.label;
        svg.appendChild(tx);
        colX += col.width;
      }

      // Header column dividers
      colX = tableLeft;
      for (let i = 0; i < colDefs.length - 1; i++) {
        colX += colDefs[i].width;
        svg.appendChild(svgEl("line", {
          x1: colX, y1: curY, x2: colX, y2: curY + tableH,
          stroke: "#cbd5e0", "stroke-width": 1
        }));
      }

      // Header bottom line
      svg.appendChild(svgEl("line", {
        x1: tableLeft, y1: curY + headerH, x2: tableRight, y2: curY + headerH,
        stroke: "#2d3748", "stroke-width": 1.5
      }));

      // Data rows
      for (let r = 0; r < numRows; r++) {
        const rowY = curY + headerH + r * rowH;

        // Alternating row background
        if (r % 2 === 0) {
          svg.appendChild(svgEl("rect", {
            x: tableLeft + 1, y: rowY, width: tableW - 2, height: rowH,
            fill: "#f7fafc"
          }));
        }

        // Row divider
        if (r > 0) {
          svg.appendChild(svgEl("line", {
            x1: tableLeft, y1: rowY, x2: tableRight, y2: rowY,
            stroke: "#e2e8f0", "stroke-width": 0.75
          }));
        }

        colX = tableLeft;
        const textY = rowY + rowH / 2 + 5;

        // Category column (always filled)
        const catEl = svgEl("text", {
          x: colX + 14, y: textY,
          "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": 700, fill: "#2d3748"
        });
        catEl.textContent = data.categories[r];
        svg.appendChild(catEl);
        colX += colDefs[0].width;

        if (includeTally) {
          // Tally column
          if (mode === "read") {
            // Show tally marks
            renderTallyMarks(svg, colX + 12, rowY + rowH / 2, data.counts[r]);
          } else if (showAnswers) {
            // Show answer tallies in collect mode answer key
            renderTallyMarks(svg, colX + 12, rowY + rowH / 2, data.counts[r]);
          }
          // In collect mode (not answer key), leave empty for student
          colX += colDefs[1].width;

          // Number column
          if (mode === "read" || showAnswers) {
            const numEl = svgEl("text", {
              x: colX + colDefs[2].width / 2, y: textY,
              "font-family": "Fredoka, sans-serif", "font-size": 14, "font-weight": 700,
              "text-anchor": "middle", fill: showAnswers ? "#3182ce" : "#2d3748"
            });
            numEl.textContent = String(data.counts[r]);
            svg.appendChild(numEl);
          }
        } else {
          // Number column only (no tally)
          if (mode === "read" || showAnswers) {
            const numEl = svgEl("text", {
              x: colX + colDefs[1].width / 2, y: textY,
              "font-family": "Fredoka, sans-serif", "font-size": 14, "font-weight": 700,
              "text-anchor": "middle", fill: showAnswers ? "#3182ce" : "#2d3748"
            });
            numEl.textContent = String(data.counts[r]);
            svg.appendChild(numEl);
          }
        }
      }

      curY += tableH + 24;

      // ===== Questions =====
      const qFontSize = 13;
      const qLineH = mode === "collect" ? 36 : 42;
      const ansLineWidth = 120;

      if (mode === "read") {
        // Title for questions section
        const qTitle = svgEl("text", {
          x: margin + 20, y: curY + 4,
          "font-family": "Fredoka, sans-serif", "font-size": 14, "font-weight": 700, fill: "#2d3748"
        });
        qTitle.textContent = "Answer the questions:";
        svg.appendChild(qTitle);
        curY += 22;
      }

      for (let q = 0; q < questions.length; q++) {
        const qY = curY + q * qLineH;

        // Question number and text
        const qNum = svgEl("text", {
          x: margin + 20, y: qY + 16,
          "font-family": "Fredoka, sans-serif", "font-size": qFontSize, "font-weight": 600, fill: "#2d3748"
        });
        qNum.textContent = (numbered !== false ? (q + 1) + ". " : "") + questions[q].q;
        svg.appendChild(qNum);

        // Answer line
        const lineY = qY + 32;
        svg.appendChild(svgEl("line", {
          x1: margin + 40, y1: lineY, x2: margin + 40 + ansLineWidth, y2: lineY,
          stroke: "#a0aec0", "stroke-width": 1, "stroke-dasharray": "3,2"
        }));

        const isExample = (q === 0 && includeExample && !showAnswers);

        if (isExample && questions[q].a) {
          // Example badge above answer line
          const badgeW = 42, badgeH = 13;
          const badgeX = margin + 40 + ansLineWidth - badgeW;
          const badgeY = lineY - badgeH - 2;
          svg.appendChild(svgEl("rect", {
            x: badgeX, y: badgeY, width: badgeW, height: badgeH,
            rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": 0.75
          }));
          const badgeText = svgEl("text", {
            x: badgeX + badgeW / 2, y: badgeY + 9.5,
            "font-family": "Fredoka, sans-serif", "font-size": 8, "font-weight": 600,
            fill: "#16a34a", "text-anchor": "middle"
          });
          badgeText.textContent = "Example";
          svg.appendChild(badgeText);
          const ansEl = svgEl("text", {
            x: margin + 40 + ansLineWidth / 2, y: lineY - 4,
            "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": 700,
            "text-anchor": "middle", fill: "#16a34a"
          });
          ansEl.textContent = questions[q].a;
          svg.appendChild(ansEl);
        } else if (showAnswers && questions[q].a) {
          const ansEl = svgEl("text", {
            x: margin + 40 + ansLineWidth / 2, y: lineY - 4,
            "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": 700,
            "text-anchor": "middle", fill: "#3182ce"
          });
          ansEl.textContent = questions[q].a;
          svg.appendChild(ansEl);
        }
      }

      // ===== Branding =====
      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.jpg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      return svg;
    }

    // ===== Tally mark rendering =====
    function renderTallyMarks(svg, startX, centerY, count) {
      const markH = 16;
      const markGap = 5;
      const groupGap = 10;
      const groups = Math.floor(count / 5);
      const remainder = count % 5;

      let x = startX;

      for (let g = 0; g < groups; g++) {
        // Draw 4 vertical marks
        for (let i = 0; i < 4; i++) {
          svg.appendChild(svgEl("line", {
            x1: x + i * markGap, y1: centerY - markH / 2,
            x2: x + i * markGap, y2: centerY + markH / 2,
            stroke: "#2d3748", "stroke-width": 1.5, "stroke-linecap": "round"
          }));
        }
        // Draw diagonal strike-through
        svg.appendChild(svgEl("line", {
          x1: x - 2, y1: centerY + markH / 2 - 2,
          x2: x + 3 * markGap + 2, y2: centerY - markH / 2 + 2,
          stroke: "#2d3748", "stroke-width": 1.5, "stroke-linecap": "round"
        }));
        x += 4 * markGap + groupGap;
      }

      // Draw remaining individual marks
      for (let i = 0; i < remainder; i++) {
        svg.appendChild(svgEl("line", {
          x1: x + i * markGap, y1: centerY - markH / 2,
          x2: x + i * markGap, y2: centerY + markH / 2,
          stroke: "#2d3748", "stroke-width": 1.5, "stroke-linecap": "round"
        }));
      }
    }

    // ===== Render/State management =====
    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateSheetData());
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateSheetData());
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const t = getTitle(currentState.sheets[s].data.title);
          const st = getSubtitle();
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: t, subtitle: st, branded: opts.branded, numbered: opts.numbered, showAnswers: false, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      // Desktop
      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cols - 1) * gap) / cols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const t = getTitle(currentState.sheets[s].data.title);
          const st = getSubtitle();
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: t, subtitle: st, branded: opts.branded, numbered: opts.numbered, showAnswers: false, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const t = getTitle(currentState.sheets[0].data.title);
        const st = getSubtitle();
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: t, subtitle: st, branded: opts.branded, numbered: opts.numbered, showAnswers: false, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const opts = gatherOptions();
      const sH = sheetWrap.innerHTML, sC = sheetWrap.className, sS = sheetWrap.style.cssText;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      for (let i = 0; i < currentState.sheets.length; i++) {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const t = getTitle(currentState.sheets[i].data.title);
        const st = getSubtitle();
        p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: opts.showHeader, title: t, subtitle: st, branded: opts.branded, numbered: opts.numbered, showAnswers: false, includeExample: opts.includeExample }, wsCodes[i]));
        sheetWrap.appendChild(p);
      }
      const answerKeyPages = [];
      if (opts.answerKey) {
        for (let i = 0; i < currentState.sheets.length; i++) {
          const p = document.createElement("div"); p.className = "worksheet-page ak-print-only";
          const t = getTitle(currentState.sheets[i].data.title);
          const st = getSubtitle();
          p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: t, subtitle: st, branded: opts.branded, numbered: opts.numbered, showAnswers: true, isAnswerKey: true, includeExample: false }, wsCodes[i]));
          sheetWrap.appendChild(p);
          answerKeyPages.push(p);
        }
      }
      window.print();
      setTimeout(() => { answerKeyPages.forEach(p => p.remove()); sheetWrap.innerHTML = sH; sheetWrap.className = sC; sheetWrap.style.cssText = sS; }, 500);
    }

    // ===== Mode-dependent UI =====
    function updateModeUI() {
      const isRead = elMode.value === "read";
      elNumQuestionsGroup.style.display = isRead ? "block" : "none";
    }

    // ===== Event Listeners =====
    elMode.addEventListener("change", () => { updateModeUI(); renderWithNewRandomization(); });
    elTheme.addEventListener("change", () => renderWithNewRandomization());
    elNumCategories.addEventListener("change", () => renderWithNewRandomization());
    elIncludeTally.addEventListener("change", () => renderWithoutRandomization());
    elNumQuestions.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);
    let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    updateModeUI();
    renderWithNewRandomization();
  
    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
