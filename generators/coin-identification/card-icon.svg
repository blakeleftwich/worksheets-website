<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f7f8fc"/>
  <!-- Quarter (largest) -->
  <circle cx="48" cy="52" r="26" fill="#C8C8C8" stroke="#a0a0a0" stroke-width="1.5"/>
  <text x="48" y="57" text-anchor="middle" font-size="11" font-weight="600" fill="#555" font-family="Fredoka, sans-serif">25¢</text>
  <!-- Nickel -->
  <circle cx="108" cy="52" r="22" fill="#C0C0C0" stroke="#909090" stroke-width="1.5"/>
  <text x="108" y="57" text-anchor="middle" font-size="10" font-weight="600" fill="#555" font-family="Fredoka, sans-serif">5¢</text>
  <!-- Penny -->
  <circle cx="158" cy="48" r="19" fill="#b87333" stroke="#8b5a2b" stroke-width="1.5"/>
  <text x="158" y="53" text-anchor="middle" font-size="9" font-weight="600" fill="#fff" font-family="Fredoka, sans-serif">1¢</text>
  <!-- Dime (smallest) -->
  <circle cx="158" cy="82" r="16" fill="#D3D3D3" stroke="#a8a8a8" stroke-width="1.5"/>
  <text x="158" y="87" text-anchor="middle" font-size="8" font-weight="600" fill="#555" font-family="Fredoka, sans-serif">10¢</text>
  <!-- Prompt -->
  <text x="100" y="122" text-anchor="middle" font-size="11" font-weight="600" fill="#a0aec0" font-family="Fredoka, sans-serif">Name each coin</text>
</svg>