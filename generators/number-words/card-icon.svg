<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f7f8fc"/>
  <!-- Number on left, blank line on right (write word mode) -->
  <text x="50" y="52" text-anchor="middle" font-size="28" font-weight="500" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">5</text>
  <line x1="85" y1="54" x2="175" y2="54" stroke="#cbd5e0" stroke-width="1.5"/>
  <!-- Second row -->
  <text x="50" y="100" text-anchor="middle" font-size="28" font-weight="500" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">12</text>
  <line x1="85" y1="102" x2="175" y2="102" stroke="#cbd5e0" stroke-width="1.5"/>
</svg>
