  <script>
    // ===== Number Word Mapping =====
    const numberWords = {
      1:"one",2:"two",3:"three",4:"four",5:"five",6:"six",7:"seven",8:"eight",9:"nine",10:"ten",
      11:"eleven",12:"twelve",13:"thirteen",14:"fourteen",15:"fifteen",16:"sixteen",17:"seventeen",
      18:"eighteen",19:"nineteen",20:"twenty",21:"twenty-one",22:"twenty-two",23:"twenty-three",
      24:"twenty-four",25:"twenty-five",26:"twenty-six",27:"twenty-seven",28:"twenty-eight",
      29:"twenty-nine",30:"thirty",31:"thirty-one",32:"thirty-two",33:"thirty-three",34:"thirty-four",

      47:"forty-seven",48:"forty-eight",49:"forty-nine",50:"fifty",51:"fifty-one",52:"fifty-two",
      53:"fifty-three",54:"fifty-four",55:"fifty-five",56:"fifty-six",57:"fifty-seven",58:"fifty-eight",
      59:"fifty-nine",60:"sixty",61:"sixty-one",62:"sixty-two",63:"sixty-three",64:"sixty-four",
      65:"sixty-five",66:"sixty-six",67:"sixty-seven",68:"sixty-eight",69:"sixty-nine",70:"seventy",
      71:"seventy-one",72:"seventy-two",73:"seventy-three",74:"seventy-four",75:"seventy-five",
      76:"seventy-six",77:"seventy-seven",78:"seventy-eight",79:"seventy-nine",80:"eighty",
      81:"eighty-one",82:"eighty-two",83:"eighty-three",84:"eighty-four",85:"eighty-five",
      86:"eighty-six",87:"eighty-seven",88:"eighty-eight",89:"eighty-nine",90:"ninety",
      91:"ninety-one",92:"ninety-two",93:"ninety-three",94:"ninety-four",95:"ninety-five",
      96:"ninety-six",97:"ninety-seven",98:"ninety-eight",99:"ninety-nine",100:"one hundred"
    };

    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elMode = document.getElementById("modeSelect");

    const elProblems = document.getElementById("problemsPerSheet");

    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");

    const elShowTitle = document.getElementById("showTitle");

    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");

    const advArrow = document.getElementById("advArrow");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => {
      advPanel.classList.toggle("open");
      advArrow.classList.toggle("open");
    });

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Problem generation =====
    function generateNumbers(count, maxRange) {
      const available = [];
      for (let i = 1; i <= maxRange; i++) available.push(i);
      // Shuffle and pick
      for (let i = available.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [available[i], available[j]] = [available[j], available[i]];
      }
      const selected = [];
      // Pick unique numbers up to count, then repeat if needed
      for (let i = 0; i < count; i++) {
        selected.push(available[i % available.length]);
      }
      // Shuffle the final selection
      for (let i = selected.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [selected[i], selected[j]] = [selected[j], selected[i]];
      }
      return selected;
    }

    function generateSheet(count, maxRange, mode) {
      const numbers = generateNumbers(count, maxRange);
      if (mode === "match") {
        // For match mode, create a shuffled right-side order
        const shuffled = [...numbers];
        // Keep shuffling until order differs (avoid identical order)
        let attempts = 0;
        do {
          for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
          }
          attempts++;
        } while (attempts < 20 && numbers.every((n, i) => n === shuffled[i]));
        return { numbers, shuffledWords: shuffled };
      }
      return { numbers };
    }

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return "Number Words";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      const mode = elMode.value;
      if (mode === "writeWord") return "Write the word for each number.";
      if (mode === "writeNumber") return "Write the number for each word.";
      if (mode === "match") return "Draw a line from each number to its matching word.";
      return "Match each number to its word.";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        mode: elMode.value,
        maxRange: parseInt(elRange.value, 10),
        problemsPerSheet: parseInt(elProblems.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        showHeader,
        title,
        subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
      };
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(sheetData, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, mode, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {

    // ===== Write the Word Mode =====
    function renderWriteWordMode(svg, sheetData, topGridY, availH, availW, margin, pageW, count, showAnswers, numbered, includeExample) {
      const rowH = Math.min(availH / count, 60);
      const probNumSize = 10;

      // Scale font based on number of problems
      const fontSize = count <= 8 ? 28 : count <= 10 ? 24 : count <= 12 ? 22 : 20;
      const lineY_offset = fontSize * 0.35;

      for (let i = 0; i < count; i++) {
        const num = sheetData.numbers[i];
        const word = numberWords[num];
        const cellTop = topGridY + i * rowH;
        const cy = cellTop + rowH / 2 + lineY_offset;
        const isExample = (i === 0 && includeExample && !showAnswers);

        let x = margin + 8;

        // Problem number
        if (numbered !== false) {
          const numEl = svgEl("text", { x: x, y: cy - 0.72 * (fontSize - probNumSize), "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numEl.textContent = (i + 1) + "."; svg.appendChild(numEl);
        }
        x += count >= 10 ? probNumSize * 2.0 : probNumSize * 1.6;

        // The number digit(s)
        const digitEl = svgEl("text", { x: x, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
        digitEl.textContent = String(num); svg.appendChild(digitEl);

        // Blank line for writing the word
        const lineX1 = margin + 120;
        const lineX2 = pageW - margin;
        const lineYPos = cellTop + rowH / 2 + lineY_offset + 4;
        svg.appendChild(svgEl("line", { x1: lineX1, y1: lineYPos, x2: lineX2, y2: lineYPos, stroke: isExample ? "#22c55e" : "#cbd5e0", "stroke-width": 1.5 }));

        // Example badge
        if (isExample) {
          const badgeX = lineX2 - 44, badgeY = cy - fontSize * 0.7 - 13;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
          const bt = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          bt.textContent = "Example"; svg.appendChild(bt);
        }

        // Answer
        if (isExample) {
          const ansEl = svgEl("text", { x: lineX1 + 8, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize * 0.75), "font-weight": "500", fill: "#16a34a" });
          ansEl.textContent = word; svg.appendChild(ansEl);
        } else if (showAnswers) {
          const ansEl = svgEl("text", { x: lineX1 + 8, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize * 0.75), "font-weight": "500", fill: "#3182ce" });
          ansEl.textContent = word; svg.appendChild(ansEl);
        }
      }
    }

    // ===== Match Mode =====
    function renderMatchMode(svg, sheetData, topGridY, availH, availW, margin, pageW, count, showAnswers, numbered, includeExample) {
      const rowH = Math.min(availH / count, 60);
      const probNumSize = 10;

      const fontSize = count <= 8 ? 24 : count <= 10 ? 20 : count <= 12 ? 18 : 16;
      const lineY_offset = fontSize * 0.35;

      const leftColX = margin + 40;
      const rightColX = pageW - margin - 140;
      const dotLeftX = leftColX + 80;
      const dotRightX = rightColX - 16;

      const adjustedTopY = topGridY;
      const adjustedAvailH = availH;
      const adjRowH = Math.min(adjustedAvailH / count, 60);

      for (let i = 0; i < count; i++) {
        const num = sheetData.numbers[i];
        const shuffledNum = sheetData.shuffledWords[i];
        const word = numberWords[shuffledNum];
        const cellTop = adjustedTopY + i * adjRowH;
        const cy = cellTop + adjRowH / 2 + lineY_offset;

        // Problem number
        if (numbered !== false) {
          const numLbl = svgEl("text", { x: margin + 8, y: cy - 0.72 * (fontSize - probNumSize), "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numLbl.textContent = (i + 1) + "."; svg.appendChild(numLbl);
        }

        // Left side: the digit
        const digitEl = svgEl("text", { x: leftColX, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
        digitEl.textContent = String(num); svg.appendChild(digitEl);

        // Left dot
        svg.appendChild(svgEl("circle", { cx: dotLeftX, cy: cy - lineY_offset + 2, r: 3.5, fill: "#2d3748" }));

        // Right side: the shuffled word
        const wordEl = svgEl("text", { x: rightColX, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
        wordEl.textContent = word; svg.appendChild(wordEl);

        // Right dot
        svg.appendChild(svgEl("circle", { cx: dotRightX, cy: cy - lineY_offset + 2, r: 3.5, fill: "#2d3748" }));
      }

      // Draw answer lines if showing answers or example
      if (showAnswers || includeExample) {
        const lineColor = showAnswers ? "#3182ce" : "#16a34a";
        const startIdx = showAnswers ? 0 : 0;
        const endIdx = showAnswers ? count : 1;
        for (let i = startIdx; i < endIdx; i++) {
          const num = sheetData.numbers[i];
          const leftCy = adjustedTopY + i * adjRowH + adjRowH / 2 + 2;
          const rightIdx = sheetData.shuffledWords.indexOf(num);
          const rightCy = adjustedTopY + rightIdx * adjRowH + adjRowH / 2 + 2;
          svg.appendChild(svgEl("line", { x1: dotLeftX + 6, y1: leftCy, x2: dotRightX - 6, y2: rightCy, stroke: lineColor, "stroke-width": 1.5, "stroke-dasharray": "4,3" }));
        }
        // Example badge for match mode
        if (!showAnswers && includeExample) {
          const badgeX = pageW - margin - 44, badgeY = adjustedTopY + 0 * adjRowH + adjRowH / 2 - 20;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
          const bt = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          bt.textContent = "Example"; svg.appendChild(bt);
        }
      }
    }

    // ===== Render functions =====
    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateSheet(opts.problemsPerSheet, opts.maxRange, opts.mode));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateSheet(opts.problemsPerSheet, opts.maxRange, opts.mode));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols-1)*gap)/cols < mrw) cols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols-1)*gap)/cols < mrw) cols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        const msw = (aw - (cols-1)*gap)/cols, msh = numSheets <= 3 ? ah : ah*0.8;
        const scale = Math.min(msw/sheetWidth, msh/sheetHeight);
        const sw = Math.floor(sheetWidth*scale), sh = Math.floor(sheetHeight*scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw+24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: true, mode: opts.mode, numbered: opts.numbered, isAnswerKey: true, includeExample: false }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
