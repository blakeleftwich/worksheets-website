  <script>
const sheetWrap = document.getElementById("sheetWrap");
const statusEl = document.getElementById("status");

const elMode = document.getElementById("mode");
const elComparison = document.getElementById("comparison");
const elNumRange = document.getElementById("numRange");
const elNumSheets = document.getElementById("numSheets");
const elProblems = { value: "4", addEventListener: function(){} };
const elGroupsPerProblem = document.getElementById("groupsPerProblem");
const elObjectLayout = document.getElementById("objectLayout");
const elObjectLayoutGroup = document.getElementById("objectLayoutGroup");
const elWording = document.getElementById("wording");
const elWordingGroup = document.getElementById("wordingGroup");
const elNumbered = document.getElementById("numbered");
const elBranded = document.getElementById("branded");
const elAnswerKey = document.getElementById("answerKey");
const elShowHeader = document.getElementById("showHeader");
const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
const elHeaderModeOptions = document.getElementById("headerModeOptions");
const elHeaderText = document.getElementById("headerText");
const elSubtitleText = document.getElementById("subtitleText");
const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
const elCustomTitleOptions = document.getElementById("customTitleOptions");
const elShowTitle = document.getElementById("showTitle");
const elShowSubtitle = document.getElementById("showSubtitle");
const elTitleInputWrap = document.getElementById("titleInputWrap");
const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
const advToggle = document.getElementById("advToggle");
const advPanel = document.getElementById("advPanel");
const advArrow = document.getElementById("advArrow");

// Icons defined in ../shared/icons.js (ICON_LIST)

let currentState = {
  sheets: [],
  randomSeed: Date.now()
};

// ===== Helpers =====
function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}


// ===== Range =====
function getRange() {
  const parts = elNumRange.value.split("-");
  return { min: parseInt(parts[0], 10), max: parseInt(parts[1], 10) };
}

function getHeaderMode() {
  return elShowHeaderEnabled.checked ? elShowHeader.value : "both";
}

// ===== Comparison label logic =====
function updateComparisonLabels() {
  const mode = elMode.value;
  const opts = elComparison.options;
  if (mode === "objects") {
    opts[0].text = "More";
    opts[1].text = "Fewer";
    opts[2].text = "Mixed";
  } else {
    opts[0].text = "Bigger";
    opts[1].text = "Smaller";
    opts[2].text = "Mixed";
  }
}

function updateModeVisibility() {
  const mode = elMode.value;
  elObjectLayoutGroup.style.display = mode === "objects" ? "" : "none";
  elWordingGroup.style.display = mode === "numbers" ? "" : "none";
  updateComparisonLabels();
}

// ===== Get instruction text for a problem =====
function getInstructionText(direction, options) {
  const mode = options.mode;
  const groups = options.groupsPerProblem;
  const wording = options.wording;

  if (mode === "objects") {
    if (groups === 3) {
      return direction === "more" ? "Circle the group with the most." : "Circle the group with the fewest.";
    }
    return direction === "more" ? "Circle the group with more." : "Circle the group with fewer.";
  } else {
    if (wording === "formal") {
      if (groups === 3) {
        return direction === "more" ? "Circle the greatest number." : "Circle the least number.";
      }
      return direction === "more" ? "Circle the greater number." : "Circle the lesser number.";
    } else {
      if (groups === 3) {
        return direction === "more" ? "Circle the biggest number." : "Circle the smallest number.";
      }
      return direction === "more" ? "Circle the bigger number." : "Circle the smaller number.";
    }
  }
}

// ===== Default titles =====
function buildDefaultTitle() {
  const mode = elMode.value;
  return mode === "objects" ? "Comparing Groups" : "Comparing Numbers";
}

function buildDefaultSubtitle() {
  const mode = elMode.value;
  const comp = elComparison.value;
  const groups = parseInt(elGroupsPerProblem.value, 10);
  const wording = elWording.value;

  if (mode === "objects") {
    if (comp === "mixed") return "Circle the group with more or fewer.";
    if (groups === 3) return comp === "more" ? "Circle the group with the most." : "Circle the group with the fewest.";
    return comp === "more" ? "Circle the group with more." : "Circle the group with fewer.";
  } else {
    if (comp === "mixed") {
      if (wording === "formal") return "Circle the greater or lesser number.";
      return "Circle the bigger or smaller number.";
    }
    if (wording === "formal") {
      if (groups === 3) return comp === "more" ? "Circle the greatest number." : "Circle the least number.";
      return comp === "more" ? "Circle the greater number." : "Circle the lesser number.";
    }
    if (groups === 3) return comp === "more" ? "Circle the biggest number." : "Circle the smallest number.";
    return comp === "more" ? "Circle the bigger number." : "Circle the smaller number.";
  }
}

function updateTitleFromSettings() {
  elHeaderText.value = buildDefaultTitle();
  elSubtitleText.value = buildDefaultSubtitle();
}

function getTitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowTitle.checked ? elHeaderText.value : "";
  }
  return buildDefaultTitle();
}

function getSubtitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowSubtitle.checked ? elSubtitleText.value : "";
  }
  return "Read each problem and circle the correct answer.";
}

function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.className = 'success';
  setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
}

// ===== Gather all options =====
function gatherOptions() {
  return {
    mode: elMode.value,
    comparison: elComparison.value,
    range: getRange(),
    numWorksheets: parseInt(elNumSheets.value, 10),
    problemsPerSheet: 4,
    groupsPerProblem: parseInt(elGroupsPerProblem.value, 10),
    objectLayout: elObjectLayout.value,
    wording: elWording.value,
    showHeader: getHeaderMode(),
    title: getTitle(),
    subtitle: getSubtitle(),
    branded: elBranded.checked,
    answerKey: elAnswerKey.checked,
    numbered: elNumbered.checked,
  };
}

// ===== Event listeners =====
advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

elMode.addEventListener("change", () => { updateModeVisibility(); updateTitleFromSettings(); renderWithNewRandomization(); });
elComparison.addEventListener("change", () => { updateTitleFromSettings(); renderWithNewRandomization(); });
elNumRange.addEventListener("change", () => { renderWithNewRandomization(); });
elNumSheets.addEventListener("change", () => renderWithNewRandomization());
elProblems.addEventListener("change", () => renderWithNewRandomization());
elGroupsPerProblem.addEventListener("change", () => { updateTitleFromSettings(); renderWithNewRandomization(); });
elObjectLayout.addEventListener("change", () => renderWithoutRandomization());
elWording.addEventListener("change", () => { updateTitleFromSettings(); renderWithoutRandomization(); });
elNumbered.addEventListener("change", () => renderWithoutRandomization());
elBranded.addEventListener("change", () => renderWithoutRandomization());
elShowHeader.addEventListener("change", () => renderWithoutRandomization());
elShowHeaderEnabled.addEventListener("change", () => {
  elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});
elAnswerKey.addEventListener("change", () => {});

elCustomTitleEnabled.addEventListener("change", () => {
  elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowTitle.addEventListener("change", () => {
  elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowSubtitle.addEventListener("change", () => {
  elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
  renderWithoutRandomization();
});
elHeaderText.addEventListener("input", () => renderWithoutRandomization());
elSubtitleText.addEventListener("input", () => renderWithoutRandomization());

document.getElementById("btnGenerate").addEventListener("click", () => { renderWithNewRandomization(); });
document.getElementById("btnPrint").addEventListener("click", handlePrint);

async function handleDownloadPdf() {
  if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
  const btn = document.getElementById("btnDownloadPdf");
  const origText = btn.innerHTML;
  btn.innerHTML = "&#9203; Generating PDF...";
  btn.disabled = true;
  try {
    const blob = await generatePdfBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch(e) { console.error("Download error:", e); }
  btn.innerHTML = origText;
  btn.disabled = false;
}
document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);

// ===== Problem generation =====
function generateProblems(numProblems, range, groupsPerProblem, comparison) {
  const problems = [];
  for (let i = 0; i < numProblems; i++) {
    // Determine direction for this problem
    let direction;
    if (comparison === "mixed") {
      direction = Math.random() < 0.5 ? "more" : "fewer";
    } else {
      direction = comparison === "more" ? "more" : "fewer";
    }

    // Generate counts ensuring not all equal
    let counts;
    let attempts = 0;
    do {
      counts = [];
      for (let g = 0; g < groupsPerProblem; g++) {
        counts.push(randInt(range.min, range.max));
      }
      attempts++;
    } while (counts.every(c => c === counts[0]) && attempts < 50);

    // If still all equal after 50 attempts (very small range), force difference
    if (counts.every(c => c === counts[0])) {
      if (counts[0] < range.max) counts[0]++;
      else if (counts[0] > range.min) counts[0]--;
    }

    // Pick different icons for each group
    const availableIcons = shuffleArray([...Array(ICON_LIST.length).keys()]);
    const groupIcons = [];
    for (let g = 0; g < groupsPerProblem; g++) {
      groupIcons.push(availableIcons[g % availableIcons.length]);
    }

    problems.push({ direction, counts, iconIndices: groupIcons });
  }
  return problems;
}

// ===== Find correct answer index =====
function getCorrectIndex(problem) {
  const { direction, counts } = problem;
  if (direction === "more") {
    let maxVal = -1, maxIdx = 0;
    for (let i = 0; i < counts.length; i++) {
      if (counts[i] > maxVal) { maxVal = counts[i]; maxIdx = i; }
    }
    return maxIdx;
  } else {
    let minVal = Infinity, minIdx = 0;
    for (let i = 0; i < counts.length; i++) {
      if (counts[i] < minVal) { minVal = counts[i]; minIdx = i; }
    }
    return minIdx;
  }
}

// ===== Render =====
function renderWithNewRandomization() {
  const opts = gatherOptions();
  currentState.sheets = [];
  currentState.randomSeed = Date.now();
  for (let s = 0; s < opts.numWorksheets; s++) {
    currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.range, opts.groupsPerProblem, opts.comparison));
  }
  renderWorksheet();
}

function renderWithoutRandomization() {
  if (currentState.sheets.length === 0) {
    renderWithNewRandomization();
  } else {
    renderWorksheet();
  }
}

function renderWorksheet() {
  const opts = gatherOptions();
  const numSheets = currentState.sheets.length;
  sheetWrap.innerHTML = "";

  if (numSheets > 1) {
    sheetWrap.classList.add('grid-view');
    const sheetWidth = 612, sheetHeight = 792;
    const edgePadding = numSheets >= 3 ? 40 : 0;
    const availableWidth = window.innerWidth - 340 - 80 - (edgePadding * 2);
    const availableHeight = window.innerHeight - 80;
    const gap = 24;
    const minReadableWidth = 180;
    let cols;
    if (numSheets <= 3) {
      cols = numSheets;
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      if (testWidth < minReadableWidth) cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
    } else {
      cols = Math.min(3, numSheets);
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      if (testWidth < minReadableWidth) cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
    }
    const maxSheetWidth = (availableWidth - (cols - 1) * gap) / cols;
    let maxSheetHeight = numSheets <= 3 ? availableHeight : availableHeight * 0.8;
    const scaleByWidth = maxSheetWidth / sheetWidth;
    const scaleByHeight = maxSheetHeight / sheetHeight;
    const scale = Math.min(scaleByWidth, scaleByHeight);
    const scaledWidth = Math.floor(sheetWidth * scale);
    const scaledHeight = Math.floor(sheetHeight * scale);
    sheetWrap.style.gridTemplateColumns = `repeat(${cols}, ${scaledWidth + 24}px)`;
    sheetWrap.style.padding = numSheets >= 3 ? `0 ${edgePadding}px` : '0';

    for (let s = 0; s < numSheets; s++) {
      const wsCode = '(' + (s + 1) + ')';
      const svg = renderWorksheetSVG(currentState.sheets[s], opts, wsCode);
      svg.setAttribute('width', scaledWidth);
      svg.setAttribute('height', scaledHeight);
      const page = document.createElement("div");
      page.className = "worksheet-page scaled";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  } else {
    sheetWrap.classList.remove('grid-view');
    sheetWrap.style.gridTemplateColumns = '';
    sheetWrap.style.padding = '0';
    if (currentState.sheets.length > 0) {
      const svg = renderWorksheetSVG(currentState.sheets[0], opts, '(1)');
      const page = document.createElement("div");
      page.className = "worksheet-page";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  }
  showStatus('\u2713 Worksheet updated!');
}

// ===== SVG Rendering =====
function renderWorksheetSVG(problems, options, wsCode) {
  const { showHeader, title, subtitle, branded, numbered, mode, groupsPerProblem, objectLayout, showAnswers, isAnswerKey } = options;
  const pageW = 612, pageH = 792, margin = 36;
  const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
  svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));
  svg.appendChild(buildIconDefs());

  const midX = pageW / 2;
  let curY = 10;

  // Header: answer key label or name/date
  if (isAnswerKey) {
    const akLabel = svgEl("text", {
      x: pageW - margin, y: curY + 16,
      "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
      fill: "#000", "text-anchor": "end", "letter-spacing": "2"
    });
    akLabel.textContent = "ANSWER KEY";
    svg.appendChild(akLabel);
    curY += 28;
  } else if (showHeader === "both") {
    svg.appendChild(svgEl("text", {
      x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
    }, [document.createTextNode("Name")]));
    svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
    svg.appendChild(svgEl("text", {
      x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
    }, [document.createTextNode("Date")]));
    svg.appendChild(svgEl("line", { x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
    curY += 28;
  } else if (showHeader === "name") {
    svg.appendChild(svgEl("text", {
      x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
    }, [document.createTextNode("Name")]));
    svg.appendChild(svgEl("line", { x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
    curY += 28;
  }

  // Title
  if (title) {
    svg.appendChild(svgEl("text", {
      x: margin, y: curY + 38,
      "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
    }, [document.createTextNode(title)]));
    curY += 46;
  }

  // Subtitle
  if (subtitle && !isAnswerKey) {
    svg.appendChild(svgEl("text", {
      x: margin, y: curY + 14,
      "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
    }, [document.createTextNode(subtitle)]));
    curY += 20;
  }

  curY += 8;

  // Calculate problem layout
  const bottomReserve = branded ? 56 : 24;
  const availableH = pageH - curY - bottomReserve;
  const numProblems = problems.length;
  const problemH = Math.floor(availableH / numProblems);
  const contentW = pageW - margin * 2;

  for (let p = 0; p < numProblems; p++) {
    const prob = problems[p];
    const py = curY + p * problemH;
    const instrText = getInstructionText(prob.direction, options);
    const numGroups = prob.counts.length;

    // Problem number
    let labelOffset = 0;
    if (numbered) {
      const numLabel = svgEl("text", {
        x: margin, y: py + 16,
        "font-family": "'Google Sans Flex', sans-serif", "font-size": 14, "font-weight": 700, fill: "#2d3748"
      });
      numLabel.textContent = (p + 1) + ".";
      svg.appendChild(numLabel);
      labelOffset = 22;
    }

    // Instruction text
    const instrEl = svgEl("text", {
      x: margin + labelOffset, y: py + 18,
      "font-family": "Fredoka, sans-serif", "font-size": 15, "font-weight": 400, fill: "#4a5568"
    });
    instrEl.textContent = instrText;
    svg.appendChild(instrEl);

    // Group layout — standard gap between rightmost item of one group and leftmost of next
    const boxTop = py + 22;
    const boxH = problemH - 30;
    const boxAreaW = contentW - labelOffset;
    const groupGap = 40; // ← standard gap between groups (adjustable)
    // Allocate equal box widths for layout calculation
    const usableW = boxAreaW;
    const boxW = (usableW - (numGroups - 1) * groupGap) / numGroups;
    const boxStartX = margin + labelOffset + (numGroups <= 2 ? 30 : 0);

    // Find the largest group count to scale icons relative to it
    const maxCount = Math.max(...prob.counts);

    // First pass: calculate actual content widths for each group
    const groupContentWidths = [];
    for (let g = 0; g < numGroups; g++) {
      const count = prob.counts[g];
      if (mode === "objects" && objectLayout === "neat") {
        const maxPerRow = Math.min(5, maxCount);
        const maxRows = maxPerRow > 0 ? Math.ceil(maxCount / maxPerRow) : 0;
        const pad = 6;
        const innerW = boxW - pad * 2;
        const innerH = boxH - pad * 2;
        const iconW = (maxRows > 0 && maxPerRow > 0) ? Math.min(innerW / maxPerRow, innerH / maxRows) : 32;
        const perRow = Math.min(5, count);
        const rows = perRow > 0 ? Math.ceil(count / perRow) : 0;
        groupContentWidths.push(perRow * iconW);
      } else {
        groupContentWidths.push(boxW); // fallback: full box width
      }
    }

    // Second pass: position groups with groupGap between actual content edges
    let groupPositions = [];
    let curX = boxStartX;
    for (let g = 0; g < numGroups; g++) {
      groupPositions.push(curX);
      curX += groupContentWidths[g] + groupGap;
    }

    for (let g = 0; g < numGroups; g++) {
      const bx = groupPositions[g];
      const count = prob.counts[g];
      const iconIdx = prob.iconIndices[g];

      // No box border — groups are shown without outlines

      if (mode === "objects") {
        // Draw icons inside box
        const pad = 6;
        const innerW = boxW - pad * 2;
        const innerH = boxH - pad * 2;
        const innerX = bx + pad;
        const innerY = boxTop + pad;

        if (objectLayout === "neat") {
          // Neat rows: scale based on largest group to fill the box
          const maxPerRow = Math.min(5, maxCount);
          const maxRows = maxPerRow > 0 ? Math.ceil(maxCount / maxPerRow) : 0;
          const perRow = Math.min(5, count);
          const rows = perRow > 0 ? Math.ceil(count / perRow) : 0;
          // Size icons based on the largest group so all groups use same icon size
          const iconW = (maxRows > 0 && maxPerRow > 0) ? Math.min(innerW / maxPerRow, innerH / maxRows) : 32;
          if (rows > 0 && perRow > 0) {
            const iconSize = iconW * 0.85;
            const totalW = perRow * iconW;
            const totalH = rows * iconW;
            const startX = innerX;
            const startY = innerY + (innerH - totalH) / 2;
            for (let idx = 0; idx < count; idx++) {
              const col = idx % perRow;
              const row = Math.floor(idx / perRow);
              const cx = startX + col * iconW + iconW / 2 - iconSize / 2;
              const cy = startY + row * iconW + iconW / 2 - iconSize / 2;
              svg.appendChild(svgEl("use", {
                href: "#" + ICON_LIST[iconIdx], x: cx, y: cy, width: iconSize, height: iconSize
              }));
            }
          }
        } else {
          // Scattered placement — use grid-jittered approach for guaranteed no overlap
          const scatterMaxPerRow = Math.min(5, maxCount);
          const scatterMaxRows = Math.ceil(maxCount / scatterMaxPerRow);
          const iconSize = Math.min(innerW / scatterMaxPerRow, innerH / scatterMaxRows) * 0.75;
          // Use grid cells with random jitter — guarantees no overlap
          const gridCols = Math.min(5, Math.max(2, Math.ceil(Math.sqrt(count * 1.5))));
          const gridRows = Math.ceil(count / gridCols);
          const cellW = innerW / gridCols;
          const cellH = innerH / gridRows;
          const jitterX = Math.max(0, (cellW - iconSize) * 0.4);
          const jitterY = Math.max(0, (cellH - iconSize) * 0.4);

          // Shuffle grid positions for randomness
          const cells = [];
          for (let r = 0; r < gridRows; r++) {
            for (let c = 0; c < gridCols; c++) {
              cells.push({ r, c });
            }
          }
          for (let i = cells.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cells[i], cells[j]] = [cells[j], cells[i]];
          }

          const positions = [];
          for (let idx = 0; idx < count; idx++) {
            const cell = cells[idx % cells.length];
            const baseCx = innerX + cell.c * cellW + cellW / 2;
            const baseCy = innerY + cell.r * cellH + cellH / 2;
            const px = baseCx - iconSize / 2 + (Math.random() - 0.5) * 2 * jitterX;
            const py2 = baseCy - iconSize / 2 + (Math.random() - 0.5) * 2 * jitterY;
            positions.push({ x: px, y: py2, rot: (Math.random() - 0.5) * 20 });
          }
          // Shift all positions left so leftmost item starts at innerX
          if (positions.length > 0) {
            const minPosX = Math.min(...positions.map(p => p.x));
            const shiftX = innerX - minPosX;
            for (const pos of positions) {
              const fx = pos.x + shiftX;
              const fy = pos.y;
              const cxc = fx + iconSize / 2;
              const cyc = fy + iconSize / 2;
              svg.appendChild(svgEl("use", {
                href: "#" + ICON_LIST[iconIdx], x: fx, y: fy, width: iconSize, height: iconSize,
                transform: `rotate(${pos.rot.toFixed(1)} ${cxc.toFixed(1)} ${cyc.toFixed(1)})`
              }));
            }
          }
        }
      } else {
        // Numbers mode: left-aligned number
        const numText = svgEl("text", {
          x: bx + 6, y: boxTop + boxH / 2 + 18,
          "text-anchor": "start",
          "font-family": "'Google Sans Flex', sans-serif",
          "font-size": Math.min(48, boxH * 0.5),
          "font-weight": 700,
          fill: "#2d3748"
        });
        numText.textContent = count;
        svg.appendChild(numText);
      }

      // Answer key: circle the correct group
      if ((showAnswers || isAnswerKey) && g === getCorrectIndex(prob)) {
        svg.appendChild(svgEl("rect", {
          x: bx - 3, y: boxTop - 3, width: boxW + 6, height: boxH + 6,
          rx: 12, ry: 12, fill: "none", stroke: "#3182ce", "stroke-width": 2.5,
          "stroke-dasharray": "6 3"
        }));
      }
    }
  }

  // Branding footer
  if (branded) {
    const brandY = pageH - 48;
    const logoH = 38;
    const logoW = Math.round(logoH * 2.79);
    svg.appendChild(svgEl("image", { href: "../../images/logo-watermark.svg", x: margin, y: brandY, width: logoW, height: logoH }));
    const bLine1 = svgEl("text", { x: pageW - margin, y: brandY + 14, "font-family": "Fredoka, sans-serif", "font-size": 11, fill: "#4a5568", "text-anchor": "end" });
    bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
    svg.appendChild(bLine1);
    const bLine2 = svgEl("text", { x: pageW - margin, y: brandY + 26, "font-family": "Fredoka, sans-serif", "font-size": 9.5, fill: "#718096", "text-anchor": "end" });
    bLine2.textContent = "\u00A9 2026 Eggroll Games";
    svg.appendChild(bLine2);
    if (!wsCode) wsCode = '(1)';
    const wsCodeEl = svgEl("text", { x: pageW / 2, y: pageH - 4, "font-family": "Fredoka, sans-serif", "font-size": 8.5, fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1" });
    wsCodeEl.textContent = wsCode;
    svg.appendChild(wsCodeEl);
  }

  return svg;
}

// ===== Print =====
let _fontCSSCache = null;
async function buildFontCSS() {
  if (_fontCSSCache) return _fontCSSCache;
  let fontCSS = "";
  for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
    if (!link.href.includes('fonts')) continue;
    try {
      const resp = await fetch(link.href);
      const css = await resp.text();
      let inlined = css;
      for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
        const fontUrl = m[1].replace(/['"]/g, "");
        const absUrl = new URL(fontUrl, link.href).href;
        try {
          const fr = await fetch(absUrl);
          const blob = await fr.blob();
          const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
          inlined = inlined.replace(m[0], 'url(' + b64 + ')');
        } catch(e) {}
      }
      fontCSS += inlined;
    } catch(e) {}
  }
  for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
    try {
      const resp = await fetch(link.href);
      const css = await resp.text();
      let inlined = css;
      for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
        const fontUrl = m[1].replace(/['"]/g, "");
        try {
          const fr = await fetch(fontUrl);
          const blob = await fr.blob();
          const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
          inlined = inlined.replace(m[0], 'url(' + b64 + ')');
        } catch(e) {}
      }
      fontCSS += inlined;
    } catch(e) {}
  }
  _fontCSSCache = fontCSS;
  return fontCSS;
}

// Load and register TTF fonts with jsPDF for embedded vector text in PDFs
let _fontCache = {};
    // Preload font files on page load so PDF generation is faster
    (function preloadFonts() {
      ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
        fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
          var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
        }).catch(function() {});
      });
    })();
async function registerPdfFonts(pdf) {
  // svg2pdf strips quotes and fallbacks, so register with clean names only
  // Also register "normal" for undefined-style calls
  const fontDefs = [
    { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
    { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
    { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
    { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
    { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
  ];
  let idx = 0;
  for (const f of fontDefs) {
    try {
      let b64;
      if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
      else {
        const resp = await fetch(f.file);
        const buf = await resp.arrayBuffer();
        const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
        _fontCache[f.file] = b64;
      }
      for (const style of f.styles) {
        const vfsName = "f" + (idx++) + ".ttf";
        pdf.addFileToVFS(vfsName, b64);
        pdf.addFont(vfsName, f.name, style);
      }
    } catch(e) { console.warn("Font load failed:", f.file, e); }
  }
}

async function generatePdfBlob() {
  const opts = gatherOptions();
  const svgPages = [];
  sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
  if (opts.answerKey) {
      for (let i = 0; i < currentState.sheets.length; i++) {
        const wsCode = '(' + (i + 1) + ')';
        svgPages.push(renderWorksheetSVG(currentState.sheets[i], Object.assign({}, opts, { showAnswers: true, isAnswerKey: true }), wsCode));
      }
    }
  const fontCSS = await buildFontCSS();
  let logoB64 = "";
  try {
    const logoResp = await fetch("../../images/logo-watermark.svg");
    const logoBlob = await logoResp.blob();
    logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
  } catch(e) {}
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
  // Register embedded fonts
  await registerPdfFonts(pdf);
  for (let i = 0; i < svgPages.length; i++) {
    if (i > 0) pdf.addPage("letter", "portrait");
    const svgEl = svgPages[i];
    const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
    styleEl.textContent = fontCSS;
    svgEl.insertBefore(styleEl, svgEl.firstChild);
    if (logoB64) {
      svgEl.querySelectorAll("image").forEach(img => {
        const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
        if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
      });
    }
    svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
    document.body.appendChild(svgEl);
    try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
  }
  return pdf.output("blob");
}

async function handlePrint() {
  if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
  const btn = document.getElementById("btnPrint");
  const origText = btn.innerHTML;
  btn.innerHTML = "&#9203; Preparing...";
  btn.disabled = true;
  try {
    const blob = await generatePdfBlob();
    const url = URL.createObjectURL(blob);
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
    iframe.src = url;
    document.body.appendChild(iframe);
    iframe.onload = function() {
      setTimeout(() => {
        iframe.contentWindow.print();
        setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
      }, 300);
    };
  } catch(e) { console.error("Print error:", e); }
  btn.innerHTML = origText;
  btn.disabled = false;
}
