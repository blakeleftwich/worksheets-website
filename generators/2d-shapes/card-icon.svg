<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f7f8fc"/>
  <!-- Circle (blue) -->
  <circle cx="45" cy="52" r="24" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Square (pink) -->
  <rect x="82" y="28" width="48" height="48" rx="2" fill="#fce7f3" stroke="#ec4899" stroke-width="2.5"/>
  <!-- Triangle (green) -->
  <polygon points="168,28 142,76 194,76" fill="#d1fae5" stroke="#10b981" stroke-width="2.5"/>
  <!-- Label text -->
  <text x="45" y="100" text-anchor="middle" font-size="10" font-weight="400" fill="#4a5568" font-family="Fredoka, sans-serif">circle</text>
  <text x="106" y="100" text-anchor="middle" font-size="10" font-weight="400" fill="#4a5568" font-family="Fredoka, sans-serif">square</text>
  <text x="168" y="100" text-anchor="middle" font-size="10" font-weight="400" fill="#4a5568" font-family="Fredoka, sans-serif">triangle</text>
</svg>
