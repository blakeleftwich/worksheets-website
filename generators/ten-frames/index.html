  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

    // ===== Element refs =====

    const elMode = document.getElementById("modeSelect");
    const elFillNumPos = document.getElementById("fillNumPos");
    const elFillStyleOption = document.getElementById("fillStyleOption");

    // problemsPerSheet is auto-calculated based on range

    const elAnswerKey = document.getElementById("answerKey");
    const elNumberLineHint = document.getElementById("numberLineHint");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const elFiveFrames = document.getElementById("fiveFrames");
    const elFiveFramesRow = document.getElementById("fiveFramesRow");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const advToggle = document.getElementById("advToggle");

    const advArrow = document.getElementById("advArrow");

    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";

        // ===== State =====
    let currentState = { sheets: [] };

    // ===== Problem generation =====
    function generateProblems(count, rangeStr) {
      let lo, hi;
      if (rangeStr === "1-5") { lo = 1; hi = 5; }
      else if (rangeStr === "1-10") { lo = 1; hi = 10; }
      else if (rangeStr === "10-20") { lo = 10; hi = 20; }
      else { lo = 1; hi = 20; }

      const problems = [];
      const range = hi - lo + 1;

      if (count <= range) {
        // No duplicates: pick 'count' unique numbers from [lo..hi]
        const pool = [];
        for (let n = lo; n <= hi; n++) pool.push(n);
        // Shuffle
        for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
        for (let i = 0; i < count; i++) problems.push(pool[i]);
      } else {
        // More problems than range — allow repeats but try to spread evenly
        const fullSets = Math.floor(count / range);
        const remainder = count % range;
        for (let s = 0; s < fullSets; s++) {
          const pool = [];
          for (let n = lo; n <= hi; n++) pool.push(n);
          for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
          for (const n of pool) problems.push(n);
        }
        if (remainder > 0) {
          const pool = [];
          for (let n = lo; n <= hi; n++) pool.push(n);
          for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
          for (let i = 0; i < remainder; i++) problems.push(pool[i]);
        }
      }

      // Final shuffle
      for (let i = problems.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [problems[i], problems[j]] = [problems[j], problems[i]]; }
      return problems;
    }

    // ===== SVG dot shapes =====
    function drawDot(svg, cx, cy, r) {
      svg.appendChild(svgEl("circle", { cx: cx, cy: cy, r: r, fill: "#4a5568" }));
    }

    // ===== Draw a single ten frame =====
    function drawTenFrame(svg, x, y, cellSize, filledCount, _unused, showDots, showEmptyOutlines, fiveFrames) {
      const cols = 5, rows = fiveFrames ? 1 : 2;
      const frameW = cols * cellSize;
      const frameH = rows * cellSize;

      // Outer border
      svg.appendChild(svgEl("rect", { x: x, y: y, width: frameW, height: frameH, fill: "none", stroke: "#2d3748", "stroke-width": "1.5", rx: 2, ry: 2 }));

      // Grid lines and cells
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cx = x + c * cellSize;
          const cy = y + r * cellSize;
          svg.appendChild(svgEl("rect", { x: cx, y: cy, width: cellSize, height: cellSize, fill: "none", stroke: "#2d3748", "stroke-width": "1" }));

          const cellIndex = r * cols + c;
          const centerX = cx + cellSize / 2;
          const centerY = cy + cellSize / 2;

          if (showDots && cellIndex < filledCount) {
            const dotR = cellSize * 0.28;
            drawDot(svg, centerX, centerY, dotR);
          } else if (showEmptyOutlines) {
            // Dashed circle outline for empty cells (fill mode)
            svg.appendChild(svgEl("ellipse", {
              cx: centerX, cy: centerY,
              rx: cellSize * 0.30, ry: cellSize * 0.30,
              fill: "none", stroke: "#cbd5e0", "stroke-width": "1.2",
              "stroke-dasharray": "3,2"
            }));
          }
        }
      }
    }

    // ===== Draw number line =====
    function drawNumberLine(svg, x, y, maxNum, width) {
      const lineY = y + 8;
      const tickH = 6;
      const leftPad = 10;
      const rightPad = 10;
      const usableW = width - leftPad - rightPad;
      const step = usableW / maxNum;

      // Main line
      svg.appendChild(svgEl("line", { x1: x + leftPad, y1: lineY, x2: x + leftPad + usableW, y2: lineY, stroke: "#718096", "stroke-width": "1" }));

      for (let i = 0; i <= maxNum; i++) {
        const tx = x + leftPad + i * step;
        // Tick
        svg.appendChild(svgEl("line", { x1: tx, y1: lineY - tickH / 2, x2: tx, y2: lineY + tickH / 2, stroke: "#718096", "stroke-width": "1" }));
        // Number
        const numEl = svgEl("text", { x: tx, y: lineY + tickH / 2 + 10, "font-family": "Fredoka, sans-serif", "font-size": "7", "text-anchor": "middle", fill: "#718096" });
        numEl.textContent = String(i);
        svg.appendChild(numEl);
      }
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, mode, fillNumPos, dotStyle, showNumberLine, range, numbered, includeExample, isAnswerKey, fiveFrames } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      // Branding
      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.svg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      // Number line
      const maxNumForLine = range === "1-20" ? 20 : 10;
      let numberLineH = 0;
      if (showNumberLine) {
        numberLineH = 30;
        drawNumberLine(svg, margin + 40, pageH - (branded ? 56 : 36) - numberLineH, maxNumForLine, pageW - margin * 2 - 80);
      }

      // Layout
      const count = problems.length;
      const bottomMargin = (branded ? 56 : 40) + numberLineH;
      const gridTop = topGridY;
      const availH = pageH - bottomMargin - gridTop;
      const availW = pageW - margin * 2;

      // Determine grid layout
      const isDouble = range === "1-20" || range === "10-20";

      // ===== LEFT-SIDE NUMBER LAYOUT (Fill in the Ten Frame style) =====
      if (mode === "fill" && fillNumPos === "left") {
        const cols = 2;
        const rows = Math.ceil(count / cols);
        const colW = availW / cols;
        const rowH = availH / rows;
        const numberAreaW = 52;
        const frameAreaW = colW - numberAreaW - 16;
        const doubleGap = 6;
        const frameRows = fiveFrames ? 1 : 2;

        let cellSize;
        if (isDouble) {
          cellSize = Math.min(
            Math.floor((frameAreaW - doubleGap) / 10),
            Math.floor((rowH - 14) / 2)
          );
          cellSize = clamp(cellSize, 10, 36);
        } else {
          cellSize = Math.min(
            Math.floor(frameAreaW / 5),
            Math.floor((rowH - 14) / frameRows)
          );
          cellSize = clamp(cellSize, 12, 44);
        }

        const singleFrameW = 5 * cellSize;
        const singleFrameH = frameRows * cellSize;
        const numFontSize = Math.min(38, Math.max(24, Math.floor(rowH * 0.45)));
        const probNumSize = 10;

        for (let i = 0; i < problems.length; i++) {
          const col = i % cols;
          const row = Math.floor(i / cols);
          const cellLeft = margin + col * colW;
          const cellTop = gridTop + row * rowH;
          const num = problems[i];
          const isExample = (i === 0 && includeExample && !showAnswers);

          // Problem box border
          svg.appendChild(svgEl("rect", { x: cellLeft, y: cellTop, width: colW, height: rowH, rx: 8, ry: 8, fill: "none", stroke: "#9ca3af", "stroke-width": 1 }));

          // Problem number label (small, e.g., "1.")
          if (numbered !== false) {
            const pnX = cellLeft + 4;
            const pnY = cellTop + 14;
            const numLabel = svgEl("text", { x: pnX, y: pnY, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
            numLabel.textContent = (i + 1) + "."; svg.appendChild(numLabel);
          }

          // Center content vertically in the row
          const centerY = cellTop + rowH / 2;

          // Large number on the left
          const numTextY = centerY + numFontSize * 0.35;
          const numEl = svgEl("text", {
            x: cellLeft + numberAreaW - 18, y: numTextY, "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(numFontSize), "font-weight": "700",
            "text-anchor": "end", fill: "#1a202c"
          });
          numEl.textContent = String(num); svg.appendChild(numEl);

          // Ten frame(s) on the right
          const colPadRight = 10;

          if (isDouble && num > 10) {
            const totalDoubleW = singleFrameW * 2 + doubleGap;
            const availFrameArea = colW - numberAreaW - 8 - colPadRight;
            const frameX = cellLeft + numberAreaW + Math.max(0, (availFrameArea - totalDoubleW) / 2);
            const frameY = centerY - singleFrameH / 2;

            if (isExample) {
              drawTenFrame(svg, frameX, frameY, cellSize, 10, null, true);
              drawTenFrame(svg, frameX + singleFrameW + doubleGap, frameY, cellSize, num - 10, null, true);
              const badgeX = frameX + totalDoubleW - 42, badgeY = frameY - 15;
              svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
              const badgeText = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
              badgeText.textContent = "Example"; svg.appendChild(badgeText);
            } else if (showAnswers) {
              drawTenFrame(svg, frameX, frameY, cellSize, 10, null, true);
              drawTenFrame(svg, frameX + singleFrameW + doubleGap, frameY, cellSize, num - 10, null, true);
            } else {
              drawTenFrame(svg, frameX, frameY, cellSize, 0, null, false, true);
              drawTenFrame(svg, frameX + singleFrameW + doubleGap, frameY, cellSize, 0, null, false, true);
            }
          } else {
            const availFrameArea = colW - numberAreaW - 8 - colPadRight;
            const frameX = cellLeft + numberAreaW + Math.max(0, (availFrameArea - singleFrameW) / 2);
            const frameY = centerY - singleFrameH / 2;

            if (isExample) {
              drawTenFrame(svg, frameX, frameY, cellSize, num, null, true, false, fiveFrames);
              const badgeX = frameX + singleFrameW - 42, badgeY = frameY - 15;
              svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
              const badgeText = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
              badgeText.textContent = "Example"; svg.appendChild(badgeText);
            } else if (showAnswers) {
              drawTenFrame(svg, frameX, frameY, cellSize, num, null, true, false, fiveFrames);
            } else {
              drawTenFrame(svg, frameX, frameY, cellSize, 0, null, false, true, fiveFrames);
            }
          }
        }
        return svg;
      }

      // ===== STANDARD LAYOUT (above numbers / count mode) =====
      let cols, rows;
      if (count <= 4) { cols = 2; }
      else if (count <= 6) { cols = 2; }
      else { cols = 3; }
      rows = Math.ceil(count / cols);

      const colW = availW / cols;
      const rowH = availH / rows;

      // Ten frame sizing — scale to fill the available cell area
      const maxCellW = colW - 30;   // horizontal room inside each problem cell
      const maxCellH = rowH - 40;   // vertical room (leave space for answer line + padding)

      let cellSize;
      if (isDouble) {
        // Two frames stacked vertically: width = 5*cell, height = 2*cell*2 + gap + answer
        const stackGapEst = 6;
        cellSize = Math.min(
          Math.floor(maxCellW / 5),                         // fit width for 5 columns
          Math.floor((maxCellH - 30 - stackGapEst) / 4)    // fit height for 4 rows (2 frames) + gap + answer
        );
        cellSize = clamp(cellSize, 10, 40);
      } else {
        const stdFrameRows = fiveFrames ? 1 : 2;
        cellSize = Math.min(
          Math.floor(maxCellW / 5),                       // fit width for 5 columns
          Math.floor((maxCellH - 30) / stdFrameRows)      // fit height for rows + answer area
        );
        cellSize = clamp(cellSize, 10, 50);
      }

      const singleFrameW = 5 * cellSize;
      const singleFrameH = (fiveFrames ? 1 : 2) * cellSize;
      const stackGap = 6;
      // For double: frames are stacked, so total width = single frame width, total height = 2 frames + gap
      const totalFrameW = singleFrameW;
      const totalFrameH = isDouble ? singleFrameH * 2 + stackGap : singleFrameH;

      // Shift all rows up when showing 6 problems; slight down-shift for 1-5 and 1-10 ranges
      const rangeDownShift = (range === "1-5" || range === "1-10") ? 6 : 0;
      // Fill mode: no row shift needed (content fits naturally); count mode shifts rows up
      const baseShift = (count >= 6) ? singleFrameH * 0.5 + 45 : 0;
      const rowShift = (mode === "fill") ? 0 : baseShift - rangeDownShift;

      // Problem number font size
      const probNumSize = 11;

      // Answer box dimensions
      const boxW = Math.max(36, cellSize * 1.2);
      const boxH = boxW;

      for (let i = 0; i < problems.length; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cellLeft = margin + col * colW;
        // When 6 problems (3 rows): move top row down 5px, keep bottom row fixed, interpolate middle
        const topRowNudge = (count >= 6 && rows > 1) ? 5 * (1 - row / (rows - 1)) : 0;
        const cellTop = gridTop + row * rowH - rowShift + topRowNudge;
        const num = problems[i];
        const isExample = (i === 0 && includeExample && !showAnswers);

        // Problem box border
        svg.appendChild(svgEl("rect", { x: cellLeft, y: cellTop, width: colW, height: rowH, rx: 8, ry: 8, fill: "none", stroke: "#9ca3af", "stroke-width": 1 }));

        // Problem number
        if (numbered !== false) {
          const pnX = cellLeft + 4;
          const pnY = cellTop + 16;
          const numLabel = svgEl("text", { x: pnX, y: pnY, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numLabel.textContent = (i + 1) + "."; svg.appendChild(numLabel);
        }

        // Position content higher within each cell
        const contentCenterY = cellTop + rowH * 0.47;
        // Horizontally center the frame block within the cell
        const contentStartX = cellLeft + (colW - singleFrameW) / 2 + 6;

        if (mode === "count") {
          // "Count the dots" mode
          const boxCx = contentStartX + singleFrameW / 2;
          const fixedFrameTopY = cellTop + (rows >= 3 ? 6 : 30);
          const answerLineOffset = 49;
          // Bottom frame Y (same for single and double — single aligns with bottom frame of double)
          const bottomFrameY = fixedFrameTopY + singleFrameH + stackGap;
          // Fixed answer line Y based on double-frame layout so all underlines align
          const fixedLineY = bottomFrameY + singleFrameH + answerLineOffset;

          if (isDouble && num > 10) {
            drawTenFrame(svg, contentStartX, fixedFrameTopY, cellSize, 10, null, true);
            drawTenFrame(svg, contentStartX, bottomFrameY, cellSize, num - 10, null, true);
          } else {
            // Single frame aligned with bottom frame position of doubles
            drawTenFrame(svg, contentStartX, bottomFrameY, cellSize, num, null, true, false, fiveFrames);
          }

          // Answer line at fixed position across all cells
          svg.appendChild(svgEl("line", { x1: boxCx - boxW / 2, y1: fixedLineY, x2: boxCx + boxW / 2, y2: fixedLineY, stroke: "#cbd5e1", "stroke-width": "1.5" }));
          if (showAnswers || isExample) {
            const ansColor = showAnswers ? "#3182ce" : "#16a34a";
            const ansEl = svgEl("text", { x: boxCx, y: fixedLineY - boxH * 0.2, "font-family": "Fredoka, sans-serif", "font-size": String(Math.round(boxH * 0.6)), "font-weight": "700", "text-anchor": "middle", fill: ansColor });
            ansEl.textContent = String(num); svg.appendChild(ansEl);
          }
        } else {
          // "Fill the frame" mode: single frames align with TOP frame of doubles
          const fillNumSize = Math.max(28, Math.round(cellSize * 0.9));
          // 40px gap between number and frame at base size, scaled for tighter layouts
          const baseNumGap = 40;
          const numGap = Math.min(baseNumGap, rowH * 0.12);
          // Position: number first, then gap, then frame(s)
          const rawFillNumY = cellTop + (rows >= 3 ? 6 : 22) + fillNumSize * 0.85;
          const fixedNumY = Math.max(rawFillNumY, gridTop + fillNumSize * 0.85);
          const fillFrameTopY = fixedNumY + numGap;
          const fillBottomFrameY = fillFrameTopY + singleFrameH + stackGap;

          // Number label at fixed position
          const numEl = svgEl("text", { x: contentStartX + singleFrameW / 2, y: fixedNumY, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fillNumSize), "font-weight": "700", "text-anchor": "middle", fill: "#1a202c" });
          numEl.textContent = String(num); svg.appendChild(numEl);

          if (isDouble && num > 10) {
            if (showAnswers || isExample) {
              drawTenFrame(svg, contentStartX, fillFrameTopY, cellSize, 10, null, true);
              drawTenFrame(svg, contentStartX, fillBottomFrameY, cellSize, num - 10, null, true);
            } else {
              drawTenFrame(svg, contentStartX, fillFrameTopY, cellSize, 0, null, false, true);
              drawTenFrame(svg, contentStartX, fillBottomFrameY, cellSize, 0, null, false, true);
            }
          } else {
            // Single frame aligned with TOP frame position of doubles
            if (showAnswers || isExample) {
              drawTenFrame(svg, contentStartX, fillFrameTopY, cellSize, num, null, true, false, fiveFrames);
            } else {
              drawTenFrame(svg, contentStartX, fillFrameTopY, cellSize, 0, null, false, true, fiveFrames);
            }
          }
        }

        // Example badge
        if (isExample) {
          const badgeW = 42, badgeH = 13;
          const badgeX = cellLeft + (colW - badgeW) / 2;
          const badgeY = cellTop + 4;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: badgeW, height: badgeH, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "1" }));
          const badgeText = svgEl("text", {
            x: badgeX + badgeW / 2, y: badgeY + badgeH * 0.75,
            "text-anchor": "middle", "font-family": "Fredoka, sans-serif",
            "font-size": "8", "font-weight": "600", fill: "#16a34a"
          });
          badgeText.textContent = "Example";
          svg.appendChild(badgeText);
        }
      }
      return svg;
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      const range = elRange.value;
      const fillNumPos = elFillNumPos.value;
      // Auto-calculate problems per sheet based on mode and layout
      let problemsPerSheet;
      const isDoubleRange = range === "1-20" || range === "10-20";
      if (elMode.value === "fill" && fillNumPos === "left") {
        // Left-side layout: 2 columns, more problems fit
        problemsPerSheet = isDoubleRange ? 8 : 10;
      } else {
        problemsPerSheet = isDoubleRange ? 4 : 6;
      }
      return {
        mode: elMode.value,
        fillNumPos: fillNumPos,
        range: range,
        problemsPerSheet: problemsPerSheet,
        dotStyle: "circles",
        numWorksheets: parseInt(elNumSheets.value, 10),
        answerKey: elAnswerKey.checked,
        showNumberLine: elNumberLineHint.checked,
        showHeader: showHeader,
        title: title,
        subtitle: subtitle,
        branded: elBranded.checked,
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
        fiveFrames: elFiveFrames.checked && range === "1-5",
      };
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.range));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.range));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, fillNumPos: opts.fillNumPos, dotStyle: opts.dotStyle, showNumberLine: opts.showNumberLine, range: opts.range, numbered: opts.numbered, includeExample: opts.includeExample, fiveFrames: opts.fiveFrames }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      // Desktop: grid layout with calculated sizing
      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cols - 1) * gap) / cols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, fillNumPos: opts.fillNumPos, dotStyle: opts.dotStyle, showNumberLine: opts.showNumberLine, range: opts.range, numbered: opts.numbered, includeExample: opts.includeExample, fiveFrames: opts.fiveFrames }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, fillNumPos: opts.fillNumPos, dotStyle: opts.dotStyle, showNumberLine: opts.showNumberLine, range: opts.range, numbered: opts.numbered, includeExample: opts.includeExample, fiveFrames: opts.fiveFrames }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }


    // Load and register TTF fonts with jsPDF for embedded vector text in PDFs
    let _fontCache = {};
    // Preload font files on page load so PDF generation is faster
    (function preloadFonts() {
      ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
        fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
          var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
        }).catch(function() {});
      });
    })();
    async function registerPdfFonts(pdf) {
      // svg2pdf strips quotes and fallbacks, so register with clean names only
      // Also register "normal" for undefined-style calls
      const fontDefs = [
        { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
        { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
        { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
      ];
      let idx = 0;
      for (const f of fontDefs) {
        try {
          let b64;
          if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
          else {
            const resp = await fetch(f.file);
            const buf = await resp.arrayBuffer();
            const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
            _fontCache[f.file] = b64;
          }
          for (const style of f.styles) {
            const vfsName = "f" + (idx++) + ".ttf";
            pdf.addFileToVFS(vfsName, b64);
            pdf.addFont(vfsName, f.name, style);
          }
        } catch(e) { console.warn("Font load failed:", f.file, e); }
      }
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: true, mode: opts.mode, fillNumPos: opts.fillNumPos, dotStyle: opts.dotStyle, showNumberLine: false, range: opts.range, numbered: opts.numbered, isAnswerKey: true, fiveFrames: opts.fiveFrames }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      // Register embedded fonts
      await registerPdfFonts(pdf);

      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

    // ===== Event Listeners =====
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elMode.addEventListener("change", () => {
      elFillStyleOption.style.display = elMode.value === "fill" ? "" : "none";
      renderWithNewRandomization();
    });
    elFillNumPos.addEventListener("change", () => renderWithNewRandomization());
    elFiveFrames.addEventListener("change", () => renderWithoutRandomization());
    elRange.addEventListener("change", () => {
      if (elRange.value === "1-5") {
        elFiveFramesRow.style.display = "";
      } else {
        elFiveFrames.checked = false;
        elFiveFramesRow.style.display = "none";
      }
      renderWithNewRandomization();
    });
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elNumberLineHint.addEventListener("change", () => renderWithoutRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
