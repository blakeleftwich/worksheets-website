  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elOpAdd = document.getElementById("opAdd");
    const elOpSub = document.getElementById("opSub");
    function getOperation() {
      const add = elOpAdd.checked, sub = elOpSub.checked;
      if (add && sub) return "mixed";
      if (sub) return "subtraction";
      return "addition";
    }
    function guardOps(changed) {
      if (!elOpAdd.checked && !elOpSub.checked) changed.checked = true;
    }
    elOpAdd.addEventListener("change", () => { guardOps(elOpAdd); renderWithNewRandomization(); });
    elOpSub.addEventListener("change", () => { guardOps(elOpSub); renderWithNewRandomization(); });
    const elMaxSum = document.getElementById("maxSumSelect");
    const elProblems = { value: "5", addEventListener: function(){} };
    const elNumSheets = document.getElementById("numWorksheets");
    const elAnswerKey = document.getElementById("answerKey");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Problem generation =====
    function generateProblems(count, maxNum, operation) {
      const problems = [];
      const seen = new Set();
      let attempts = 0;

      while (problems.length < count && attempts < count * 300) {
        attempts++;
        // Pick operation for this problem
        let op;
        if (operation === "mixed") {
          op = Math.random() < 0.5 ? "+" : "-";
        } else if (operation === "subtraction") {
          op = "-";
        } else {
          op = "+";
        }

        let a, b, answer;
        if (op === "+") {
          // Addition: a + b = answer, answer <= maxNum, both a,b >= 1, both <= 10
          a = randInt(1, Math.min(10, maxNum - 1));
          const maxB = Math.min(10, maxNum - a);
          if (maxB < 1) continue;
          b = randInt(1, maxB);
          answer = a + b;
        } else {
          // Subtraction: a - b = answer, a >= 2, b >= 1, answer >= 0, a <= maxNum, a <= 10 for single frame or <= 20 for double
          a = randInt(2, Math.min(maxNum, 20));
          b = randInt(1, Math.min(a, 10));
          answer = a - b;
          if (answer < 0) continue;
        }

        const key = a + op + b;
        if (seen.has(key)) continue;
        seen.add(key);
        problems.push({ a, b, op, answer });
      }

      // Fill remainder if needed
      let fa = 0;
      while (problems.length < count && fa < count * 300) {
        fa++;
        let op = operation === "mixed" ? (Math.random() < 0.5 ? "+" : "-") : (operation === "subtraction" ? "-" : "+");
        let a, b, answer;
        if (op === "+") {
          a = randInt(1, Math.min(10, maxNum - 1));
          const maxB = Math.min(10, maxNum - a);
          if (maxB < 1) continue;
          b = randInt(1, maxB);
          answer = a + b;
        } else {
          a = randInt(2, Math.min(maxNum, 20));
          b = randInt(1, Math.min(a, 10));
          answer = a - b;
          if (answer < 0) continue;
        }
        problems.push({ a, b, op, answer });
      }

      // Shuffle
      for (let i = problems.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [problems[i], problems[j]] = [problems[j], problems[i]];
      }
      return problems;
    }

    // ===== Draw a single ten frame =====
    function drawTenFrame(svg, x, y, cellSize, filledCount) {
      const cols = 5, rows = 2;
      const frameW = cols * cellSize;
      const frameH = rows * cellSize;

      svg.appendChild(svgEl("rect", {
        x: x, y: y, width: frameW, height: frameH,
        fill: "none", stroke: "#2d3748", "stroke-width": "1.5", rx: 2, ry: 2
      }));

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cx = x + c * cellSize;
          const cy = y + r * cellSize;
          svg.appendChild(svgEl("rect", {
            x: cx, y: cy, width: cellSize, height: cellSize,
            fill: "none", stroke: "#2d3748", "stroke-width": "1"
          }));
          const cellIndex = r * cols + c;
          if (cellIndex < filledCount) {
            const dotR = cellSize * 0.28;
            svg.appendChild(svgEl("circle", {
              cx: cx + cellSize / 2, cy: cy + cellSize / 2, r: dotR, fill: "#4a5568"
            }));
          }
        }
      }
    }

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      const op = getOperation();
      const maxNum = parseInt(elMaxSum.value, 10);
      if (op === "addition") return "Ten Frame Addition";
      if (op === "subtraction") return "Ten Frame Subtraction";
      return "Ten Frame Math";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Use the ten frames to solve each problem.";
    }

    // ===== Gather options =====
    function gatherOptions() {
      return {
        operation: getOperation(),
        maxNum: parseInt(elMaxSum.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        problemsPerSheet: 5,
        showHeader: getHeaderMode(),
        title: getTitle(),
        subtitle: getSubtitle(),
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
      };
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", { x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY - 6;
      }

      // Branding
      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", { href: "../../images/logo-watermark.svg", x: margin, y: brandY, width: logoW, height: logoH }));
        const bLine1 = svgEl("text", { x: pageW - margin, y: brandY + 14, "font-family": "Fredoka, sans-serif", "font-size": 11, fill: "#4a5568", "text-anchor": "end" });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", { x: pageW - margin, y: brandY + 26, "font-family": "Fredoka, sans-serif", "font-size": 9.5, fill: "#718096", "text-anchor": "end" });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", { x: pageW / 2, y: pageH - 4, "font-family": "Fredoka, sans-serif", "font-size": 8.5, fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1" });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      // Layout
      const count = problems.length;
      const bottomMargin = branded ? 46 : 20;
      const gridTop = topGridY;
      const availH = pageH - bottomMargin - gridTop;
      const availW = pageW - margin * 2;
      const rowH = availH / count;

      // Calculate ten frame cell size
      // Layout: [frame1] gap [sign] gap [frame2] gap [sign] gap [answerBox]
      const gap = 6;
      const signW = 20;
      // Initial estimate for ansBox size to calculate cellSize
      const estCellSize = clamp(Math.min(Math.floor((availW - 4 * gap - 2 * signW - 44) / 10), Math.floor((rowH - 14) / 2)), 14, 44);
      const estAnsBox = 2 * estCellSize;
      const fixedW = 4 * gap + 2 * signW + estAnsBox;
      const maxCellFromWidth = Math.floor((availW - fixedW) / 10);
      const maxCellFromHeight = Math.floor((rowH - 14) / 2);
      const cellSize = clamp(Math.min(maxCellFromWidth, maxCellFromHeight), 14, 44);
      const frameW = 5 * cellSize;
      const frameH = 2 * cellSize;
      const ansBoxW = frameH;
      const ansBoxH = frameH;

      const signFontSize = clamp(Math.round(cellSize * 1.1), 22, 36);
      const answerFontSize = clamp(Math.round(cellSize * 0.85), 16, 28);

      const actualTotalW = frameW + gap + signW + gap + frameW + gap + signW + gap + ansBoxW;

      for (let i = 0; i < problems.length; i++) {
        const { a, b, op, answer } = problems[i];
        const rowTop = gridTop + i * rowH;
        const isExample = (i === 0 && includeExample && !showAnswers);

        // Center content vertically in row
        const frameY = rowTop + (rowH - frameH) / 2;

        // Horizontal layout
        const startX = margin + (availW - actualTotalW) / 2;
        let x = startX;

        // Problem number — positioned to the left of the first ten frame
        if (numbered !== false) {
          const probNumSize = 11;
          const pnEl = svgEl("text", { x: startX - 14, y: frameY + frameH / 2 + probNumSize * 0.35, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0", "text-anchor": "end" });
          pnEl.textContent = (i + 1) + "."; svg.appendChild(pnEl);
        }

        // ===== First ten frame =====
        if (a <= 10) {
          drawTenFrame(svg, x, frameY, cellSize, a);
        } else {
          // Double ten frame for numbers > 10
          drawTenFrame(svg, x, frameY, cellSize, 10);
          // Second frame below or we need to handle this differently
          // For simplicity in horizontal layout, show 10 filled + label
          const labelEl = svgEl("text", { x: x + frameW / 2, y: frameY - 4, "font-family": "'Google Sans Flex', sans-serif", "font-size": "14", "font-weight": "700", "text-anchor": "middle", fill: "#1a202c" });
          labelEl.textContent = String(a);
          svg.appendChild(labelEl);
        }
        x += frameW + gap;

        // ===== Operation sign =====
        const signCY = frameY + frameH / 2 + signFontSize * 0.35;
        const signEl = svgEl("text", { x: x + signW / 2, y: signCY, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(signFontSize), "font-weight": "700", "text-anchor": "middle", fill: "#1a202c" });
        signEl.textContent = op === "+" ? "+" : "\u2212";
        svg.appendChild(signEl);
        x += signW + gap;

        // ===== Second ten frame =====
        if (b <= 10) {
          drawTenFrame(svg, x, frameY, cellSize, b);
        } else {
          drawTenFrame(svg, x, frameY, cellSize, 10);
          const labelEl = svgEl("text", { x: x + frameW / 2, y: frameY - 4, "font-family": "'Google Sans Flex', sans-serif", "font-size": "14", "font-weight": "700", "text-anchor": "middle", fill: "#1a202c" });
          labelEl.textContent = String(b);
          svg.appendChild(labelEl);
        }
        x += frameW + gap;

        // ===== Equals sign =====
        const eqEl = svgEl("text", { x: x + signW / 2, y: signCY, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(signFontSize), "font-weight": "700", "text-anchor": "middle", fill: "#1a202c" });
        eqEl.textContent = "=";
        svg.appendChild(eqEl);
        x += signW + gap;

        // ===== Answer underline =====
        const boxCx = x + ansBoxW / 2;
        const boxY = frameY + (frameH - ansBoxH) / 2;
        const ansLineY = boxY + ansBoxH;
        svg.appendChild(svgEl("line", { x1: x, y1: ansLineY, x2: x + ansBoxW, y2: ansLineY, stroke: "#cbd5e1", "stroke-width": "1.5" }));

        if (showAnswers || isExample) {
          const ansColor = showAnswers ? "#3182ce" : "#16a34a";
          const ansEl = svgEl("text", { x: boxCx, y: ansLineY - ansBoxH * 0.2, "font-family": "Fredoka, sans-serif", "font-size": String(answerFontSize), "font-weight": "700", "text-anchor": "middle", fill: ansColor });
          ansEl.textContent = String(answer);
          svg.appendChild(ansEl);
        }

        // Example badge
        if (isExample) {
          const badgeW = 42, badgeH = 13;
          const badgeX = startX + actualTotalW / 2 - badgeW / 2;
          const badgeY = rowTop + 4;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: badgeW, height: badgeH, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "1" }));
          const badgeText = svgEl("text", { x: badgeX + badgeW / 2, y: badgeY + badgeH * 0.75, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          badgeText.textContent = "Example";
          svg.appendChild(badgeText);
        }
      }

      return svg;
    }

    // ===== Render logic =====
    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.maxNum, opts.operation));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.maxNum, opts.operation));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cols - 1) * gap) / cols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: "", branded: opts.branded, showAnswers: true, isAnswerKey: true, numbered: opts.numbered, includeExample: false }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

    // ===== Event Listeners =====
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elMaxSum.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
    let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
<script src="../../favorites.js"></script>
</body>
