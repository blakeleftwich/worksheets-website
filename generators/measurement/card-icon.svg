<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f7f8fc"/>
  <!-- Pencil shape to measure -->
  <rect x="30" y="30" width="120" height="12" rx="2" fill="#f6c944" stroke="#c9a020" stroke-width="1"/>
  <polygon points="150,30 160,36 150,42" fill="#f6c944" stroke="#c9a020" stroke-width="1"/>
  <!-- Ruler below -->
  <rect x="20" y="62" width="160" height="22" rx="2" fill="none" stroke="#636e72" stroke-width="1.2"/>
  <line x1="52" y1="62" x2="52" y2="84" stroke="#636e72" stroke-width="0.8"/>
  <line x1="84" y1="62" x2="84" y2="84" stroke="#636e72" stroke-width="0.8"/>
  <line x1="116" y1="62" x2="116" y2="84" stroke="#636e72" stroke-width="0.8"/>
  <line x1="148" y1="62" x2="148" y2="84" stroke="#636e72" stroke-width="0.8"/>
  <!-- Ruler numbers -->
  <text x="36" y="78" text-anchor="middle" font-size="9" font-weight="400" fill="#333" font-family="Fredoka, sans-serif">1</text>
  <text x="68" y="78" text-anchor="middle" font-size="9" font-weight="400" fill="#333" font-family="Fredoka, sans-serif">2</text>
  <text x="100" y="78" text-anchor="middle" font-size="9" font-weight="400" fill="#333" font-family="Fredoka, sans-serif">3</text>
  <text x="132" y="78" text-anchor="middle" font-size="9" font-weight="400" fill="#333" font-family="Fredoka, sans-serif">4</text>
  <text x="164" y="78" text-anchor="middle" font-size="9" font-weight="400" fill="#333" font-family="Fredoka, sans-serif">5</text>
  <!-- Answer -->
  <line x1="70" y1="112" x2="120" y2="112" stroke="#b0b0b0" stroke-width="1.2"/>
  <text x="130" y="111" text-anchor="start" font-size="11" font-weight="400" fill="#4a5568" font-family="Fredoka, sans-serif">units</text>
</svg>
