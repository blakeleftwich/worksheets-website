  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }
    function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elMeasureType = document.getElementById("measureType");
    const elNonStandardUnit = document.getElementById("nonStandardUnit");
    const elNonStandardUnitGroup = document.getElementById("nonStandardUnitGroup");
    const elMaxMeasure = document.getElementById("maxMeasure");
    const elProblemType = document.getElementById("problemType");
    const elProblems = document.getElementById("problemsPerSheet");
    const elNumSheets = document.getElementById("numWorksheets");
    const elAnswerKey = document.getElementById("answerKey");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    // ===== Measurement type change =====
    elMeasureType.addEventListener("change", () => {
      elNonStandardUnitGroup.style.display = elMeasureType.value === "non_standard" ? "block" : "none";
      // Update max measure defaults
      updateMaxMeasureOptions();
      renderWithNewRandomization();
    });
    elNonStandardUnit.addEventListener("change", () => renderWithNewRandomization());

    function updateMaxMeasureOptions() {
      const sel = elMaxMeasure;
      const mt = elMeasureType.value;
      sel.innerHTML = "";
      if (mt === "ruler_in") {
        [6, 8, 10, 12].forEach(v => { const o = document.createElement("option"); o.value = v; o.textContent = v + " inches"; sel.appendChild(o); });
        sel.value = "6";
      } else if (mt === "ruler_cm") {
        [10, 15, 20].forEach(v => { const o = document.createElement("option"); o.value = v; o.textContent = v + " cm"; sel.appendChild(o); });
        sel.value = "10";
      } else {
        [6, 8, 10].forEach(v => { const o = document.createElement("option"); o.value = v; o.textContent = v + " units"; sel.appendChild(o); });
        sel.value = "6";
      }
    }

    // ===== Objects to measure =====
    const OBJECTS = [
      { name: "pencil", label: "Pencil" },
      { name: "crayon", label: "Crayon" },
      { name: "worm", label: "Worm" },
      { name: "leaf", label: "Leaf" },
      { name: "key", label: "Key" },
      { name: "feather", label: "Feather" },
      { name: "eraser", label: "Eraser" },
      { name: "ribbon", label: "Ribbon" },
      { name: "caterpillar", label: "Caterpillar" },
      { name: "bone", label: "Bone" }
    ];

    // ===== Draw SVG objects =====
    function drawObject(g, objName, x, y, width, height) {
      // All objects are drawn horizontally, starting at x,y with given width and height
      const cx = x + width / 2;
      const cy = y + height / 2;
      switch (objName) {
        case "pencil": {
          // Body
          g.appendChild(svgEl("rect", { x: x + width * 0.12, y: cy - height * 0.22, width: width * 0.72, height: height * 0.44, rx: 2, fill: "#f6c944", stroke: "#c9a020", "stroke-width": "1" }));
          // Tip (triangle)
          const tipX = x;
          const tipMid = cy;
          const tipRight = x + width * 0.12;
          const tipTop = cy - height * 0.22;
          const tipBot = cy + height * 0.22;
          g.appendChild(svgEl("polygon", { points: tipX + "," + tipMid + " " + tipRight + "," + tipTop + " " + tipRight + "," + tipBot, fill: "#ffe0b2", stroke: "#c9a020", "stroke-width": "1" }));
          // Tip point
          g.appendChild(svgEl("polygon", { points: tipX + "," + tipMid + " " + (tipX + width * 0.04) + "," + (tipMid - height * 0.1) + " " + (tipX + width * 0.04) + "," + (tipMid + height * 0.1), fill: "#333" }));
          // Eraser
          g.appendChild(svgEl("rect", { x: x + width * 0.84, y: cy - height * 0.22, width: width * 0.12, height: height * 0.44, rx: 2, fill: "#e88ca5", stroke: "#c9a020", "stroke-width": "1" }));
          // Metal band
          g.appendChild(svgEl("rect", { x: x + width * 0.82, y: cy - height * 0.24, width: width * 0.04, height: height * 0.48, rx: 1, fill: "#b0b0b0" }));
          break;
        }
        case "crayon": {
          // Body
          g.appendChild(svgEl("rect", { x: x + width * 0.15, y: cy - height * 0.24, width: width * 0.72, height: height * 0.48, rx: 3, fill: "#e74c3c", stroke: "#c0392b", "stroke-width": "1" }));
          // Tip
          g.appendChild(svgEl("polygon", { points: x + "," + cy + " " + (x + width * 0.15) + "," + (cy - height * 0.24) + " " + (x + width * 0.15) + "," + (cy + height * 0.24), fill: "#c0392b", stroke: "#a93226", "stroke-width": "1" }));
          // Wrapper line
          g.appendChild(svgEl("rect", { x: x + width * 0.22, y: cy - height * 0.18, width: width * 0.56, height: height * 0.36, rx: 1, fill: "none", stroke: "#ffeaa7", "stroke-width": "1" }));
          // End
          g.appendChild(svgEl("rect", { x: x + width * 0.87, y: cy - height * 0.2, width: width * 0.1, height: height * 0.4, rx: 2, fill: "#c0392b" }));
          break;
        }
        case "worm": {
          // Segmented body using curves
          const segs = 6;
          const segW = width / segs;
          const amp = height * 0.18;
          let d = "M " + x + "," + cy;
          for (let i = 0; i < segs; i++) {
            const sx = x + i * segW;
            const dir = (i % 2 === 0) ? -1 : 1;
            d += " Q " + (sx + segW / 2) + "," + (cy + dir * amp) + " " + (sx + segW) + "," + cy;
          }
          g.appendChild(svgEl("path", { d: d, fill: "none", stroke: "#e07a5f", "stroke-width": String(height * 0.32), "stroke-linecap": "round" }));
          // Segments
          for (let i = 1; i < segs; i++) {
            g.appendChild(svgEl("line", { x1: x + i * segW, y1: cy - height * 0.14, x2: x + i * segW, y2: cy + height * 0.14, stroke: "#c96040", "stroke-width": "0.8", opacity: "0.5" }));
          }
          // Eye
          g.appendChild(svgEl("circle", { cx: x + width - 3, cy: cy - height * 0.08, r: Math.max(2, height * 0.08), fill: "white", stroke: "#333", "stroke-width": "0.8" }));
          g.appendChild(svgEl("circle", { cx: x + width - 2, cy: cy - height * 0.08, r: Math.max(1, height * 0.04), fill: "#333" }));
          break;
        }
        case "leaf": {
          // Leaf shape
          const leafD = "M " + x + "," + cy + " Q " + (x + width * 0.3) + "," + (cy - height * 0.45) + " " + (x + width) + "," + cy + " Q " + (x + width * 0.3) + "," + (cy + height * 0.45) + " " + x + "," + cy;
          g.appendChild(svgEl("path", { d: leafD, fill: "#81b29a", stroke: "#588157", "stroke-width": "1" }));
          // Vein
          g.appendChild(svgEl("line", { x1: x + 2, y1: cy, x2: x + width - 2, y2: cy, stroke: "#588157", "stroke-width": "1" }));
          // Side veins
          for (let i = 1; i <= 3; i++) {
            const vx = x + width * (i * 0.22);
            g.appendChild(svgEl("line", { x1: vx, y1: cy, x2: vx + width * 0.1, y2: cy - height * 0.2, stroke: "#588157", "stroke-width": "0.6", opacity: "0.7" }));
            g.appendChild(svgEl("line", { x1: vx, y1: cy, x2: vx + width * 0.1, y2: cy + height * 0.2, stroke: "#588157", "stroke-width": "0.6", opacity: "0.7" }));
          }
          break;
        }
        case "key": {
          // Shaft
          const shaftY = cy - height * 0.08;
          const shaftH = height * 0.16;
          g.appendChild(svgEl("rect", { x: x, y: shaftY, width: width * 0.68, height: shaftH, rx: 1, fill: "#d4a44c", stroke: "#b8860b", "stroke-width": "1" }));
          // Teeth
          const teethX = x + 2;
          const teethW = width * 0.12;
          g.appendChild(svgEl("rect", { x: teethX, y: cy + height * 0.08, width: teethW, height: height * 0.18, fill: "#d4a44c", stroke: "#b8860b", "stroke-width": "0.8" }));
          g.appendChild(svgEl("rect", { x: teethX + teethW + 3, y: cy + height * 0.08, width: teethW * 0.7, height: height * 0.12, fill: "#d4a44c", stroke: "#b8860b", "stroke-width": "0.8" }));
          // Handle (circle)
          const hx = x + width * 0.82;
          g.appendChild(svgEl("circle", { cx: hx, cy: cy, r: height * 0.35, fill: "#d4a44c", stroke: "#b8860b", "stroke-width": "1.5" }));
          g.appendChild(svgEl("circle", { cx: hx, cy: cy, r: height * 0.15, fill: "none", stroke: "#b8860b", "stroke-width": "1" }));
          break;
        }
        case "feather": {
          // Quill/shaft
          g.appendChild(svgEl("line", { x1: x, y1: cy, x2: x + width, y2: cy, stroke: "#8B7355", "stroke-width": "1.5" }));
          // Feather vanes (top and bottom)
          const vaneD1 = "M " + (x + width * 0.1) + "," + cy + " Q " + (x + width * 0.4) + "," + (cy - height * 0.45) + " " + (x + width * 0.95) + "," + (cy - height * 0.05);
          const vaneD2 = "M " + (x + width * 0.1) + "," + cy + " Q " + (x + width * 0.4) + "," + (cy + height * 0.45) + " " + (x + width * 0.95) + "," + (cy + height * 0.05);
          g.appendChild(svgEl("path", { d: vaneD1, fill: "#b8d4e3", stroke: "#7ba7c2", "stroke-width": "0.5" }));
          g.appendChild(svgEl("path", { d: vaneD2, fill: "#b8d4e3", stroke: "#7ba7c2", "stroke-width": "0.5" }));
          // Barb lines
          for (let i = 2; i <= 7; i++) {
            const bx = x + width * (i * 0.12);
            g.appendChild(svgEl("line", { x1: bx, y1: cy, x2: bx + width * 0.06, y2: cy - height * 0.25, stroke: "#7ba7c2", "stroke-width": "0.4", opacity: "0.6" }));
            g.appendChild(svgEl("line", { x1: bx, y1: cy, x2: bx + width * 0.06, y2: cy + height * 0.25, stroke: "#7ba7c2", "stroke-width": "0.4", opacity: "0.6" }));
          }
          break;
        }
        case "eraser": {
          // Main body
          g.appendChild(svgEl("rect", { x: x, y: cy - height * 0.3, width: width, height: height * 0.6, rx: 4, fill: "#f8a5c2", stroke: "#e77f9c", "stroke-width": "1" }));
          // Paper wrapper band
          g.appendChild(svgEl("rect", { x: x + width * 0.2, y: cy - height * 0.32, width: width * 0.6, height: height * 0.64, rx: 1, fill: "#dfe6e9", stroke: "#b2bec3", "stroke-width": "0.8" }));
          // Text on wrapper
          const et = svgEl("text", { x: cx, y: cy + 3, "text-anchor": "middle", "font-size": String(Math.max(6, height * 0.22)), "font-family": "'Google Sans Flex', sans-serif", fill: "#636e72" });
          et.textContent = "ERASER"; g.appendChild(et);
          break;
        }
        case "ribbon": {
          // Wavy ribbon
          const ribbH = height * 0.28;
          let rd = "M " + x + "," + (cy - ribbH / 2);
          rd += " L " + (x + width) + "," + (cy - ribbH / 2);
          rd += " L " + (x + width) + "," + (cy + ribbH / 2);
          rd += " L " + x + "," + (cy + ribbH / 2) + " Z";
          g.appendChild(svgEl("path", { d: rd, fill: "#a29bfe", stroke: "#6c5ce7", "stroke-width": "1" }));
          // Decorative stripes
          for (let i = 1; i <= 4; i++) {
            const sx = x + width * (i * 0.18);
            g.appendChild(svgEl("line", { x1: sx, y1: cy - ribbH / 2 + 1, x2: sx, y2: cy + ribbH / 2 - 1, stroke: "#6c5ce7", "stroke-width": "0.6", opacity: "0.4" }));
          }
          // End cuts (V shapes)
          g.appendChild(svgEl("polygon", { points: x + "," + (cy - ribbH / 2) + " " + (x + 5) + "," + cy + " " + x + "," + (cy + ribbH / 2), fill: "white" }));
          g.appendChild(svgEl("polygon", { points: (x + width) + "," + (cy - ribbH / 2) + " " + (x + width - 5) + "," + cy + " " + (x + width) + "," + (cy + ribbH / 2), fill: "white" }));
          break;
        }
        case "caterpillar": {
          // Body segments (circles)
          const numSegs = 7;
          const segR = Math.min(height * 0.32, width / (numSegs * 1.6));
          const segSpacing = (width - segR * 2) / (numSegs - 1);
          for (let i = 0; i < numSegs; i++) {
            const segX = x + segR + i * segSpacing;
            const color = i % 2 === 0 ? "#55efc4" : "#00b894";
            g.appendChild(svgEl("circle", { cx: segX, cy: cy, r: segR, fill: color, stroke: "#00b894", "stroke-width": "0.8" }));
          }
          // Head (last segment is head)
          const headX = x + segR + (numSegs - 1) * segSpacing;
          g.appendChild(svgEl("circle", { cx: headX, cy: cy, r: segR * 1.15, fill: "#55efc4", stroke: "#00b894", "stroke-width": "1" }));
          // Eyes
          g.appendChild(svgEl("circle", { cx: headX + segR * 0.3, cy: cy - segR * 0.3, r: segR * 0.2, fill: "white", stroke: "#333", "stroke-width": "0.5" }));
          g.appendChild(svgEl("circle", { cx: headX + segR * 0.35, cy: cy - segR * 0.3, r: segR * 0.08, fill: "#333" }));
          // Antennae
          g.appendChild(svgEl("line", { x1: headX, y1: cy - segR * 0.9, x2: headX + segR * 0.5, y2: cy - segR * 1.4, stroke: "#00b894", "stroke-width": "1" }));
          g.appendChild(svgEl("line", { x1: headX + segR * 0.2, y1: cy - segR * 0.85, x2: headX + segR * 0.8, y2: cy - segR * 1.2, stroke: "#00b894", "stroke-width": "1" }));
          break;
        }
        case "bone": {
          // Shaft
          const boneH = height * 0.2;
          g.appendChild(svgEl("rect", { x: x + width * 0.15, y: cy - boneH / 2, width: width * 0.7, height: boneH, rx: 2, fill: "#ffeaa7", stroke: "#d4a44c", "stroke-width": "1" }));
          // Left knobs
          const kr = height * 0.2;
          g.appendChild(svgEl("circle", { cx: x + width * 0.12, cy: cy - height * 0.18, r: kr, fill: "#ffeaa7", stroke: "#d4a44c", "stroke-width": "1" }));
          g.appendChild(svgEl("circle", { cx: x + width * 0.12, cy: cy + height * 0.18, r: kr, fill: "#ffeaa7", stroke: "#d4a44c", "stroke-width": "1" }));
          // Right knobs
          g.appendChild(svgEl("circle", { cx: x + width * 0.88, cy: cy - height * 0.18, r: kr, fill: "#ffeaa7", stroke: "#d4a44c", "stroke-width": "1" }));
          g.appendChild(svgEl("circle", { cx: x + width * 0.88, cy: cy + height * 0.18, r: kr, fill: "#ffeaa7", stroke: "#d4a44c", "stroke-width": "1" }));
          break;
        }
      }
    }

    // ===== Draw a ruler =====
    function drawRuler(g, x, y, maxUnits, unitType, highlightLen) {
      // unitType: "in" or "cm"
      // Returns pixel width of ruler
      const pxPerUnit = unitType === "cm" ? 22 : 40;
      const rulerW = maxUnits * pxPerUnit;
      const rulerH = 28;

      // Background
      g.appendChild(svgEl("rect", { x: x, y: y, width: rulerW, height: rulerH, rx: 2, fill: "#fffde7", stroke: "#bbb", "stroke-width": "1" }));

      // Tick marks and numbers
      for (let i = 0; i <= maxUnits; i++) {
        const tx = x + i * pxPerUnit;
        // Major tick
        g.appendChild(svgEl("line", { x1: tx, y1: y, x2: tx, y2: y + rulerH * 0.55, stroke: "#333", "stroke-width": "1" }));
        // Number
        const numTxt = svgEl("text", { x: tx, y: y + rulerH - 3, "text-anchor": "middle", "font-size": "9", "font-family": "'Google Sans Flex', sans-serif", fill: "#333" });
        numTxt.textContent = String(i); g.appendChild(numTxt);

        // Half tick
        if (i < maxUnits) {
          const halfX = tx + pxPerUnit / 2;
          g.appendChild(svgEl("line", { x1: halfX, y1: y, x2: halfX, y2: y + rulerH * 0.35, stroke: "#666", "stroke-width": "0.7" }));
          // Quarter ticks for inches
          if (unitType === "in") {
            g.appendChild(svgEl("line", { x1: tx + pxPerUnit * 0.25, y1: y, x2: tx + pxPerUnit * 0.25, y2: y + rulerH * 0.22, stroke: "#999", "stroke-width": "0.5" }));
            g.appendChild(svgEl("line", { x1: tx + pxPerUnit * 0.75, y1: y, x2: tx + pxPerUnit * 0.75, y2: y + rulerH * 0.22, stroke: "#999", "stroke-width": "0.5" }));
          }
        }
      }

      // Unit label at the end
      const unitLabel = svgEl("text", { x: x + rulerW + 5, y: y + rulerH - 5, "font-size": "8", "font-family": "'Google Sans Flex', sans-serif", fill: "#888" });
      unitLabel.textContent = unitType === "in" ? "in" : "cm"; g.appendChild(unitLabel);

      return { width: rulerW, height: rulerH, pxPerUnit: pxPerUnit };
    }

    // ===== Draw non-standard unit row =====
    function drawNonStandardUnits(g, x, y, count, unitType, unitSize) {
      // Draw a row of small unit shapes
      const gap = 1;
      for (let i = 0; i < count; i++) {
        const ux = x + i * (unitSize + gap);
        if (unitType === "paper_clips") {
          // Paper clip shape
          const cw = unitSize;
          const ch = 14;
          const cy2 = y + 7;
          // Outer loop
          g.appendChild(svgEl("rect", { x: ux + 1, y: cy2 - 5, width: cw - 2, height: 10, rx: 4, fill: "none", stroke: "#888", "stroke-width": "1.2" }));
          // Inner loop
          g.appendChild(svgEl("rect", { x: ux + cw * 0.25, y: cy2 - 3, width: cw * 0.55, height: 6, rx: 2, fill: "none", stroke: "#888", "stroke-width": "0.8" }));
        } else {
          // Block - simple cube
          const bw = unitSize;
          const bh = 14;
          g.appendChild(svgEl("rect", { x: ux, y: y, width: bw, height: bh, rx: 1, fill: "#74b9ff", stroke: "#0984e3", "stroke-width": "1" }));
          // Number inside
          const bt = svgEl("text", { x: ux + bw / 2, y: y + bh / 2 + 3.5, "text-anchor": "middle", "font-size": "8", "font-family": "'Google Sans Flex', sans-serif", fill: "#0984e3" });
          bt.textContent = String(i + 1); g.appendChild(bt);
        }
      }
      return { width: count * (unitSize + gap) - gap, height: 14 };
    }

    // ===== Problem generation =====
    function generateProblems(count, opts) {
      const { measureType, maxMeasure, problemType, nonStandardUnit } = opts;
      const problems = [];
      const usedObjects = shuffle([...OBJECTS]);
      let objIdx = 0;

      function nextObject() {
        const obj = usedObjects[objIdx % usedObjects.length];
        objIdx++;
        return obj;
      }

      const types = [];
      if (problemType === "mixed") {
        // Distribute problem types
        for (let i = 0; i < count; i++) {
          const roll = Math.random();
          if (roll < 0.4) types.push("read");
          else if (roll < 0.7) types.push("compare");
          else types.push("estimate");
        }
      } else {
        for (let i = 0; i < count; i++) types.push(problemType);
      }

      for (let i = 0; i < count; i++) {
        const type = types[i];
        if (type === "read") {
          const obj = nextObject();
          const measurement = randInt(1, maxMeasure);
          problems.push({ type: "read", obj: obj, measurement: measurement, measureType: measureType, nonStandardUnit: nonStandardUnit, maxMeasure: maxMeasure });
        } else if (type === "compare") {
          const obj1 = nextObject();
          let obj2 = nextObject();
          // Ensure different objects
          while (obj2.name === obj1.name) obj2 = nextObject();
          const m1 = randInt(1, maxMeasure);
          let m2 = randInt(1, maxMeasure);
          // Ensure different measurements for compare
          while (m2 === m1) m2 = randInt(1, maxMeasure);
          problems.push({ type: "compare", obj1: obj1, obj2: obj2, m1: m1, m2: m2, measureType: measureType, nonStandardUnit: nonStandardUnit, maxMeasure: maxMeasure });
        } else {
          // estimate
          const obj = nextObject();
          const measurement = randInt(1, maxMeasure);
          problems.push({ type: "estimate", obj: obj, measurement: measurement, measureType: measureType, nonStandardUnit: nonStandardUnit, maxMeasure: maxMeasure });
        }
      }
      return problems;
    }

    // ===== Get unit label =====
    function getUnitLabel(measureType, nonStandardUnit, plural) {
      if (measureType === "ruler_in") return plural ? "inches" : "inch";
      if (measureType === "ruler_cm") return plural ? "centimeters" : "centimeter";
      if (nonStandardUnit === "paper_clips") return plural ? "paper clips" : "paper clip";
      return plural ? "blocks" : "block";
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));
      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", { x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af" }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.svg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const count = problems.length;
      const bottomMargin = branded ? 56 : 24;
      const availH = pageH - bottomMargin - topGridY;
      const rowH = availH / count;
      const contentW = pageW - margin * 2;

      for (let i = 0; i < problems.length; i++) {
        const prob = problems[i];
        const rowTop = topGridY + i * rowH;

        // Problem number
        const pnSize = 11;
        if (numbered !== false) {
          const pnEl = svgEl("text", { x: margin, y: rowTop + 16, "font-family": "Fredoka, sans-serif", "font-size": String(pnSize), "font-weight": "600", fill: "#a0aec0" });
          pnEl.textContent = (i + 1) + "."; svg.appendChild(pnEl);
        }

        // Separator line between problems
        if (i > 0) {
          svg.appendChild(svgEl("line", { x1: margin, y1: rowTop, x2: pageW - margin, y2: rowTop, stroke: "#e2e8f0", "stroke-width": "0.5" }));
        }

        const leftX = margin + 22;
        const isExample = (i === 0 && includeExample && !showAnswers);

        if (prob.type === "read") {
          renderReadProblem(svg, prob, leftX, rowTop, rowH, contentW - 22, showAnswers, isExample);
        } else if (prob.type === "compare") {
          renderCompareProblem(svg, prob, leftX, rowTop, rowH, contentW - 22, showAnswers, isExample);
        } else {
          renderEstimateProblem(svg, prob, leftX, rowTop, rowH, contentW - 22, showAnswers, isExample);
        }
      }
      return svg;

    // ===== Render "Read the measurement" problem =====

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      const mt = elMeasureType.value;
      const pt = elProblemType.value;
      let typeLabel = "";
      if (mt === "ruler_in") typeLabel = "Inches";
      else if (mt === "ruler_cm") typeLabel = "Centimeters";
      else typeLabel = "Non-Standard Units";

      let probLabel = "";
      if (pt === "read") probLabel = "Read the Measurement";
      else if (pt === "compare") probLabel = "Compare Lengths";
      else if (pt === "estimate") probLabel = "Estimate Length";
      else probLabel = "Measurement Practice";

      return probLabel + " (" + typeLabel + ")";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Measure each object and write the answer.";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        measureType: elMeasureType.value,
        maxMeasure: parseInt(elMaxMeasure.value, 10),
        problemType: elProblemType.value,
        nonStandardUnit: elNonStandardUnit.value,
        numWorksheets: parseInt(elNumSheets.value, 10),
        problemsPerSheet: parseInt(elProblems.value, 10),
        showHeader,
        title,
        subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
      };
    }

    // ===== State =====
    let currentState = { sheets: [] };

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) { currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts)); }
      renderWorksheet();
    }
    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) { currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts)); }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cols - 1) * gap) / cols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

      let fontCSS = "";

        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }


    // Load and register TTF fonts with jsPDF for embedded vector text in PDFs
    let _fontCache = {};
    // Preload font files on page load so PDF generation is faster
    (function preloadFonts() {
      ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
        fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
          var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
        }).catch(function() {});
      });
    })();
    async function registerPdfFonts(pdf) {
      // svg2pdf strips quotes and fallbacks, so register with clean names only
      // Also register "normal" for undefined-style calls
      const fontDefs = [
        { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
        { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
        { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
      ];
      let idx = 0;
      for (const f of fontDefs) {
        try {
          let b64;
          if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
          else {
            const resp = await fetch(f.file);
            const buf = await resp.arrayBuffer();
            const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
            _fontCache[f.file] = b64;
          }
          for (const style of f.styles) {
            const vfsName = "f" + (idx++) + ".ttf";
            pdf.addFileToVFS(vfsName, b64);
            pdf.addFont(vfsName, f.name, style);
          }
        } catch(e) { console.warn("Font load failed:", f.file, e); }
      }
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: "", branded: opts.branded, showAnswers: true, isAnswerKey: true, numbered: opts.numbered, includeExample: false }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      // Register embedded fonts
      await registerPdfFonts(pdf);

      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

    // ===== Event Listeners =====
    elMaxMeasure.addEventListener("change", () => renderWithNewRandomization());
    elProblemType.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
    let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    updateMaxMeasureOptions();
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
