<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f7f8fc"/>
  <!-- Quarter -->
  <circle cx="35" cy="48" r="20" fill="#C8C8C8" stroke="#a0a0a0" stroke-width="1.5"/>
  <text x="35" y="53" text-anchor="middle" font-size="9" font-weight="600" fill="#555" font-family="Fredoka, sans-serif">25¢</text>
  <!-- Quarter -->
  <circle cx="80" cy="48" r="20" fill="#C8C8C8" stroke="#a0a0a0" stroke-width="1.5"/>
  <text x="80" y="53" text-anchor="middle" font-size="9" font-weight="600" fill="#555" font-family="Fredoka, sans-serif">25¢</text>
  <!-- Dime -->
  <circle cx="120" cy="48" r="16" fill="#D3D3D3" stroke="#a8a8a8" stroke-width="1.5"/>
  <text x="120" y="53" text-anchor="middle" font-size="8" font-weight="600" fill="#555" font-family="Fredoka, sans-serif">10¢</text>
  <!-- Nickel -->
  <circle cx="156" cy="48" r="18" fill="#C0C0C0" stroke="#909090" stroke-width="1.5"/>
  <text x="156" y="53" text-anchor="middle" font-size="8" font-weight="600" fill="#555" font-family="Fredoka, sans-serif">5¢</text>
  <!-- Answer line -->
  <text x="60" y="100" text-anchor="middle" font-size="16" font-weight="500" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">=</text>
  <line x1="80" y1="102" x2="140" y2="102" stroke="#2d3748" stroke-width="1.5"/>
  <text x="148" y="100" text-anchor="middle" font-size="12" font-weight="500" fill="#1a202c" font-family="Fredoka, sans-serif">¢</text>
</svg>