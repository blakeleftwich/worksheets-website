  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elCoinTypes = document.getElementById("coinTypes");
    const elMaxTotal = document.getElementById("maxTotal");
    const elProblems = document.getElementById("problemsPerSheet");
    const elAnswerFormat = document.getElementById("answerFormat");
    const elNumSheets = document.getElementById("numWorksheets");
    const elAnswerKey = document.getElementById("answerKey");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elNumbered = document.getElementById("numbered");
    const elBranded = document.getElementById("branded");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return "Counting Money";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Count the coins and write the total value.";
    }

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Coin / bill definitions =====
    const COIN_DEFS = {
      penny:   { value: 1,  label: "1\u00a2",  r: 9.5, fill: "#b87333", stroke: "#8B5A2B", textFill: "#5a3210" },
      nickel:  { value: 5,  label: "5\u00a2",  r: 11,  fill: "#C0C0C0", stroke: "#808080", textFill: "#404040" },
      dime:    { value: 10, label: "10\u00a2", r: 8.5, fill: "#D0D0D0", stroke: "#909090", textFill: "#404040" },
      quarter: { value: 25, label: "25\u00a2", r: 13,  fill: "#C8C8C8", stroke: "#808080", textFill: "#404040" }
    };

    const BILL_DEFS = {
      one:  { value: 100, label: "$1", w: 42, h: 20, fill: "#b8d8b8", stroke: "#2d6a2d", textFill: "#1a4a1a" },
      five: { value: 500, label: "$5", w: 42, h: 20, fill: "#a0cca0", stroke: "#1a5a1a", textFill: "#0e3a0e" }
    };

    // ===== Get available denominations =====
    function getAvailableDenoms(coinType) {
      const coins = [];
      const bills = [];
      if (coinType === "pennies") {
        coins.push("penny");
      } else if (coinType === "pennies-nickels") {
        coins.push("penny", "nickel");
      } else if (coinType === "pennies-nickels-dimes") {
        coins.push("penny", "nickel", "dime");
      } else if (coinType === "all-coins") {
        coins.push("penny", "nickel", "dime", "quarter");
      } else if (coinType === "coins-bills") {
        coins.push("penny", "nickel", "dime", "quarter");
        bills.push("one", "five");
      }
      return { coins, bills };
    }

    // ===== Problem generation =====
    function generateMoneyProblem(coinType, maxTotal) {
      const { coins, bills } = getAvailableDenoms(coinType);
      const maxCents = maxTotal;
      let remaining = 0;
      let attempts = 0;

      // Generate a target value between a reasonable minimum and maxTotal
      const minValue = coins.includes("penny") ? 1 : (coins.includes("nickel") ? 5 : 10);
      const target = minValue + Math.floor(Math.random() * (maxCents - minValue + 1));

      // Build the collection of coins/bills that sum to target
      const collection = [];
      remaining = target;

      // Add bills first if available
      if (bills.length > 0) {
        // Possibly add a $5 bill
        if (bills.includes("five") && remaining >= 500 && Math.random() < 0.3) {
          collection.push({ type: "bill", denom: "five" });
          remaining -= 500;
        }
        // Possibly add $1 bills
        if (bills.includes("one")) {
          const maxOnes = Math.min(Math.floor(remaining / 100), 4);
          if (maxOnes > 0) {
            const numOnes = Math.random() < 0.5 ? 0 : (1 + Math.floor(Math.random() * maxOnes));
            for (let i = 0; i < numOnes; i++) {
              collection.push({ type: "bill", denom: "one" });
              remaining -= 100;
            }
          }
        }
      }

      // Add coins from largest to smallest
      const coinOrder = ["quarter", "dime", "nickel", "penny"];
      for (const cName of coinOrder) {
        if (!coins.includes(cName)) continue;
        const coinVal = COIN_DEFS[cName].value;
        if (remaining <= 0) break;

        if (cName === "penny") {
          // Use pennies for the remainder
          const count = remaining;
          for (let i = 0; i < count; i++) {
            collection.push({ type: "coin", denom: cName });
          }
          remaining = 0;
        } else {
          const maxCount = Math.floor(remaining / coinVal);
          if (maxCount <= 0) continue;
          // Use a random number of this coin (at least 0, up to maxCount)
          // Bias toward using some but not all, to keep variety
          const count = Math.floor(Math.random() * (maxCount + 1));
          for (let i = 0; i < count; i++) {
            collection.push({ type: "coin", denom: cName });
          }
          remaining -= count * coinVal;
        }
      }

      // If remaining > 0 and we only have pennies left, add pennies
      if (remaining > 0) {
        for (let i = 0; i < remaining; i++) {
          collection.push({ type: "coin", denom: "penny" });
        }
        remaining = 0;
      }

      // Shuffle collection for visual variety
      for (let i = collection.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [collection[i], collection[j]] = [collection[j], collection[i]];
      }

      return { collection, total: target };
    }

    function generateProblems(count, coinType, maxTotal) {
      const problems = [];
      const seen = new Set();
      let attempts = 0;
      while (problems.length < count && attempts < count * 200) {
        attempts++;
        const problem = generateMoneyProblem(coinType, maxTotal);
        // Avoid too many items (keep it reasonable for the space)
        if (problem.collection.length > 15) continue;
        // Ensure at least 2 items
        if (problem.collection.length < 2) continue;
        // Avoid duplicate totals
        const key = problem.total;
        if (seen.has(key) && problems.length < count - 2) continue;
        seen.add(key);
        problems.push(problem);
      }
      // Fill any remaining
      while (problems.length < count) {
        problems.push(generateMoneyProblem(coinType, maxTotal));
      }
      return problems;
    }

    // ===== Format answer =====
    function formatAnswer(totalCents, format) {
      if (format === "dollar") {
        const dollars = Math.floor(totalCents / 100);
        const cents = totalCents % 100;
        return "$" + dollars + "." + String(cents).padStart(2, "0");
      } else {
        if (totalCents >= 100) {
          const dollars = Math.floor(totalCents / 100);
          const cents = totalCents % 100;
          return "$" + dollars + "." + String(cents).padStart(2, "0");
        }
        return totalCents + "\u00a2";
      }
    }

    // ===== Draw a coin as SVG =====
    function drawCoin(svg, cx, cy, denom) {
      const def = COIN_DEFS[denom];
      const r = def.r;

      // Outer circle
      svg.appendChild(svgEl("circle", {
        cx: cx, cy: cy, r: r,
        fill: def.fill, stroke: def.stroke, "stroke-width": "1.5"
      }));

      // Inner circle (rim detail)
      svg.appendChild(svgEl("circle", {
        cx: cx, cy: cy, r: r * 0.78,
        fill: "none", stroke: def.stroke, "stroke-width": "0.5", opacity: "0.4"
      }));

      // Value text
      const fontSize = denom === "dime" ? 7 : (denom === "penny" ? 7.5 : 8);
      const txt = svgEl("text", {
        x: cx, y: cy + fontSize * 0.35,
        "text-anchor": "middle",
        "font-family": "'Google Sans Flex', sans-serif",
        "font-size": fontSize,
        "font-weight": "500",
        fill: def.textFill
      });
      txt.textContent = def.label;
      svg.appendChild(txt);
    }

    // ===== Draw a bill as SVG =====
    function drawBill(svg, cx, cy, denom) {
      const def = BILL_DEFS[denom];
      const x = cx - def.w / 2;
      const y = cy - def.h / 2;

      // Bill rectangle
      svg.appendChild(svgEl("rect", {
        x: x, y: y, width: def.w, height: def.h,
        rx: 2, ry: 2,
        fill: def.fill, stroke: def.stroke, "stroke-width": "1.5"
      }));

      // Inner border
      svg.appendChild(svgEl("rect", {
        x: x + 2, y: y + 2, width: def.w - 4, height: def.h - 4,
        rx: 1, ry: 1,
        fill: "none", stroke: def.stroke, "stroke-width": "0.5", opacity: "0.4"
      }));

      // Value text
      const txt = svgEl("text", {
        x: cx, y: cy + 4,
        "text-anchor": "middle",
        "font-family": "'Google Sans Flex', sans-serif",
        "font-size": "10",
        "font-weight": "500",
        fill: def.textFill
      });
      txt.textContent = def.label;
      svg.appendChild(txt);
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, answerFormat, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.jpg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const count = problems.length;
      const bottomMargin = branded ? 56 : 24;
      const gridTop = topGridY;
      const availH = pageH - bottomMargin - gridTop;
      const availW = pageW - margin * 2;

      // Layout: 2 columns for 6 and 8 problems, 1 column for 4
      let cols = count <= 4 ? 1 : 2;
      const rows = Math.ceil(count / cols);
      const colW = availW / cols;
      const rowH = availH / rows;

      for (let i = 0; i < problems.length; i++) {
        const col = i % cols, row = Math.floor(i / cols);
        const cellLeft = margin + col * colW;
        const cellTop = gridTop + row * rowH;
        const problem = problems[i];
        const isExample = (i === 0 && includeExample && !showAnswers);

        // Problem number
        if (numbered !== false) {
          const probNumSize = 11;
          const probNumX = cellLeft + 4;
          const probNumY = cellTop + 16;
          const numEl = svgEl("text", { x: probNumX, y: probNumY, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numEl.textContent = (i + 1) + "."; svg.appendChild(numEl);
        }

        // Draw a light box around the problem area
        const boxPad = 4;
        const problemBoxX = cellLeft + boxPad;
        const problemBoxY = cellTop + boxPad;
        const problemBoxW = colW - boxPad * 2;
        const problemBoxH = rowH - boxPad * 2;
        svg.appendChild(svgEl("rect", {
          x: problemBoxX, y: problemBoxY,
          width: problemBoxW, height: problemBoxH,
          rx: 6, ry: 6,
          fill: "#fafafa", stroke: "#e2e8f0", "stroke-width": "1"
        }));

        // Re-draw problem number on top of box
        const numEl2 = svgEl("text", { x: probNumX + 6, y: probNumY + 6, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
        numEl2.textContent = (i + 1) + "."; svg.appendChild(numEl2);

        // Area for coins/bills
        const coinAreaLeft = problemBoxX + 12;
        const coinAreaTop = problemBoxY + 24;
        const coinAreaW = problemBoxW - 24;
        const coinAreaH = problemBoxH - 60;

        // Layout coins/bills in rows
        const items = problem.collection;
        const maxItemsPerRow = cols === 1 ? 10 : 6;
        const itemRows = Math.ceil(items.length / maxItemsPerRow);
        const itemsPerRow = Math.ceil(items.length / itemRows);

        const spacingX = Math.min(34, coinAreaW / (itemsPerRow + 0.5));
        const spacingY = Math.min(34, coinAreaH / (itemRows + 0.5));

        for (let idx = 0; idx < items.length; idx++) {
          const itemRow = Math.floor(idx / itemsPerRow);
          const itemCol = idx % itemsPerRow;
          const itemsInThisRow = Math.min(itemsPerRow, items.length - itemRow * itemsPerRow);

          // Center items within the row
          const rowWidth = itemsInThisRow * spacingX;
          const rowStartX = coinAreaLeft + (coinAreaW - rowWidth) / 2 + spacingX / 2;
          const rowStartY = coinAreaTop + (coinAreaH - itemRows * spacingY) / 2 + spacingY / 2;

          const cx = rowStartX + itemCol * spacingX;
          const cy = rowStartY + itemRow * spacingY;

          const item = items[idx];
          if (item.type === "coin") {
            drawCoin(svg, cx, cy, item.denom);
          } else {
            drawBill(svg, cx, cy, item.denom);
          }
        }

        // Answer line at bottom of problem box
        const answerY = problemBoxY + problemBoxH - 16;
        const lineLeft = problemBoxX + problemBoxW * 0.25;
        const lineRight = problemBoxX + problemBoxW * 0.75;

        // "Total:" label
        const totalLabelX = problemBoxX + problemBoxW * 0.2;
        const totalLabel = svgEl("text", {
          x: totalLabelX, y: answerY,
          "text-anchor": "end",
          "font-family": "Fredoka, sans-serif", "font-size": "13", "font-weight": "600", fill: "#2d3748"
        });
        totalLabel.textContent = "Total:";
        svg.appendChild(totalLabel);

        // Answer line
        svg.appendChild(svgEl("line", {
          x1: totalLabelX + 8, y1: answerY + 2,
          x2: lineRight, y2: answerY + 2,
          stroke: isExample ? "#22c55e" : "#2d3748", "stroke-width": "1"
        }));

        // Show answer if example or answer key
        if (isExample) {
          const ansText = formatAnswer(problem.total, answerFormat);
          const badgeW = 42, badgeH = 13;
          const badgeX = lineRight - 44;
          const badgeY = answerY + 2 - 15;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: badgeW, height: badgeH, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
          const bt = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          bt.textContent = "Example"; svg.appendChild(bt);
          const ansEl = svgEl("text", {
            x: (totalLabelX + 8 + lineRight) / 2, y: answerY,
            "text-anchor": "middle",
            "font-family": "Fredoka, sans-serif", "font-size": "14", "font-weight": "700", fill: "#16a34a"
          });
          ansEl.textContent = ansText;
          svg.appendChild(ansEl);
        } else if (showAnswers) {
          const ansText = formatAnswer(problem.total, answerFormat);
          const ansEl = svgEl("text", {
            x: (totalLabelX + 8 + lineRight) / 2, y: answerY,
            "text-anchor": "middle",
            "font-family": "Fredoka, sans-serif", "font-size": "14", "font-weight": "700", fill: "#3182ce"
          });
          ansEl.textContent = ansText;
          svg.appendChild(ansEl);
        }
      }

      return svg;
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        coinType: elCoinTypes.value,
        maxTotal: parseInt(elMaxTotal.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        problemsPerSheet: parseInt(elProblems.value, 10),
        answerFormat: elAnswerFormat.value,
        showHeader: showHeader,
        title: title,
        subtitle: subtitle,
        numbered: elNumbered.checked,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        includeExample: elIncludeExample.checked
      };
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.coinType, opts.maxTotal));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.coinType, opts.maxTotal));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, answerFormat: opts.answerFormat, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols-1)*gap)/cols < mrw) cols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols-1)*gap)/cols < mrw) cols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        const msw = (aw - (cols-1)*gap)/cols, msh = numSheets <= 3 ? ah : ah*0.8;
        const scale = Math.min(msw/sheetWidth, msh/sheetHeight);
        const sw = Math.floor(sheetWidth*scale), sh = Math.floor(sheetHeight*scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw+24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, answerFormat: opts.answerFormat, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, answerFormat: opts.answerFormat, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const opts = gatherOptions();
      const sH = sheetWrap.innerHTML, sC = sheetWrap.className, sS = sheetWrap.style.cssText;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      for (let i = 0; i < currentState.sheets.length; i++) {
        const p = document.createElement("div"); p.className = "worksheet-page";
        p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, answerFormat: opts.answerFormat, numbered: opts.numbered, includeExample: opts.includeExample }, wsCodes[i]));
        sheetWrap.appendChild(p);
      }
      const answerKeyPages = [];
      if (opts.answerKey) {
        for (let i = 0; i < currentState.sheets.length; i++) {
          const p = document.createElement("div"); p.className = "worksheet-page ak-print-only";
          p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: true, answerFormat: opts.answerFormat, numbered: opts.numbered, isAnswerKey: true, includeExample: false }, wsCodes[i]));
          sheetWrap.appendChild(p);
          answerKeyPages.push(p);
        }
      }
      window.print();
      setTimeout(() => { answerKeyPages.forEach(p => p.remove()); sheetWrap.innerHTML = sH; sheetWrap.className = sC; sheetWrap.style.cssText = sS; }, 500);
    }


    // ===== Event Listeners =====
    elCoinTypes.addEventListener("change", () => renderWithNewRandomization());
    elMaxTotal.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elAnswerFormat.addEventListener("change", () => renderWithoutRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);
    let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();
  
    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
<script src="../../favorites.js"></script>
