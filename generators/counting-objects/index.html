<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Count & Write Worksheet Generator</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    .main-container {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: white;
      padding: 32px 24px;
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar h2 {
      font-size: 24px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
      text-align: left;
    }

    .sidebar .subtitle {
      font-size: 14px;
      color: #718096;
      margin-bottom: 32px;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 6px;
    }

    .control-group input[type="number"],
    .control-group select {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: white;
      color: #2d3748;
      transition: all 0.2s;
    }

    .control-group input[type="number"]:focus,
    .control-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .control-group input[type="number"]:hover,
    .control-group select:hover {
      border-color: #cbd5e0;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid #e2e8f0;
    }

    button {
      width: 100%;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btnGenerate {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    #btnGenerate:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
    }

    #btnGenerate:active {
      transform: translateY(0);
    }

    #btnPdf {
      background: #48bb78;
      color: white;
      box-shadow: 0 4px 12px rgba(72, 187, 120, 0.3);
    }

    #btnPdf:hover {
      background: #38a169;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(72, 187, 120, 0.4);
    }

    #btnPrint {
      background: #ed8936;
      color: white;
      box-shadow: 0 4px 12px rgba(237, 137, 54, 0.3);
    }

    #btnPrint:hover {
      background: #dd6b20;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(237, 137, 54, 0.4);
    }

    .preview-area {
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
      min-height: 100vh;
      padding: 40px;
    }

    #sheetWrap {
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
    }

    #sheetWrap.grid-view {
      display: grid;
      gap: 24px;
      justify-content: center;
      align-content: start;
    }

    .worksheet-page {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      display: inline-block;
      border: none;
      transition: transform 0.2s ease;
    }

    .worksheet-page.scaled {
      padding: 12px;
    }

    .worksheet-page.scaled svg {
      display: block;
    }

    .page-break {
      page-break-after: always;
    }

    #status { 
      margin: 16px 0;
      padding: 12px 16px;
      border-radius: 8px;
      display: none;
      font-size: 14px;
      font-weight: 500;
    }
    #status.success { 
      background: #d4edda;
      color: #155724;
      display: block;
      border: 1px solid #c3e6cb;
    }
    
    @media print {
      .sidebar {
        display: none !important;
      }
      
      .main-container {
        display: block !important;
      }
      
      .preview-area {
        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
        background: white !important;
      }
      
      #sheetWrap { 
        padding: 0 !important; 
        margin: 0 !important;
        display: block !important;
        background: white !important;
      }
      
      .worksheet-page {
        padding: 0 !important;
        margin: 0 !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        display: block !important;
        background: white !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
      
      .worksheet-page:not(:last-child) {
        page-break-after: always !important;
        break-after: page !important;
      }
      
      .worksheet-page svg {
        width: 100% !important;
        height: auto !important;
        display: block !important;
      }
      
      body {
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
      }
    }
    
    @page {
      size: letter;
      margin: 0.641in 0.46in 0.46in 0.46in;
    }

    @media (max-width: 1024px) {
      .main-container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
      }

      .preview-area {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="sidebar">
	<a href="../../index.html" style="display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: #667eea; text-decoration: none; margin-bottom: 16px; transition: gap 0.2s;"
   onmouseover="this.style.gap='10px'" onmouseout="this.style.gap='6px'">
  ← All Worksheets
</a>
      <h2>Count & Write Worksheet</h2>
      <div class="subtitle">Generate custom worksheets</div>

      <div class="control-group">
        <label for="minCount">Min Count</label>
        <input id="minCount" type="number" value="1" min="1" max="20" />
      </div>

      <div class="control-group">
        <label for="maxCount">Max Count</label>
        <input id="maxCount" type="number" value="10" min="1" max="30" />
      </div>

      <div class="control-group">
        <label for="numSheets">Number of Worksheets</label>
        <select id="numSheets">
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="8">8</option>
          <option value="10">10</option>
        </select>
      </div>

      <div class="control-group">
        <label for="problems">Problems per Sheet</label>
        <select id="problems">
          <option value="6">6</option>
          <option value="8" selected>8</option>
          <option value="10">10</option>
          <option value="12">12</option>
        </select>
      </div>

      <div class="control-group">
        <label for="style">Style</label>
        <select id="style">
          <option value="1" selected>2 Columns (Grid)</option>
          <option value="2">1 Column (Rows)</option>
        </select>
      </div>

      <div class="control-group">
        <label for="showHeader">Name/Date</label>
        <select id="showHeader">
          <option value="both" selected>Name & Date</option>
          <option value="name">Name Only</option>
          <option value="none">None</option>
        </select>
      </div>

      <div class="control-group">
        <label for="headerText">Worksheet Title</label>
        <input id="headerText" type="text" value="Count the objects and write the number." style="width: 100%; padding: 10px 12px; font-size: 14px; border: 2px solid #e2e8f0; border-radius: 8px;" />
      </div>

      <div class="control-group" style="flex-direction: column; align-items: flex-start;">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 0 0 12px 0;">
          <input type="checkbox" id="answerKey" style="width: 18px; height: 18px; cursor: pointer; accent-color: #667eea;">
          <span style="font-size: 13px; font-weight: 600;">Answer Key</span>
        </label>
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 0;">
          <input type="checkbox" id="branded" style="width: 18px; height: 18px; cursor: pointer; accent-color: #667eea;">
          <span style="font-size: 13px; font-weight: 600;">Branding</span>
        </label>
      </div>

      <div class="button-group">
        <button id="btnGenerate">🔄 Generate New</button>
        <button id="btnPdf">📄 Download PDF</button>
        <button id="btnPrint">🖨️ Print</button>
      </div>

      <div id="status"></div>
    </div>

    <div class="preview-area">
      <div id="sheetWrap"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/svg2pdf.js@2.2.3/dist/svg2pdf.umd.min.js"></script>
  <script>
const sheetWrap = document.getElementById("sheetWrap");
const statusEl = document.getElementById("status");

const elNumSheets = document.getElementById("numSheets");
const elProblems = document.getElementById("problems");
const elMin = document.getElementById("minCount");
const elMax = document.getElementById("maxCount");
const elStyle = document.getElementById("style");
const elShowHeader = document.getElementById("showHeader");
const elBranded = document.getElementById("branded");
const elAnswerKey = document.getElementById("answerKey");
const elHeaderText = document.getElementById("headerText");

// Track current worksheet state - now an array of sheets
let currentState = {
  sheets: [], // Each sheet has its own problems array
  randomSeed: Date.now()
};

function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.className = 'success';
  setTimeout(() => {
    statusEl.style.display = 'none';
  }, 3000);
}

// Add event listeners for real-time updates
elNumSheets.addEventListener("change", () => renderWithNewRandomization());
elProblems.addEventListener("change", () => renderWithNewRandomization());
elMin.addEventListener("input", () => renderWithNewRandomization());
elMax.addEventListener("input", () => renderWithNewRandomization());
elStyle.addEventListener("change", () => renderWithoutRandomization());
elShowHeader.addEventListener("change", () => renderWithoutRandomization());
elBranded.addEventListener("change", () => renderWithoutRandomization());
elHeaderText.addEventListener("input", () => renderWithoutRandomization());

document.getElementById("btnGenerate").addEventListener("click", () => {
  renderWithNewRandomization();
});

// Answer key checkbox - no longer affects preview, only PDF
elAnswerKey.addEventListener("change", () => {
  // No preview update needed
});

document.getElementById("btnPrint").addEventListener("click", () => {
  const svgs = sheetWrap.querySelectorAll("svg");
  if (svgs.length === 0) {
    alert('Please generate a worksheet first!');
    return;
  }
  
  // Store original dimensions and remove inline width/height for print
  const originalDimensions = [];
  svgs.forEach(svg => {
    originalDimensions.push({
      width: svg.getAttribute('width'),
      height: svg.getAttribute('height')
    });
    svg.removeAttribute('width');
    svg.removeAttribute('height');
  });
  
  // Print
  window.print();
  
  // Restore original dimensions after print dialog
  setTimeout(() => {
    svgs.forEach((svg, i) => {
      if (originalDimensions[i].width) {
        svg.setAttribute('width', originalDimensions[i].width);
      }
      if (originalDimensions[i].height) {
        svg.setAttribute('height', originalDimensions[i].height);
      }
    });
  }, 100);
});

document.getElementById("btnPdf").addEventListener("click", async () => {
  const svgs = sheetWrap.querySelectorAll("svg");
  if (svgs.length === 0) {
    alert('Please generate a worksheet first!');
    return;
  }
  
  // Check if svg2pdf is available
  if (typeof svg2pdf === 'undefined') {
    alert('PDF library not loaded. Please use Print button and select "Save as PDF".');
    return;
  }
  
  try {
    // Get jsPDF from the loaded library
    const { jsPDF } = window.jspdf;
    
    // Create PDF with exact print dimensions
    const pdf = new jsPDF({
      orientation: 'portrait',
      unit: 'pt',
      format: 'letter',
      compress: false
    });
    
    const pageWidth = 612;
    const pageHeight = 792;
    
    // Match browser print margins
    const margin = 33;
    const topOffset = 8; // Move content down a little
    const contentWidth = pageWidth - (margin * 2);
    const contentHeight = pageHeight - (margin * 2) - topOffset;
    
    // Add each worksheet SVG page to the PDF
    for (let i = 0; i < svgs.length; i++) {
      if (i > 0) {
        pdf.addPage();
      }
      
      const svgClone = svgs[i].cloneNode(true);
      
      await pdf.svg(svgClone, {
        x: margin,
        y: margin + topOffset,
        width: contentWidth,
        height: contentHeight
      });
    }
    
    // Generate and add answer keys if checkbox is checked
    if (elAnswerKey.checked) {
      const style = parseInt(elStyle.value, 10);
      const headerMode = elShowHeader.value;
      const branded = elBranded.checked;
      
      for (let sheetIndex = 0; sheetIndex < currentState.sheets.length; sheetIndex++) {
        pdf.addPage();
        
        const answerSvg = generateAnswerKeySvg(currentState.sheets[sheetIndex], style, headerMode, branded);
        
        await pdf.svg(answerSvg, {
          x: margin,
          y: margin + topOffset,
          width: contentWidth,
          height: contentHeight
        });
      }
    }
    
    pdf.save('count-and-write-worksheet.pdf');
    showStatus('✓ Vector PDF downloaded!');
    
  } catch (error) {
    console.error('PDF generation error:', error);
    alert('PDF generation failed. Please use Print button and select "Save as PDF".');
  }
});

function renderWithNewRandomization() {
  // Generate new random problems for each sheet
  const numSheets = parseInt(elNumSheets.value, 10);
  const numProblems = parseInt(elProblems.value, 10);
  const minCount = clamp(parseInt(elMin.value, 10) || 1, 1, 30);
  const maxCount = clamp(parseInt(elMax.value, 10) || 10, 1, 30);
  const numIcons = 8; // Total available icons
  
  currentState.sheets = [];
  currentState.randomSeed = Date.now();
  
  for (let s = 0; s < numSheets; s++) {
    const sheetProblems = [];
    
    // Create shuffled array of icon indices for this sheet
    // If we have more problems than icons, we'll need to repeat some
    let availableIcons = [];
    for (let i = 0; i < Math.ceil(numProblems / numIcons); i++) {
      // Add all icon indices and shuffle
      const batch = Array.from({length: numIcons}, (_, idx) => idx);
      shuffleArray(batch);
      availableIcons = availableIcons.concat(batch);
    }
    
    for (let i = 0; i < numProblems; i++) {
      sheetProblems.push({
        count: randInt(minCount, maxCount),
        iconIndex: availableIcons[i]
      });
    }
    currentState.sheets.push(sheetProblems);
  }
  
  renderWorksheet();
}

// Fisher-Yates shuffle
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function renderWithoutRandomization() {
  // Re-render with existing problems, just update layout/style
  if (currentState.sheets.length === 0) {
    renderWithNewRandomization();
  } else {
    renderWorksheet();
  }
}

function renderWorksheet() {
  const style = parseInt(elStyle.value, 10);
  const headerMode = elShowHeader.value;
  const branded = elBranded.checked;
  const numSheets = currentState.sheets.length;

  const icons = ["icon-apple-new", "icon-balloon", "icon-icecream", "icon-pepper", "icon-pizza", "icon-corn", "icon-broccoli", "icon-fish"];
  
  sheetWrap.innerHTML = "";
  
  // Set up grid view if multiple sheets
  if (numSheets > 1) {
    sheetWrap.classList.add('grid-view');
    
    const sheetWidth = 612;
    const sheetHeight = 792;
    const sheetAspect = sheetHeight / sheetWidth;
    
    // Calculate available space
    // Add edge padding for 3+ worksheets
    const edgePadding = numSheets >= 3 ? 40 : 0;
    const availableWidth = window.innerWidth - 340 - 80 - (edgePadding * 2); // sidebar + padding + edge padding
    const availableHeight = window.innerHeight - 80; // padding
    const gap = 24;
    
    // Minimum readable width for a worksheet preview
    const minReadableWidth = 180;
    
    // Determine optimal columns based on rules:
    // - 2 or 3 sheets: single row
    // - 4+ sheets: max 3 per row
    // - Break rules if needed to maintain readability
    let cols;
    if (numSheets <= 3) {
      // Try to fit all in one row
      cols = numSheets;
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      // If too small, reduce columns
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    } else {
      // 4+ sheets: max 3 per row, but check readability
      cols = Math.min(3, numSheets);
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    }
    
    const rows = Math.ceil(numSheets / cols);
    
    // Calculate scale
    const maxSheetWidth = (availableWidth - (cols - 1) * gap) / cols;
    
    // For 1-3 sheets (single row), fit within viewport height
    // For 4+ sheets, allow scrolling
    let maxSheetHeight;
    if (numSheets <= 3) {
      maxSheetHeight = availableHeight;
    } else {
      // Allow larger previews when scrolling is enabled
      maxSheetHeight = availableHeight * 0.8;
    }
    
    const scaleByWidth = maxSheetWidth / sheetWidth;
    const scaleByHeight = maxSheetHeight / sheetHeight;
    const scale = Math.min(scaleByWidth, scaleByHeight);
    
    const scaledWidth = Math.floor(sheetWidth * scale);
    const scaledHeight = Math.floor(sheetHeight * scale);
    
    sheetWrap.style.gridTemplateColumns = `repeat(${cols}, ${scaledWidth + 24}px)`;
    sheetWrap.style.padding = numSheets >= 3 ? `0 ${edgePadding}px` : '0';
    
    // Render each sheet
    for (let s = 0; s < numSheets; s++) {
      const problems = currentState.sheets[s];
      const svg = generateWorksheetSvg(problems, style, headerMode, branded, icons);
      svg.setAttribute('width', scaledWidth);
      svg.setAttribute('height', scaledHeight);
      
      const page = document.createElement("div");
      page.className = "worksheet-page scaled";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  } else {
    sheetWrap.classList.remove('grid-view');
    sheetWrap.style.gridTemplateColumns = '';
    sheetWrap.style.padding = '0';
    
    // Single sheet - render at full size
    if (currentState.sheets.length > 0) {
      const problems = currentState.sheets[0];
      const svg = generateWorksheetSvg(problems, style, headerMode, branded, icons);
      
      const page = document.createElement("div");
      page.className = "worksheet-page";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  }
  
  showStatus('✓ Worksheet updated!');
}

// Generate a worksheet SVG (without adding to DOM)
function generateWorksheetSvg(problems, style, headerMode, branded, icons) {
  if (style === 1) {
    return generateStyle1Svg(problems, headerMode, branded, icons);
  } else {
    return generateStyle2Svg(problems, headerMode, branded, icons);
  }
}

// Generate answer key SVG for PDF
function generateAnswerKeySvg(problems, style, headerMode, branded) {
  const icons = ["icon-apple-new", "icon-balloon", "icon-icecream", "icon-pepper", "icon-pizza", "icon-corn", "icon-broccoli", "icon-fish"];
  
  if (style === 1) {
    return generateAnswerKeyStyle1Svg(problems, headerMode, branded, icons);
  } else {
    return generateAnswerKeyStyle2Svg(problems, headerMode, branded, icons);
  }
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function svgEl(tag, attrs = {}, children = []) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  for (const c of children) el.appendChild(c);
  return el;
}

function buildDefs() {
  const defs = svgEl("defs");

  const style = svgEl("style");
  style.textContent = `
    .txt { fill: #000; font-family: Arial, Helvetica, sans-serif; }
  `;
  defs.appendChild(style);

}

function renderStyle1(problems, headerMode, branded, icons) {
  const pageW = 612;
  const pageH = 792;
  const margin = 36;

  const svg = svgEl("svg", {
    width: pageW,
    height: pageH,
    viewBox: `0 0 ${pageW} ${pageH}`,
    xmlns: "http://www.w3.org/2000/svg"
  });

  svg.appendChild(buildDefs());
  svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

  let topGridY;

  if (headerMode === "both") {
    svg.appendChild(svgEl("text", {
      x: margin, y: 30, class: "txt", "font-size": 14, "font-weight": 400
    }, [document.createTextNode("Name:")]));
    svg.appendChild(svgEl("line", {
      x1: margin + 50, y1: 32,
      x2: margin + 240, y2: 32,
      stroke: "#000", "stroke-width": 1
    }));

    svg.appendChild(svgEl("text", {
      x: pageW - margin - 190, y: 30, class: "txt", "font-size": 14, "font-weight": 400
    }, [document.createTextNode("Date:")]));
    svg.appendChild(svgEl("line", {
      x1: pageW - margin - 140, y1: 32,
      x2: pageW - margin, y2: 32,
      stroke: "#000", "stroke-width": 1
    }));

    svg.appendChild(svgEl("text", {
      x: pageW / 2, y: 70, class: "txt", "font-size": 20, "font-weight": 700, "text-anchor": "middle"
    }, [document.createTextNode(elHeaderText.value)]));

    topGridY = 88;
  } else if (headerMode === "name") {
    svg.appendChild(svgEl("text", {
      x: pageW - margin - 190, y: 30, class: "txt", "font-size": 14, "font-weight": 400, "text-anchor": "end"
    }, [document.createTextNode("Name:")]));
    svg.appendChild(svgEl("line", {
      x1: pageW - margin - 180, y1: 32,
      x2: pageW - margin, y2: 32,
      stroke: "#000", "stroke-width": 1
    }));

    svg.appendChild(svgEl("text", {
      x: pageW / 2, y: 70, class: "txt", "font-size": 20, "font-weight": 700, "text-anchor": "middle"
    }, [document.createTextNode(elHeaderText.value)]));

    topGridY = 88;
  } else {
    svg.appendChild(svgEl("text", {
      x: pageW / 2, y: 45, class: "txt", "font-size": 22, "font-weight": 700, "text-anchor": "middle"
    }, [document.createTextNode(elHeaderText.value)]));

    topGridY = 65;
  }

  const bottomMargin = 24;
  const gridH = pageH - topGridY - bottomMargin;
  const cols = 2;
  const rows = Math.ceil(problems.length / cols);

  const gutter = 18;
  const cellW = (pageW - margin * 2 - gutter) / cols;
  const cellH = (gridH - gutter * (rows - 1)) / rows;

  const objectAreaH = cellH - 48;

  for (let i = 0; i < problems.length; i++) {
    const c = i % cols;
    const r = Math.floor(i / cols);

    const x = margin + c * (cellW + gutter);
    const y = topGridY + r * (cellH + gutter);

    svg.appendChild(svgEl("rect", {
      x, y, width: cellW, height: cellH,
      rx: 8, ry: 8,
      fill: "none", stroke: "#000", "stroke-width": 1
    }));

    const problem = problems[i];
    const count = problem.count;
    const iconId = icons[problem.iconIndex];

    const boxW = 72;  // 80 * 0.9 = 72 (10% narrower)
    const boxH = 42;  // Increased from 32 to make it taller
    const boxX = x + cellW - boxW - 14 + 3;  // Move right 3px
    const boxY = y + cellH - boxH - 12 + 7;  // Move down 7px

    placeObjects(svg, {
      iconId,
      count,
      x: x + 14,
      y: y + 12,
      w: cellW - 28,
      h: objectAreaH - 16,
      answerBox: { x: boxX, y: boxY, width: boxW, height: boxH },
      problemIndex: i,
      problemCount: problems.length
    });

    svg.appendChild(svgEl("rect", {
      x: boxX, y: boxY, width: boxW, height: boxH,
      rx: 6, ry: 6,
      fill: "none", stroke: "#000", "stroke-width": 1  // Changed from 2 to 1 to match outer box
    }));
  }

  // Add branding at bottom without affecting layout
  if (branded) {
    svg.appendChild(svgEl("text", {
      x: pageW / 2, y: pageH - 8, class: "txt", "font-size": 11, "text-anchor": "middle", fill: "#666"
    }, [document.createTextNode("animalmath.com")]));
  }

  return svg;
}

// Renamed original function to generate SVG
function generateStyle1Svg(problems, headerMode, branded, icons) {
  return renderStyle1(problems, headerMode, branded, icons);
}

  for (let r = 0; r < rows && itemIndex < count; r++) {
    for (let c = 0; c < cols && itemIndex < count; c++) {
      const itemX = gridStartX + c * (iconSize + adjustedSpacingH) - iconOffsetX;
      const itemY = gridStartY + r * (iconSize + adjustedSpacingV) - iconOffsetY;
      
      problemGroup.appendChild(svgEl("use", {
        href: `#${iconId}`,
        x: itemX,
        y: itemY,
        width: iconSize,
        height: iconSize
      }));
      
      itemIndex++;
    }
  }
  
  // Add the group to the svg
  svg.appendChild(problemGroup);
}

function placeObjectsRow(svg, { iconId, count, x, y, w, h }) {
  // Calculate size with guaranteed spacing
  const availableWidth = w - (count + 1) * 8; // 8px spacing minimum
  const maxItemWidth = availableWidth / count;
  
  let size = Math.min(h * 0.85, maxItemWidth);
  size = Math.max(20, Math.min(50, size));
  
  const totalWidth = size * count;
  const spacing = (w - totalWidth) / (count + 1);
  
  for (let i = 0; i < count; i++) {
    const cx = x + spacing + i * (size + spacing) + size / 2;
    const cy = y + h / 2;

    svg.appendChild(svgEl("use", {
      href: `#${iconId}`,
      x: cx - size / 2,
      y: cy - size / 2,
      width: size,
      height: size
    }));
  }
}

function placeObjectsRowLeftAligned(svg, { iconId, count, x, y, w, h, maxCount }) {
  // Calculate size based on maxCount so all rows have same-sized icons
  const itemsToFit = maxCount || count;
  const spacing = 6; // Fixed small spacing between items
  const startX = x + 5; // Small left padding
  
  // Calculate size that fits maxCount items with spacing
  const availableWidth = w - 10 - (itemsToFit * spacing);
  let size = Math.min(h * 0.85, availableWidth / itemsToFit, 50);
  size = Math.max(20, size);
  
  for (let i = 0; i < count; i++) {
    const cx = startX + i * (size + spacing) + size / 2;
    const cy = y + h / 2;

    svg.appendChild(svgEl("use", {
      href: `#${iconId}`,
      x: cx - size / 2,
      y: cy - size / 2,
      width: size,
      height: size
    }));
  }
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

// Debounced resize handler to recalculate grid
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    if (currentState.sheets.length > 1) {
      renderWorksheet();
    }
  }, 150);
});

// Initial render
renderWithNewRandomization();
  </script>
