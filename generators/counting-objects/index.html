<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Count & Write Worksheet Generator</title>
  <link rel="stylesheet" href="../../fonts/fonts.css">
<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    .main-container {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: white;
      padding: 32px 24px;
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar h2 {
      font-size: 24px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
      text-align: left;
    }

    .sidebar .subtitle {
      font-size: 14px;
      color: #718096;
      margin-bottom: 32px;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 6px;
    }

    .control-group input[type="number"],
    .control-group select {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: white;
      color: #2d3748;
      transition: all 0.2s;
    }

    .control-group input[type="number"]:focus,
    .control-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .control-group input[type="number"]:hover,
    .control-group select:hover {
      border-color: #cbd5e0;
    }

    /* ===== Advanced Options Toggle ===== */
    .advanced-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 10px 0;
      margin-bottom: 4px;
      user-select: none;
    }

    .advanced-toggle .toggle-arrow {
      font-size: 12px;
      transition: transform 0.2s;
      color: #667eea;
    }

    .advanced-toggle .toggle-arrow.open {
      transform: rotate(90deg);
    }

    .advanced-toggle span:last-child {
      font-size: 13px;
      font-weight: 600;
      color: #667eea;
    }

    .advanced-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: #f7fafc;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .advanced-panel.open {
      max-height: 800px;
    }

    .advanced-panel-inner {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .advanced-panel-inner .control-group {
      margin-bottom: 0;
    }

    .adv-checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .adv-checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .adv-checkbox-row label {
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
      cursor: pointer;
    }

    .adv-sub {
      padding-left: 26px;
    }

    .adv-sub select,
    .adv-sub input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: white;
      color: #2d3748;
    }

    .adv-sub label {
      font-size: 12px;
      color: #718096;
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid #e2e8f0;
    }

    button {
      width: 100%;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btnGenerate {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    #btnGenerate:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
    }

    #btnGenerate:active {
      transform: translateY(0);
    }

    #btnPrint {
      background: #ed8936;
      color: white;
      box-shadow: 0 4px 12px rgba(237, 137, 54, 0.3);
    }

    #btnPrint:hover {
      background: #dd6b20;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(237, 137, 54, 0.4);
    }

    #btnVarietyPack, #btnVarietyPack1to5 {
      background: linear-gradient(135deg, #38a169 0%, #2f855a 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(56, 161, 105, 0.3);
    }

    #btnVarietyPack:hover, #btnVarietyPack1to5:hover {
      background: linear-gradient(135deg, #2f855a 0%, #276749 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(56, 161, 105, 0.4);
    }

    .preview-area {
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
      min-height: 100vh;
      padding: 40px;
    }

    #sheetWrap {
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
    }

    #sheetWrap.grid-view {
      display: grid;
      gap: 24px;
      justify-content: center;
      align-content: start;
    }

    .worksheet-page {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      display: inline-block;
      border: none;
      transition: transform 0.2s ease;
    }

    .worksheet-page.scaled {
      padding: 12px;
    }

    .worksheet-page.scaled svg {
      display: block;
    }

    .page-break {
      page-break-after: always;
    }

    #status { 
      margin: 16px 0;
      padding: 12px 16px;
      border-radius: 8px;
      display: none;
      font-size: 14px;
      font-weight: 500;
    }
    #status.success { 
      background: #d4edda;
      color: #155724;
      display: block;
      border: 1px solid #c3e6cb;
    }
    
    .ak-print-only { display: none !important; }

    @media print {
      .ak-print-only { display: block !important; }
      .sidebar {
        display: none !important;
      }
      
      .main-container {
        display: block !important;
      }
      
      .preview-area {
        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
        background: white !important;
      }
      
      #sheetWrap { 
        padding: 0 !important; 
        margin: 0 !important;
        display: block !important;
        background: white !important;
      }
      
      .worksheet-page {
        padding: 0 !important;
        margin: 0 !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        display: block !important;
        background: white !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
      
      .worksheet-page:not(:last-child) {
        page-break-after: always !important;
        break-after: page !important;
      }
      
      .worksheet-page svg {
        width: 100% !important;
        height: auto !important;
        display: block !important;
      }
      
      body {
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
      }
    }
    
    @page {
      size: letter;
      margin: 0.5in 0.4in -0.2in 0.4in;
    }

    @media (max-width: 1024px) {
      .main-container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
      }

      .preview-area {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="sidebar">
	<a href="../../index.html" style="display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: #667eea; text-decoration: none; margin-bottom: 16px; transition: gap 0.2s;"
   onmouseover="this.style.gap='10px'" onmouseout="this.style.gap='6px'">
  ← All Worksheets
</a>
      <h2>Count & Write Worksheet</h2>
      <div class="subtitle">Generate custom worksheets</div>

      <div class="control-group">
        <label for="countRange">Count Range</label>
        <select id="countRange">
          <option value="1-5" selected>1 to 5</option>
          <option value="5-10">5 to 10</option>
          <option value="1-10">1 to 10</option>
          <option value="10-20">10 to 20</option>
          <option value="1-20">1 to 20</option>
        </select>
      </div>

      <div class="control-group">
        <label for="problems">Problems per Sheet</label>
        <select id="problems">
          <option value="6">6</option>
          <option value="8" selected>8</option>
          <option value="10">10</option>
        </select>
      </div>

      <div class="control-group">
        <label for="numSheets">Number of Worksheets</label>
        <select id="numSheets">
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="8">8</option>
          <option value="10">10</option>
        </select>
      </div>

      <div class="control-group" style="flex-direction: column; align-items: flex-start;">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 0;">
          <input type="checkbox" id="answerKey" style="width: 18px; height: 18px; cursor: pointer; accent-color: #667eea;">
          <span style="font-size: 13px; font-weight: 600;">Answer Key</span>
        </label>
      </div>

      <!-- Advanced Options -->
      <div class="advanced-toggle" id="advToggle">
        <span class="toggle-arrow" id="advArrow">▶</span>
        <span>Advanced Options</span>
      </div>
      <div class="advanced-panel" id="advPanel">
        <div class="advanced-panel-inner">

          <!-- Allow zero -->
          <div class="adv-checkbox-row">
            <input type="checkbox" id="allowZero" />
            <label for="allowZero">Allow zero</label>
          </div>

          <!-- Style -->
          <div class="control-group">
            <label for="style">Style</label>
            <select id="style">
              <option value="1" selected>2 Columns (Grid)</option>
              <option value="2">1 Column (Rows)</option>
            </select>
          </div>

          <!-- Name / Date -->
          <div class="adv-checkbox-row">
            <input type="checkbox" id="showHeaderEnabled" checked />
            <label for="showHeaderEnabled">Name / Date</label>
          </div>
          <div class="adv-sub" id="headerModeOptions">
            <label for="showHeader">Show</label>
            <select id="showHeader">
              <option value="both" selected>Name & Date</option>
              <option value="name">Name Only</option>
            </select>
          </div>

          <!-- Numbered -->
          <div class="adv-checkbox-row">
            <input type="checkbox" id="numbered" checked />
            <label for="numbered">Numbered</label>
          </div>

          <!-- Include example -->
          <div class="adv-checkbox-row">
            <input type="checkbox" id="includeExample" />
            <label for="includeExample">Include example</label>
          </div>

          <!-- Customize worksheet titles -->
          <div class="adv-checkbox-row">
            <input type="checkbox" id="customTitleEnabled" />
            <label for="customTitleEnabled">Customize worksheet titles</label>
          </div>
          <div class="adv-sub" id="customTitleOptions" style="display:none;">
            <div class="adv-checkbox-row" style="margin-bottom:8px;">
              <input type="checkbox" id="showTitle" checked />
              <label for="showTitle">Show title</label>
            </div>
            <div id="titleInputWrap">
              <label for="headerText">Title</label>
              <input type="text" id="headerText" value="Count & Write 1 to 5" />
            </div>
            <div class="adv-checkbox-row" style="margin-top:10px;margin-bottom:8px;">
              <input type="checkbox" id="showSubtitle" checked />
              <label for="showSubtitle">Show subtitle</label>
            </div>
            <div id="subtitleInputWrap">
              <label for="subtitleText">Subtitle</label>
              <input type="text" id="subtitleText" value="Count the objects and write the number." />
            </div>
          </div>

          <!-- Branding -->
          <div class="adv-checkbox-row">
            <input type="checkbox" id="branded" checked />
            <label for="branded">Branding</label>
          </div>

        </div>
      </div>

      <div class="button-group">
        <button id="btnGenerate">🔄 Generate New</button>
        <button id="btnPrint">🖨️ Print</button>
        <button id="btnVarietyPack">📦 Print Variety Pack</button>
        <button id="btnVarietyPack1to5">📦 Print 1 to 5 Variety Pack</button>
      </div>

      <div id="status"></div>
    </div>

    <div class="preview-area">
      <div id="sheetWrap"></div>
    </div>
  </div>  <script>
const sheetWrap = document.getElementById("sheetWrap");
const statusEl = document.getElementById("status");

const elNumSheets = document.getElementById("numSheets");
const elProblems = document.getElementById("problems");
const elCountRange = document.getElementById("countRange");
const elStyle = document.getElementById("style");
const elShowHeader = document.getElementById("showHeader");
const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
const elHeaderModeOptions = document.getElementById("headerModeOptions");
const elNumbered = document.getElementById("numbered");
const elBranded = document.getElementById("branded");
const elAnswerKey = document.getElementById("answerKey");
const elIncludeExample = document.getElementById("includeExample");
const elHeaderText = document.getElementById("headerText");
const elSubtitleText = document.getElementById("subtitleText");
const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
const elCustomTitleOptions = document.getElementById("customTitleOptions");
const elShowTitle = document.getElementById("showTitle");
const elShowSubtitle = document.getElementById("showSubtitle");
const elTitleInputWrap = document.getElementById("titleInputWrap");
const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
const elAllowZero = document.getElementById("allowZero");
const advToggle = document.getElementById("advToggle");
const advPanel = document.getElementById("advPanel");
const advArrow = document.getElementById("advArrow");

// Track current worksheet state - now an array of sheets
let currentState = {
  sheets: [], // Each sheet has its own problems array
  randomSeed: Date.now()
};

function getCountRange() {
  const parts = elCountRange.value.split("-");
  const rawMin = parseInt(parts[0], 10);
  const min = (elAllowZero.checked && rawMin === 1) ? 0 : rawMin;
  return { min, max: parseInt(parts[1], 10) };
}

function updateCountRangeLabels() {
  const lo = elAllowZero.checked ? '0' : '1';
  for (const opt of elCountRange.options) {
    const parts = opt.value.split('-');
    const minLabel = parts[0] === '1' ? lo : parts[0];
    opt.text = minLabel + ' to ' + parts[1];
  }
}

function updateTitleFromSettings() {
  const title = buildDefaultTitle();
  elHeaderText.value = title;
}

function getHeaderMode() {
  return elShowHeaderEnabled.checked ? elShowHeader.value : "none";
}

function buildDefaultTitle() {
  const range = getCountRange();
  return `Count & Write ${range.min} to ${range.max}`;
}

function getTitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowTitle.checked ? elHeaderText.value : "";
  }
  return buildDefaultTitle();
}

function getSubtitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowSubtitle.checked ? elSubtitleText.value : "";
  }
  return "Count the objects and write the number.";
}

function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.className = 'success';
  setTimeout(() => {
    statusEl.style.display = 'none';
  }, 3000);
}

// ===== Advanced panel toggle =====
advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

// ===== Allow zero =====
elAllowZero.addEventListener("change", () => { updateCountRangeLabels(); updateTitleFromSettings(); renderWithNewRandomization(); });

// ===== Name/Date toggle =====
elShowHeaderEnabled.addEventListener("change", () => {
  elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});

// ===== Custom title toggle =====
elCustomTitleEnabled.addEventListener("change", () => {
  elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowTitle.addEventListener("change", () => {
  elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowSubtitle.addEventListener("change", () => {
  elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
  renderWithoutRandomization();
});

// Add event listeners for real-time updates
elNumSheets.addEventListener("change", () => renderWithNewRandomization());
elProblems.addEventListener("change", () => renderWithNewRandomization());
elCountRange.addEventListener("change", () => { updateTitleFromSettings(); renderWithNewRandomization(); });
elStyle.addEventListener("change", () => renderWithoutRandomization());
elShowHeader.addEventListener("change", () => renderWithoutRandomization());
elNumbered.addEventListener("change", () => renderWithoutRandomization());
elBranded.addEventListener("change", () => renderWithoutRandomization());
elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
elHeaderText.addEventListener("input", () => renderWithoutRandomization());
elSubtitleText.addEventListener("input", () => renderWithoutRandomization());

document.getElementById("btnGenerate").addEventListener("click", () => {
  renderWithNewRandomization();
});

// Answer key checkbox - no longer affects preview, only PDF
elAnswerKey.addEventListener("change", () => {
  // No preview update needed
});

function handlePrint() {
  if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
  const style = parseInt(elStyle.value, 10);
  const headerMode = getHeaderMode();
  const branded = elBranded.checked;
  const numbered = elNumbered.checked;
  const title = getTitle();
  const subtitle = getSubtitle();
  const includeExample = elIncludeExample.checked;
  const range = getCountRange();
  const perRowMax = range.max > 10 ? 10 : 5;
  const icons = ["icon-apple-new", "icon-balloon", "icon-icecream", "icon-pepper", "icon-pizza", "icon-corn", "icon-broccoli", "icon-fish"];

  const sH = sheetWrap.innerHTML, sC = sheetWrap.className, sS = sheetWrap.style.cssText;
  sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
  for (let i = 0; i < currentState.sheets.length; i++) {
    const p = document.createElement("div"); p.className = "worksheet-page";
    p.appendChild(generateWorksheetSvg(currentState.sheets[i], style, headerMode, branded, numbered, icons, title, subtitle, includeExample, perRowMax));
    sheetWrap.appendChild(p);
  }
  const answerKeyPages = [];
  if (elAnswerKey.checked) {
    for (let i = 0; i < currentState.sheets.length; i++) {
      const p = document.createElement("div"); p.className = "worksheet-page ak-print-only";
      p.appendChild(generateAnswerKeySvg(currentState.sheets[i], style, "none", branded, numbered, title, subtitle, true, perRowMax));
      sheetWrap.appendChild(p);
      answerKeyPages.push(p);
    }
  }
  window.print();
  setTimeout(() => { answerKeyPages.forEach(p => p.remove()); sheetWrap.innerHTML = sH; sheetWrap.className = sC; sheetWrap.style.cssText = sS; }, 500);
}

document.getElementById("btnPrint").addEventListener("click", handlePrint);

// ===== Shared helpers for variety packs =====
function generateRandomProblems(min, max, numProblems) {
  const numIcons = 8;
  const problems = [];
  let availableIcons = [];
  for (let i = 0; i < Math.ceil(numProblems / numIcons); i++) {
    const batch = Array.from({length: numIcons}, (_, idx) => idx);
    shuffleArray(batch);
    availableIcons = availableIcons.concat(batch);
  }
  // Cap zero-count problems at 20% when range includes zero
  const maxZeros = (min === 0) ? Math.floor(numProblems * 0.2) : 0;
  let zeroCount = 0;
  for (let i = 0; i < numProblems; i++) {
    let count = randInt(min, max);
    if (count === 0) {
      zeroCount++;
      if (zeroCount > maxZeros) count = randInt(1, max);
    }
    problems.push({ count, iconIndex: availableIcons[i] });
  }
  return problems;
}

function printVarietyPack(packDef) {
  const icons = ["icon-apple-new", "icon-balloon", "icon-icecream", "icon-pepper", "icon-pizza", "icon-corn", "icon-broccoli", "icon-fish"];
  const headerMode = "both";
  const branded = true;
  const numbered = true;
  const subtitle = "Count the objects and write the number.";
  const includeExample = false;

  // Save current DOM
  const sH = sheetWrap.innerHTML, sC = sheetWrap.className, sS = sheetWrap.style.cssText;
  sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";

  // Collect worksheet and answer key data separately so answer keys go at the end
  const worksheetPages = [];
  const answerKeyPages = [];

  for (const group of packDef) {
    const title = `Count & Write ${group.min} to ${group.max}`;
    const perRowMax = group.max > 10 ? 10 : 5;
    const numProblems = group.problems || 8;

    for (let s = 0; s < group.count; s++) {
      const problems = generateRandomProblems(group.min, group.max, numProblems);

      // Worksheet page
      const wp = document.createElement("div"); wp.className = "worksheet-page";
      wp.appendChild(generateWorksheetSvg(problems, group.style, headerMode, branded, numbered, icons, title, subtitle, includeExample, perRowMax));
      worksheetPages.push(wp);

      // Answer key page
      const ak = document.createElement("div"); ak.className = "worksheet-page";
      ak.appendChild(generateAnswerKeySvg(problems, group.style, "none", branded, numbered, title, subtitle, true, perRowMax));
      answerKeyPages.push(ak);
    }
  }

  // Append all worksheets first, then all answer keys
  worksheetPages.forEach(p => sheetWrap.appendChild(p));
  answerKeyPages.forEach(p => sheetWrap.appendChild(p));

  window.print();
  setTimeout(() => { sheetWrap.innerHTML = sH; sheetWrap.className = sC; sheetWrap.style.cssText = sS; }, 500);
}

// ===== Variety Pack =====
function handleVarietyPack() {
  printVarietyPack([
    { count: 4, min: 1, max: 5,  style: 1 },
    { count: 4, min: 1, max: 5,  style: 2 },
    { count: 2, min: 0, max: 5,  style: 1 },
    { count: 2, min: 0, max: 5,  style: 2 },
    { count: 4, min: 1, max: 10, style: 1 },
    { count: 4, min: 1, max: 10, style: 2 },
    { count: 2, min: 0, max: 10, style: 1 },
    { count: 2, min: 0, max: 10, style: 2 },
    { count: 3, min: 5, max: 10, style: 1 },
    { count: 3, min: 5, max: 10, style: 2 },
    { count: 3, min: 1, max: 20, style: 1 },
    { count: 3, min: 1, max: 20, style: 2 },
    { count: 3, min: 10, max: 20, style: 1 },
    { count: 3, min: 10, max: 20, style: 2 },
  ]);
}

document.getElementById("btnVarietyPack").addEventListener("click", handleVarietyPack);

// ===== 1 to 5 Variety Pack =====
function handleVarietyPack1to5() {
  printVarietyPack([
    { count: 4, min: 1, max: 5, style: 2, problems: 6 },
    { count: 3, min: 1, max: 5, style: 1, problems: 6 },
    { count: 4, min: 1, max: 5, style: 2, problems: 8 },
    { count: 4, min: 1, max: 5, style: 1, problems: 8 },
    { count: 1, min: 0, max: 5, style: 2, problems: 8 },
    { count: 1, min: 0, max: 5, style: 1, problems: 8 },

// Fisher-Yates shuffle
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function renderWithoutRandomization() {
  // Re-render with existing problems, just update layout/style
  if (currentState.sheets.length === 0) {
    renderWithNewRandomization();
  } else {
    renderWorksheet();
  }
}

function renderWorksheet() {
  const style = parseInt(elStyle.value, 10);
  const headerMode = getHeaderMode();
  const branded = elBranded.checked;
  const numbered = elNumbered.checked;
  const includeExample = elIncludeExample.checked;
  const title = getTitle();
  const subtitle = getSubtitle();
  const numSheets = currentState.sheets.length;
  const range = getCountRange();
  const perRowMax = range.max > 10 ? 10 : 5;

  const icons = ["icon-apple-new", "icon-balloon", "icon-icecream", "icon-pepper", "icon-pizza", "icon-corn", "icon-broccoli", "icon-fish"];
  
  sheetWrap.innerHTML = "";
  
  // Set up grid view if multiple sheets
  if (numSheets > 1) {
    sheetWrap.classList.add('grid-view');
    
    const sheetWidth = 612;
    const sheetHeight = 792;
    const sheetAspect = sheetHeight / sheetWidth;
    
    // Calculate available space
    // Add edge padding for 3+ worksheets
    const edgePadding = numSheets >= 3 ? 40 : 0;
    const availableWidth = window.innerWidth - 340 - 80 - (edgePadding * 2); // sidebar + padding + edge padding
    const availableHeight = window.innerHeight - 80; // padding
    const gap = 24;
    
    // Minimum readable width for a worksheet preview
    const minReadableWidth = 180;
    
    // Determine optimal columns based on rules:
    // - 2 or 3 sheets: single row
    // - 4+ sheets: max 3 per row
    // - Break rules if needed to maintain readability
    let cols;
    if (numSheets <= 3) {
      // Try to fit all in one row
      cols = numSheets;
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      // If too small, reduce columns
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    } else {
      // 4+ sheets: max 3 per row, but check readability
      cols = Math.min(3, numSheets);
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    }
    
    const rows = Math.ceil(numSheets / cols);
    
    // Calculate scale
    const maxSheetWidth = (availableWidth - (cols - 1) * gap) / cols;
    
    // For 1-3 sheets (single row), fit within viewport height
    // For 4+ sheets, allow scrolling
    let maxSheetHeight;
    if (numSheets <= 3) {
      maxSheetHeight = availableHeight;
    } else {
      // Allow larger previews when scrolling is enabled
      maxSheetHeight = availableHeight * 0.8;
    }
    
    const scaleByWidth = maxSheetWidth / sheetWidth;
    const scaleByHeight = maxSheetHeight / sheetHeight;
    const scale = Math.min(scaleByWidth, scaleByHeight);
    
    const scaledWidth = Math.floor(sheetWidth * scale);
    const scaledHeight = Math.floor(sheetHeight * scale);
    
    sheetWrap.style.gridTemplateColumns = `repeat(${cols}, ${scaledWidth + 24}px)`;
    sheetWrap.style.padding = numSheets >= 3 ? `0 ${edgePadding}px` : '0';
    
    // Render each sheet
    for (let s = 0; s < numSheets; s++) {
      const problems = currentState.sheets[s];
      const svg = generateWorksheetSvg(problems, style, headerMode, branded, numbered, icons, title, subtitle, includeExample, perRowMax);
      svg.setAttribute('width', scaledWidth);
      svg.setAttribute('height', scaledHeight);
      
      const page = document.createElement("div");
      page.className = "worksheet-page scaled";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  } else {
    sheetWrap.classList.remove('grid-view');
    sheetWrap.style.gridTemplateColumns = '';
    sheetWrap.style.padding = '0';
    
    // Single sheet - render at full size
    if (currentState.sheets.length > 0) {
      const problems = currentState.sheets[0];
      const svg = generateWorksheetSvg(problems, style, headerMode, branded, numbered, icons, title, subtitle, includeExample, perRowMax);

      const page = document.createElement("div");
      page.className = "worksheet-page";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  }
  
  showStatus('✓ Worksheet updated!');
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function svgEl(tag, attrs = {}, children = []) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, String(v));
  for (const c of children) el.appendChild(c);
  return el;
}

function makeSymbol(id, innerHTML) {
  const sym = svgEl("symbol", { id, viewBox: "0 0 512 512" });
  sym.innerHTML = innerHTML;
  return sym;
}

function renderStyle1(problems, headerMode, branded, numbered, icons, title, subtitle, includeExample, isAnswerKey, perRowMax = 5) {
  const pageW = 612;
  const pageH = 792;
  const margin = 36;

  const svg = svgEl("svg", {
    width: pageW,
    height: pageH,
    viewBox: `0 0 ${pageW} ${pageH}`,
    xmlns: "http://www.w3.org/2000/svg"
  });

  svg.appendChild(buildDefs());
  svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

  let topGridY;
  const midX = pageW / 2;

  {
    let curY = 10;
    if (isAnswerKey) {
      const akLabel = svgEl("text", {
        x: pageW - margin, y: curY + 16,
        "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
        fill: "#000", "text-anchor": "end", "letter-spacing": "2"
      });
      akLabel.textContent = "ANSWER KEY";
      svg.appendChild(akLabel);
      curY += 28;
    } else if (headerMode === "both") {
      svg.appendChild(svgEl("text", {
        x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
      }, [document.createTextNode("Name")]));
      svg.appendChild(svgEl("line", {
        x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
        stroke: "#718096", "stroke-width": 0.75
      }));
      svg.appendChild(svgEl("text", {
        x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
      }, [document.createTextNode("Date")]));
      svg.appendChild(svgEl("line", {
        x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
        stroke: "#718096", "stroke-width": 0.75
      }));
      curY += 28;
    } else if (headerMode === "name") {
      svg.appendChild(svgEl("text", {
        x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
      }, [document.createTextNode("Name")]));
      svg.appendChild(svgEl("line", {
        x1: margin + 38, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
        stroke: "#718096", "stroke-width": 0.75
      }));
      curY += 28;
    }
    if (title) {
      svg.appendChild(svgEl("text", {
        x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
      }, [document.createTextNode(title)]));
      curY += 46;
    }
    if (subtitle) {
      svg.appendChild(svgEl("text", {
        x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
      }, [document.createTextNode(subtitle)]));
      curY += 20;
    }
    topGridY = curY + 6;
  }

  const bottomMargin = branded ? 56 : 24;
  const gridH = pageH - topGridY - bottomMargin;
  const cols = 2;
  const rows = Math.ceil(problems.length / cols);

  const gutter = 8;
  const cellW = (pageW - margin * 2 - gutter) / cols;
  const cellH = (gridH - gutter * (rows - 1)) / rows;

  const objectAreaH = cellH - 48;

  for (let i = 0; i < problems.length; i++) {
    const c = i % cols;
    const r = Math.floor(i / cols);

    const x = margin + c * (cellW + gutter);
    const y = topGridY + r * (cellH + gutter);

    svg.appendChild(svgEl("rect", {
      x, y, width: cellW, height: cellH,
      rx: 8, ry: 8,
      fill: "none", stroke: "#000", "stroke-width": 1
    }));

    if (numbered !== false) {
      svg.appendChild(svgEl("text", {
        x: x + 8, y: y + 14,
        "font-family": "Fredoka, sans-serif", "font-size": 11, "font-weight": 400, fill: "#a0aec0"
      }, [document.createTextNode((i + 1) + ".")]));
    }

    const problem = problems[i];
    const count = problem.count;
    const iconId = icons[problem.iconIndex];

    const boxW = 72;  // 80 * 0.9 = 72 (10% narrower)
    const boxH = 42;  // Increased from 32 to make it taller
    const boxX = x + cellW - boxW - 14 + 3;  // Move right 3px
    const boxY = y + cellH - boxH - 12 + 7;  // Move down 7px

    placeObjects(svg, {
      iconId,
      count,
      x: x + 14,
      y: y + 12,
      w: cellW - 28,
      h: objectAreaH - 16,
      answerBox: { x: boxX, y: boxY, width: boxW, height: boxH },
      problemIndex: i,
      problemCount: problems.length,
      perRowMax
    });

    const isExample = (i === 0 && includeExample);

    svg.appendChild(svgEl("rect", {
      x: boxX, y: boxY, width: boxW, height: boxH,
      rx: 6, ry: 6,
      fill: isExample ? "#f0fdf4" : "none",
      stroke: isExample ? "#22c55e" : "#000",
      "stroke-width": 1
    }));

    if (isExample) {
      // Example badge above answer box
      const badgeW = 42, badgeH = 13;
      const badgeX = boxX + boxW - badgeW;
      const badgeY = boxY - badgeH - 2;
      svg.appendChild(svgEl("rect", {
        x: badgeX, y: badgeY, width: badgeW, height: badgeH,
        rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": 0.75
      }));
      const badgeText = svgEl("text", {
        x: badgeX + badgeW / 2, y: badgeY + 9.5,
        "font-family": "Fredoka, sans-serif", "font-size": 8, "font-weight": 600,
        fill: "#16a34a", "text-anchor": "middle"
      });
      badgeText.textContent = "Example";
      svg.appendChild(badgeText);
      // Show answer in green
      const ansText = svgEl("text", {
        x: boxX + boxW / 2, y: boxY + boxH / 2 + 7,
        "font-family": "'Google Sans Flex', sans-serif", "font-size": 24, "font-weight": 700,
        fill: "#16a34a", "text-anchor": "middle"
      });
      ansText.textContent = String(count);
      svg.appendChild(ansText);
    }
  }

  // Add branding at bottom
  if (branded) {
    const brandY = pageH - 48;
    const logoH = 38;
    const logoW = Math.round(logoH * 2.79);
    svg.appendChild(svgEl("image", {
      href: "../branding/emma-logo.jpg",
      x: margin, y: brandY,
      width: logoW, height: logoH
    }));
    const bLine1 = svgEl("text", {
      x: pageW - margin, y: brandY + 14,
      "font-family": "Fredoka, sans-serif", "font-size": 11,
      fill: "#4a5568", "text-anchor": "end"
    });
    bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
    svg.appendChild(bLine1);
    const bLine2 = svgEl("text", {
      x: pageW - margin, y: brandY + 26,
      "font-family": "Fredoka, sans-serif", "font-size": 9.5,
      fill: "#a0aec0", "text-anchor": "end"
    });
    bLine2.textContent = "\u00A9 2026 Eggroll Games";
    svg.appendChild(bLine2);
  }

  return svg;
}

// Renamed original function to generate SVG
function generateStyle1Svg(problems, headerMode, branded, numbered, icons, title, subtitle, includeExample, isAnswerKey, perRowMax = 5) {

}

function placeObjects(svg, { iconId, count, x, y, w, h, answerBox = null, problemIndex = 0, problemCount = 8, perRowMax = 5 }) {
  const problemGroup = svgEl("g", { "data-problem": problemIndex });
  const pad = 10;

  // Available area for icons (inside cell padding)
  let aX = x + pad;
  let aY = y + pad;
  let aW = w - pad * 2;
  let aH = h - pad * 2;

  // Reduce available height to avoid answer box
  if (answerBox) {
    const abTop = answerBox.y - 6; // 6px buffer above answer box
    const maxH = abTop - aY;
    if (maxH < aH) aH = maxH;
  }

  // Fixed row layout based on count range:
  // Items <= perRowMax: single row; items > perRowMax: wrap to 2 rows
  let bestCols, bestRows;
  if (count <= perRowMax) {
    bestCols = count;
    bestRows = 1;
  } else {
    bestCols = perRowMax;
    bestRows = Math.ceil(count / perRowMax);
  }
  const spacingRatio = 0.15;
  const sizeByW = aW / (bestCols + (bestCols - 1) * spacingRatio);
  const sizeByH = aH / (bestRows + (bestRows - 1) * spacingRatio);
  const bestSize = Math.min(sizeByW, sizeByH);

  let iconSize = Math.max(18, bestSize);
  const spacing = iconSize * spacingRatio;
  const gridW = bestCols * iconSize + (bestCols - 1) * spacing;
  const gridH = bestRows * iconSize + (bestRows - 1) * spacing;
  const startX = aX + (aW - gridW) / 2;
  const startY = aY + (aH - gridH) / 2;

  let idx = 0;
  for (let r = 0; r < bestRows && idx < count; r++) {
    for (let c = 0; c < bestCols && idx < count; c++) {
      const ix = startX + c * (iconSize + spacing);
      const iy = startY + r * (iconSize + spacing);
      problemGroup.appendChild(svgEl("use", {
        href: `#${iconId}`,
        x: ix, y: iy,
        width: iconSize, height: iconSize
      }));
      idx++;
    }
  }

  svg.appendChild(problemGroup);
}

function placeObjectsRow(svg, { iconId, count, x, y, w, h }) {
  // Calculate size with guaranteed spacing
  const availableWidth = w - (count + 1) * 8; // 8px spacing minimum
  const maxItemWidth = availableWidth / count;
  
  let size = Math.min(h * 0.85, maxItemWidth);
  size = Math.max(20, Math.min(50, size));
  
  const totalWidth = size * count;
  const spacing = (w - totalWidth) / (count + 1);
  
  for (let i = 0; i < count; i++) {
    const cx = x + spacing + i * (size + spacing) + size / 2;
    const cy = y + h / 2;

    svg.appendChild(svgEl("use", {
      href: `#${iconId}`,
      x: cx - size / 2,
      y: cy - size / 2,
      width: size,
      height: size
    }));
  }
}

function placeObjectsRowLeftAligned(svg, { iconId, count, x, y, w, h, maxCount, perRowMax = 5 }) {
  const spacing = 6;
  const startX = x + 18;
  const needsWrap = count > perRowMax;

  const leftPad = 18;
  const rightPad = 5;
  const availW = w - leftPad - rightPad;

  if (needsWrap) {
    // Two rows
    const perRow = perRowMax;
    const sizeByW = (availW - (perRow - 1) * spacing) / perRow;
    const sizeByH = (h - spacing) / 2 * 0.9;
    let size = Math.min(sizeByW, sizeByH);
    size = Math.max(20, size);

    const rowH = size + spacing;
    const totalH = rowH * 2 - spacing;
    const startY = y + (h - totalH) / 2;

    for (let i = 0; i < count; i++) {
      const row = Math.floor(i / perRow);
      const col = i % perRow;
      const cx = startX + col * (size + spacing) + size / 2;
      const cy = startY + row * rowH + size / 2;
      svg.appendChild(svgEl("use", {
        href: `#${iconId}`,
        x: cx - size / 2, y: cy - size / 2,
        width: size, height: size
      }));
    }
  } else {
    // Single row - size based on actual count to fill the space
    const sizeByW = (availW - (count - 1) * spacing) / count;
    const sizeByH = h * 0.85;
    let size = Math.min(sizeByW, sizeByH);
    size = Math.max(20, size);

    for (let i = 0; i < count; i++) {
      const cx = startX + i * (size + spacing) + size / 2;
      const cy = y + h / 2;
      svg.appendChild(svgEl("use", {
        href: `#${iconId}`,
        x: cx - size / 2, y: cy - size / 2,
        width: size, height: size
      }));
    }
  }
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}
