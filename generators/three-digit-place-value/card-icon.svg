<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f7f8fc"/>
  <!-- Hundreds block (orange) -->
  <rect x="20" y="30" width="45" height="45" rx="3" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1.5"/>
  <text x="42" y="58" text-anchor="middle" font-size="10" fill="#f97316" font-family="Fredoka, sans-serif">100</text>
  <!-- Tens rods (green) -->
  <rect x="78" y="30" width="12" height="45" rx="2" fill="#22c55e" opacity="0.25" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="95" y="30" width="12" height="45" rx="2" fill="#22c55e" opacity="0.25" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="112" y="30" width="12" height="45" rx="2" fill="#22c55e" opacity="0.25" stroke="#22c55e" stroke-width="1.5"/>
  <!-- Ones cubes (blue) -->
  <rect x="140" y="60" width="12" height="12" rx="1" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="1"/>
  <rect x="156" y="60" width="12" height="12" rx="1" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="1"/>
  <!-- Answer line -->
  <text x="70" y="110" text-anchor="middle" font-size="16" font-weight="500" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">=</text>
  <line x1="85" y1="112" x2="135" y2="112" stroke="#2d3748" stroke-width="1.5"/>
</svg>
