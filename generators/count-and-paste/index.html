  <script>
    // ===== Helpers =====
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function shuffleArray(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elCountRange = document.getElementById("countRange");
    const elNumSheets = document.getElementById("numWorksheets");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elAnswerKey = document.getElementById("answerKey");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    // Icons defined in ../shared/icons.js (ICON_LIST)

    // ===== State =====
    let currentState = { sheets: [], randomSeed: Date.now() };

    function getCountRange() {
      const parts = elCountRange.value.split("-");
      return { min: parseInt(parts[0], 10), max: parseInt(parts[1], 10) };
    }

    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return "Count & Paste";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Count the objects. Cut and paste the number.";
    }

    function gatherOptions() {
      return {
        headerMode: getHeaderMode(),
        title: getTitle(),
        subtitle: getSubtitle(),
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        range: getCountRange()
      };
    }

    // ===== Event Listeners =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });
    elShowHeaderEnabled.addEventListener("change", () => { elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none"; renderWithoutRandomization(); });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => { elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none"; renderWithoutRandomization(); });
    elShowTitle.addEventListener("change", () => { elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none"; renderWithoutRandomization(); });
    elShowSubtitle.addEventListener("change", () => { elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none"; renderWithoutRandomization(); });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elCountRange.addEventListener("change", () => renderWithNewRandomization());
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());

    // ===== SVG Icon Definitions =====

    // ===== Place Objects =====
function placeObjects(svg, { iconId, count, x, y, w, h, answerBox = null, problemIndex = 0, problemCount = 8, perRowMax = 5 }) {
  const problemGroup = svgEl("g", { "data-problem": problemIndex });
  const pad = 10;

  // Available area for icons (inside cell padding)
  let aX = x + pad;
  let aY = y + pad;
  let aW = w - pad * 2;
  let aH = h - pad * 2;

  // Reduce available height to avoid answer box
  if (answerBox) {
    const abTop = answerBox.y - 6; // 6px buffer above answer box
    const maxH = abTop - aY;
    if (maxH < aH) aH = maxH;
  }

  // Fixed row layout based on count range:
  // Items <= perRowMax: single row; items > perRowMax: wrap to 2 rows
  let bestCols, bestRows;
  if (count <= perRowMax) {
    bestCols = count;
    bestRows = 1;
  } else {
    bestCols = perRowMax;
    bestRows = Math.ceil(count / perRowMax);
  }
  const spacingRatio = 0.15;
  const sizeByW = aW / (bestCols + (bestCols - 1) * spacingRatio);
  const sizeByH = aH / (bestRows + (bestRows - 1) * spacingRatio);
  const bestSize = Math.min(sizeByW, sizeByH);

  let iconSize = Math.max(18, bestSize);
  const spacing = iconSize * spacingRatio;
  const gridW = bestCols * iconSize + (bestCols - 1) * spacing;
  const gridH = bestRows * iconSize + (bestRows - 1) * spacing;
  const startX = aX + (aW - gridW) / 2;
  const startY = aY + (aH - gridH) / 2;

  let idx = 0;
  for (let r = 0; r < bestRows && idx < count; r++) {
    for (let c = 0; c < bestCols && idx < count; c++) {
      const ix = startX + c * (iconSize + spacing);
      const iy = startY + r * (iconSize + spacing);
      problemGroup.appendChild(svgEl("use", {
        href: `#${iconId}`,
        x: ix, y: iy,
        width: iconSize, height: iconSize
      }));
      idx++;
    }
  }

  svg.appendChild(problemGroup);
}

function placeObjectsRow(svg, { iconId, count, x, y, w, h }) {
  // Calculate size with guaranteed spacing
  const availableWidth = w - (count + 1) * 8; // 8px spacing minimum
  const maxItemWidth = availableWidth / count;
  
  let size = Math.min(h * 0.85, maxItemWidth);
  size = Math.max(20, Math.min(50, size));
}

    // ===== Problem Generation =====
    function generateProblems(range) {
      const nums = [];
      for (let i = range.min; i <= range.max; i++) nums.push(i);
      shuffleArray(nums);
      const iconPool = [...Array(ICON_LIST.length).keys()];
      shuffleArray(iconPool);
      return nums.map((count, i) => ({ count: count, iconIndex: iconPool[i % iconPool.length] }));
    }

    // ===== Render =====
    function renderWithNewRandomization() {
      const range = getCountRange();
      const numSheets = parseInt(elNumSheets.value, 10);
      currentState.sheets = [];
      for (let i = 0; i < numSheets; i++) currentState.sheets.push(generateProblems(range));
      currentState.randomSeed = Date.now();
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      if (!currentState.sheets.length) { renderWithNewRandomization(); return; }
      renderWorksheet();
    }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      if (numSheets > 1) {
        sheetWrap.className = "grid-view";
        const cols = numSheets <= 2 ? 2 : numSheets <= 4 ? 2 : 3;
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", auto)";
      } else {
        sheetWrap.className = "";
        sheetWrap.style.gridTemplateColumns = "";
      }
      sheetWrap.innerHTML = "";
      const wsCodes = currentState.sheets.map(function(_, i) { return "(" + (i + 1) + ")"; });
      for (let i = 0; i < currentState.sheets.length; i++) {
        const div = document.createElement("div");
        div.className = "worksheet-page" + (numSheets > 1 ? " scaled" : "");
        const svg = renderWorksheetSVG(currentState.sheets[i], opts, wsCodes[i]);
        if (numSheets > 1) {
          const scale = numSheets <= 2 ? 0.48 : numSheets <= 4 ? 0.38 : 0.3;
          svg.style.width = (612 * scale) + "px";
          svg.style.height = (792 * scale) + "px";
        }
        div.appendChild(svg);
        sheetWrap.appendChild(div);
      }
    }

    function renderWorksheetSVG(problems, opts, wsCode, overrides) {
      const showAnswers = (overrides && overrides.showAnswers) || false;
      const isAnswerKey = (overrides && overrides.isAnswerKey) || false;
      const headerMode = (overrides && overrides.headerMode) || opts.headerMode;
      const title = opts.title;
      const subtitle = opts.subtitle;
      const branded = opts.branded;
      const range = opts.range;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(buildIconDefs());
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));
      const midX = pageW / 2;
      let curY = 10;

      if (isAnswerKey) {
        const akLabel = svgEl("text", { x: pageW - margin, y: curY + 16, "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700, fill: "#000", "text-anchor": "end", "letter-spacing": "2" });
        akLabel.textContent = "ANSWER KEY";
        svg.appendChild(akLabel);
        curY += 28;
      } else if (headerMode === "both") {
        svg.appendChild(svgEl("text", { x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
        svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
        svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Date")]));
        svg.appendChild(svgEl("line", { x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
        curY += 28;
      } else if (headerMode === "name") {
        svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
        svg.appendChild(svgEl("line", { x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
        curY += 28;
      }

      if (title) {
        svg.appendChild(svgEl("text", { x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af" }, [document.createTextNode(title)]));
        curY += 46;
      }
      if (subtitle) {
        svg.appendChild(svgEl("text", { x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": 400, fill: "#64748b" }, [document.createTextNode(subtitle)]));
        curY += 24;
      }
      curY += 8;
      const topGridY = curY;

      const brandingH = branded ? 48 : 10;
      const cutoutStripH = 80;
      const bottomY = pageH - brandingH;
      const cutoutTopY = bottomY - cutoutStripH;
      const gridBottomY = cutoutTopY - 8;
      const availH = gridBottomY - topGridY;
      const numRows = problems.length;
      const rowH = availH / numRows;
      const answerColW = 70;
      const gridX = margin;
      const gridW = pageW - margin * 2;
      const objectsX = gridX + answerColW;
      const objectsW = gridW - answerColW;

      // Outer border
      svg.appendChild(svgEl("rect", { x: gridX, y: topGridY, width: gridW, height: availH, fill: "none", stroke: "#2d3748", "stroke-width": 2 }));
      // Vertical separator
      svg.appendChild(svgEl("line", { x1: gridX + answerColW, y1: topGridY, x2: gridX + answerColW, y2: topGridY + availH, stroke: "#2d3748", "stroke-width": 2 }));
      // Horizontal lines
      for (let r = 1; r < numRows; r++) {
        const ly = topGridY + r * rowH;
        svg.appendChild(svgEl("line", { x1: gridX, y1: ly, x2: gridX + gridW, y2: ly, stroke: "#2d3748", "stroke-width": 2 }));
      }

      const perRowMax = 5;
      for (let i = 0; i < problems.length; i++) {
        const prob = problems[i];
        const ry = topGridY + i * rowH;
        if (showAnswers) {
          const numText = svgEl("text", { x: gridX + answerColW / 2, y: ry + rowH / 2 + 10, "font-family": "'Google Sans Flex', sans-serif", "font-size": 28, "font-weight": 700, fill: "#3182ce", "text-anchor": "middle" });
          numText.textContent = prob.count;
          svg.appendChild(numText);
        }
        placeObjects(svg, { iconId: ICON_LIST[prob.iconIndex], count: prob.count, x: objectsX, y: ry, w: objectsW, h: rowH, perRowMax: perRowMax });
      }

      // Cut-out strip
      const stripY = cutoutTopY;
      const allNums = [];
      for (let n = range.min; n <= range.max; n++) allNums.push(n);
      const numCount = allNums.length;
      const is1to5 = numCount <= 5;
      const boxW = is1to5 ? 50 : 40;
      const boxH = is1to5 ? 40 : 35;
      const fontSize = is1to5 ? 28 : 22;

      // Scissors + label
      svg.appendChild(svgEl("text", { x: margin, y: stripY + 14, "font-family": "sans-serif", "font-size": 14, fill: "#64748b" }, [document.createTextNode("\u2702")]));
      svg.appendChild(svgEl("text", { x: margin + 16, y: stripY + 14, "font-family": "Fredoka, sans-serif", "font-size": 12, fill: "#64748b" }, [document.createTextNode("Cut and paste the numbers.")]));

      // Dashed boxes
      const boxAreaW = gridW;
      const totalBoxesW = numCount * boxW;
      const boxSpacing = (boxAreaW - totalBoxesW) / (numCount + 1);
      const boxY = stripY + 24;
      for (let i = 0; i < numCount; i++) {
        const bx = gridX + boxSpacing + i * (boxW + boxSpacing);
        svg.appendChild(svgEl("rect", { x: bx, y: boxY, width: boxW, height: boxH, fill: "none", stroke: "#94a3b8", "stroke-width": 1.5, "stroke-dasharray": "6,4", rx: 4 }));
        const nt = svgEl("text", { x: bx + boxW / 2, y: boxY + boxH / 2 + fontSize * 0.35, "font-family": "'Google Sans Flex', sans-serif", "font-size": fontSize, "font-weight": 700, fill: "#2d3748", "text-anchor": "middle" });
        nt.textContent = allNums[i];
        svg.appendChild(nt);
      }

      // Branding
      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", { href: "../../images/logo-watermark.svg", x: margin, y: brandY, width: logoW, height: logoH }));
        const bLine1 = svgEl("text", { x: pageW - margin, y: brandY + 14, "font-family": "Fredoka, sans-serif", "font-size": 11, fill: "#4a5568", "text-anchor": "end" });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", { x: pageW - margin, y: brandY + 26, "font-family": "Fredoka, sans-serif", "font-size": 9.5, fill: "#718096", "text-anchor": "end" });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
      }

      if (wsCode) {
        svg.appendChild(svgEl("text", { x: pageW / 2, y: pageH - 4, "font-family": "Fredoka, sans-serif", "font-size": 8, fill: "#94a3b8", "text-anchor": "middle" })).textContent = wsCode;
      }
      return svg;
    }

    // ===== Print =====
    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }


    // Load and register TTF fonts with jsPDF for embedded vector text in PDFs
    let _fontCache = {};
    // Preload font files on page load so PDF generation is faster
    (function preloadFonts() {
      ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
        fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
          var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
        }).catch(function() {});
      });
    })();
    async function registerPdfFonts(pdf) {
      // svg2pdf strips quotes and fallbacks, so register with clean names only
      // Also register "normal" for undefined-style calls
      const fontDefs = [
        { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
        { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
        { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
      ];
      let idx = 0;
      for (const f of fontDefs) {
        try {
          let b64;
          if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
          else {
            const resp = await fetch(f.file);
            const buf = await resp.arrayBuffer();
            const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
            _fontCache[f.file] = b64;
          }
          for (const style of f.styles) {
            const vfsName = "f" + (idx++) + ".ttf";
            pdf.addFileToVFS(vfsName, b64);
            pdf.addFont(vfsName, f.name, style);
          }
        } catch(e) { console.warn("Font load failed:", f.file, e); }
      }
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map(function(_, i) { return "(" + (i + 1) + ")"; });
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], opts, wsCodes[i], { showAnswers: true, isAnswerKey: true, headerMode: "none" }));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      // Register embedded fonts
      await registerPdfFonts(pdf);

      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);

    let resizeTimeout;
    window.addEventListener("resize", function() { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(function() { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Initial render
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, opts, "(" + (idx + 1) + ")", { showAnswers: true, isAnswerKey: true, headerMode: "none" });
          return sv.outerHTML;
        } catch(e) { return ""; }
      }).filter(Boolean);
    };
  </script>
