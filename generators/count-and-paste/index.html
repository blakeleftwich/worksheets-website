</style>

  <script>
const sheetWrap = document.getElementById("sheetWrap");
const statusEl = document.getElementById("status");

const elNumSheets = document.getElementById("numSheets");
const elCountRange = document.getElementById("countRange");
const elShowHeader = document.getElementById("showHeader");
const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
const elHeaderModeOptions = document.getElementById("headerModeOptions");
const elBranded = document.getElementById("branded");
const elAnswerKey = document.getElementById("answerKey");
const elHeaderText = document.getElementById("headerText");
const elSubtitleText = document.getElementById("subtitleText");
const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
const elCustomTitleOptions = document.getElementById("customTitleOptions");
const elShowTitle = document.getElementById("showTitle");
const elShowSubtitle = document.getElementById("showSubtitle");
const elTitleInputWrap = document.getElementById("titleInputWrap");
const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
const advToggle = document.getElementById("advToggle");
const advPanel = document.getElementById("advPanel");
const advArrow = document.getElementById("advArrow");

// Track current worksheet state
let currentState = {
  sheets: [],
  randomSeed: Date.now()
};

function getCountRange() {
  const parts = elCountRange.value.split("-");
  return { min: parseInt(parts[0], 10), max: parseInt(parts[1], 10) };
}

function getHeaderMode() {
  return elShowHeaderEnabled.checked ? elShowHeader.value : "both";
}

function buildDefaultTitle() {
  return "Count & Paste";
}

function getTitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowTitle.checked ? elHeaderText.value : "";
  }
  return buildDefaultTitle();
}

function getSubtitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowSubtitle.checked ? elSubtitleText.value : "";
  }
  return "Count the objects. Cut and paste the number.";
}

function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.className = 'success';
  setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
}

// ===== Advanced panel toggle =====
advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

// ===== Name/Date toggle =====
elShowHeaderEnabled.addEventListener("change", () => {
  elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});

// ===== Custom title toggle =====
elCustomTitleEnabled.addEventListener("change", () => {
  elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowTitle.addEventListener("change", () => {
  elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowSubtitle.addEventListener("change", () => {
  elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
  renderWithoutRandomization();
});

// Event listeners
elNumSheets.addEventListener("change", () => renderWithNewRandomization());
elCountRange.addEventListener("change", () => renderWithNewRandomization());
elShowHeader.addEventListener("change", () => renderWithoutRandomization());
elBranded.addEventListener("change", () => renderWithoutRandomization());
elHeaderText.addEventListener("input", () => renderWithoutRandomization());
elSubtitleText.addEventListener("input", () => renderWithoutRandomization());

document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());

// Answer key checkbox - no preview update needed, only affects PDF
elAnswerKey.addEventListener("change", () => {});

// Hamburger menu
document.querySelector(".hamburger-btn").addEventListener("click", function() {
  this.classList.toggle("open");
  document.querySelector(".nav-links").classList.toggle("open");
});

// ===== Fisher-Yates shuffle =====
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// ===== Problem generation =====
// Each number 1..N appears exactly once, shuffled order, unique icon per row
function generateProblems(max) {
  const counts = [];
  for (let i = 1; i <= max; i++) counts.push(i);
  shuffleArray(counts);

  // Pick unique icons
  const iconIndices = Array.from({ length: ICON_LIST.length }, (_, i) => i);
  shuffleArray(iconIndices);

  const problems = [];
  for (let i = 0; i < counts.length; i++) {
    problems.push({
      count: counts[i],
      iconIndex: iconIndices[i % iconIndices.length]
    });
  }
  return problems;
}

// ===== Render state management =====
function renderWithNewRandomization() {
  const numSheets = parseInt(elNumSheets.value, 10);
  const range = getCountRange();

  currentState.sheets = [];
  currentState.randomSeed = Date.now();

  for (let s = 0; s < numSheets; s++) {
    currentState.sheets.push(generateProblems(range.max));
  }

  renderWorksheet();
}

function renderWithoutRandomization() {
  if (currentState.sheets.length === 0) {
    renderWithNewRandomization();
  } else {
    renderWorksheet();
  }
}

// ===== Main render =====
function renderWorksheet() {
  const headerMode = getHeaderMode();
  const branded = elBranded.checked;
  const title = getTitle();
  const subtitle = getSubtitle();
  const numSheets = currentState.sheets.length;
  const range = getCountRange();

  sheetWrap.innerHTML = "";

  if (numSheets > 1) {
    sheetWrap.classList.add('grid-view');

    const sheetWidth = 612;
    const sheetHeight = 792;

    const edgePadding = numSheets >= 3 ? 40 : 0;
    const availableWidth = window.innerWidth - 340 - 80 - (edgePadding * 2);
    const availableHeight = window.innerHeight - 80;
    const gap = 24;
    const minReadableWidth = 180;

    let cols;
    if (numSheets <= 3) {
      cols = numSheets;
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    } else {
      cols = Math.min(3, numSheets);
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    }

    const maxSheetWidth = (availableWidth - (cols - 1) * gap) / cols;
    let maxSheetHeight;
    if (numSheets <= 3) {
      maxSheetHeight = availableHeight;
    } else {
      maxSheetHeight = availableHeight * 0.8;
    }

    const scaleByWidth = maxSheetWidth / sheetWidth;
    const scaleByHeight = maxSheetHeight / sheetHeight;
    const scale = Math.min(scaleByWidth, scaleByHeight);

    const scaledWidth = Math.floor(sheetWidth * scale);
    const scaledHeight = Math.floor(sheetHeight * scale);

    sheetWrap.style.gridTemplateColumns = `repeat(${cols}, ${scaledWidth + 24}px)`;
    sheetWrap.style.padding = numSheets >= 3 ? `0 ${edgePadding}px` : '0';

    for (let s = 0; s < numSheets; s++) {
      const wsCode = '(' + (s + 1) + ')';
      const problems = currentState.sheets[s];
      const svg = buildWorksheetSvg(problems, headerMode, branded, title, subtitle, false, wsCode);
      svg.setAttribute('width', scaledWidth);
      svg.setAttribute('height', scaledHeight);

      const page = document.createElement("div");
      page.className = "worksheet-page scaled";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  } else {
    sheetWrap.classList.remove('grid-view');
    sheetWrap.style.gridTemplateColumns = '';
    sheetWrap.style.padding = '0';

    if (currentState.sheets.length > 0) {
      const problems = currentState.sheets[0];
      const wsCode = '(1)';
      const svg = buildWorksheetSvg(problems, headerMode, branded, title, subtitle, false, wsCode);

      const page = document.createElement("div");
      page.className = "worksheet-page";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  }

  showStatus('\u2713 Worksheet updated!');
}

// ===== SVG worksheet builder =====
function buildWorksheetSvg(problems, headerMode, branded, title, subtitle, isAnswerKey, wsCode) {
  const pageW = 612;
  const pageH = 792;
  const margin = 36;
  const midX = pageW / 2;
  const numRows = problems.length;
  const icons = ICON_LIST;

  const svg = svgEl("svg", {
    width: pageW, height: pageH,
    viewBox: `0 0 ${pageW} ${pageH}`,
    xmlns: "http://www.w3.org/2000/svg"
  });

  svg.appendChild(buildIconDefs());
  svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

  // ---- Header ----
  let curY = 10;
  if (isAnswerKey) {
    const akLabel = svgEl("text", {
      x: pageW - margin, y: curY + 16,
      "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
      fill: "#000", "text-anchor": "end", "letter-spacing": "2"
    });
    akLabel.textContent = "ANSWER KEY";
    svg.appendChild(akLabel);
    curY += 28;
  } else if (headerMode === "both") {
    svg.appendChild(svgEl("text", {
      x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
    }, [document.createTextNode("Name")]));
    svg.appendChild(svgEl("line", {
      x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
      stroke: "#718096", "stroke-width": 0.75
    }));
    svg.appendChild(svgEl("text", {
      x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
    }, [document.createTextNode("Date")]));
    svg.appendChild(svgEl("line", {
      x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
      stroke: "#718096", "stroke-width": 0.75
    }));
    curY += 28;
  } else if (headerMode === "name") {
    svg.appendChild(svgEl("text", {
      x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
    }, [document.createTextNode("Name")]));
    svg.appendChild(svgEl("line", {
      x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
      stroke: "#718096", "stroke-width": 0.75
    }));
    curY += 28;
  }

  // ---- Title ----
  if (title) {
    svg.appendChild(svgEl("text", {
      x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
    }, [document.createTextNode(title)]));
    curY += 46;
  }

  // ---- Subtitle ----
  if (subtitle) {
    svg.appendChild(svgEl("text", {
      x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
    }, [document.createTextNode(subtitle)]));
    curY += 20;
  }

  const topGridY = curY + 6;

  // ---- Reserve space at bottom ----
  const cutoutStripH = 80;
  const bottomMargin = branded ? 56 : 24;
  const gridH = pageH - topGridY - cutoutStripH - bottomMargin;

  // ---- Table dimensions ----
  const tableX = margin;
  const tableW = pageW - margin * 2;
  const answerColW = 70;
  const iconColW = tableW - answerColW;
  const rowH = gridH / numRows;
  const borderColor = "#2d3748";
  const borderWidth = 1.5;

  // ---- Draw table grid ----
  // Outer border
  svg.appendChild(svgEl("rect", {
    x: tableX, y: topGridY, width: tableW, height: gridH,
    fill: "none", stroke: borderColor, "stroke-width": borderWidth * 1.3
  }));

  // Vertical divider between answer col and icon col
  svg.appendChild(svgEl("line", {
    x1: tableX + answerColW, y1: topGridY,
    x2: tableX + answerColW, y2: topGridY + gridH,
    stroke: borderColor, "stroke-width": borderWidth
  }));

  // Horizontal row dividers
  for (let r = 1; r < numRows; r++) {
    const ly = topGridY + r * rowH;
    svg.appendChild(svgEl("line", {
      x1: tableX, y1: ly, x2: tableX + tableW, y2: ly,
      stroke: borderColor, "stroke-width": borderWidth
    }));
  }

  // ---- Fill each row ----
  for (let i = 0; i < numRows; i++) {
    const problem = problems[i];
    const count = problem.count;
    const iconId = icons[problem.iconIndex];
    const rowY = topGridY + i * rowH;

    // Answer box content (answer key mode)
    if (isAnswerKey) {
      const numEl = svgEl("text", {
        x: tableX + answerColW / 2,
        y: rowY + rowH / 2 + 10,
        "font-family": "'Google Sans Flex', sans-serif", "font-size": 30, "font-weight": 700,
        fill: "#22c55e", "text-anchor": "middle"
      });
      numEl.textContent = String(count);
      svg.appendChild(numEl);
    }

    // Place icons in right column
    const iconAreaX = tableX + answerColW + 8;
    const iconAreaY = rowY + 4;
    const iconAreaW = iconColW - 16;
    const iconAreaH = rowH - 8;

    placeIconsInRow(svg, iconId, count, iconAreaX, iconAreaY, iconAreaW, iconAreaH);
  }

  // ---- Cut-out strip ----
  const stripTopY = topGridY + gridH + 12;

  // Scissors + instruction text
  const instrEl = svgEl("text", {
    x: margin, y: stripTopY + 10,
    "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
  });
  instrEl.textContent = "\u2702 Cut and paste the numbers.";
  svg.appendChild(instrEl);

  // Dashed boxes with numbers
  const stripY = stripTopY + 18;
  const stripH = cutoutStripH - 30;
  const boxCount = numRows; // same as max number
  const totalBoxAreaW = tableW;
  const boxW = Math.min(52, (totalBoxAreaW - (boxCount - 1) * 8) / boxCount);
  const boxGap = (totalBoxAreaW - boxW * boxCount) / (boxCount - 1);

  for (let n = 0; n < boxCount; n++) {
    const bx = margin + n * (boxW + boxGap);
    const by = stripY;

    // Dashed rectangle
    svg.appendChild(svgEl("rect", {
      x: bx, y: by, width: boxW, height: stripH,
      rx: 4, ry: 4,
      fill: "none", stroke: "#6b7280", "stroke-width": 1.2,
      "stroke-dasharray": "4,3"
    }));

    // Number inside (ascending order 1..N)
    const numVal = n + 1;
    const numEl = svgEl("text", {
      x: bx + boxW / 2,
      y: by + stripH / 2 + 9,
      "font-family": "'Google Sans Flex', sans-serif", "font-size": 26, "font-weight": 700,
      fill: "#1a202c", "text-anchor": "middle"
    });
    numEl.textContent = String(numVal);
    svg.appendChild(numEl);
  }

  // ---- Branding ----
  if (branded) {
    const brandY = pageH - 48;
    const logoH = 38;
    const logoW = Math.round(logoH * 2.79);
    svg.appendChild(svgEl("image", {
      href: "../../images/logo-watermark.svg",
      x: margin, y: brandY,
      width: logoW, height: logoH
    }));
    const bLine1 = svgEl("text", {
      x: pageW - margin, y: brandY + 14,
      "font-family": "Fredoka, sans-serif", "font-size": 11,
      fill: "#4a5568", "text-anchor": "end"
    });
    bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
    svg.appendChild(bLine1);
    const bLine2 = svgEl("text", {
      x: pageW - margin, y: brandY + 26,
      "font-family": "Fredoka, sans-serif", "font-size": 9.5,
      fill: "#718096", "text-anchor": "end"
    });
    bLine2.textContent = "\u00A9 2026 Eggroll Games";
    svg.appendChild(bLine2);
  }

  // Worksheet code
  if (wsCode) {
    svg.appendChild(svgEl("text", {
      x: pageW / 2, y: pageH - 4,
      "font-family": "Fredoka, sans-serif", "font-size": 8,
      fill: "#94a3b8", "text-anchor": "middle"
    }, [document.createTextNode(wsCode)]));
  }

  return svg;
}

// ===== Place icons in a row cell =====
function placeIconsInRow(svg, iconId, count, areaX, areaY, areaW, areaH) {
  if (count <= 0) return;

  const ar = ICON_ASPECT[iconId] || 1;
  const wFactor = Math.max(1, ar);
  const hFactor = Math.max(1, 1 / ar);
  const spacingRatio = 0.08;

  // Determine grid layout: single row if count <= 5, two rows if count > 5
  let bestCols, bestRows, bestSize = 0;

  if (count <= 5) {
    // Try single row
    bestCols = count;
    bestRows = 1;
  } else {
    // Two rows for 6-10
    bestCols = Math.ceil(count / 2);
    bestRows = 2;
  }

  const sizeByW = areaW / (bestCols * wFactor + (bestCols - 1) * spacingRatio);
  const sizeByH = areaH / (bestRows * hFactor + (bestRows - 1) * spacingRatio);
  bestSize = Math.min(sizeByW, sizeByH);

  // Also try optimizing for larger icons
  const minPerRow = count === 1 ? 1 : 2;
  for (let tryMax = minPerRow; tryMax <= count; tryMax++) {
    const cols = Math.min(tryMax, count);
    const rows = Math.ceil(count / cols);
    const sByW = areaW / (cols * wFactor + (cols - 1) * spacingRatio);
    const sByH = areaH / (rows * hFactor + (rows - 1) * spacingRatio);
    const candidate = Math.min(sByW, sByH);
    if (candidate > bestSize) {
      bestSize = candidate;
      bestCols = cols;
      bestRows = rows;
    }
  }

  const iconSize = Math.max(12, bestSize);
  const iconW = iconSize * wFactor;
  const iconH = iconSize * hFactor;
  const spacing = iconSize * spacingRatio;

  const gridW = bestCols * iconW + (bestCols - 1) * spacing;
  const gridH = bestRows * iconH + (bestRows - 1) * spacing;

  // Left-align horizontally with a small indent, center vertically
  const startX = areaX + 6;
  const startY = areaY + (areaH - gridH) / 2;

  let idx = 0;
  for (let r = 0; r < bestRows && idx < count; r++) {
    // How many icons in this row (last row may have fewer)
    const colsThisRow = Math.min(bestCols, count - idx);
    for (let c = 0; c < colsThisRow; c++) {
      const ix = startX + c * (iconW + spacing);
      const iy = startY + r * (iconH + spacing);
      svg.appendChild(svgEl("use", {
        href: `#${iconId}`,
        x: ix, y: iy,
        width: iconW, height: iconH
      }));
      idx++;
    }
  }
}

// ===== PDF pipeline =====
let _fontCSSCache = null;
async function buildFontCSS() {
  if (_fontCSSCache) return _fontCSSCache;
  let fontCSS = "";
  for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
    if (!link.href.includes('fonts')) continue;
    try {
      const resp = await fetch(link.href);
      const css = await resp.text();
      let inlined = css;
      for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
        const fontUrl = m[1].replace(/['"]/g, "");
        const absUrl = new URL(fontUrl, link.href).href;
        try {
          const fr = await fetch(absUrl);
          const blob = await fr.blob();
          const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
          inlined = inlined.replace(m[0], 'url(' + b64 + ')');
        } catch(e) {}
      }
      fontCSS += inlined;
    } catch(e) {}
  }
  for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
    try {
      const resp = await fetch(link.href);
      const css = await resp.text();
      let inlined = css;
      for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
        const fontUrl = m[1].replace(/['"]/g, "");
        try {
          const fr = await fetch(fontUrl);
          const blob = await fr.blob();
          const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
          inlined = inlined.replace(m[0], 'url(' + b64 + ')');
        } catch(e) {}
      }
      fontCSS += inlined;
    } catch(e) {}
  }
  _fontCSSCache = fontCSS;
  return fontCSS;
}

let _fontCache = {};
(function preloadFonts() {
  ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
    fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
      var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
    }).catch(function() {});
  });
})();

async function registerPdfFonts(pdf) {
  const fontDefs = [
    { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
    { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
    { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
    { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
    { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
  ];
  let idx = 0;
  for (const f of fontDefs) {
    try {
      let b64;
      if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
      else {
        const resp = await fetch(f.file);
        const buf = await resp.arrayBuffer();
        const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
        _fontCache[f.file] = b64;
      }
      for (const style of f.styles) {
        const vfsName = "f" + (idx++) + ".ttf";
        pdf.addFileToVFS(vfsName, b64);
        pdf.addFont(vfsName, f.name, style);
      }
    } catch(e) { console.warn("Font load failed:", f.file, e); }
  }
}

async function generatePdfBlob() {
  const svgPages = [];
  sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));

  const branded = elBranded.checked;
  const title = getTitle();
  const subtitle = getSubtitle();
  const headerMode = getHeaderMode();

  const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
  if (elAnswerKey.checked) {
    for (let i = 0; i < currentState.sheets.length; i++) {
      svgPages.push(buildWorksheetSvg(currentState.sheets[i], headerMode, branded, title, subtitle, true, wsCodes[i]));
    }
  }

  const fontCSS = await buildFontCSS();
  let logoB64 = "";
  try {
    const logoResp = await fetch("../../images/logo-watermark.svg");
    const logoBlob = await logoResp.blob();
    logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
  } catch(e) {}

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
  await registerPdfFonts(pdf);

  for (let i = 0; i < svgPages.length; i++) {
    if (i > 0) pdf.addPage("letter", "portrait");
    const svgNode = svgPages[i];
    const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
    styleEl.textContent = fontCSS;
    svgNode.insertBefore(styleEl, svgNode.firstChild);
    if (logoB64) {
      svgNode.querySelectorAll("image").forEach(img => {
        const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
        if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
      });
    }
    svgNode.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
    document.body.appendChild(svgNode);
    try { await pdf.svg(svgNode, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgNode); }
  }
  return pdf.output("blob");
}

async function handlePrint() {
  if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
  const btn = document.getElementById("btnPrint");
  const origText = btn.innerHTML;
  btn.innerHTML = "&#9203; Preparing...";
  btn.disabled = true;
  try {
    const blob = await generatePdfBlob();
    const url = URL.createObjectURL(blob);
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
    iframe.src = url;
    document.body.appendChild(iframe);
    iframe.onload = function() {
      setTimeout(() => {
        iframe.contentWindow.print();
        setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
      }, 300);
    };
  } catch(e) { console.error("Print error:", e); }
  btn.innerHTML = origText;
  btn.disabled = false;
}

document.getElementById("btnPrint").addEventListener("click", handlePrint);

async function handleDownloadPdf() {
  if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
  const btn = document.getElementById("btnDownloadPdf");
  const origText = btn.innerHTML;
  btn.innerHTML = "&#9203; Generating PDF...";
  btn.disabled = true;
  try {
    const blob = await generatePdfBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "count-and-paste-worksheet.pdf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch(e) { console.error("Download error:", e); }
  btn.innerHTML = origText;
  btn.disabled = false;
}
document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
