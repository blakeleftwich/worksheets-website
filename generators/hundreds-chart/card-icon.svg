<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="10" y="10" width="100" height="100" rx="8" fill="#f0f4f8" stroke="#e2e8f0" stroke-width="2"/>
  <!-- 4x4 grid -->
  <rect x="20" y="24" width="80" height="72" rx="4" fill="white" stroke="#334155" stroke-width="1.5"/>
  <!-- Row lines -->
  <line x1="20" y1="42" x2="100" y2="42" stroke="#334155" stroke-width="1"/>
  <line x1="20" y1="60" x2="100" y2="60" stroke="#334155" stroke-width="1"/>
  <line x1="20" y1="78" x2="100" y2="78" stroke="#334155" stroke-width="1"/>
  <!-- Col lines -->
  <line x1="40" y1="24" x2="40" y2="96" stroke="#334155" stroke-width="1"/>
  <line x1="60" y1="24" x2="60" y2="96" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="24" x2="80" y2="96" stroke="#334155" stroke-width="1"/>
  <!-- Alternating row bg -->
  <rect x="20.5" y="42.5" width="79" height="17" fill="#f0f4f8" opacity="0.6"/>
  <rect x="20.5" y="78.5" width="79" height="17" fill="#f0f4f8" opacity="0.6"/>
  <!-- Numbers -->
  <text x="30" y="37" font-family="sans-serif" font-size="10" font-weight="600" fill="#1a202c" text-anchor="middle">1</text>
  <text x="50" y="37" font-family="sans-serif" font-size="10" font-weight="600" fill="#1a202c" text-anchor="middle">2</text>
  <text x="70" y="37" font-family="sans-serif" font-size="10" font-weight="600" fill="#1a202c" text-anchor="middle">3</text>
  <text x="90" y="37" font-family="sans-serif" font-size="10" font-weight="600" fill="#1a202c" text-anchor="middle">4</text>
  <text x="30" y="55" font-family="sans-serif" font-size="10" font-weight="600" fill="#1a202c" text-anchor="middle">5</text>
  <!-- Blank cell indicators -->
  <text x="70" y="55" font-family="sans-serif" font-size="10" font-weight="600" fill="#1a202c" text-anchor="middle">7</text>
  <text x="30" y="73" font-family="sans-serif" font-size="10" font-weight="600" fill="#1a202c" text-anchor="middle">9</text>
  <text x="50" y="73" font-family="sans-serif" font-size="10" font-weight="600" fill="#cbd5e0" text-anchor="middle">?</text>
  <text x="90" y="73" font-family="sans-serif" font-size="10" font-weight="600" fill="#1a202c" text-anchor="middle">12</text>
  <text x="30" y="91" font-family="sans-serif" font-size="9" font-weight="600" fill="#1a202c" text-anchor="middle">13</text>
  <text x="50" y="91" font-family="sans-serif" font-size="9" font-weight="600" fill="#1a202c" text-anchor="middle">14</text>
  <text x="70" y="91" font-family="sans-serif" font-size="10" font-weight="600" fill="#cbd5e0" text-anchor="middle">?</text>
  <text x="90" y="91" font-family="sans-serif" font-size="9" font-weight="600" fill="#1a202c" text-anchor="middle">16</text>
  <!-- Title hint -->
  <text x="60" y="19" font-family="sans-serif" font-size="7" font-weight="700" fill="#64748b" text-anchor="middle">100</text>
</svg>
