  <script>
// ===== SVG helper =====
function svgEl(tag, attrs, children) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  if (children) children.forEach(c => el.appendChild(c));
  return el;
}

// ===== Element refs =====
const sheetWrap = document.getElementById("sheetWrap");
const statusEl = document.getElementById("status");

const elMode = document.getElementById("mode");
const elBlankPercent = document.getElementById("blankPercent");
const elBlankPercentGroup = document.getElementById("blankPercentGroup");
const elNumSheets = document.getElementById("numSheets");
const elShowHeader = document.getElementById("showHeader");
const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
const elHeaderModeOptions = document.getElementById("headerModeOptions");
const elBranded = document.getElementById("branded");
const elAnswerKey = document.getElementById("answerKey");
const elHeaderText = document.getElementById("headerText");
const elSubtitleText = document.getElementById("subtitleText");
const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
const elCustomTitleOptions = document.getElementById("customTitleOptions");
const elShowTitle = document.getElementById("showTitle");
const elShowSubtitle = document.getElementById("showSubtitle");
const elTitleInputWrap = document.getElementById("titleInputWrap");
const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
const advToggle = document.getElementById("advToggle");
const advPanel = document.getElementById("advPanel");
const advArrow = document.getElementById("advArrow");

// ===== State =====
let currentState = {
  sheets: [], // Each sheet: array of 100 booleans (true = blank)
  randomSeed: Date.now()
};

// ===== Mode config =====
const MODE_CONFIG = {
  'complete':    { title: 'Hundreds Chart',              subtitle: '' },
  'fill-blank':  { title: 'Fill in the Missing Numbers', subtitle: 'Write the missing numbers on the chart.' },
  'count-2s':    { title: 'Count by 2s',                 subtitle: 'Fill in the numbers when you count by 2s.' },
  'count-5s':    { title: 'Count by 5s',                 subtitle: 'Fill in the numbers when you count by 5s.' },
  'count-10s':   { title: 'Count by 10s',                subtitle: 'Fill in the numbers when you count by 10s.' },
  'even':        { title: 'Even Numbers',                subtitle: 'Fill in the even numbers on the chart.' },
  'odd':         { title: 'Odd Numbers',                 subtitle: 'Fill in the odd numbers on the chart.' }
};

function buildDefaultTitle() {
  return MODE_CONFIG[elMode.value].title;
}

function buildDefaultSubtitle() {
  return MODE_CONFIG[elMode.value].subtitle;
}

function updateTitleFromSettings() {
  elHeaderText.value = buildDefaultTitle();
  elSubtitleText.value = buildDefaultSubtitle();
}

function getHeaderMode() {
  return elShowHeaderEnabled.checked ? elShowHeader.value : "both";
}

function getTitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowTitle.checked ? elHeaderText.value : "";
  }
  return buildDefaultTitle();
}

function getSubtitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowSubtitle.checked ? elSubtitleText.value : "";
  }
  return buildDefaultSubtitle();
}

function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.className = 'success';
  setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
}

// ===== Advanced panel toggle =====
advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

// ===== Mode toggle =====
elMode.addEventListener("change", () => {
  elBlankPercentGroup.style.display = elMode.value === "fill-blank" ? "" : "none";
  updateTitleFromSettings();
  renderWithNewRandomization();
});

elBlankPercent.addEventListener("change", () => renderWithNewRandomization());

// ===== Name/Date toggle =====
elShowHeaderEnabled.addEventListener("change", () => {
  elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});

// ===== Custom title toggle =====
elCustomTitleEnabled.addEventListener("change", () => {
  elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowTitle.addEventListener("change", () => {
  elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowSubtitle.addEventListener("change", () => {
  elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
  renderWithoutRandomization();
});

// Event listeners for real-time updates
elNumSheets.addEventListener("change", () => renderWithNewRandomization());
elShowHeader.addEventListener("change", () => renderWithoutRandomization());
elBranded.addEventListener("change", () => renderWithoutRandomization());
elAnswerKey.addEventListener("change", () => renderWithoutRandomization());
elHeaderText.addEventListener("input", () => renderWithoutRandomization());
elSubtitleText.addEventListener("input", () => renderWithoutRandomization());

document.getElementById("btnGenerate").addEventListener("click", () => {
  renderWithNewRandomization();
});

// ===== Blank generation =====
function generateBlanks(mode, blankPercent) {
  // Returns array of 100 booleans, true = blank (index 0 = number 1, index 99 = number 100)
  const blanks = new Array(100).fill(false);

  if (mode === 'complete') {
    return blanks; // No blanks
  }

  if (mode === 'fill-blank') {
    const pct = parseInt(blankPercent, 10) / 100;
    const numBlanks = Math.round(100 * pct);
    const indices = Array.from({length: 100}, (_, i) => i);
    shuffleArray(indices);
    for (let i = 0; i < numBlanks; i++) {
      blanks[indices[i]] = true;
    }
    return blanks;
  }

  if (mode === 'count-2s') {
    for (let n = 2; n <= 100; n += 2) blanks[n - 1] = true;
    return blanks;
  }

  if (mode === 'count-5s') {
    for (let n = 5; n <= 100; n += 5) blanks[n - 1] = true;
    return blanks;
  }

  if (mode === 'count-10s') {
    for (let n = 10; n <= 100; n += 10) blanks[n - 1] = true;
    return blanks;
  }

  if (mode === 'even') {
    for (let n = 2; n <= 100; n += 2) blanks[n - 1] = true;
    return blanks;
  }

  if (mode === 'odd') {
    for (let n = 1; n <= 100; n += 2) blanks[n - 1] = true;
    return blanks;
  }

  return blanks;
}

// Fisher-Yates shuffle
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// ===== SVG generation =====
function generateChartSvg(blanks, headerMode, branded, title, subtitle, isAnswerKey) {
  const pageW = 612;
  const pageH = 792;
  const margin = 36;
  const midX = pageW / 2;

  const svg = svgEl("svg", {
    width: pageW,
    height: pageH,
    viewBox: `0 0 ${pageW} ${pageH}`,
    xmlns: "http://www.w3.org/2000/svg"
  });

  // White background
  svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

  let curY = 10;

  // Answer key label
  if (isAnswerKey) {
    const akLabel = svgEl("text", {
      x: pageW - margin, y: curY + 16,
      "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
      fill: "#000", "text-anchor": "end", "letter-spacing": "2"
    });
    akLabel.textContent = "ANSWER KEY";
    svg.appendChild(akLabel);
    curY += 28;
  } else if (headerMode === "both") {
    svg.appendChild(svgEl("text", {
      x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
    }, [document.createTextNode("Name")]));
    svg.appendChild(svgEl("line", {
      x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
      stroke: "#718096", "stroke-width": 0.75
    }));
    svg.appendChild(svgEl("text", {
      x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
    }, [document.createTextNode("Date")]));
    svg.appendChild(svgEl("line", {
      x1: midX + 50, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
      stroke: "#718096", "stroke-width": 0.75
    }));
    curY += 28;
  } else if (headerMode === "name") {
    svg.appendChild(svgEl("text", {
      x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
    }, [document.createTextNode("Name")]));
    svg.appendChild(svgEl("line", {
      x1: margin + 38, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
      stroke: "#718096", "stroke-width": 0.75
    }));
    curY += 28;
  }
  // headerMode === "none": skip header entirely

  // Title
  if (title) {
    curY += 6;
    const maxTitleW = pageW - margin * 2;
    let titleSize = 26;
    // Measure and shrink if needed
    const measurer = document.createElement("canvas").getContext("2d");
    while (titleSize > 12) {
      measurer.font = `700 ${titleSize}px Fredoka, sans-serif`;
      if (measurer.measureText(title).width <= maxTitleW) break;
      titleSize -= 1;
    }
    svg.appendChild(svgEl("text", {
      x: midX, y: curY + titleSize,
      "font-family": "Fredoka, sans-serif", "font-size": titleSize, "font-weight": 700,
      fill: "#1a202c", "text-anchor": "middle"
    }, [document.createTextNode(title)]));
    curY += titleSize + 8;
  }

  // Subtitle
  if (subtitle) {
    const maxSubW = pageW - margin * 2;
    let subSize = 13;
    const measurer = document.createElement("canvas").getContext("2d");
    while (subSize > 9) {
      measurer.font = `400 ${subSize}px Fredoka, sans-serif`;
      if (measurer.measureText(subtitle).width <= maxSubW) break;
      subSize -= 1;
    }
    svg.appendChild(svgEl("text", {
      x: midX, y: curY + subSize,
      "font-family": "Fredoka, sans-serif", "font-size": subSize, "font-weight": 400,
      fill: "#718096", "text-anchor": "middle"
    }, [document.createTextNode(subtitle)]));
    curY += subSize + 10;
  }

  curY += 12;

  // Grid dimensions
  const gridW = pageW - margin * 2;
  const availH = pageH - curY - margin - (branded ? 24 : 8);
  const cellSize = Math.min(gridW / 10, availH / 10);
  const totalGridW = cellSize * 10;
  const totalGridH = cellSize * 10;
  const gridX = (pageW - totalGridW) / 2;
  const gridY = curY;

  // Draw grid background and cells
  for (let row = 0; row < 10; row++) {
    // Alternating row background
    if (row % 2 === 1) {
      svg.appendChild(svgEl("rect", {
        x: gridX, y: gridY + row * cellSize,
        width: totalGridW, height: cellSize,
        fill: "#f0f4f8"
      }));
    }

    for (let col = 0; col < 10; col++) {
      const idx = row * 10 + col;
      const num = idx + 1;
      const cx = gridX + col * cellSize;
      const cy = gridY + row * cellSize;

      // Cell border
      svg.appendChild(svgEl("rect", {
        x: cx, y: cy, width: cellSize, height: cellSize,
        fill: "none", stroke: "#000", "stroke-width": 1
      }));

      // Number text
      if (!blanks[idx]) {
        // Always show this number
        const fontSize = Math.min(cellSize * 0.45, 22);
        svg.appendChild(svgEl("text", {
          x: cx + cellSize / 2, y: cy + cellSize / 2 + fontSize * 0.35,
          "font-family": "Fredoka, sans-serif", "font-size": fontSize, "font-weight": 600,
          fill: "#1a202c", "text-anchor": "middle"
        }, [document.createTextNode(String(num))]));
      } else if (isAnswerKey) {
        // Show answer in blue
        const fontSize = Math.min(cellSize * 0.45, 22);
        svg.appendChild(svgEl("text", {
          x: cx + cellSize / 2, y: cy + cellSize / 2 + fontSize * 0.35,
          "font-family": "Fredoka, sans-serif", "font-size": fontSize, "font-weight": 600,
          fill: "#2563eb", "text-anchor": "middle"
        }, [document.createTextNode(String(num))]));
      }
    }
  }

  // Outer grid border (thicker)
  svg.appendChild(svgEl("rect", {
    x: gridX, y: gridY, width: totalGridW, height: totalGridH,
    fill: "none", stroke: "#000", "stroke-width": 2
  }));

  // Branding
  if (branded) {
    svg.appendChild(svgEl("image", {
      href: "../../images/logo-watermark.svg",
      x: pageW - margin - 80, y: pageH - 28,
      width: 80, height: 18, opacity: 0.5
    }));
  }

  return svg;
}

// ===== Render functions =====
function renderWithNewRandomization() {
  const numSheets = parseInt(elNumSheets.value, 10);
  const mode = elMode.value;
  const blankPercent = elBlankPercent.value;

  currentState.sheets = [];
  currentState.randomSeed = Date.now();

  for (let s = 0; s < numSheets; s++) {
    currentState.sheets.push(generateBlanks(mode, blankPercent));
  }

  renderWorksheet();
}

function renderWithoutRandomization() {
  if (currentState.sheets.length === 0) {
    renderWithNewRandomization();
  } else {
    renderWorksheet();
  }
}

function renderWorksheet() {
  const headerMode = getHeaderMode();
  const branded = elBranded.checked;
  const title = getTitle();
  const subtitle = getSubtitle();
  const numSheets = currentState.sheets.length;
  const includeAnswerKey = elAnswerKey.checked;

  sheetWrap.innerHTML = "";

  if (numSheets > 1) {
    sheetWrap.classList.add('grid-view');

    const sheetWidth = 612;
    const sheetHeight = 792;

    const edgePadding = numSheets >= 3 ? 40 : 0;
    const availableWidth = window.innerWidth - 340 - 80 - (edgePadding * 2);
    const availableHeight = window.innerHeight - 80;
    const gap = 24;
    const minReadableWidth = 180;

    let cols;
    if (numSheets <= 3) {
      cols = numSheets;
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    } else {
      cols = Math.min(3, numSheets);
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    }

    const maxSheetWidth = (availableWidth - (cols - 1) * gap) / cols;
    let maxSheetHeight;
    if (numSheets <= 3) {
      maxSheetHeight = availableHeight;
    } else {
      maxSheetHeight = availableHeight * 0.8;
    }

    const scaleByWidth = maxSheetWidth / sheetWidth;
    const scaleByHeight = maxSheetHeight / sheetHeight;
    const scale = Math.min(scaleByWidth, scaleByHeight);

    const scaledWidth = Math.floor(sheetWidth * scale);
    const scaledHeight = Math.floor(sheetHeight * scale);

    // Total items = worksheets + answer keys
    const totalItems = includeAnswerKey ? numSheets * 2 : numSheets;
    sheetWrap.style.gridTemplateColumns = `repeat(${cols}, ${scaledWidth + 24}px)`;
    sheetWrap.style.padding = numSheets >= 3 ? `0 ${edgePadding}px` : '0';

    for (let s = 0; s < numSheets; s++) {
      const blanks = currentState.sheets[s];
      const chartSvg = generateChartSvg(blanks, headerMode, branded, title, subtitle, false);
      chartSvg.setAttribute('width', scaledWidth);
      chartSvg.setAttribute('height', scaledHeight);

      const page = document.createElement("div");
      page.className = "worksheet-page scaled";
      page.appendChild(chartSvg);
      sheetWrap.appendChild(page);
    }

    // Answer keys in preview
    if (includeAnswerKey) {
      for (let s = 0; s < numSheets; s++) {
        const blanks = currentState.sheets[s];
        const akSvg = generateChartSvg(blanks, "none", branded, title, subtitle, true);
        akSvg.setAttribute('width', scaledWidth);
        akSvg.setAttribute('height', scaledHeight);

        const page = document.createElement("div");
        page.className = "worksheet-page scaled ak-print-only";
        page.appendChild(akSvg);
        sheetWrap.appendChild(page);
      }
    }
  } else {
    sheetWrap.classList.remove('grid-view');
    sheetWrap.style.gridTemplateColumns = '';
    sheetWrap.style.padding = '0';

    if (currentState.sheets.length > 0) {
      const blanks = currentState.sheets[0];
      const chartSvg = generateChartSvg(blanks, headerMode, branded, title, subtitle, false);

      const page = document.createElement("div");
      page.className = "worksheet-page";
      page.appendChild(chartSvg);
      sheetWrap.appendChild(page);

      // Answer key in preview
      if (includeAnswerKey) {
        const akSvg = generateChartSvg(blanks, "none", branded, title, subtitle, true);
        const akPage = document.createElement("div");
        akPage.className = "worksheet-page ak-print-only";
        akPage.appendChild(akSvg);
        sheetWrap.appendChild(akPage);
      }
    }
  }

  showStatus('\u2713 Worksheet updated!');
}

// ===== Font handling for PDF =====
let _fontCSSCache = null;
async function buildFontCSS() {
  if (_fontCSSCache) return _fontCSSCache;
  let fontCSS = "";
  for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
    if (!link.href.includes('fonts')) continue;
    try {
      const resp = await fetch(link.href);
      const css = await resp.text();
      let inlined = css;
      for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
        const fontUrl = m[1].replace(/['"]/g, "");
        const absUrl = new URL(fontUrl, link.href).href;
        try {
          const fr = await fetch(absUrl);
          const blob = await fr.blob();
          const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
          inlined = inlined.replace(m[0], 'url(' + b64 + ')');
        } catch(e) {}
      }
      fontCSS += inlined;
    } catch(e) {}
  }
  for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
    try {
      const resp = await fetch(link.href);
      const css = await resp.text();
      let inlined = css;
      for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
        const fontUrl = m[1].replace(/['"]/g, "");
        try {
          const fr = await fetch(fontUrl);
          const blob = await fr.blob();
          const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
          inlined = inlined.replace(m[0], 'url(' + b64 + ')');
        } catch(e) {}
      }
      fontCSS += inlined;
    } catch(e) {}
  }
  _fontCSSCache = fontCSS;
  return fontCSS;
}

let _fontCache = {};
(function preloadFonts() {
  ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
    fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
      var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
    }).catch(function() {});
  });
})();

async function registerPdfFonts(pdf) {
  const fontDefs = [
    { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
    { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
    { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
    { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
    { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
  ];
  let idx = 0;
  for (const f of fontDefs) {
    try {
      let b64;
      if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
      else {
        const resp = await fetch(f.file);
        const buf = await resp.arrayBuffer();
        const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
        _fontCache[f.file] = b64;
      }
      for (const style of f.styles) {
        const vfsName = "f" + (idx++) + ".ttf";
        pdf.addFileToVFS(vfsName, b64);
        pdf.addFont(vfsName, f.name, style);
      }
    } catch(e) { console.warn("Font load failed:", f.file, e); }
  }
}

async function generatePdfBlob() {
  const headerMode = getHeaderMode();
  const branded = elBranded.checked;
  const title = getTitle();
  const subtitle = getSubtitle();

  const svgPages = [];
  for (let i = 0; i < currentState.sheets.length; i++) {
    svgPages.push(generateChartSvg(currentState.sheets[i], headerMode, branded, title, subtitle, false));
  }
  if (elAnswerKey.checked) {
    for (let i = 0; i < currentState.sheets.length; i++) {
      svgPages.push(generateChartSvg(currentState.sheets[i], "none", branded, title, subtitle, true));
    }
  }

  const fontCSS = await buildFontCSS();
  let logoB64 = "";
  try {
    const logoResp = await fetch("../../images/logo-watermark.svg");
    const logoBlob = await logoResp.blob();
    logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
  } catch(e) {}

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
  await registerPdfFonts(pdf);

  for (let i = 0; i < svgPages.length; i++) {
    if (i > 0) pdf.addPage("letter", "portrait");
    const svgClone = svgPages[i].cloneNode(true);
    const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
    styleEl.textContent = fontCSS;
    svgClone.insertBefore(styleEl, svgClone.firstChild);
    if (logoB64) {
      svgClone.querySelectorAll("image").forEach(img => {
        const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
        if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
      });
    }
    svgClone.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
    document.body.appendChild(svgClone);
    try { await pdf.svg(svgClone, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgClone); }
  }
  return pdf.output("blob");
}

async function handlePrint() {
  if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
  const btn = document.getElementById("btnPrint");
  const origText = btn.innerHTML;
  btn.innerHTML = "&#9203; Preparing...";
  btn.disabled = true;
  try {
    const blob = await generatePdfBlob();
    const url = URL.createObjectURL(blob);
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
    iframe.src = url;
    document.body.appendChild(iframe);
    iframe.onload = function() {
      setTimeout(() => {
        iframe.contentWindow.print();
        setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
      }, 300);
    };
  } catch(e) { console.error("Print error:", e); }
  btn.innerHTML = origText;
  btn.disabled = false;
}

document.getElementById("btnPrint").addEventListener("click", handlePrint);

async function handleDownloadPdf() {
  if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
  const btn = document.getElementById("btnDownloadPdf");
  const origText = btn.innerHTML;
  btn.innerHTML = "&#9203; Generating PDF...";
  btn.disabled = true;
  try {
    const blob = await generatePdfBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  } catch(e) { console.error("Download error:", e); }
  btn.innerHTML = origText;
  btn.disabled = false;
}
document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
