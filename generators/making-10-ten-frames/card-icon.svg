<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f7f8fc"/>

  <!-- Ten frame: 5 cols x 2 rows, showing 7 filled dots, scaled up to fill -->
  <g transform="translate(10,8)">
    <!-- Frame outline -->
    <rect x="0" y="0" width="180" height="72" rx="3" fill="none" stroke="#2d3748" stroke-width="1.4"/>
    <!-- Vertical dividers -->
    <line x1="36" y1="0" x2="36" y2="72" stroke="#2d3748" stroke-width="0.9"/>
    <line x1="72" y1="0" x2="72" y2="72" stroke="#2d3748" stroke-width="0.9"/>
    <line x1="108" y1="0" x2="108" y2="72" stroke="#2d3748" stroke-width="0.9"/>
    <line x1="144" y1="0" x2="144" y2="72" stroke="#2d3748" stroke-width="0.9"/>
    <!-- Horizontal midline -->
    <line x1="0" y1="36" x2="180" y2="36" stroke="#2d3748" stroke-width="0.9"/>

    <!-- Filled dots (7 total) - top row all 5 -->
    <circle cx="18" cy="18" r="12" fill="#4a5568"/>
    <circle cx="54" cy="18" r="12" fill="#4a5568"/>
    <circle cx="90" cy="18" r="12" fill="#4a5568"/>
    <circle cx="126" cy="18" r="12" fill="#4a5568"/>
    <circle cx="162" cy="18" r="12" fill="#4a5568"/>
    <!-- Bottom row: 2 filled -->
    <circle cx="18" cy="54" r="12" fill="#4a5568"/>
    <circle cx="54" cy="54" r="12" fill="#4a5568"/>
    <!-- Bottom row: 3 empty (dotted circles) -->
    <circle cx="90" cy="54" r="10.5" fill="none" stroke="#a0aec0" stroke-width="1.3" stroke-dasharray="3.5,2.5"/>
    <circle cx="126" cy="54" r="10.5" fill="none" stroke="#a0aec0" stroke-width="1.3" stroke-dasharray="3.5,2.5"/>
    <circle cx="162" cy="54" r="10.5" fill="none" stroke="#a0aec0" stroke-width="1.3" stroke-dasharray="3.5,2.5"/>
  </g>

  <!-- Equation: 7 + ___ = 10, centered under the ten frame (frame center = 100) -->
  <text x="37" y="118" font-family="'Google Sans Flex', sans-serif" font-size="28" font-weight="500" fill="#1a202c" text-anchor="middle">7</text>
  <text x="62" y="118" font-family="'Google Sans Flex', sans-serif" font-size="28" font-weight="500" fill="#1a202c" text-anchor="middle">+</text>
  <!-- Answer blank line -->
  <line x1="78" y1="120" x2="118" y2="120" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="138" y="118" font-family="'Google Sans Flex', sans-serif" font-size="28" font-weight="500" fill="#1a202c" text-anchor="middle">=</text>
  <text x="162" y="118" font-family="'Google Sans Flex', sans-serif" font-size="28" font-weight="500" fill="#1a202c" text-anchor="middle">10</text>
</svg>
