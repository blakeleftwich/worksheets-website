  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }

    // ===== Time to Words =====
    function timeToWords(hour, minute) {
      const ones = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine',
        'ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'];
      const tens = ['', '', 'twenty', 'thirty', 'forty', 'fifty'];
      function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
      const hourWord = ones[hour];
      if (minute === 0) {
        return capitalize(hourWord) + " o'clock";
      }
      let minuteWord;
      if (minute < 20) {
        minuteWord = ones[minute];
      } else {
        minuteWord = tens[Math.floor(minute / 10)];
        if (minute % 10 > 0) minuteWord += '-' + ones[minute % 10];
      }
      if (minute < 10) {
        minuteWord = 'oh ' + minuteWord;
      }
      return capitalize(hourWord) + ' ' + minuteWord;
    }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elClockType = document.getElementById("clockType");
    const elNumSheets = document.getElementById("numWorksheets");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elBranded = document.getElementById("branded");
    const elAnswerKey = document.getElementById("answerKey");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");
    const elShowTickMarks = document.getElementById("showTickMarks");
    const elTickStyle = document.getElementById("tickStyle");
    const elTickStyleOptions = document.getElementById("tickStyleOptions");
    const elMinuteIncrement = document.getElementById("minuteIncrement");
    const elProblemsPerSheet = document.getElementById("problemsPerSheet");
    const elMinuteIncrementGroup = document.getElementById("minuteIncrementGroup");
    const elNumbered = document.getElementById("numbered");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return elClockType.value === "hours" ? "Telling Time by Hours: Draw the Hands" : "Telling Time by Minutes: Draw the Hands";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Draw the hands on each clock to show the time.";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();

      const showTicks = elShowTickMarks.checked;
      const tickStyle = showTicks ? elTickStyle.value : "none"; // "none", "hours", "minutes"

      return {
        clockType: elClockType.value,
        numWorksheets: parseInt(elNumSheets.value, 10),
        showHeader,
        title,
        subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        tickStyle,
        showArrows: true,
        numbered: elNumbered.checked,
        minuteIncrement: parseInt(elMinuteIncrement.value, 10),
        problemsPerSheet: parseInt(elProblemsPerSheet.value, 10),
      };
    }

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Generate random times =====
    function generateRandomTime(clockType, minuteIncrement) {
      const hour = Math.floor(Math.random() * 12) + 1;
      let minute;
      if (clockType === "hours") {
        minute = 0;
      } else {
        const inc = minuteIncrement || 1;
        const steps = Math.floor(60 / inc);
        minute = Math.floor(Math.random() * steps) * inc;
      }
      return { hour, minute };
    }

    function generateSheet(opts) {
      const times = [];
      const numProblems = opts.problemsPerSheet || 9;
      for (let i = 0; i < numProblems; i++) {
        times.push(generateRandomTime(opts.clockType, opts.minuteIncrement));
      }
      return times;
    }

    // ===== Draw a single clock face (no hands version for worksheet) =====
    function drawClockFace(svg, cx, cy, radius, tickStyle) {
      const color = "#2d3748";
      const hasTicks = tickStyle !== "none";
      const hasMinuteTicks = tickStyle === "minutes";

      // Clock circle
      svg.appendChild(svgEl("circle", {
        cx, cy, r: radius,
        fill: "none", stroke: color, "stroke-width": "2"
      }));

      // Tick marks and numbers
      for (let i = 1; i <= 12; i++) {
        const angle = (i * 30 - 90) * Math.PI / 180;

        // Hour tick marks
        if (hasTicks) {
          const tickOuter = radius * 0.93;
          const tickInner = radius * 0.86;
          svg.appendChild(svgEl("line", {
            x1: cx + Math.cos(angle) * tickInner,
            y1: cy + Math.sin(angle) * tickInner,
            x2: cx + Math.cos(angle) * tickOuter,
            y2: cy + Math.sin(angle) * tickOuter,
            stroke: color, "stroke-width": "1.5"
          }));
        }

        // Minute tick marks (between hours)
        if (hasMinuteTicks) {
          for (let m = 1; m <= 4; m++) {
            const mAngle = ((i - 1) * 30 + m * 6 - 90) * Math.PI / 180;
            const mTickOuter = radius * 0.93;
            const mTickInner = radius * 0.88;
            svg.appendChild(svgEl("line", {
              x1: cx + Math.cos(mAngle) * mTickInner,
              y1: cy + Math.sin(mAngle) * mTickInner,
              x2: cx + Math.cos(mAngle) * mTickOuter,
              y2: cy + Math.sin(mAngle) * mTickOuter,
              stroke: color, "stroke-width": "0.7"
            }));
          }
        }

        // Numbers
        const numR = hasTicks ? radius * 0.72 : radius * 0.84;
        const fontSize = radius * 0.22;
        const numX = cx + Math.cos(angle) * numR;
        const numY = cy + Math.sin(angle) * numR;
        const el = svgEl("text", {
          x: numX, y: numY + fontSize * 0.35,
          "text-anchor": "middle",
          "font-family": "'Google Sans Flex', sans-serif",
          "font-size": String(fontSize),
          "font-weight": "500",
          fill: color
        });
        el.textContent = String(i);
        svg.appendChild(el);
      }

      // Center dot only (no hands)
      svg.appendChild(svgEl("circle", {
        cx, cy, r: radius * 0.04,
        fill: color
      }));
    }

    // ===== Draw a clock face WITH hands (for answer key) =====
    function drawClockWithHands(svg, cx, cy, radius, hour, minute, tickStyle, showArrows) {
      const color = "#2d3748";
      const hasTicks = tickStyle !== "none";
      const hasMinuteTicks = tickStyle === "minutes";

      // Clock circle
      svg.appendChild(svgEl("circle", {
        cx, cy, r: radius,
        fill: "none", stroke: color, "stroke-width": "2"
      }));

      // Tick marks and numbers
      for (let i = 1; i <= 12; i++) {
        const angle = (i * 30 - 90) * Math.PI / 180;

        if (hasTicks) {
          const tickOuter = radius * 0.93;
          const tickInner = radius * 0.86;
          svg.appendChild(svgEl("line", {
            x1: cx + Math.cos(angle) * tickInner,
            y1: cy + Math.sin(angle) * tickInner,
            x2: cx + Math.cos(angle) * tickOuter,
            y2: cy + Math.sin(angle) * tickOuter,
            stroke: color, "stroke-width": "1.5"
          }));
        }

        if (hasMinuteTicks) {
          for (let m = 1; m <= 4; m++) {
            const mAngle = ((i - 1) * 30 + m * 6 - 90) * Math.PI / 180;
            const mTickOuter = radius * 0.93;
            const mTickInner = radius * 0.88;
            svg.appendChild(svgEl("line", {
              x1: cx + Math.cos(mAngle) * mTickInner,
              y1: cy + Math.sin(mAngle) * mTickInner,
              x2: cx + Math.cos(mAngle) * mTickOuter,
              y2: cy + Math.sin(mAngle) * mTickOuter,
              stroke: color, "stroke-width": "0.7"
            }));
          }
        }

        const numR = hasTicks ? radius * 0.72 : radius * 0.84;
        const fontSize = radius * 0.22;
        const numX = cx + Math.cos(angle) * numR;
        const numY = cy + Math.sin(angle) * numR;
        const el = svgEl("text", {
          x: numX, y: numY + fontSize * 0.35,
          "text-anchor": "middle",
          "font-family": "'Google Sans Flex', sans-serif",
          "font-size": String(fontSize),
          "font-weight": "500",
          fill: color
        });
        el.textContent = String(i);
        svg.appendChild(el);
      }

      // Hand angles
      const hourAngle = ((hour % 12) * 30 + minute * 0.5 - 90) * Math.PI / 180;
      const minuteAngle = (minute * 6 - 90) * Math.PI / 180;

      const minuteLen = hasTicks ? radius * 0.57 : radius * 0.68;
      const hourLen = hasTicks ? radius * 0.44 : radius * 0.48;

      // Arrowhead helper
      function drawArrow(x2, y2, angle, size) {
        const ux = Math.cos(angle), uy = Math.sin(angle);
        const ax = -ux * size, ay = -uy * size;
        const px = -uy * size * 0.7, py = ux * size * 0.7;
        svg.appendChild(svgEl("polygon", {
          points: [
            x2 + "," + y2,
            (x2 + ax + px) + "," + (y2 + ay + py),
            (x2 + ax - px) + "," + (y2 + ay - py)
          ].join(" "),
          fill: color
        }));
      }

      // Hour hand
      const hourArrowPullback = showArrows ? radius * 0.1 : 0;
      const hx2 = cx + Math.cos(hourAngle) * (hourLen - hourArrowPullback);
      const hy2 = cy + Math.sin(hourAngle) * (hourLen - hourArrowPullback);
      svg.appendChild(svgEl("line", {
        x1: cx, y1: cy, x2: hx2, y2: hy2,
        stroke: color, "stroke-width": "3.5", "stroke-linecap": "round"
      }));
      if (showArrows) {
        const htx = cx + Math.cos(hourAngle) * hourLen;
        const hty = cy + Math.sin(hourAngle) * hourLen;
        drawArrow(htx, hty, hourAngle, radius * 0.12);
      }

      // Minute hand
      const minArrowPullback = showArrows ? radius * 0.08 : 0;
      const mx2 = cx + Math.cos(minuteAngle) * (minuteLen - minArrowPullback);
      const my2 = cy + Math.sin(minuteAngle) * (minuteLen - minArrowPullback);
      svg.appendChild(svgEl("line", {
        x1: cx, y1: cy, x2: mx2, y2: my2,
        stroke: color, "stroke-width": "2", "stroke-linecap": "round"
      }));
      if (showArrows) {
        const mtx = cx + Math.cos(minuteAngle) * minuteLen;
        const mty = cy + Math.sin(minuteAngle) * minuteLen;
        drawArrow(mtx, mty, minuteAngle, radius * 0.1);
      }

      // Center dot on top
      svg.appendChild(svgEl("circle", {
        cx, cy, r: radius * 0.04,
        fill: color
      }));
    }

    // ===== Draw written time text box above the clock =====
    function drawTimeWordsBox(svg, cx, boxTopY, boxW, boxH, time) {
      const color = "#2d3748";
      const text = timeToWords(time.hour, time.minute);

      // Auto-scale font size based on text length
      let fontSize = boxH * 0.52;
      if (text.length > 18) fontSize = boxH * 0.42;
      if (text.length > 22) fontSize = boxH * 0.36;
      if (text.length > 26) fontSize = boxH * 0.32;

      const textEl = svgEl("text", {
        x: cx, y: boxTopY + boxH / 2 + fontSize * 0.35,
        "text-anchor": "middle",
        "font-family": "'Google Sans Flex', sans-serif",
        "font-size": String(fontSize),
        "font-weight": "600",
        fill: color
      });
      textEl.textContent = text;
      svg.appendChild(textEl);

      // Answer underlines with colon below the text
      const underlineY = boxTopY + boxH - 2;
      const lineW = boxW * 0.22;
      const colonGap = 8;
      const colonFontSize = fontSize * 0.9;

      // Colon
      const colonEl = svgEl("text", {
        x: cx, y: underlineY - 3,
        "text-anchor": "middle",
        "font-family": "'Google Sans Flex', sans-serif",
        "font-size": String(colonFontSize),
        "font-weight": "700",
        fill: color
      });
      colonEl.textContent = ":";
      svg.appendChild(colonEl);

      // Left underline (hours)
      svg.appendChild(svgEl("line", {
        x1: cx - colonGap - lineW, y1: underlineY,
        x2: cx - colonGap, y2: underlineY,
        stroke: "#cbd5e1", "stroke-width": "1.5"
      }));

      // Right underline (minutes)
      svg.appendChild(svgEl("line", {
        x1: cx + colonGap, y1: underlineY,
        x2: cx + colonGap + lineW, y2: underlineY,
        stroke: "#cbd5e1", "stroke-width": "1.5"
      }));
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(sheetTimes, options, wsCode) {
      const { showHeader, title, subtitle, branded, isAnswerKey, tickStyle, showArrows, numbered } = options;
      const color = "#2d3748";
      const pageW = 612, pageH = 792, margin = 36;

      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      // Header
      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../branding/emma-logo.jpg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code -- bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const bottomMargin = branded ? 56 : 24;
      const availH = pageH - bottomMargin - topGridY;
      const availW = pageW - margin * 2;

      const totalProbs = sheetTimes.length;
      const cols = totalProbs <= 6 ? 2 : 3;
      const rows = Math.ceil(totalProbs / cols);
      const cellW = availW / cols;
      const cellH = availH / rows;

      // Layout: text box on top, clock below
      const textBoxH = Math.min(cellH * 0.17, 36);
      const textBoxGap = cellH * 0.01;
      const clockAreaH = cellH - textBoxH - textBoxGap;
      const radius = Math.min(cellW * 0.38, clockAreaH * 0.46);
      const textBoxW = cellW * 0.88;

      for (let i = 0; i < totalProbs; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cellX = margin + col * cellW;
        const cellY = topGridY + row * cellH;
        const ccx = cellX + cellW / 2;
        const time = sheetTimes[i];

        // Problem number
        if (numbered !== false) {
          const probNumSize = 10;
          const numEl = svgEl("text", { x: cellX + 2, y: cellY + 12, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numEl.textContent = (i + 1) + ".";
          svg.appendChild(numEl);
        }

        // Written time text box at top of cell
        const textBoxY = cellY + 4;
        drawTimeWordsBox(svg, ccx, textBoxY, textBoxW, textBoxH, time);

        // Clock center below the text box
        const clockTopY = textBoxY + textBoxH + textBoxGap;
        const ccy = clockTopY + clockAreaH / 2;

        if (isAnswerKey) {
          // Answer key: draw clock WITH hands
          drawClockWithHands(svg, ccx, ccy, radius, time.hour, time.minute, tickStyle, showArrows);
        } else {
          // Worksheet: draw clock WITHOUT hands
          drawClockFace(svg, ccx, ccy, radius, tickStyle);
        }
      }

      return svg;
    }

    // ===== Render helpers =====
    function buildRenderOptions(opts, isAnswerKey) {
      return {
        showHeader: isAnswerKey ? "none" : opts.showHeader,
        title: opts.title,
        subtitle: opts.subtitle,
        branded: opts.branded,
        isAnswerKey: !!isAnswerKey,
        tickStyle: opts.tickStyle,
        showArrows: opts.showArrows,
        numbered: opts.numbered,
      };
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateSheet(opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateSheet(opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const ro = buildRenderOptions(opts, false);
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          p.appendChild(renderWorksheetSVG(currentState.sheets[s], ro, '(' + (s + 1) + ')'));
          sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cs;
        if (numSheets <= 3) { cs = numSheets; if ((aw - (cs - 1) * gap) / cs < mrw) cs = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cs = Math.min(3, numSheets); if ((aw - (cs - 1) * gap) / cs < mrw) cs = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cs - 1) * gap) / cs, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cs + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], ro, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        p.appendChild(renderWorksheetSVG(currentState.sheets[0], ro, '(1)'));
        sheetWrap.appendChild(p);
      }
    }

    function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const opts = gatherOptions();
      const ro = buildRenderOptions(opts, false);
      const sH = sheetWrap.innerHTML, sC = sheetWrap.className, sS = sheetWrap.style.cssText;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      for (let i = 0; i < currentState.sheets.length; i++) {
        const p = document.createElement("div"); p.className = "worksheet-page";
        p.appendChild(renderWorksheetSVG(currentState.sheets[i], ro, wsCodes[i]));
        sheetWrap.appendChild(p);
      }
      if (opts.answerKey) {
        const roAns = buildRenderOptions(opts, true);
        for (let i = 0; i < currentState.sheets.length; i++) {
          const p = document.createElement("div"); p.className = "worksheet-page ak-print-only";
          p.appendChild(renderWorksheetSVG(currentState.sheets[i], roAns, wsCodes[i]));
          sheetWrap.appendChild(p);
        }
      }
      setTimeout(() => { window.print(); sheetWrap.innerHTML = sH; sheetWrap.className = sC; sheetWrap.style.cssText = sS; }, 50);
    }

    // ===== Sync tick marks UI =====
    function syncTickMarksUI() {
      elTickStyleOptions.style.display = elShowTickMarks.checked ? "block" : "none";
    }

    // ===== Event Listeners =====
    function syncMinuteIncrementUI() {
      elMinuteIncrementGroup.style.display = elClockType.value === "minutes" ? "block" : "none";
    }

    elClockType.addEventListener("change", () => {
      elShowTickMarks.checked = true;
      elTickStyle.value = elClockType.value === "minutes" ? "minutes" : "hours";
      syncTickMarksUI();
      syncMinuteIncrementUI();
      renderWithNewRandomization();
    });

    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elShowTickMarks.addEventListener("change", () => { syncTickMarksUI(); renderWithoutRandomization(); });
    elTickStyle.addEventListener("change", () => renderWithoutRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => { });
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);
    let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    elProblemsPerSheet.addEventListener("change", () => renderWithNewRandomization());
    elMinuteIncrement.addEventListener("change", () => renderWithNewRandomization());

    // Init
    syncTickMarksUI();
    syncMinuteIncrementUI();
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
<script src="../../favorites.js"></script>
