  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    /* ===== Site Header ===== */

      background: white;
      border-bottom: 1px solid #e5e7eb;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 100%;

      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .site-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .site-logo-img {
      height: 44px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 600;
      color: #64748b;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-links a:hover {
      background: #f1f5f9;
      color: #1a1a2e;
    }

    .nav-links a.active {
      background: #fef3c7;
      color: #92400e;
    }


    .main-container {
      display: grid;
      grid-template-columns: 340px 1fr;
      }

    /* ===== Sidebar ===== */
    .sidebar {
      background: white;
      padding: 32px 24px;
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
    }

    .sidebar h2 {
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: left;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-group > label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 6px;
    }

    .control-group input[type="number"],
    .control-group input[type="text"],
    .control-group select {
      width: 100%;

    .control-group input:focus,

    .advanced-toggle {

        height: auto;
      }

        padding: 12px;
      }
      #sheetWrap {
        gap: 16px;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        padding: 0 !important;
      }
      #sheetWrap.grid-view {

        flex-direction: column !important;
        grid-template-columns: none !important;
        padding: 0 !important;
      }
      .worksheet-page {
        padding: 8px;
        width: 100%;
        max-width: 100%;
      }
      .worksheet-page svg {
        width: 100% !important;
        height: auto !important;

    @page {
      size: letter;

    .ak-print-only { display: none !important; }

    /* ===== Print ===== */
    @media print {
      .site-header { display: none !important; }
      .ak-print-only { display: block !important; }
      body {
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      .main-container {
        display: block;
      }
      .sidebar {
        display: none !important;
      }
      .preview-area {
        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
        background: white !important;
      }
      #sheetWrap {
        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
        background: white !important;
      }
      .worksheet-page {
        padding: 0 !important;
        margin: 0 !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        display: block !important;
        background: white !important;
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
      .worksheet-page:not(:last-child) {
        page-break-after: always !important;
        break-after: page !important;
      }
      .worksheet-page svg {
        width: 100% !important;
        height: auto !important;
        display: block !important;
      }

  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elPatternType = document.getElementById("patternType");
    const elDifficulty = document.getElementById("difficulty");
    const elNumbersPerSeq = document.getElementById("numbersPerSeq");
    const elBlanksCount = document.getElementById("blanksCount");
    const elProblems = document.getElementById("problemsPerSheet");
    const elNumSheets = document.getElementById("numWorksheets");
    const elAnswerKey = document.getElementById("answerKey");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Pattern generation =====
    function getStepRange(difficulty) {
      if (difficulty === "simple") return [1, 2, 3, 5, 10];
      if (difficulty === "medium") return { min: 2, max: 25 };
      // hard: varied increments including larger numbers
      return { min: 3, max: 50 };
    }

    function generatePattern(numbersPerSeq, blanks, patternType, difficulty) {
      const maxAttempts = 200;
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        let direction;
        if (patternType === "up") direction = 1;
        else if (patternType === "down") direction = -1;
        else direction = Math.random() < 0.5 ? 1 : -1;

        let step;
        const stepRange = getStepRange(difficulty);
        if (Array.isArray(stepRange)) {
          step = stepRange[Math.floor(Math.random() * stepRange.length)];
        } else {
          step = stepRange.min + Math.floor(Math.random() * (stepRange.max - stepRange.min + 1));
        }

        // Apply direction
        const increment = step * direction;

        // Choose a starting number that keeps all values non-negative and reasonable
        let startMin, startMax;
        if (direction === 1) {
          // Counting up: start from a small number
          startMin = 0;
          startMax = Math.max(0, 100 - step * (numbersPerSeq - 1));
          if (difficulty === "simple") startMax = Math.min(startMax, 20);
          if (difficulty === "medium") startMax = Math.min(startMax, 50);
        } else {
          // Counting down: start high enough so we don't go negative
          startMin = step * (numbersPerSeq - 1);
          startMax = startMin + 50;
          if (difficulty === "simple") startMax = Math.min(startMax, 50);
          if (difficulty === "medium") startMax = Math.min(startMax, 200);
          if (difficulty === "hard") startMax = Math.min(startMax, 500);
        }

        if (startMax < startMin) continue;

        const start = startMin + Math.floor(Math.random() * (startMax - startMin + 1));

        // Build the sequence
        const sequence = [];
        let valid = true;
        for (let i = 0; i < numbersPerSeq; i++) {
          const val = start + increment * i;
          if (val < 0 || val > 999) { valid = false; break; }
          sequence.push(val);
        }
        if (!valid) continue;

        return { sequence, step: increment };
      }

      // Fallback: simple counting by 2
      const seq = [];
      for (let i = 0; i < numbersPerSeq; i++) seq.push(2 + i * 2);
      return { sequence: seq, step: 2 };
    }

    function generateProblems(count, opts) {
      const { numbersPerSeq, blanks, patternType, difficulty } = opts;
      const problems = [];
      const seen = new Set();
      let attempts = 0;

      while (problems.length < count && attempts < count * 100) {
        attempts++;
        const pattern = generatePattern(numbersPerSeq, blanks, patternType, difficulty);
        const key = pattern.sequence.join(",");
        if (seen.has(key)) continue;
        seen.add(key);
        problems.push(pattern);
      }

      // Fill if needed
      while (problems.length < count) {
        const pattern = generatePattern(numbersPerSeq, blanks, patternType, difficulty);
        problems.push(pattern);
      }

      return problems;
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, blanks, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));
      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", { x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af" }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      // Instruction line
      if (!showAnswers) {
        const instrY = topGridY + 4;
        const instr = svgEl("text", { x: pageW / 2, y: instrY, "font-family": "Fredoka, sans-serif", "font-size": 11, "font-weight": 400, "text-anchor": "middle", fill: "#4a5568" });
        instr.textContent = "Find the pattern and fill in the missing numbers.";
        svg.appendChild(instr);
        topGridY = instrY + 14;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../branding/emma-logo.jpg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const count = problems.length;
      const bottomMargin = branded ? 56 : 24;
      const gridTop = topGridY;
      const availH = pageH - bottomMargin - gridTop;
      const availW = pageW - margin * 2;

      const rowH = availH / count;
      const numbersPerSeq = problems[0] ? problems[0].sequence.length : 8;

      // Calculate box sizing
      const probNumSize = 10;
      const probNumW = probNumSize * (count >= 10 ? 2.0 : 1.6);

      // Each number goes in a box; figure out box dimensions
      const gapBetweenBoxes = 4;
      const totalGapW = gapBetweenBoxes * (numbersPerSeq - 1);
      const maxBoxW = (availW - probNumW - totalGapW) / numbersPerSeq;
      const boxW = Math.min(maxBoxW, 58);
      const boxH = Math.min(rowH * 0.6, 38);
      const fontSize = Math.min(18, Math.max(12, boxH * 0.55));
      const commaW = fontSize * 0.4;

      // Total width of the pattern row
      const totalPatternW = probNumW + numbersPerSeq * boxW + (numbersPerSeq - 1) * gapBetweenBoxes;
      const startX = margin + (availW - totalPatternW) / 2;

      for (let i = 0; i < problems.length; i++) {
        const { sequence } = problems[i];
        const cellTop = gridTop + i * rowH;
        const cy = cellTop + rowH / 2;
        const isExampleRow = (i === 0 && includeExample && !showAnswers);

        // Problem number
        let x = startX;
        if (numbered !== false) {
          const probNumY = cy + probNumSize * 0.35;
          const numEl = svgEl("text", { x: x, y: probNumY, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numEl.textContent = (i + 1) + "."; svg.appendChild(numEl);
        }
        x += probNumW;

        const givenCount = sequence.length - blanks;

        // Example badge at start of row
        if (isExampleRow) {
          const badgeX = pageW - margin - 44, badgeY = cy - boxH / 2 - 2;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
          const bt = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          bt.textContent = "Example"; svg.appendChild(bt);
        }

        for (let j = 0; j < sequence.length; j++) {
          const bx = x + j * (boxW + gapBetweenBoxes);
          const by = cy - boxH / 2;
          const isBlank = j >= givenCount;
          // Only pre-fill the first blank box in the example row
          const isExampleBlank = isExampleRow && isBlank && j === givenCount;

          if (isBlank) {
            // Dashed border box for missing numbers
            const boxFill = isExampleBlank ? "#f0fdf4" : "none";
            const boxStroke = isExampleBlank ? "#22c55e" : "#a0aec0";
            svg.appendChild(svgEl("rect", {
              x: bx, y: by, width: boxW, height: boxH,
              rx: 4, ry: 4, fill: boxFill,
              stroke: boxStroke, "stroke-width": "1.5",
              "stroke-dasharray": isExampleBlank ? "none" : "5,3"
            }));

            if (isExampleBlank) {
              // Show the first blank answer in green
              const ansEl = svgEl("text", {
                x: bx + boxW / 2, y: cy + fontSize * 0.35,
                "text-anchor": "middle",
                "font-family": "'Google Sans Flex', sans-serif",
                "font-size": String(fontSize), "font-weight": "500", fill: "#16a34a"
              });
              ansEl.textContent = String(sequence[j]);
              svg.appendChild(ansEl);
            } else if (showAnswers) {
              // Show the answer in blue
              const ansEl = svgEl("text", {
                x: bx + boxW / 2, y: cy + fontSize * 0.35,
                "text-anchor": "middle",
                "font-family": "'Google Sans Flex', sans-serif",
                "font-size": String(fontSize), "font-weight": "500", fill: "#3182ce"
              });
              ansEl.textContent = String(sequence[j]);
              svg.appendChild(ansEl);
            }
          } else {
            // Solid border box for given numbers
            svg.appendChild(svgEl("rect", {
              x: bx, y: by, width: boxW, height: boxH,
              rx: 4, ry: 4, fill: "none",
              stroke: "#2d3748", "stroke-width": "1.5"
            }));

            const numTxt = svgEl("text", {
              x: bx + boxW / 2, y: cy + fontSize * 0.35,
              "text-anchor": "middle",
              "font-family": "'Google Sans Flex', sans-serif",
              "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c"
            });
            numTxt.textContent = String(sequence[j]);
            svg.appendChild(numTxt);
          }

          // Comma between boxes (except last)
          if (j < sequence.length - 1) {
            const commaEl = svgEl("text", {
              x: bx + boxW + gapBetweenBoxes / 2,
              y: cy + fontSize * 0.35,
              "text-anchor": "middle",
              "font-family": "'Google Sans Flex', sans-serif",
              "font-size": String(fontSize * 0.9), "font-weight": "400", fill: "#718096"
            });
            commaEl.textContent = ",";
            svg.appendChild(commaEl);
          }
        }
      }

      return svg;
    }

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "none";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return "Number Patterns";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Find the pattern and fill in the missing numbers.";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      const blanks = parseInt(elBlanksCount.value, 10);
      const numbersPerSeq = parseInt(elNumbersPerSeq.value, 10);

      // Ensure blanks doesn't exceed sequence length - 2 (need at least 2 given)
      const effectiveBlanks = Math.min(blanks, numbersPerSeq - 2);

      return {
        patternType: elPatternType.value,
        difficulty: elDifficulty.value,
        numbersPerSeq: numbersPerSeq,
        blanks: effectiveBlanks,
        problemsPerSheet: parseInt(elProblems.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        showHeader,
        title,
        subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
      };
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, blanks: opts.blanks, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      // Desktop: grid layout with calculated sizing
      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cols - 1) * gap) / cols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, blanks: opts.blanks, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, blanks: opts.blanks, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const opts = gatherOptions();
      const sH = sheetWrap.innerHTML, sC = sheetWrap.className, sS = sheetWrap.style.cssText;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      for (let i = 0; i < currentState.sheets.length; i++) {
        const p = document.createElement("div"); p.className = "worksheet-page";
        p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, blanks: opts.blanks, numbered: opts.numbered, includeExample: opts.includeExample }, wsCodes[i]));
        sheetWrap.appendChild(p);
      }
      const answerKeyPages = [];
      if (opts.answerKey) {
        for (let i = 0; i < currentState.sheets.length; i++) {
          const p = document.createElement("div"); p.className = "worksheet-page ak-print-only";
          p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: true, blanks: opts.blanks, numbered: opts.numbered, isAnswerKey: true, includeExample: false }, wsCodes[i]));
          sheetWrap.appendChild(p);
          answerKeyPages.push(p);
        }
      }
      window.print();
      setTimeout(() => { answerKeyPages.forEach(p => p.remove()); sheetWrap.innerHTML = sH; sheetWrap.className = sC; sheetWrap.style.cssText = sS; }, 500);
    }

    // ===== Event Listeners =====
    elPatternType.addEventListener("change", () => renderWithNewRandomization());
    elDifficulty.addEventListener("change", () => renderWithNewRandomization());
    elNumbersPerSeq.addEventListener("change", () => renderWithNewRandomization());
    elBlanksCount.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);
let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
<script src="../../favorites.js"></script>
</body>
</html>
