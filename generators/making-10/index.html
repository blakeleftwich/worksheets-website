  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

    // ===== Element refs =====

    const elMode = document.getElementById("modeSelect");

    const elHeaderMode = document.getElementById("headerMode");

    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Problem generation =====
    function generateProblems(count, target) {
      const problems = [];
      const seen = new Set();
      // Generate unique addend pairs that sum to target
      // Addends range from 0 to target
      const possibleAddends = [];
      for (let a = 0; a <= target; a++) {
        possibleAddends.push(a);
      }

      let attempts = 0;
      while (problems.length < count && attempts < count * 200) {
        attempts++;
        const addend = possibleAddends[Math.floor(Math.random() * possibleAddends.length)];
        const answer = target - addend;

        // Vary the format: sometimes blank is first, sometimes second
        // ~40% chance the blank is the first number
        const blankFirst = Math.random() < 0.4;

        const key = (blankFirst ? "B" : "A") + ":" + addend;
        if (seen.has(key) && problems.length < possibleAddends.length * 2) continue;
        seen.add(key);

        problems.push({
          given: addend,
          answer: answer,
          blankFirst: blankFirst,
          target: target
        });
      }

      // Fill if needed
      while (problems.length < count) {
        const addend = randInt(0, target);
        const answer = target - addend;
        const blankFirst = Math.random() < 0.4;
        problems.push({ given: addend, answer: answer, blankFirst: blankFirst, target: target });
      }

      // Shuffle
      for (let i = problems.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [problems[i], problems[j]] = [problems[j], problems[i]];
      }

      return problems;
    }

    // ===== Draw a single ten frame =====
    function drawTenFrame(svg, x, y, cellSize, filledCount) {
      const cols = 5, rows = 2;
      const frameW = cols * cellSize;
      const frameH = rows * cellSize;

      // Outer border
      svg.appendChild(svgEl("rect", { x: x, y: y, width: frameW, height: frameH, fill: "none", stroke: "#2d3748", "stroke-width": "1.5", rx: 2, ry: 2 }));

      // Grid lines and cells
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cx = x + c * cellSize;
          const cy = y + r * cellSize;
          // Cell border
          svg.appendChild(svgEl("rect", { x: cx, y: cy, width: cellSize, height: cellSize, fill: "none", stroke: "#2d3748", "stroke-width": "0.75" }));

          // Dot (fill top row left-to-right, then bottom row)
          const cellIndex = r * cols + c;
          if (cellIndex < filledCount) {
            const dotR = cellSize * 0.32;
            svg.appendChild(svgEl("circle", {
              cx: cx + cellSize / 2,
              cy: cy + cellSize / 2,
              r: dotR,
              fill: "#2b6cb0"
            }));
          }
        }
      }
    }

    // ===== Draw a twenty frame (two ten frames stacked) =====
    function drawTwentyFrame(svg, x, y, cellSize, filledCount) {
      // First ten frame
      drawTenFrame(svg, x, y, cellSize, Math.min(filledCount, 10));
      // Second ten frame below with a small gap
      const gap = cellSize * 0.4;
      drawTenFrame(svg, x, y + 2 * cellSize + gap, cellSize, Math.max(0, filledCount - 10));
    }

    // ===== Helper functions =====

      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

      }
      const target = parseInt(elTarget.value, 10);

        numbered: elNumbered.checked,

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, mode, target, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", { x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af" }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.jpg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const count = problems.length;
      const bottomMargin = branded ? 56 : 24;
      const gridTop = topGridY;
      const availH = pageH - bottomMargin - gridTop;
      const availW = pageW - margin * 2;

      if (mode === "equation") {
        renderEquationMode(svg, problems, { gridTop, availH, availW, margin, pageW, count, showAnswers, target, numbered, includeExample });
      } else {
        renderTenFrameMode(svg, problems, { gridTop, availH, availW, margin, pageW, count, showAnswers, target, numbered, includeExample });
      }

      return svg;
    }

    // ===== Equation Mode Rendering =====
    function renderEquationMode(svg, problems, opts) {
      const { gridTop, availH, availW, margin, pageW, count, showAnswers, target, numbered, includeExample } = opts;

      // Single column layout
      const cols = count <= 10 ? 1 : 2;
      const rows = Math.ceil(count / cols);
      const colW = availW / cols;
      const rowH = availH / rows;

      // Size text
      const maxTextH = rowH * 0.8;
      const maxTextW = colW * 0.12;
      const fontSize = Math.min(36, Math.max(16, Math.floor(Math.min(maxTextH, maxTextW))));
      const charW = fontSize * 0.62;
      const boxH = fontSize * 1.7;
      const boxW = fontSize * 2.2;

      // Problem number size
      const probNumSize = 10;
      const probNumW = probNumSize * (count >= 10 ? 2.0 : 1.6);

      for (let i = 0; i < problems.length; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cellLeft = margin + col * colW;
        const cellTop = gridTop + row * rowH;
        const p = problems[i];

        // Vertical centering within cell
        const cy = cellTop + rowH / 2 + fontSize * 0.35;

        let x = cellLeft + 8;

        // Problem number
        const probNumY = cy - 0.72 * (fontSize - probNumSize);
        if (numbered !== false) {
          const numEl = svgEl("text", { x: x, y: probNumY, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numEl.textContent = (i + 1) + "."; svg.appendChild(numEl);
        }
        x += probNumW;

        const isExample = (i === 0 && includeExample && !showAnswers);

        if (p.blankFirst) {
          // ___ + given = target
          // Answer box
          const boxX = x;
          const boxY = cy - boxH * 0.7;
          svg.appendChild(svgEl("rect", { x: boxX, y: boxY, width: boxW, height: boxH, rx: 4, ry: 4, fill: isExample ? "#f0fdf4" : "none", stroke: isExample ? "#22c55e" : "#2d3748", "stroke-width": "1.5" }));
          if (isExample) {
            const ansEl = svgEl("text", { x: boxX + boxW / 2, y: cy, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize * 0.9), "font-weight": "500", fill: "#16a34a" });
            ansEl.textContent = String(p.answer); svg.appendChild(ansEl);
            svg.appendChild(svgEl("rect", { x: boxX + boxW - 2 - 42, y: boxY - 15, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": 0.75 }));
            const badgeText = svgEl("text", { x: boxX + boxW - 2 - 21, y: boxY - 15 + 9.5, "font-family": "Fredoka, sans-serif", "font-size": 8, "font-weight": 600, "text-anchor": "middle", fill: "#16a34a" });
            badgeText.textContent = "Example"; svg.appendChild(badgeText);
          } else if (showAnswers) {
            const ansEl = svgEl("text", { x: boxX + boxW / 2, y: cy, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize * 0.9), "font-weight": "500", fill: "#3182ce" });
            ansEl.textContent = String(p.answer); svg.appendChild(ansEl);
          }
          x += boxW + charW * 0.6;

          // Plus sign
          const plusEl = svgEl("text", { x: x, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
          plusEl.textContent = "+"; svg.appendChild(plusEl);
          x += charW * 1.6;

          // Given number
          const givenStr = String(p.given);
          const givenEl = svgEl("text", { x: x, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
          givenEl.textContent = givenStr; svg.appendChild(givenEl);
          x += givenStr.length * charW + charW * 0.8;

          // Equals sign
          const eqEl = svgEl("text", { x: x, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
          eqEl.textContent = "="; svg.appendChild(eqEl);
          x += charW * 1.6;

          // Target number
          const targetEl = svgEl("text", { x: x, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
          targetEl.textContent = String(p.target); svg.appendChild(targetEl);

        } else {
          // given + ___ = target
          // Given number
          const givenStr = String(p.given);
          const givenEl = svgEl("text", { x: x, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
          givenEl.textContent = givenStr; svg.appendChild(givenEl);
          x += givenStr.length * charW + charW * 0.8;

          // Plus sign
          const plusEl = svgEl("text", { x: x, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
          plusEl.textContent = "+"; svg.appendChild(plusEl);
          x += charW * 1.6;

          // Answer box
          const boxX = x;
          const boxY = cy - boxH * 0.7;
          svg.appendChild(svgEl("rect", { x: boxX, y: boxY, width: boxW, height: boxH, rx: 4, ry: 4, fill: isExample ? "#f0fdf4" : "none", stroke: isExample ? "#22c55e" : "#2d3748", "stroke-width": "1.5" }));
          if (isExample) {
            const ansEl = svgEl("text", { x: boxX + boxW / 2, y: cy, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize * 0.9), "font-weight": "500", fill: "#16a34a" });
            ansEl.textContent = String(p.answer); svg.appendChild(ansEl);
            svg.appendChild(svgEl("rect", { x: boxX + boxW - 2 - 42, y: boxY - 15, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": 0.75 }));
            const badgeText = svgEl("text", { x: boxX + boxW - 2 - 21, y: boxY - 15 + 9.5, "font-family": "Fredoka, sans-serif", "font-size": 8, "font-weight": 600, "text-anchor": "middle", fill: "#16a34a" });
            badgeText.textContent = "Example"; svg.appendChild(badgeText);
          } else if (showAnswers) {
            const ansEl = svgEl("text", { x: boxX + boxW / 2, y: cy, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize * 0.9), "font-weight": "500", fill: "#3182ce" });
            ansEl.textContent = String(p.answer); svg.appendChild(ansEl);
          }
          x += boxW + charW * 0.6;

          // Equals sign
          const eqEl = svgEl("text", { x: x, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
          eqEl.textContent = "="; svg.appendChild(eqEl);
          x += charW * 1.6;

          // Target number
          const targetEl = svgEl("text", { x: x, y: cy, "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
          targetEl.textContent = String(p.target); svg.appendChild(targetEl);
        }
      }
    }

    // ===== Ten Frame Mode Rendering =====
    function renderTenFrameMode(svg, problems, opts) {
      const { gridTop, availH, availW, margin, pageW, count, showAnswers, target, numbered, includeExample } = opts;

      // Layout: 2 columns for most counts, single column for small counts
      const cols = count <= 6 ? 2 : 2;
      const rows = Math.ceil(count / cols);
      const colW = availW / cols;
      const rowH = availH / rows;

      // Ten frame sizing
      const useTwenty = target === 20;
      const useFive = target === 5;
      // Frame needs: 5 cells wide x 1 row (target=5), 2 rows (target=10), or 4 rows (target=20)
      const frameRows = useTwenty ? 4 : (useFive ? 1 : 2);
      const frameGapRatio = useTwenty ? 0.4 : 0;
      // Calculate cell size to fit within column width and row height
      const maxFrameW = colW * 0.65;
      const maxFrameH = rowH * 0.55;
      const cellFromW = maxFrameW / 5;
      const cellFromH = maxFrameH / (frameRows + (useTwenty ? frameGapRatio : 0));
      const cellSize = Math.min(cellFromW, cellFromH, 36);

      const frameW = 5 * cellSize;

      // Problem number and text sizing
      const probNumSize = 10;
      const probNumW = probNumSize * (count >= 10 ? 2.0 : 1.6);
      const textSize = Math.min(16, Math.max(11, Math.floor(rowH * 0.12)));
      const ansBoxW = textSize * 2.2;
      const ansBoxH = textSize * 1.6;

      for (let i = 0; i < problems.length; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cellLeft = margin + col * colW;
        const cellTop = gridTop + row * rowH;
        const p = problems[i];

        // Center the frame horizontally in the cell
        const frameX = cellLeft + (colW - frameW) / 2;

        // Vertical layout within cell:
        // problem number + frame + question text + answer box
        const totalFrameH = useTwenty ? (4 * cellSize + cellSize * 0.4) : (useFive ? cellSize : 2 * cellSize);
        const contentH = totalFrameH + textSize * 2 + ansBoxH + 8;
        const startY = cellTop + (rowH - contentH) / 2;

        // Problem number (top-left of cell)
        if (numbered !== false) {
          const numEl = svgEl("text", { x: cellLeft + 8, y: startY + probNumSize, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numEl.textContent = (i + 1) + "."; svg.appendChild(numEl);
        }

        // Draw the frame
        const frameY = startY + 4;
        if (useTwenty) {
          drawTwentyFrame(svg, frameX, frameY, cellSize, p.given);
        } else {
          // For target=5, use a 5-cell frame (1 row x 5 cols)
          if (target === 5) {
            drawFiveFrame(svg, frameX, frameY, cellSize, p.given);
          } else {
            drawTenFrame(svg, frameX, frameY, cellSize, p.given);
          }
        }

        // Question text below frame
        const textY = frameY + totalFrameH + textSize + 8;
        const questionText = "How many more to make " + p.target + "?";
        const qtEl = svgEl("text", { x: cellLeft + colW / 2, y: textY, "font-family": "Fredoka, sans-serif", "font-size": String(textSize), "font-weight": "500", fill: "#2d3748", "text-anchor": "middle" });
        qtEl.textContent = questionText; svg.appendChild(qtEl);

        const isExample = (i === 0 && includeExample && !showAnswers);

        // Answer box below question
        const boxX = cellLeft + colW / 2 - ansBoxW / 2;
        const boxY = textY + 6;
        svg.appendChild(svgEl("rect", { x: boxX, y: boxY, width: ansBoxW, height: ansBoxH, rx: 4, ry: 4, fill: isExample ? "#f0fdf4" : "none", stroke: isExample ? "#22c55e" : "#2d3748", "stroke-width": "1.5" }));

        if (isExample) {
          const ansEl = svgEl("text", { x: boxX + ansBoxW / 2, y: boxY + ansBoxH / 2 + textSize * 0.35, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(textSize), "font-weight": "500", fill: "#16a34a" });
          ansEl.textContent = String(p.answer); svg.appendChild(ansEl);
          svg.appendChild(svgEl("rect", { x: boxX + ansBoxW - 2 - 42, y: boxY - 15, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": 0.75 }));
          const badgeText = svgEl("text", { x: boxX + ansBoxW - 2 - 21, y: boxY - 15 + 9.5, "font-family": "Fredoka, sans-serif", "font-size": 8, "font-weight": 600, "text-anchor": "middle", fill: "#16a34a" });
          badgeText.textContent = "Example"; svg.appendChild(badgeText);
        } else if (showAnswers) {
          const ansEl = svgEl("text", { x: boxX + ansBoxW / 2, y: boxY + ansBoxH / 2 + textSize * 0.35, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(textSize), "font-weight": "500", fill: "#3182ce" });
          ansEl.textContent = String(p.answer); svg.appendChild(ansEl);
        }
      }
    }

    // ===== Draw a five frame (1 row x 5 cols) =====
    function drawFiveFrame(svg, x, y, cellSize, filledCount) {
      const cols = 5, rows = 1;
      const frameW = cols * cellSize;
      const frameH = rows * cellSize;

      // Outer border
      svg.appendChild(svgEl("rect", { x: x, y: y, width: frameW, height: frameH, fill: "none", stroke: "#2d3748", "stroke-width": "1.5", rx: 2, ry: 2 }));

      for (let c = 0; c < cols; c++) {
        const cx = x + c * cellSize;
        // Cell border
        svg.appendChild(svgEl("rect", { x: cx, y: y, width: cellSize, height: cellSize, fill: "none", stroke: "#2d3748", "stroke-width": "0.75" }));

        if (c < filledCount) {
          const dotR = cellSize * 0.32;
          svg.appendChild(svgEl("circle", {
            cx: cx + cellSize / 2,
            cy: y + cellSize / 2,
            r: dotR,
            fill: "#2b6cb0"
          }));
        }
      }
    }

    // ===== Render functions =====
    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.target));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.target));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, target: opts.target, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols-1)*gap)/cols < mrw) cols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols-1)*gap)/cols < mrw) cols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        const msw = (aw - (cols-1)*gap)/cols, msh = numSheets <= 3 ? ah : ah*0.8;
        const scale = Math.min(msw/sheetWidth, msh/sheetHeight);
        const sw = Math.floor(sheetWidth*scale), sh = Math.floor(sheetHeight*scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw+24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, target: opts.target, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, target: opts.target, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const opts = gatherOptions();
      const sH = sheetWrap.innerHTML, sC = sheetWrap.className, sS = sheetWrap.style.cssText;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      for (let i = 0; i < currentState.sheets.length; i++) {
        const p = document.createElement("div"); p.className = "worksheet-page";
        p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, target: opts.target, numbered: opts.numbered, includeExample: opts.includeExample }, wsCodes[i]));
        sheetWrap.appendChild(p);
      }
      const answerKeyPages = [];
      if (opts.answerKey) {
        for (let i = 0; i < currentState.sheets.length; i++) {
          const p = document.createElement("div"); p.className = "worksheet-page ak-print-only";
          p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: "", branded: opts.branded, showAnswers: true, mode: opts.mode, target: opts.target, numbered: opts.numbered, includeExample: false, isAnswerKey: true }, wsCodes[i]));
          sheetWrap.appendChild(p);
          answerKeyPages.push(p);
        }
      }
      window.print();
      setTimeout(() => { answerKeyPages.forEach(p => p.remove()); sheetWrap.innerHTML = sH; sheetWrap.className = sC; sheetWrap.style.cssText = sS; }, 500);
    }

    // ===== Event Listeners =====
    elMode.addEventListener("change", () => renderWithNewRandomization());
    elTarget.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);
let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
