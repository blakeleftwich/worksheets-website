<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f7f8fc"/>
  <!-- Number pattern: 3, 5, 7, ___, 11 in boxes -->
  <g transform="translate(8,50)">
    <!-- Box 1: 3 -->
    <rect x="0" y="0" width="32" height="32" rx="4" fill="none" stroke="#2d3748" stroke-width="1.5"/>
    <text x="16" y="22" text-anchor="middle" font-size="15" font-weight="500" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">3</text>
    <!-- Comma -->
    <text x="39" y="22" text-anchor="middle" font-size="12" fill="#718096" font-family="Fredoka, sans-serif">,</text>
    <!-- Box 2: 5 -->
    <rect x="44" y="0" width="32" height="32" rx="4" fill="none" stroke="#2d3748" stroke-width="1.5"/>
    <text x="60" y="22" text-anchor="middle" font-size="15" font-weight="500" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">5</text>
    <!-- Comma -->
    <text x="83" y="22" text-anchor="middle" font-size="12" fill="#718096" font-family="Fredoka, sans-serif">,</text>
    <!-- Box 3: 7 -->
    <rect x="88" y="0" width="32" height="32" rx="4" fill="none" stroke="#2d3748" stroke-width="1.5"/>
    <text x="104" y="22" text-anchor="middle" font-size="15" font-weight="500" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">7</text>
    <!-- Comma -->
    <text x="127" y="22" text-anchor="middle" font-size="12" fill="#718096" font-family="Fredoka, sans-serif">,</text>
    <!-- Box 4: blank (dashed) -->
    <rect x="132" y="0" width="32" height="32" rx="4" fill="#f7fafc" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3"/>
    <!-- Comma -->
    <text x="171" y="22" text-anchor="middle" font-size="12" fill="#718096" font-family="Fredoka, sans-serif">,</text>
    <!-- Box 5: 11 -->
    <rect x="176" y="0" width="32" height="32" rx="4" fill="none" stroke="#2d3748" stroke-width="1.5"/>
    <text x="192" y="22" text-anchor="middle" font-size="14" font-weight="500" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">11</text>
  </g>
</svg>
