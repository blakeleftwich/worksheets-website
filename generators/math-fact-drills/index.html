  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function isMobile() { return window.innerWidth <= 900; }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elWithin = document.getElementById("withinSelect");
    const elNumSheets = document.getElementById("numWorksheets");
    const elProblems = document.getElementById("problemsPerSheet");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elAnswerKey = document.getElementById("answerKey");
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");
    const elOpAdd = document.getElementById("opAdd");
    const elOpSub = document.getElementById("opSub");
    const elOpMul = document.getElementById("opMul");
    const elOpDiv = document.getElementById("opDiv");
    const elUseZero = document.getElementById("useZero");
    const elZeroPercent = document.getElementById("zeroPercent");
    const elZeroPercentOptions = document.getElementById("zeroPercentOptions");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const elNumbered = document.getElementById("numbered");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => {
      advPanel.classList.toggle("open");
      advArrow.classList.toggle("open");
    });

    // ===== Allow Zero =====
    elUseZero.addEventListener("change", () => {
      elZeroPercentOptions.style.display = elUseZero.checked ? "block" : "none";
      renderWithNewRandomization();
    });
    elZeroPercent.addEventListener("change", () => { renderWithNewRandomization(); });
    if (elUseZero.checked) elZeroPercentOptions.style.display = "block";

    // ===== Operations =====
    function getSelectedOps() {
      const ops = [];
      if (elOpAdd.checked) ops.push("+");
      if (elOpSub.checked) ops.push("-");
      if (elOpMul.checked) ops.push("\u00d7");
      if (elOpDiv.checked) ops.push("\u00f7");
      return ops;
    }

    function handleOpChange(el) {
      if (!(elOpAdd.checked || elOpSub.checked || elOpMul.checked || elOpDiv.checked)) {
        el.checked = true;
        return;
      }
      renderWithNewRandomization();
    }

    elOpAdd.addEventListener("change", () => handleOpChange(elOpAdd));
    elOpSub.addEventListener("change", () => handleOpChange(elOpSub));
    elOpMul.addEventListener("change", () => handleOpChange(elOpMul));
    elOpDiv.addEventListener("change", () => handleOpChange(elOpDiv));

    // ===== Within dropdown =====
    function getWithinValue() {
      return parseInt(elWithin.value, 10);
    }

    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return generateAutoTitle();
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Complete each problem as quickly as you can.";
    }

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Problem generation =====
    function generateProblems(count, opts) {
      const { min1, max1, min2, max2, maxAnswer, operations } = opts;

      // Build complete pool of all valid unique equations (including zero variants)
      function buildPool() {
        const pool = [];
        const poolKeys = new Set();
        function addToPool(top, bottom, op, answer) {
          const key = op + ":" + top + "," + bottom;
          if (poolKeys.has(key)) return;
          if (maxAnswer !== null && Math.abs(answer) > maxAnswer) return;
          poolKeys.add(key);
          pool.push({ top, bottom, op, answer });
        }
        for (const op of operations) {
          if (op === "+") {
            for (let a = min1; a <= max1; a++) for (let b = min2; b <= max2; b++) addToPool(a, b, op, a + b);
          } else if (op === "-") {
            for (let a = min1; a <= max1; a++) for (let b = min2; b <= max2; b++) {
              const t = Math.max(a, b), bo = Math.min(a, b);
              addToPool(t, bo, op, t - bo);
            }
          } else if (op === "\u00d7") {
            for (let a = min1; a <= max1; a++) for (let b = min2; b <= max2; b++) addToPool(a, b, op, a * b);
          } else if (op === "\u00f7") {
            for (let d = Math.max(1, min2); d <= max2; d++) for (let q = Math.max(1, min1); q <= max1; q++) addToPool(d * q, d, op, q);
          }
        }
        // Add zero variants if enabled
        if (opts.useZero) {
          for (const op of operations) {
            for (let v = 0; v <= Math.max(max1, max2); v++) {
              if (op === "+") {
                addToPool(0, v, op, v);
                addToPool(v, 0, op, v);
              } else if (op === "-") {
                addToPool(v, 0, op, v);
              } else if (op === "\u00d7") {
                addToPool(0, v, op, 0);
                addToPool(v, 0, op, 0);
              } else if (op === "\u00f7") {
                if (v >= 1) addToPool(0, v, op, 0);
              }
            }
          }
        }
        return pool;
      }

      const fullPool = buildPool();

      // Shuffle pool
      for (let i = fullPool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [fullPool[i], fullPool[j]] = [fullPool[j], fullPool[i]]; }

      // Split pool into non-zero and zero equations
      const nonZeroPool = fullPool.filter(p => p.top !== 0 && p.bottom !== 0);
      const zeroPool = fullPool.filter(p => p.top === 0 || p.bottom === 0);

      // Determine how many zero problems we want
      const targetZeroCount = opts.useZero ? Math.max(1, Math.round(count * opts.zeroPercent / 100)) : 0;
      const targetNonZeroCount = count - targetZeroCount;

      // Pick problems, preferring unique
      const problems = [];
      const usedKeys = new Set();

      // Determine per-operation quotas
      let opQuotas = null;
      if (operations.length > 1) {
        opQuotas = {};
        const base = Math.floor(count / operations.length);
        let remainder = count % operations.length;
        for (const op of operations) {
          opQuotas[op] = base + (remainder > 0 ? 1 : 0);
          if (remainder > 0) remainder--;
        }
      }

      function opCountFor(op) { return problems.filter(p => p.op === op).length; }
      function opFull(op) { return opQuotas ? opCountFor(op) >= opQuotas[op] : false; }

      function pickFrom(pool, needed) {
        // First pass: unique only, respecting op quotas
        const unused = pool.filter(p => {
          const key = p.op + ":" + p.top + "," + p.bottom;
          return !usedKeys.has(key);
        });
        for (const p of unused) {
          if (problems.length >= count) break;
          if (needed <= 0) break;
          if (opQuotas && opFull(p.op)) continue;
          const key = p.op + ":" + p.top + "," + p.bottom;
          usedKeys.add(key);
          problems.push({ ...p });
          needed--;
        }
        return needed;
      }

      // Pick non-zero problems first, then zero problems
      let remainNonZero = pickFrom(nonZeroPool, targetNonZeroCount);
      let remainZero = pickFrom(zeroPool, targetZeroCount);

      // If either pool was too small, fill from the other
      if (remainNonZero > 0) remainNonZero = pickFrom(zeroPool, remainNonZero);
      if (remainZero > 0) remainZero = pickFrom(nonZeroPool, remainZero);

      // If still short, allow duplicates as fallback — spread them evenly
      if (problems.length < count) {
        // Shuffle pool for randomness, then round-robin to spread duplicates
        for (let i = fullPool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [fullPool[i], fullPool[j]] = [fullPool[j], fullPool[i]]; }
        let fi = 0;
        while (problems.length < count) {
          problems.push({ ...fullPool[fi % fullPool.length] });
          fi++;
        }
      }

      // Proximity-aware shuffle: identical/commutative equations should be as far apart as possible
      let layoutCols;
      if (count <= 30) layoutCols = 3;
      else layoutCols = 4;

      function adjKey(p) {
        if (p.op === '+' || p.op === '\u00d7') return p.op + ":" + Math.min(p.top, p.bottom) + "," + Math.max(p.top, p.bottom);
        return p.op + ":" + p.top + "," + p.bottom;
      }
      // Grid distance between two positions (Manhattan distance in row/col space)
      function gridDist(i, j, cols) {
        const r1 = Math.floor(i / cols), c1 = i % cols;
        const r2 = Math.floor(j / cols), c2 = j % cols;
        return Math.abs(r1 - r2) + Math.abs(c1 - c2);
      }
      function getNeighbors(i, arr, cols) {
        const neighbors = [];
        const col = i % cols;
        if (col > 0 && i - 1 >= 0) neighbors.push(i - 1);
        if (col < cols - 1 && i + 1 < arr.length) neighbors.push(i + 1);
        if (i - cols >= 0) neighbors.push(i - cols);
        if (i + cols < arr.length) neighbors.push(i + cols);
        return neighbors;
      }
      // Score: penalize adjacent duplicates heavily, nearby duplicates moderately
      function proximityScore(arr) {
        let score = 0;
        for (let i = 0; i < arr.length; i++) {
          const k = adjKey(arr[i]);
          for (let j = i + 1; j < arr.length; j++) {
            if (adjKey(arr[j]) === k) {
              const d = gridDist(i, j, layoutCols);
              if (d <= 1) score += 100;      // adjacent: severe penalty
              else if (d <= 2) score += 20;   // near: moderate penalty
              else if (d <= 3) score += 5;    // close: mild penalty
            }
          }
        }
        return score;
      }
      function hasAdjacentConflict(arr) {
        for (let i = 0; i < arr.length; i++) {
          const k = adjKey(arr[i]);
          for (const n of getNeighbors(i, arr, layoutCols)) {
            if (adjKey(arr[n]) === k) return true;
          }
        }
        return false;
      }
      // Multi-pass shuffle: try to minimize proximity score
      let bestArr = [...problems];
      let bestScore = proximityScore(bestArr);
      for (let attempt = 0; attempt < 30; attempt++) {
        // Shuffle
        for (let i = problems.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [problems[i], problems[j]] = [problems[j], problems[i]]; }
        // Local optimization: swap conflicting pairs to reduce score
        for (let pass = 0; pass < 300; pass++) {
          const before = proximityScore(problems);
          if (before === 0) break;
          let improved = false;
          for (let i = 0; i < problems.length; i++) {
            const k = adjKey(problems[i]);
            // Find closest duplicate
            let closestJ = -1, closestD = Infinity;
            for (let j = 0; j < problems.length; j++) {
              if (j === i) continue;
              if (adjKey(problems[j]) === k) {
                const d = gridDist(i, j, layoutCols);
                if (d < closestD) { closestD = d; closestJ = j; }
              }
            }
            if (closestJ < 0 || closestD > 3) continue;
            // Try swapping the duplicate with every non-nearby position
            let bestSwap = -1, bestSwapScore = proximityScore(problems);
            for (let s = 0; s < problems.length; s++) {
              if (s === i || s === closestJ) continue;
              if (gridDist(s, i, layoutCols) <= closestD) continue; // only swap farther away
              [problems[closestJ], problems[s]] = [problems[s], problems[closestJ]];
              const sc = proximityScore(problems);
              if (sc < bestSwapScore) { bestSwapScore = sc; bestSwap = s; }
              [problems[closestJ], problems[s]] = [problems[s], problems[closestJ]];
            }
            if (bestSwap >= 0) {
              [problems[closestJ], problems[bestSwap]] = [problems[bestSwap], problems[closestJ]];
              improved = true;
            }
          }
          if (!improved) break;
        }
        const score = proximityScore(problems);
        if (score < bestScore) { bestScore = score; bestArr = [...problems]; }
        if (bestScore === 0) break;
      }
      // Use best arrangement found
      for (let i = 0; i < problems.length; i++) problems[i] = bestArr[i];
      return problems;
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", {
        width: pageW, height: pageH,
        viewBox: "0 0 " + pageW + " " + pageH,
        xmlns: "http://www.w3.org/2000/svg"
      });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16,
            "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#000000"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#000000", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16,
            "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#000000"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#000000", "stroke-width": 0.75
          }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16,
            "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#000000"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#000000", "stroke-width": 0.75
          }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 14,
            "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#000000"
          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.svg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const count = problems.length;
      const bottomMargin = branded ? 56 : 24;
      const availH = pageH - bottomMargin - topGridY;
      const availW = pageW - margin * 2;

      // Determine columns based on problem count
      let cols;
      if (count <= 24) cols = 3;
      else if (count <= 30) cols = 3;
      else cols = 4;

      const rows = Math.ceil(count / cols);
      const colW = availW / cols;
      const rowH = availH / rows;

      // Small font for drills
      const fontSize = Math.min(18, Math.max(11, Math.floor(Math.min(rowH * 0.5, colW * 0.12))));
      const charW = fontSize * 0.62;

      const probNumSize = 8;
      const probNumW = numbered !== false ? probNumSize * (count >= 10 ? 2.0 : 1.6) : 0;

      for (let i = 0; i < problems.length; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cellLeft = margin + col * colW;
        const cellTop = topGridY + row * rowH;
        const { top: pTop, bottom: pBot, op: pOp, answer: pAns } = problems[i];
        const opSymbol = pOp === "\u00d7" ? "\u00d7" : pOp === "\u00f7" ? "\u00f7" : pOp === "-" ? "\u2212" : "+";

        // Vertically center within cell
        const cy = cellTop + rowH * 0.6;
        let x = cellLeft + 6;

        const isExample = (i === 0 && includeExample && !showAnswers);

        // Problem number
        if (numbered !== false) {
          const numEl = svgEl("text", {
            x, y: cy - fontSize * 0.7,
            "font-family": "Fredoka, sans-serif",
            "font-size": String(probNumSize),
            "font-weight": "600",
            fill: "#a0aec0"
          });
          numEl.textContent = (i + 1) + ".";
          svg.appendChild(numEl);
          x += probNumW;
        }

        // First number
        const aEl = svgEl("text", {
          x, y: cy,
          "font-family": "'Google Sans Flex', sans-serif",
          "font-size": String(fontSize),
          "font-weight": "500",
          fill: "#1a202c"
        });
        aEl.textContent = String(pTop);
        svg.appendChild(aEl);
        x += String(pTop).length * charW + charW * 0.6;

        // Operator
        const opEl = svgEl("text", {
          x, y: cy,
          "font-family": "'Google Sans Flex', sans-serif",
          "font-size": String(fontSize),
          "font-weight": "500",
          fill: "#1a202c"
        });
        opEl.textContent = opSymbol;
        svg.appendChild(opEl);
        x += charW * 1.4;

        // Second number
        const bEl = svgEl("text", {
          x, y: cy,
          "font-family": "'Google Sans Flex', sans-serif",
          "font-size": String(fontSize),
          "font-weight": "500",
          fill: "#1a202c"
        });
        bEl.textContent = String(pBot);
        svg.appendChild(bEl);
        x += String(pBot).length * charW + charW * 0.6;

        // Equals sign
        const eqEl = svgEl("text", {
          x, y: cy,
          "font-family": "'Google Sans Flex', sans-serif",
          "font-size": String(fontSize),
          "font-weight": "500",
          fill: "#1a202c"
        });
        eqEl.textContent = "=";
        svg.appendChild(eqEl);
        x += charW * 1.2;

        // Answer area: a short underline
        const lineLen = Math.max(charW * 2.5, String(Math.abs(Math.round(pAns))).length * charW + charW);
        const lineY = cy + 2;

        if (isExample) {
          // Green underline + answer
          svg.appendChild(svgEl("line", {
            x1: x, y1: lineY, x2: x + lineLen, y2: lineY,
            stroke: "#22c55e", "stroke-width": "1.5"
          }));
          // Example badge
          const badgeW = 38, badgeH = 11;
          const badgeX = x + lineLen - badgeW;
          const badgeY2 = cy - fontSize - 8;
          svg.appendChild(svgEl("rect", {
            x: badgeX, y: badgeY2, width: badgeW, height: badgeH, rx: 2, ry: 2,
            fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75"
          }));
          const bt = svgEl("text", {
            x: badgeX + badgeW / 2, y: badgeY2 + 8,
            "text-anchor": "middle",
            "font-family": "Fredoka, sans-serif",
            "font-size": "7.5",
            "font-weight": "600",
            fill: "#16a34a"
          });
          bt.textContent = "Example";
          svg.appendChild(bt);
          // Answer text
          const aEl2 = svgEl("text", {
            x: x + lineLen / 2, y: cy - 1,
            "text-anchor": "middle",
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(fontSize * 0.9),
            "font-weight": "500",
            fill: "#16a34a"
          });
          aEl2.textContent = String(Math.round(pAns));
          svg.appendChild(aEl2);
        } else {
          svg.appendChild(svgEl("line", {
            x1: x, y1: lineY, x2: x + lineLen, y2: lineY,
            stroke: "#2d3748", "stroke-width": "1.2"
          }));
          if (showAnswers) {
            const aEl2 = svgEl("text", {
              x: x + lineLen / 2, y: cy - 1,
              "text-anchor": "middle",
              "font-family": "'Google Sans Flex', sans-serif",
              "font-size": String(fontSize * 0.9),
              "font-weight": "500",
              fill: "#3182ce"
            });
            aEl2.textContent = String(Math.round(pAns));
            svg.appendChild(aEl2);
          }
        }
      }

      return svg;
    }

    // ===== Auto title =====
    function generateAutoTitle() {
      const ops = getSelectedOps();
      const w = getWithinValue();
      const names = { "+": "Addition", "-": "Subtraction", "\u00d7": "Multiplication", "\u00f7": "Division" };
      let opLabel;
      if (ops.length === 4) opLabel = "Mixed Operations";
      else if (ops.length === 3) opLabel = ops.map(o => names[o]).join(", ");
      else if (ops.length === 2) opLabel = ops.map(o => names[o]).join(" & ");
      else opLabel = names[ops[0]] || "Math";
      return opLabel + " Within " + w;
    }

    // ===== Gather options =====
    function gatherOptions() {
      const ops = getSelectedOps();
      const w = getWithinValue();
      const useZero = elUseZero.checked;
      const zeroPercent = parseInt(elZeroPercent.value, 10);
      const lo = 1;
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        useZero,
        zeroPercent,
        min1: lo,
        max1: w,
        min2: lo,
        max2: w,
        maxAnswer: w,
        operations: ops,
        numWorksheets: parseInt(elNumSheets.value, 10),
        problemsPerSheet: parseInt(elProblems.value, 10),
        showHeader,
        title,
        subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        includeExample: elIncludeExample.checked,
        numbered: elNumbered.checked,
      };
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = "";
      sheetWrap.className = "";
      sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div");
          p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], {
            showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle,
            branded: opts.branded, showAnswers: false,
            numbered: opts.numbered, includeExample: opts.includeExample
          });
          p.appendChild(v);
          sheetWrap.appendChild(p);
        }
        return;
      }

      // Desktop: grid layout with calculated sizing
      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2;
        const ah = window.innerHeight - 80;
        const gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) {
          cols = numSheets;
          if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap)));
        } else {
          cols = Math.min(3, numSheets);
          if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap)));
        }
        const msw = (aw - (cols - 1) * gap) / cols;
        const msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div");
          p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], {
            showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle,
            branded: opts.branded, showAnswers: false,
            numbered: opts.numbered, includeExample: opts.includeExample
          });
          v.setAttribute("width", sw);
          v.setAttribute("height", sh);
          p.appendChild(v);
          sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div");
        p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], {
          showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle,
          branded: opts.branded, showAnswers: false,
          numbered: opts.numbered, includeExample: opts.includeExample
        });
        p.appendChild(v);
        sheetWrap.appendChild(p);
      }
    }

    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }


    // Load and register TTF fonts with jsPDF for embedded vector text in PDFs
    let _fontCache = {};
    // Preload font files on page load so PDF generation is faster
    (function preloadFonts() {
      ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
        fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
          var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
        }).catch(function() {});
      });
    })();
    async function registerPdfFonts(pdf) {
      // svg2pdf strips quotes and fallbacks, so register with clean names only
      // Also register "normal" for undefined-style calls
      const fontDefs = [
        { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
        { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
        { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
      ];
      let idx = 0;
      for (const f of fontDefs) {
        try {
          let b64;
          if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
          else {
            const resp = await fetch(f.file);
            const buf = await resp.arrayBuffer();
            const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
            _fontCache[f.file] = b64;
          }
          for (const style of f.styles) {
            const vfsName = "f" + (idx++) + ".ttf";
            pdf.addFileToVFS(vfsName, b64);
            pdf.addFont(vfsName, f.name, style);
          }
        } catch(e) { console.warn("Font load failed:", f.file, e); }
      }
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], {
                  showHeader: "none",
                  title: opts.title,
                  subtitle: opts.subtitle,
                  branded: opts.branded,
                  showAnswers: true,
                  numbered: opts.numbered,
                  isAnswerKey: true,
                  includeExample: false
                }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      // Register embedded fonts
      await registerPdfFonts(pdf);

      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

    // ===== Event Listeners =====
    elWithin.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
    let resizeTimeout;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        if (currentState.sheets.length > 1) renderWorksheet();
      }, 150);
    });

    // Init
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
