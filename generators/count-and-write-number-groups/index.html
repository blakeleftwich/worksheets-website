<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    /* ===== Site Header ===== */
    .site-header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;

    }

    .site-logo {
      display: flex;

    }

    .site-logo-img {
      height: 44px;
      width: auto;

    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 600;
      color: #64748b;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-links a:hover {
      background: #f1f5f9;

    }

    .nav-links a.active {
      background: #fef3c7;
      color: #92400e;
    }

    .main-container {
      display: grid;
      grid-template-columns: 340px 1fr;
    }

    .sidebar {
      background: white;
      padding: 32px 24px;

      overflow-y: auto;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
    }

    .sidebar h2 {
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
      text-align: left;
    }

    .sidebar .subtitle {
      font-size: 14px;
      color: #718096;
      margin-bottom: 32px;
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 6px;
    }

    .control-group input[type="number"],
    .control-group select {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: white;
      color: #2d3748;
      transition: all 0.2s;

    .control-group input[type="number"]:focus,
    .control-group select:focus {
      outline: none;
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
    }

    .control-group input[type="number"]:hover,
    .control-group select:hover {
      border-color: #cbd5e0;
    }

    /* ===== Advanced Options Toggle ===== */
    .advanced-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 10px 0;
      margin-bottom: 4px;
      user-select: none;
    }

    .advanced-toggle .toggle-arrow {
      font-size: 12px;
      transition: transform 0.2s;
      color: #f59e0b;
    }

    .advanced-toggle .toggle-arrow.open {
      transform: rotate(90deg);
    }

    .advanced-toggle span:last-child {
      font-size: 13px;
      font-weight: 600;
      color: #f59e0b;
    }

    .advanced-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: #f7fafc;
      border-radius: 8px;
      margin-bottom: 16px;

    .advanced-panel.open {
      max-height: 800px;
    }

    .advanced-panel-inner {
      padding: 16px;

      flex-direction: column;

    .advanced-panel-inner .control-group {
      margin-bottom: 0;

    }

    .adv-checkbox-row label {

      font-weight: 600;
      color: #2d3748;
      cursor: pointer;

    .adv-sub {

    #btnGenerate {

    .preview-area {

    #sheetWrap {

    .worksheet-page {

      padding: 24px;

    .worksheet-page.scaled {

    @media print {
      .site-header { display: none !important; }
      .ak-print-only { display: block !important; }

      }

        margin: 0 !important;

    }
    
    @page {

      margin: 0.5in 0.4in 0in 0.4in;

    @media (max-width: 1024px) {
      .site-header { position: relative; }
      .main-container {

      .sidebar {

      .preview-area {

      }

      .worksheet-page {
        scroll-margin-top: 72px;

      }

      .worksheet-page svg {
        width: 100% !important;
        height: auto !important;
      }

      #sheetWrap {
        gap: 16px;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        padding: 0 !important;
      }

      .nav-links {
        gap: 2px;
      }

      .nav-links a {
        font-size: 13px;
        padding: 6px 10px;
      }
}

  <script>
const sheetWrap = document.getElementById("sheetWrap");
const statusEl = document.getElementById("status");

const elNumSheets = document.getElementById("numSheets");
const elProblems = document.getElementById("problems");
const elCountRange = document.getElementById("countRange");
const elStyle = document.getElementById("style");
const elShowHeader = document.getElementById("showHeader");
const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
const elHeaderModeOptions = document.getElementById("headerModeOptions");
const elNumbered = document.getElementById("numbered");
const elBranded = document.getElementById("branded");
const elAnswerKey = document.getElementById("answerKey");
const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
const elHeaderText = document.getElementById("headerText");
const elSubtitleText = document.getElementById("subtitleText");
const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
const elCustomTitleOptions = document.getElementById("customTitleOptions");
const elShowTitle = document.getElementById("showTitle");
const elShowSubtitle = document.getElementById("showSubtitle");
const elTitleInputWrap = document.getElementById("titleInputWrap");
const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
const elAllowZero = document.getElementById("allowZero");
const elAllowZeroRow = document.getElementById("allowZeroRow");
const elAnswerMode = document.getElementById("answerMode");
const elNumChoices = document.getElementById("numChoices");
const elNumChoicesGroup = document.getElementById("numChoicesGroup");
const advToggle = document.getElementById("advToggle");
const advPanel = document.getElementById("advPanel");
const advArrow = document.getElementById("advArrow");

// Track current worksheet state - now an array of sheets
let currentState = {
  sheets: [], // Each sheet has its own problems array
  randomSeed: Date.now()
};

function getCountRange() {
  const parts = elCountRange.value.split("-");
  const rawMin = parseInt(parts[0], 10);
  return { min: rawMin, max: parseInt(parts[1], 10) };
}

function getRange() {
  const r = getCountRange();
  return [r.min, r.max];
}

function updateCountRangeLabels() {
  const lo = elAllowZero.checked ? '0' : '1';
  for (const opt of elCountRange.options) {
    const parts = opt.value.split('-');
    const minLabel = parts[0] === '1' ? lo : parts[0];
    opt.text = minLabel + ' to ' + parts[1];
  }
}

function updateTitleFromSettings() {
  const title = buildDefaultTitle();
  elHeaderText.value = title;
}

function getHeaderMode() {
  return elShowHeaderEnabled.checked ? elShowHeader.value : "both";
}

function buildDefaultTitle() {
  const range = getCountRange();
  const mode = elAnswerMode.value === "circle" ? "Count & Circle" : "Count & Write";
  return `${mode} to ${range.max}`;
}

function getTitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowTitle.checked ? elHeaderText.value : "";
  }
  return buildDefaultTitle();
}

function getSubtitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowSubtitle.checked ? elSubtitleText.value : "";
  }
  return elAnswerMode.value === "circle" ? "Count the objects and circle the number." : "Count the objects and write the number.";
}

function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.className = 'success';
  setTimeout(() => {
    statusEl.style.display = 'none';
  }, 3000);
}

// ===== Advanced panel toggle =====
advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

// ===== Allow zero =====
elAllowZero.addEventListener("change", () => { updateCountRangeLabels(); updateTitleFromSettings(); renderWithNewRandomization(); });

// ===== Answer mode toggle =====
elAnswerMode.addEventListener("change", () => {
  elNumChoicesGroup.style.display = elAnswerMode.value === "circle" ? "block" : "none";
  updateTitleFromSettings();
  updateStyleDependentOptions();
  renderWithNewRandomization();
});
elNumChoices.addEventListener("change", () => renderWithoutRandomization());

// ===== Name/Date toggle =====
elShowHeaderEnabled.addEventListener("change", () => {
  elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});

// ===== Custom title toggle =====
elCustomTitleEnabled.addEventListener("change", () => {
  elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowTitle.addEventListener("change", () => {
  elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowSubtitle.addEventListener("change", () => {
  elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
  renderWithoutRandomization();
});

// Add event listeners for real-time updates
elNumSheets.addEventListener("change", () => renderWithNewRandomization());
elProblems.addEventListener("change", () => renderWithNewRandomization());
elCountRange.addEventListener("change", () => {
  updateAllowZeroVisibility();
  updateTitleFromSettings(); renderWithNewRandomization();
});

function updateAllowZeroVisibility() {
  const range = getCountRange();
  const show = range.min <= 1;
  elAllowZeroRow.style.display = show ? "" : "none";
  if (!show) { elAllowZero.checked = false; }
}
updateAllowZeroVisibility();

// Declare these before updateStyleDependentOptions which references them
const elSortRows = document.getElementById("sortRows");
const elLargerGroupFirst = document.getElementById("largerGroupFirst");
const elSplitGroups = document.getElementById("splitGroups");
const elScattered = document.getElementById("scattered");
const elOrganization = document.getElementById("organization");

function updateStyleDependentOptions() {
  const style = parseInt(elStyle.value, 10);
  const mode = elAnswerMode.value;
  const isOneCol = style === 2;
  const isCircle = mode === "circle";

  // Problems per sheet: update options based on style
  const sel = document.getElementById("problems");
  const currentVal = sel.value;
  sel.innerHTML = "";
  if (isOneCol) {
    sel.add(new Option("5", "5"));

let _fontCSSCache = null;
async function buildFontCSS() {
  if (_fontCSSCache) return _fontCSSCache;
  let fontCSS = "";
  for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
    if (!link.href.includes('fonts')) continue;
    try {
      const resp = await fetch(link.href);
      const css = await resp.text();
      let inlined = css;
      for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
        const fontUrl = m[1].replace(/['"]/g, "");
        const absUrl = new URL(fontUrl, link.href).href;
        try {
          const fr = await fetch(absUrl);
          const blob = await fr.blob();
          const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
          inlined = inlined.replace(m[0], 'url(' + b64 + ')');
        } catch(e) {}
      }
      fontCSS += inlined;
    } catch(e) {}
  }
  for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
    try {
      const resp = await fetch(link.href);
      const css = await resp.text();
      let inlined = css;
      for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
        const fontUrl = m[1].replace(/['"]/g, "");
        try {
          const fr = await fetch(fontUrl);
          const blob = await fr.blob();
          const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
          inlined = inlined.replace(m[0], 'url(' + b64 + ')');
        } catch(e) {}
      }
      fontCSS += inlined;
    } catch(e) {}
  }
  _fontCSSCache = fontCSS;
  return fontCSS;
}

// ===== Shared helpers for variety packs =====
function generateRandomProblems(min, max, numProblems) {
  const numIcons = 18;
  let availableIcons = [];
  for (let i = 0; i < Math.ceil(numProblems / numIcons); i++) {
    const batch = Array.from({length: numIcons}, (_, idx) => idx);
    shuffleArray(batch);
    availableIcons = availableIcons.concat(batch);
  }

  // Build the range of possible values
  const rangeValues = [];
  for (let v = min; v <= max; v++) rangeValues.push(v);
  const rangeSize = rangeValues.length;

  // Grid adjacency check for 2-column layout compatibility
  // In a 2-col grid, position i is adjacent to i-1 (left), i+1 (right), i-2 (above), i+2 (below)
  // In a 1-col layout, position i is adjacent to i-1 and i+1
  // We enforce the stricter 2-col constraint so problems work in both layouts
  const cols = 2;
  function isAdjacent(posA, posB) {
    if (posA < 0 || posB < 0) return false;
    const diff = Math.abs(posA - posB);
    if (diff === 1) {
      // Only adjacent left/right if on same row
      return Math.floor(posA / cols) === Math.floor(posB / cols);
    }
    return diff === cols; // above/below
  }

  function getAdjacentValues(counts, pos) {
    const adj = new Set();
    for (let p = 0; p < counts.length; p++) {
      if (counts[p] !== null && isAdjacent(pos, p)) adj.add(counts[p]);
    }
    return adj;
  }

  // Step 1: Guarantee every value in the range appears at least once
  // Start with one copy of each value (shuffled), truncate if range > numProblems
  let required = [...rangeValues];
  shuffleArray(required);
  if (required.length > numProblems) {
    required = required.slice(0, numProblems);
  }

  // Step 2: Fill remaining slots with values from the range
  // Never reuse the smallest number (min) as the repeated value
  const extraCount = numProblems - required.length;
  const extras = [];
  const extraCandidates = rangeValues.filter(v => v !== min);
  // If range is exactly 1 value, we have no choice but to reuse it
  const extraPool = extraCandidates.length > 0 ? extraCandidates : rangeValues;
  for (let i = 0; i < extraCount; i++) {
    extras.push(extraPool[randInt(0, extraPool.length - 1)]);
  }

  // Combine and place using backtracking to satisfy adjacency constraints
  const allValues = required.concat(extras);
  const counts = new Array(numProblems).fill(null);

  // Try to place values with no-adjacency constraint using greedy + shuffle retry
  function tryPlace(values) {
    const pool = [...values];
    const result = new Array(numProblems).fill(null);

    for (let pos = 0; pos < numProblems; pos++) {
      const adjVals = getAdjacentValues(result, pos);
      // Find candidates in pool that don't conflict
      const validIndices = [];
      for (let j = 0; j < pool.length; j++) {
        if (!adjVals.has(pool[j])) validIndices.push(j);
      }
      if (validIndices.length === 0) return null; // Failed
      // Pick a random valid candidate
      const pick = validIndices[randInt(0, validIndices.length - 1)];
      result[pos] = pool[pick];
      pool.splice(pick, 1);
    }
    return result;
  }

  // Try up to 50 times with reshuffled values
  let placed = null;
  for (let attempt = 0; attempt < 50; attempt++) {
    shuffleArray(allValues);
    placed = tryPlace(allValues);
    if (placed) break;
  }

  // Fallback: if placement failed (very small range, many problems), relax constraint
  if (!placed) {
    placed = allValues;
    shuffleArray(placed);
  }

  // Build final problems array
  const problems = [];
  for (let i = 0; i < numProblems; i++) {
    problems.push({ count: placed[i], iconIndex: availableIcons[i] });
  }

  // Allow Zero: add exactly one problem with count 0
  if (elAllowZero.checked && getCountRange().min <= 1) {
    const idx = Math.floor(Math.random() * problems.length);
    problems[idx].count = 0;
  }

  return problems;
}



function renderWithNewRandomization() {
  // Generate new random problems for each sheet
  const numSheets = parseInt(elNumSheets.value, 10);
  const numProblems = parseInt(elProblems.value, 10);
  const range = getCountRange();
  const minCount = range.min;
  const maxCount = range.max;
  const numIcons = 18; // Total available icons
  
  currentState.sheets = [];
  currentState.randomSeed = Date.now();

  for (let s = 0; s < numSheets; s++) {
    const problems = generateRandomProblems(minCount, maxCount, numProblems);
    // Assign per-problem organization flags based on Organization dropdown
    const orgVal = elOrganization.value;
    // Organization modes:
    // "none" = standard, "scattered" = all scattered, "split" = all split groups
    // "mixed" = mix of scattered + split (not both), "both" = all scattered split groups
    // "allmixed" = mix of scattered, split, and scattered split groups
    // For mixed modes, distribute types evenly then shuffle
    if (orgVal === "mixed" || orgVal === "allmixed") {
      const types = orgVal === "mixed" ? ["scattered", "split"] : ["scattered", "split", "both"];
      const assignments = [];
      for (let t = 0; t < problems.length; t++) {
        assignments.push(types[t % types.length]);
      }
      // Shuffle assignments
      for (let t = assignments.length - 1; t > 0; t--) {
        const j = Math.floor(Math.random() * (t + 1));
        [assignments[t], assignments[j]] = [assignments[j], assignments[t]];
      }
      for (let t = 0; t < problems.length; t++) {
        const pick = assignments[t];
        problems[t].orgSplit = (pick === "split" || pick === "both");
        problems[t].orgScattered = (pick === "scattered" || pick === "both");
      }
    } else {
      for (const p of problems) {
        p.orgSplit = (orgVal === "split" || orgVal === "both");
        p.orgScattered = (orgVal === "scattered" || orgVal === "both");
      }
    }
    for (const p of problems) {
      // Generate split data if this problem uses split
      if (p.orgSplit) {
        if (p.count === 0 || p.count === 1) {
          p.splitA = p.count;
          p.splitB = 0;
        } else if (p.count === 2) {
          p.splitA = 1;
          p.splitB = 1;
        } else {
          const minGroup = Math.max(1, Math.round(p.count * 0.3));
          const maxGroup = p.count - minGroup;
          const splitA = minGroup + Math.floor(Math.random() * (maxGroup - minGroup + 1));
          p.splitA = splitA;
          p.splitB = p.count - splitA;
        }
        // Ensure larger group is first when checkbox is checked
        if (elLargerGroupFirst.checked && p.splitA < p.splitB) {
          [p.splitA, p.splitB] = [p.splitB, p.splitA];
        }
      }
    }
    currentState.sheets.push(problems);
  }

  renderWorksheet();
}

// Fisher-Yates shuffle
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

  if (currentState.sheets.length === 0) {

}

function renderWorksheet() {
  const style = parseInt(elStyle.value, 10);
  const headerMode = getHeaderMode();
  const branded = elBranded.checked;
  const numbered = elNumbered.checked;
  const includeExample = elIncludeExample.checked;

  const isOneCol = style === 2;
  const perRowMax = elSortRows.checked ? (isOneCol ? -2 : -1) : (isOneCol ? -3 : 0);
  const orgMode = elOrganization.value;
  // For non-mixed modes, all problems get the same flags
  const globalSplit = (orgMode === "split" || orgMode === "both");
  const globalScattered = (orgMode === "scattered" || orgMode === "both");
  const isMixed = (orgMode === "mixed");
  const splitGroups = globalSplit || isMixed;
  const scattered = globalScattered || isMixed;

  const icons = ICON_LIST;

  sheetWrap.innerHTML = "";
  
  // Set up grid view if multiple sheets
  if (numSheets > 1) {
    sheetWrap.classList.add('grid-view');
    
    const sheetWidth = 612;
    const sheetHeight = 792;
    const sheetAspect = sheetHeight / sheetWidth;
    
    // Calculate available space
    // Add edge padding for 3+ worksheets
    const edgePadding = numSheets >= 3 ? 40 : 0;
    const availableWidth = window.innerWidth - 340 - 80 - (edgePadding * 2); // sidebar + padding + edge padding
    const availableHeight = window.innerHeight - 80; // padding
    const gap = 24;
    
    // Minimum readable width for a worksheet preview
    const minReadableWidth = 180;
    
    // Determine optimal columns based on rules:
    // - 2 or 3 sheets: single row
    // - 4+ sheets: max 3 per row
    // - Break rules if needed to maintain readability
    let cols;
    if (numSheets <= 3) {
      // Try to fit all in one row
      cols = numSheets;
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      // If too small, reduce columns
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    } else {
      // 4+ sheets: max 3 per row, but check readability
      cols = Math.min(3, numSheets);
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    }
    
    const rows = Math.ceil(numSheets / cols);
    
    // Calculate scale
    const maxSheetWidth = (availableWidth - (cols - 1) * gap) / cols;
    
    // For 1-3 sheets (single row), fit within viewport height
    // For 4+ sheets, allow scrolling
    let maxSheetHeight;
    if (numSheets <= 3) {
      maxSheetHeight = availableHeight;
    } else {
      // Allow larger previews when scrolling is enabled
      maxSheetHeight = availableHeight * 0.8;
    }
    
    const scaleByWidth = maxSheetWidth / sheetWidth;
    const scaleByHeight = maxSheetHeight / sheetHeight;
    const scale = Math.min(scaleByWidth, scaleByHeight);
    
    const scaledWidth = Math.floor(sheetWidth * scale);
    const scaledHeight = Math.floor(sheetHeight * scale);
    
    sheetWrap.style.gridTemplateColumns = `repeat(${cols}, ${scaledWidth + 24}px)`;
    sheetWrap.style.padding = numSheets >= 3 ? `0 ${edgePadding}px` : '0';
    
    // Render each sheet
    for (let s = 0; s < numSheets; s++) {
      const wsCode = '(' + (s + 1) + ')';
      const problems = currentState.sheets[s];
      const svg = generateWorksheetSvg(problems, style, headerMode, branded, numbered, icons, title, subtitle, includeExample, perRowMax, wsCode, splitGroups, scattered);
      svg.setAttribute('width', scaledWidth);
      svg.setAttribute('height', scaledHeight);

      const page = document.createElement("div");
      page.className = "worksheet-page scaled";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  } else {
    sheetWrap.classList.remove('grid-view');
    sheetWrap.style.gridTemplateColumns = '';
    sheetWrap.style.padding = '0';

    // Single sheet - render at full size
    if (currentState.sheets.length > 0) {
      const problems = currentState.sheets[0];
      const wsCode = '(1)';
      const svg = generateWorksheetSvg(problems, style, headerMode, branded, numbered, icons, title, subtitle, includeExample, perRowMax, wsCode, splitGroups, scattered);

      const page = document.createElement("div");
      page.className = "worksheet-page";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  }
  
  showStatus('✓ Worksheet updated!');
}

    const count = problem.count;

    const lineW = 72;
    const lineCenterX = x + cellW / 2;
    const lineY = y + cellH - 18;
    const lineX1 = lineCenterX - lineW / 2;
    const lineX2 = lineCenterX + lineW / 2;

      iconId,

      // Generate wrong answers that are close to the correct answer
      const choices = [count];
      const [lo, hi] = getRange();
      while (choices.length < choiceCount) {
        let wrong;
        if (Math.random() < 0.5) wrong = count + Math.ceil(Math.random() * 3);
        else wrong = count - Math.ceil(Math.random() * 3);
        if (wrong < lo) wrong = count + Math.ceil(Math.random() * 3);
        if (wrong > hi) wrong = count - Math.ceil(Math.random() * 3);
        if (wrong < lo) wrong = lo;
        if (wrong > hi) wrong = hi;
        if (wrong !== count && choices.indexOf(wrong) === -1) choices.push(wrong);
        if (choices.length >= hi - lo + 1) break; // avoid infinite loop with tiny ranges
      }
      // Shuffle choices
      for (let s = choices.length - 1; s > 0; s--) {
        const j = Math.floor(Math.random() * (s + 1));
        const tmp = choices[s]; choices[s] = choices[j]; choices[j] = tmp;

        });

        svg.appendChild(badgeText);
      }

    // Write mode: standard underline
    svg.appendChild(svgEl("line", {
      x1: lineX1, y1: lineY, x2: lineX2, y2: lineY,
      stroke: isExample ? "#22c55e" : "#cbd5e1",

    }));

    if (isExample) {

      const badgeW = 42, badgeH = 13;
      const badgeX = lineX2 - badgeW;

      svg.appendChild(svgEl("rect", {

      // Show answer in green above line

        x: lineCenterX, y: lineY - 4,
        "font-family": "'Google Sans Flex', sans-serif", "font-size": 24, "font-weight": 700,
        fill: "#16a34a", "text-anchor": "middle"
      });
      ansText.textContent = String(count);
      svg.appendChild(ansText);
    }
    } // close else (write mode) - Style 1
  }

  // Add branding at bottom
  if (branded) {
    const brandY = pageH - 48;
    const logoH = 38;
    const logoW = Math.round(logoH * 2.79);
    svg.appendChild(svgEl("image", {

  return svg;
}

function placeObjects(svg, { iconId, count, x, y, w, h, answerBox = null, problemIndex = 0, problemCount = 8, perRowMax = 5, splitGroups = false, splitA, splitB, scattered = false }) {

          const offY = (seededRandom() * 2 - 1) * jitterY;
          const tryX = gridX + offX;
          const tryY = gridY + offY;

          // Keep within bounds
          const clampedX = Math.max(aX, Math.min(aX + aW - iconW, tryX));
          const clampedY = Math.max(aY, Math.min(aY + aH - iconH, tryY));
          const tryCX = clampedX + iconW / 2;
          const tryCY = clampedY + iconH / 2;

          // Collision check
          let collides = false;
          for (const p of placed) {
            const dx = tryCX - p.cx;
            const dy = tryCY - p.cy;
            if (Math.sqrt(dx * dx + dy * dy) < minDist) { collides = true; break; }
          }
          if (!collides) {
            finalX = clampedX;
            finalY = clampedY;
            foundPos = true;
            break;
          }
        }

        // Fall back to grid position if no non-colliding position found
        if (!foundPos) { finalX = gridX; finalY = gridY; }

        const cx = finalX + iconW / 2;
        const cy = finalY + iconH / 2;

        placed.push({ cx, cy });

        problemGroup.appendChild(svgEl("use", {
          href: `#${iconId}`,
          x: finalX, y: finalY,
          width: iconW, height: iconH
        }));
        idx++;
      }
    }
  } else {
    let idx = 0;
    for (let r = 0; r < bestRows && idx < count; r++) {
      for (let c = 0; c < bestCols && idx < count; c++) {
        const ix = startX + c * (iconW + spacing);
        const iy = startY + r * (iconH + spacing);
        problemGroup.appendChild(svgEl("use", {
          href: `#${iconId}`,
          x: ix, y: iy,
          width: iconW, height: iconH
        }));
        idx++;
      }
    }
  }

  svg.appendChild(problemGroup);
}

function placeObjectsRow(svg, { iconId, count, x, y, w, h }) {
  if (count <= 0) return;
  // Calculate size with guaranteed spacing
  const availableWidth = w - (count + 1) * 8; // 8px spacing minimum
  const maxItemWidth = availableWidth / count;
  
  let size = Math.min(h * 0.85, maxItemWidth);
  size = Math.max(20, Math.min(50, size));
  
  const totalWidth = size * count;
  const spacing = (w - totalWidth) / (count + 1);
  
  for (let i = 0; i < count; i++) {
    const cx = x + spacing + i * (size + spacing) + size / 2;
    const cy = y + h / 2;

    svg.appendChild(svgEl("use", {
      href: `#${iconId}`,
      x: cx - size / 2,
      y: cy - size / 2,
      width: size,
      height: size
    }));
  }
}

function placeObjectsRowLeftAligned(svg, { iconId, count, x, y, w, h, maxCount, perRowMax = 5, splitGroups = false, splitA, splitB, scattered = false, problemIndex = 0 }) {
  if (count <= 0) return;
  // Resolve perRowMax sentinel values per-problem
  if (perRowMax === -1) { perRowMax = count <= 5 ? 0 : 5; }
  else if (perRowMax === -2) { perRowMax = count <= 5 ? 0 : (count <= 10 ? 5 : 10); }
  else if (perRowMax === -3) { perRowMax = count > 10 ? 10 : 0; }
  const spacing = 6;
  const startX = x + 18;

  const leftPad = 18;
  const rightPad = 5;
  const availW = w - leftPad - rightPad;

  // Split Groups mode: render two sub-groups with a gap
  if (splitGroups && splitA !== undefined && splitB > 0) {
    const splitSpacing = 2; // tighter spacing within each group
    const gap = 28; // larger gap between the two groups
    const halfW = (availW - gap) / 2;

    // Per-sub-group sort row max: over 5 items → always rows of 5
    function subPerRowMax(subCount) {
      if (subCount > 5) return 5;
      return 0; // no wrapping
    }

    // Compute size for a sub-group (without rendering)
    function computeSubSize(subCount, subW) {
      if (subCount <= 0) return 20;
      const effMax = subPerRowMax(subCount);
      const needsWrap = effMax > 0 && subCount > effMax;
      if (needsWrap) {
        const perRow = effMax;
        const rows = Math.ceil(subCount / perRow);
        const sizeByW = (subW - (perRow - 1) * splitSpacing) / perRow;
        const sizeByH = (h - (rows - 1) * splitSpacing) / rows * 0.9;
        return Math.max(20, Math.min(sizeByW, sizeByH));
      } else {
        const sizeByW = (subW - (subCount - 1) * splitSpacing) / subCount;
        const sizeByH = h * 0.85;
        return Math.max(20, Math.min(sizeByW, sizeByH));
      }
    }

    // Use the smaller size of the two groups so both match
    const sizeA = computeSubSize(splitA, halfW);
    const sizeB = computeSubSize(splitB, halfW);
    const uniformSize = Math.min(sizeA, sizeB);

    // Render a sub-group at the given size
    function renderSubGroup(subCount, subStartX, subW, size) {
      if (subCount <= 0) return;
      const effMax = subPerRowMax(subCount);
      const needsWrap = effMax > 0 && subCount > effMax;
      if (needsWrap) {
        const perRow = effMax;
        const rows = Math.ceil(subCount / perRow);
        const rowH = size + splitSpacing;
        const totalH = rowH * rows - splitSpacing;
        const sY = y + (h - totalH) / 2;
        for (let i = 0; i < subCount; i++) {
          const row = Math.floor(i / perRow);
          const col = i % perRow;
          const cx = subStartX + col * (size + splitSpacing) + size / 2;
          const cy = sY + row * rowH + size / 2;
          svg.appendChild(svgEl("use", {
            href: `#${iconId}`,
            x: cx - size / 2, y: cy - size / 2,
            width: size, height: size
          }));
        }
      } else {
        for (let i = 0; i < subCount; i++) {
          const cx = subStartX + i * (size + splitSpacing) + size / 2;
          const cy = y + h / 2;
          svg.appendChild(svgEl("use", {
            href: `#${iconId}`,
            x: cx - size / 2, y: cy - size / 2,
            width: size, height: size
          }));
        }
      }
    }

    // Render group A on the left, group B on the right — both at uniform size
    renderSubGroup(splitA, startX, halfW, uniformSize);
    renderSubGroup(splitB, startX + halfW + gap, halfW, uniformSize);

    // No divider line between split groups
    return;
  }

  // Standard (non-split) layout
  const needsWrap = perRowMax > 0 && count > perRowMax;

  // Compute grid positions first (needed for both scattered and normal)
  let size, gridPositions = [];

  if (needsWrap) {
    // Two rows
    const perRow = perRowMax;
    const sizeByW = (availW - (perRow - 1) * spacing) / perRow;
    const sizeByH = (h - spacing) / 2 * 0.9;
    size = Math.min(sizeByW, sizeByH);
    size = Math.max(20, size);

    const rowH = size + spacing;
    const totalH = rowH * 2 - spacing;
    const sY = y + (h - totalH) / 2;

    for (let i = 0; i < count; i++) {
      const row = Math.floor(i / perRow);
      const col = i % perRow;
      const cx = startX + col * (size + spacing) + size / 2;
      const cy = sY + row * rowH + size / 2;
      gridPositions.push({ cx, cy });
    }
  } else {
    // Single row - size based on actual count to fill the space
    const sizeByW = (availW - (count - 1) * spacing) / count;
    const sizeByH = h * 0.85;
    size = Math.min(sizeByW, sizeByH);
    size = Math.max(20, size);

    for (let i = 0; i < count; i++) {
      const cx = startX + i * (size + spacing) + size / 2;
      const cy = y + h / 2;
      gridPositions.push({ cx, cy });
    }
  }

  if (scattered) {
    // Scale down for scattered mode
    size = size * 0.75;
    // Seeded random based on problemIndex for consistent positions
    let seed = (problemIndex + 1) * 9301 + 49297;
    function seededRandom() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }

    const placed = [];
    const maxAttempts = 30;
    const jitterX = (size + spacing) * 0.45;
    const jitterY = h * 0.35;
    const minDist = size * 0.95;

    for (let i = 0; i < gridPositions.length; i++) {
      const gp = gridPositions[i];
      let finalCX = gp.cx, finalCY = gp.cy;
      let foundPos = false;

      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        const offX = (seededRandom() * 2 - 1) * jitterX;
        const offY = (seededRandom() * 2 - 1) * jitterY;
        const tryCX = gp.cx + offX;
        const tryCY = gp.cy + offY;

        // Keep within bounds
        const clampedCX = Math.max(x + size / 2, Math.min(x + w - size / 2, tryCX));
        const clampedCY = Math.max(y + size / 2, Math.min(y + h - size / 2, tryCY));

        // Collision check
        let collides = false;
        for (const p of placed) {
          const dx = clampedCX - p.cx;
          const dy = clampedCY - p.cy;
          if (Math.sqrt(dx * dx + dy * dy) < minDist) { collides = true; break; }
        }
        if (!collides) {
          finalCX = clampedCX;
          finalCY = clampedCY;
          foundPos = true;
          break;
        }
      }

      placed.push({ cx: finalCX, cy: finalCY });

      svg.appendChild(svgEl("use", {
        href: `#${iconId}`,
        x: finalCX - size / 2, y: finalCY - size / 2,
        width: size, height: size
      }));
    }
  } else {
    for (const gp of gridPositions) {
      svg.appendChild(svgEl("use", {
        href: `#${iconId}`,
        x: gp.cx - size / 2, y: gp.cy - size / 2,
        width: size, height: size
      }));
    }
  }
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

// Debounced resize handler to recalculate grid

window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    if (currentState.sheets.length > 1) {
      renderWorksheet();
    }
  }, 150);
});

// Initial render
renderWithNewRandomization();
  
    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {

        } catch(e) { return ''; }
      }).filter(Boolean);
    };
