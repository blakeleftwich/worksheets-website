<style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      padding: 0;
      margin: 0;
    }

    /* ===== Site Header ===== */
    .site-header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .site-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .site-logo-img {
      height: 44px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 600;
      color: #64748b;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.2s;

    .nav-links a:hover {
      background: #f1f5f9;
      color: #1a1a2e;
    }

    .nav-links a.active {
      background: #fef3c7;

    }

    .main-container {
      display: grid;
      grid-template-columns: 340px 1fr;

    .sidebar {
      background: white;
      padding: 32px 24px;
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
      position: sticky;
      top: 64px;

    .sidebar h2 {

      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
      text-align: left;
    }

    .sidebar .subtitle {
      font-size: 14px;
      color: #718096;
      margin-bottom: 32px;
    }

    .control-group {

    }

    .control-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 6px;

    .control-group input[type="number"],

      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: white;
      color: #2d3748;
      transition: all 0.2s;

    .control-group input[type="number"]:focus,

    }

    .control-group input[type="number"]:hover,
    .control-group select:hover {
      border-color: #cbd5e0;
    }

    /* ===== Advanced Options Toggle ===== */
    .advanced-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 10px 0;
      margin-bottom: 4px;
      user-select: none;
    }

    .advanced-toggle .toggle-arrow {
      font-size: 12px;
      transition: transform 0.2s;
      color: #f59e0b;
    }

    .advanced-toggle .toggle-arrow.open {
      transform: rotate(90deg);
    }

    .advanced-toggle span:last-child {
      font-size: 13px;
      font-weight: 600;
      color: #f59e0b;
    }

    .advanced-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: #f7fafc;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .advanced-panel.open {
      max-height: 800px;
    }

    .advanced-panel-inner {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .advanced-panel-inner .control-group {
      margin-bottom: 0;
    }

    .adv-checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .adv-checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #f59e0b;
    }

    .adv-checkbox-row label {
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
      cursor: pointer;
    }

    .adv-sub {
      padding-left: 26px;
    }

    .adv-sub select,
    .adv-sub input[type="text"] {

      padding: 8px 10px;
      font-size: 13px;
      border: 2px solid #e2e8f0;

      background: white;
      color: #2d3748;
    }

    .adv-sub label {
      font-size: 12px;
      color: #718096;
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }

    .button-group {

      flex-direction: column;

      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;

    #btnGenerate {

    #btnPrint:hover {

    .preview-area {

    #sheetWrap {

    #sheetWrap.grid-view {

    .worksheet-page {

    .worksheet-page.scaled svg {

    }

    .page-break {

    #status {

      display: none;
      font-size: 14px;

    }

    .ak-print-only { display: none !important; }

    @media print {
      .site-header { display: none !important; }
      .ak-print-only { display: block !important; }
      .site-header {
        display: none !important;
      }
      .sidebar {
        display: none !important;
      }
      
      .main-container {
        display: block !important;
      }
      
      .preview-area {
        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
        background: white !important;
      }
      
      #sheetWrap {

        display: block !important;
        background: white !important;
      }
      
      .worksheet-page {
        padding: 0 !important;
        margin: 0 !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        display: block !important;

        page-break-inside: avoid !important;
        break-inside: avoid !important;

        break-after: page !important;
      }

        height: auto !important;
        display: block !important;
      }

        margin: 0 !important;

    @page {

    @media (max-width: 1024px) {

      .main-container {

        height: auto;

      .worksheet-page {

        max-width: 100%;

        height: auto !important;
      }

      #sheetWrap {
        gap: 16px;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        padding: 0 !important;
      }

      .nav-links {
        gap: 2px;
      }

      .nav-links a {

}

  <script>
const sheetWrap = document.getElementById("sheetWrap");
const statusEl = document.getElementById("status");

const elNumSheets = document.getElementById("numSheets");
const elProblems = document.getElementById("problems");
const elCountRange = document.getElementById("countRange");
const elStyle = document.getElementById("style");
const elShowHeader = document.getElementById("showHeader");
const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
const elHeaderModeOptions = document.getElementById("headerModeOptions");
const elNumbered = document.getElementById("numbered");
const elBranded = document.getElementById("branded");
const elAnswerKey = document.getElementById("answerKey");
const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
const elHeaderText = document.getElementById("headerText");
const elSubtitleText = document.getElementById("subtitleText");
const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
const elCustomTitleOptions = document.getElementById("customTitleOptions");
const elShowTitle = document.getElementById("showTitle");
const elShowSubtitle = document.getElementById("showSubtitle");
const elTitleInputWrap = document.getElementById("titleInputWrap");
const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
const elAllowZero = document.getElementById("allowZero");
const elZeroPercent = document.getElementById("zeroPercent");
const elZeroPercentOptions = document.getElementById("zeroPercentOptions");
const elAnswerMode = document.getElementById("answerMode");
const elNumChoices = document.getElementById("numChoices");
const elNumChoicesGroup = document.getElementById("numChoicesGroup");
const advToggle = document.getElementById("advToggle");
const advPanel = document.getElementById("advPanel");
const advArrow = document.getElementById("advArrow");

// Track current worksheet state - now an array of sheets
let currentState = {
  sheets: [], // Each sheet has its own problems array
  randomSeed: Date.now()
};

function getCountRange() {
  const parts = elCountRange.value.split("-");
  const rawMin = parseInt(parts[0], 10);
  return { min: rawMin, max: parseInt(parts[1], 10) };
}

function getRange() {
  const r = getCountRange();
  return [r.min, r.max];
}

function updateCountRangeLabels() {
  const lo = elAllowZero.checked ? '0' : '1';
  for (const opt of elCountRange.options) {
    const parts = opt.value.split('-');
    const minLabel = parts[0] === '1' ? lo : parts[0];
    opt.text = minLabel + ' to ' + parts[1];
  }
}

function updateTitleFromSettings() {
  const title = buildDefaultTitle();
  elHeaderText.value = title;
}

function getHeaderMode() {
  return elShowHeaderEnabled.checked ? elShowHeader.value : "both";
}

function buildDefaultTitle() {
  const range = getCountRange();
  const mode = elAnswerMode.value === "circle" ? "Count & Circle" : "Count & Write";
  return `${mode} ${range.min} to ${range.max}`;
}

function getTitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowTitle.checked ? elHeaderText.value : "";
  }
  return buildDefaultTitle();
}

function getSubtitle() {
  if (elCustomTitleEnabled.checked) {
    return elShowSubtitle.checked ? elSubtitleText.value : "";
  }
  return elAnswerMode.value === "circle" ? "Count the objects and circle the number." : "Count the objects and write the number.";
}

function showStatus(msg) {
  statusEl.textContent = msg;
  statusEl.className = 'success';
  setTimeout(() => {
    statusEl.style.display = 'none';
  }, 3000);
}

// ===== Advanced panel toggle =====
advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

// ===== Allow zero =====
elAllowZero.addEventListener("change", () => { elZeroPercentOptions.style.display = elAllowZero.checked ? "block" : "none"; updateCountRangeLabels(); updateTitleFromSettings(); renderWithNewRandomization(); });
elZeroPercent.addEventListener("change", () => { renderWithNewRandomization(); });
if (elAllowZero.checked) elZeroPercentOptions.style.display = "block";

// ===== Answer mode toggle =====
elAnswerMode.addEventListener("change", () => {
  elNumChoicesGroup.style.display = elAnswerMode.value === "circle" ? "block" : "none";
  updateTitleFromSettings();
  renderWithoutRandomization();
});
elNumChoices.addEventListener("change", () => renderWithoutRandomization());

// ===== Name/Date toggle =====
elShowHeaderEnabled.addEventListener("change", () => {
  elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});

// ===== Custom title toggle =====
elCustomTitleEnabled.addEventListener("change", () => {
  elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowTitle.addEventListener("change", () => {
  elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
  renderWithoutRandomization();
});
elShowSubtitle.addEventListener("change", () => {
  elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
  renderWithoutRandomization();
});

// Add event listeners for real-time updates
elNumSheets.addEventListener("change", () => renderWithNewRandomization());
elProblems.addEventListener("change", () => renderWithNewRandomization());
elCountRange.addEventListener("change", () => {
  const range = elCountRange.value;
  const styleGroup = document.getElementById("styleGroup");
  if (range === "10-20" || range === "1-20") {
    // Force 1 Column for large ranges, hide Style option
    styleGroup.style.display = "none";
    elStyle.value = "2";
  } else {
    // For 1-5, 5-10, 1-10: default to 2 Columns, but let user change
    styleGroup.style.display = "";
    elStyle.value = "1";
  }
  updateTitleFromSettings(); renderWithNewRandomization();
});
elStyle.addEventListener("change", () => renderWithoutRandomization());
elShowHeader.addEventListener("change", () => renderWithoutRandomization());
elNumbered.addEventListener("change", () => renderWithoutRandomization());
elBranded.addEventListener("change", () => renderWithoutRandomization());
elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
elHeaderText.addEventListener("input", () => renderWithoutRandomization());
elSubtitleText.addEventListener("input", () => renderWithoutRandomization());

document.getElementById("btnGenerate").addEventListener("click", () => {
  renderWithNewRandomization();
});

// Answer key checkbox - no longer affects preview, only PDF
elAnswerKey.addEventListener("change", () => {
  // No preview update needed
});

let _fontCSSCache = null;
async function buildFontCSS() {
  if (_fontCSSCache) return _fontCSSCache;
  let fontCSS = "";
  for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
    if (!link.href.includes('fonts')) continue;
    try {
      const resp = await fetch(link.href);
      const css = await resp.text();
      let inlined = css;
      for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
        const fontUrl = m[1].replace(/['"]/g, "");
        const absUrl = new URL(fontUrl, link.href).href;
        try {
          const fr = await fetch(absUrl);
          const blob = await fr.blob();
          const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
          inlined = inlined.replace(m[0], 'url(' + b64 + ')');
        } catch(e) {}
      }
      fontCSS += inlined;
    } catch(e) {}
  }
  for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
    try {
      const resp = await fetch(link.href);
      const css = await resp.text();
      let inlined = css;
      for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
        const fontUrl = m[1].replace(/['"]/g, "");
        try {
          const fr = await fetch(fontUrl);
          const blob = await fr.blob();
          const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
          inlined = inlined.replace(m[0], 'url(' + b64 + ')');
        } catch(e) {}
      }
      fontCSS += inlined;
    } catch(e) {}
  }
  _fontCSSCache = fontCSS;
  return fontCSS;
}

        svgPages.push(generateAnswerKeySvg(currentState.sheets[i], style, "none", branded, numbered, title, subtitle, true, perRowMax, wsCodes[i]));
      }
    }
  const fontCSS = await buildFontCSS();
  let logoB64 = "";
  try {
    const logoResp = await fetch("../../images/logo-watermark.svg");
    const logoBlob = await logoResp.blob();
    logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
  } catch(e) {}
  const { jsPDF } = window.jspdf;

  for (let i = 0; i < svgPages.length; i++) {

    const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
    styleEl.textContent = fontCSS;
    svgEl.insertBefore(styleEl, svgEl.firstChild);
    if (logoB64) {
      svgEl.querySelectorAll("image").forEach(img => {

        if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
      });

    document.body.appendChild(svgEl);
    try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
  }
  return pdf.output("blob");
}

// ===== Shared helpers for variety packs =====
function generateRandomProblems(min, max, numProblems) {
  const numIcons = 19;
  let availableIcons = [];
  for (let i = 0; i < Math.ceil(numProblems / numIcons); i++) {
    const batch = Array.from({length: numIcons}, (_, idx) => idx);
    shuffleArray(batch);
    availableIcons = availableIcons.concat(batch);
  }

  // Build the range of possible values
  const rangeValues = [];
  for (let v = min; v <= max; v++) rangeValues.push(v);
  const rangeSize = rangeValues.length;

  // Grid adjacency check for 2-column layout compatibility
  // In a 2-col grid, position i is adjacent to i-1 (left), i+1 (right), i-2 (above), i+2 (below)
  // In a 1-col layout, position i is adjacent to i-1 and i+1
  // We enforce the stricter 2-col constraint so problems work in both layouts
  const cols = 2;
  function isAdjacent(posA, posB) {
    if (posA < 0 || posB < 0) return false;
    const diff = Math.abs(posA - posB);
    if (diff === 1) {
      // Only adjacent left/right if on same row
      return Math.floor(posA / cols) === Math.floor(posB / cols);
    }
    return diff === cols; // above/below
  }

  function getAdjacentValues(counts, pos) {
    const adj = new Set();
    for (let p = 0; p < counts.length; p++) {
      if (counts[p] !== null && isAdjacent(pos, p)) adj.add(counts[p]);
    }
    return adj;
  }

  // Step 1: Guarantee every value in the range appears at least once
  // Start with one copy of each value (shuffled), truncate if range > numProblems
  let required = [...rangeValues];
  shuffleArray(required);
  if (required.length > numProblems) {
    required = required.slice(0, numProblems);
  }

  // Step 2: Fill remaining slots with values from the range
  // Never reuse the smallest number (min) as the repeated value
  const extraCount = numProblems - required.length;
  const extras = [];
  const extraCandidates = rangeValues.filter(v => v !== min);
  // If range is exactly 1 value, we have no choice but to reuse it
  const extraPool = extraCandidates.length > 0 ? extraCandidates : rangeValues;
  for (let i = 0; i < extraCount; i++) {
    extras.push(extraPool[randInt(0, extraPool.length - 1)]);
  }

  // Combine and place using backtracking to satisfy adjacency constraints
  const allValues = required.concat(extras);
  const counts = new Array(numProblems).fill(null);

  // Try to place values with no-adjacency constraint using greedy + shuffle retry
  function tryPlace(values) {
    const pool = [...values];
    const result = new Array(numProblems).fill(null);

    for (let pos = 0; pos < numProblems; pos++) {
      const adjVals = getAdjacentValues(result, pos);
      // Find candidates in pool that don't conflict
      const validIndices = [];
      for (let j = 0; j < pool.length; j++) {
        if (!adjVals.has(pool[j])) validIndices.push(j);
      }
      if (validIndices.length === 0) return null; // Failed
      // Pick a random valid candidate
      const pick = validIndices[randInt(0, validIndices.length - 1)];
      result[pos] = pool[pick];
      pool.splice(pick, 1);
    }
    return result;
  }

  // Try up to 50 times with reshuffled values
  let placed = null;
  for (let attempt = 0; attempt < 50; attempt++) {
    shuffleArray(allValues);
    placed = tryPlace(allValues);
    if (placed) break;
  }

  // Fallback: if placement failed (very small range, many problems), relax constraint
  if (!placed) {
    placed = allValues;
    shuffleArray(placed);
  }

  // Build final problems array
  const problems = [];
  for (let i = 0; i < numProblems; i++) {
    problems.push({ count: placed[i], iconIndex: availableIcons[i] });
  }

  // Apply zero percentage
  if (elAllowZero.checked) {
    const zp = parseInt(elZeroPercent.value, 10);
    const zeroCount = Math.max(1, Math.round(problems.length * zp / 100));
    const indices = problems.map((_, i) => i);
    for (let i = indices.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [indices[i], indices[j]] = [indices[j], indices[i]]; }
    for (let k = 0; k < zeroCount; k++) {
      problems[indices[k]].count = 0;
    }
  }

  return problems;
}

// Fisher-Yates shuffle
function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function renderWithoutRandomization() {
  // Re-render with existing problems, just update layout/style
  if (currentState.sheets.length === 0) {
    renderWithNewRandomization();
  } else {

  }
}

function renderWorksheet() {
  const style = parseInt(elStyle.value, 10);
  const headerMode = getHeaderMode();
  const branded = elBranded.checked;
  const numbered = elNumbered.checked;
  const includeExample = elIncludeExample.checked;
  const title = getTitle();
  const subtitle = getSubtitle();
  const numSheets = currentState.sheets.length;
  const range = getCountRange();
  const perRowMax = range.max > 10 ? 10 : 5;

  const icons = ICON_LIST;
  
  sheetWrap.innerHTML = "";
  
  // Set up grid view if multiple sheets
  if (numSheets > 1) {
    sheetWrap.classList.add('grid-view');
    
    const sheetWidth = 612;
    const sheetHeight = 792;
    const sheetAspect = sheetHeight / sheetWidth;
    
    // Calculate available space
    // Add edge padding for 3+ worksheets
    const edgePadding = numSheets >= 3 ? 40 : 0;
    const availableWidth = window.innerWidth - 340 - 80 - (edgePadding * 2); // sidebar + padding + edge padding
    const availableHeight = window.innerHeight - 80; // padding
    const gap = 24;
    
    // Minimum readable width for a worksheet preview
    const minReadableWidth = 180;
    
    // Determine optimal columns based on rules:
    // - 2 or 3 sheets: single row
    // - 4+ sheets: max 3 per row
    // - Break rules if needed to maintain readability
    let cols;
    if (numSheets <= 3) {
      // Try to fit all in one row
      cols = numSheets;
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      // If too small, reduce columns
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    } else {
      // 4+ sheets: max 3 per row, but check readability
      cols = Math.min(3, numSheets);
      const testWidth = (availableWidth - (cols - 1) * gap) / cols;
      if (testWidth < minReadableWidth) {
        cols = Math.max(1, Math.floor((availableWidth + gap) / (minReadableWidth + gap)));
      }
    }
    
    const rows = Math.ceil(numSheets / cols);
    
    // Calculate scale
    const maxSheetWidth = (availableWidth - (cols - 1) * gap) / cols;
    
    // For 1-3 sheets (single row), fit within viewport height
    // For 4+ sheets, allow scrolling
    let maxSheetHeight;
    if (numSheets <= 3) {
      maxSheetHeight = availableHeight;
    } else {
      // Allow larger previews when scrolling is enabled
      maxSheetHeight = availableHeight * 0.8;
    }
    
    const scaleByWidth = maxSheetWidth / sheetWidth;
    const scaleByHeight = maxSheetHeight / sheetHeight;
    const scale = Math.min(scaleByWidth, scaleByHeight);
    
    const scaledWidth = Math.floor(sheetWidth * scale);
    const scaledHeight = Math.floor(sheetHeight * scale);
    
    sheetWrap.style.gridTemplateColumns = `repeat(${cols}, ${scaledWidth + 24}px)`;
    sheetWrap.style.padding = numSheets >= 3 ? `0 ${edgePadding}px` : '0';
    
    // Render each sheet
    for (let s = 0; s < numSheets; s++) {
      const wsCode = '(' + (s + 1) + ')';
      const problems = currentState.sheets[s];
      const svg = generateWorksheetSvg(problems, style, headerMode, branded, numbered, icons, title, subtitle, includeExample, perRowMax, wsCode);
      svg.setAttribute('width', scaledWidth);
      svg.setAttribute('height', scaledHeight);

      const page = document.createElement("div");
      page.className = "worksheet-page scaled";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  } else {
    sheetWrap.classList.remove('grid-view');
    sheetWrap.style.gridTemplateColumns = '';
    sheetWrap.style.padding = '0';

    // Single sheet - render at full size
    if (currentState.sheets.length > 0) {
      const problems = currentState.sheets[0];
      const wsCode = '(1)';
      const svg = generateWorksheetSvg(problems, style, headerMode, branded, numbered, icons, title, subtitle, includeExample, perRowMax, wsCode);

      const page = document.createElement("div");
      page.className = "worksheet-page";
      page.appendChild(svg);
      sheetWrap.appendChild(page);
    }
  }
  
  showStatus('✓ Worksheet updated!');
}

function randInt(min, max) {

}

function pick(arr) {

}

  // Find max count across all problems for uniform icon sizing
  const maxCount = Math.max(...problems.map(p => p.count));

  for (let i = 0; i < problems.length; i++) {

        let wrong;

        else wrong = count - Math.ceil(Math.random() * 3);
        if (wrong < lo) wrong = count + Math.ceil(Math.random() * 3);
        if (wrong > hi) wrong = count - Math.ceil(Math.random() * 3);
        if (wrong < lo) wrong = lo;
        if (wrong > hi) wrong = hi;

      x: margin, y, width: contentW, height: rowHeight,
      rx: 8, ry: 8,
      fill: "none", stroke: "#000", "stroke-width": 1
    }));

    if (numbered !== false) {
      svg.appendChild(svgEl("text", {
        x: margin + 8, y: y + 14,
        "font-family": "Fredoka, sans-serif", "font-size": 11, "font-weight": 400, fill: "#a0aec0"
      }, [document.createTextNode((i + 1) + ".")]));
    }

    const problem = problems[i];
    const count = problem.count;
    const iconId = icons[problem.iconIndex];

    placeObjectsRowLeftAligned(svg, {
      iconId,
      count,
      x: margin + 10,
      y: y + 10,
      w: objectsW - 20,
      h: rowHeight - 20,
      maxCount: maxCount,
      perRowMax
    });

    const lineW = 72;
    const ansAreaCenterX = pageW - margin - boxW / 2 - 10;
    const akLineX1 = ansAreaCenterX - lineW / 2;
    const akLineX2 = ansAreaCenterX + lineW / 2;
    const akLineY = y + rowHeight - 24;

    const answerMode = elAnswerMode.value;
    const numChoicesVal = parseInt(elNumChoices.value, 10);

    if (answerMode === "circle") {
      const choiceCount = numChoicesVal;
      const choiceFontSize = 44;
      const choices = [count];
      const [lo, hi] = getRange();
      while (choices.length < choiceCount) {
        let wrong;
        if (Math.random() < 0.5) wrong = count + Math.ceil(Math.random() * 3);
        else wrong = count - Math.ceil(Math.random() * 3);
        if (wrong < lo) wrong = count + Math.ceil(Math.random() * 3);
        if (wrong > hi) wrong = count - Math.ceil(Math.random() * 3);
        if (wrong < lo) wrong = lo;
        if (wrong > hi) wrong = hi;
        if (wrong !== count && choices.indexOf(wrong) === -1) choices.push(wrong);
        if (choices.length >= hi - lo + 1) break;
      }
      for (let s = choices.length - 1; s > 0; s--) {
        const j = Math.floor(Math.random() * (s + 1));
        const tmp = choices[s]; choices[s] = choices[j]; choices[j] = tmp;
      }
      const totalW = lineW + 80;
      const startX = ansAreaCenterX - totalW / 2;
      for (let ch = 0; ch < choices.length; ch++) {
        const cx = startX + (ch + 0.5) * (totalW / choices.length);
        const isCorrect = choices[ch] === count;
        const choiceEl = svgEl("text", {
          x: cx, y: akLineY + 4,
          "font-family": "'Google Sans Flex', sans-serif", "font-size": choiceFontSize, "font-weight": 700,
          fill: isCorrect ? "#3182ce" : "#1a202c", "text-anchor": "middle"
        });
        choiceEl.textContent = String(choices[ch]);
        svg.appendChild(choiceEl);
        if (isCorrect) {
          svg.appendChild(svgEl("ellipse", {
            cx: cx, cy: akLineY - 4,
            rx: choiceFontSize * 0.55, ry: choiceFontSize * 0.5,
            fill: "none", stroke: "#3182ce", "stroke-width": 2
          }));
        }
      }
    } else {
      svg.appendChild(svgEl("line", {
        x1: akLineX1, y1: akLineY, x2: akLineX2, y2: akLineY,
        stroke: "#cbd5e1", "stroke-width": 1.5
      }));

      // Add answer text above the line
      const answerText = svgEl("text", {
        x: ansAreaCenterX,
        y: akLineY - 4,
        "font-family": "'Google Sans Flex', sans-serif",
        "font-size": 24,
        "font-weight": "500",
        "text-anchor": "middle",
        fill: "#000"
      });
      answerText.textContent = count.toString();
      svg.appendChild(answerText);
    }
  }

  // Add branding at bottom
  if (branded) {
    const brandY = pageH - 48;
    const logoH = 38;
    const logoW = Math.round(logoH * 2.79);
    svg.appendChild(svgEl("image", {
      href: "../../images/logo-watermark.svg",
      x: margin, y: brandY,
      width: logoW, height: logoH
    }));
    const bLine1 = svgEl("text", {
      x: pageW - margin, y: brandY + 14,
      "font-family": "Fredoka, sans-serif", "font-size": 11,
      fill: "#4a5568", "text-anchor": "end"
    });
    bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
    svg.appendChild(bLine1);
    const bLine2 = svgEl("text", {
      x: pageW - margin, y: brandY + 26,
      "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
    });
    bLine2.textContent = "\u00A9 2026 Eggroll Games";
    svg.appendChild(bLine2);
  }

  // Worksheet code
  if (wsCode) {
    svg.appendChild(svgEl("text", {
      x: pageW / 2, y: pageH - 4,
      "font-family": "Fredoka, sans-serif", "font-size": 8,
      fill: "#94a3b8", "text-anchor": "middle"
    })).textContent = wsCode;
  }

  return svg;
}

function generateAnswerKeyStyle2Svg(problems, headerMode, branded, numbered, icons, title, subtitle, isAnswerKey, perRowMax, wsCode) {
  return renderAnswerKeyStyle2(problems, headerMode, branded, numbered, icons, title, subtitle, isAnswerKey, perRowMax, wsCode);

function placeObjects(svg, { iconId, count, x, y, w, h, answerBox = null, problemIndex = 0, problemCount = 8, perRowMax = 5 }) {
  const problemGroup = svgEl("g", { "data-problem": problemIndex });
  const pad = 10;

  // Available area for icons (inside cell padding)
  let aX = x + pad;
  let aY = y + pad;
  let aW = w - pad * 2;
  let aH = h - pad * 2;

  // Reduce available height to avoid answer box
  if (answerBox) {
    const abTop = answerBox.y - 6; // 6px buffer above answer box
    const maxH = abTop - aY;
    if (maxH < aH) aH = maxH;
  }

  // Look up aspect ratio for this icon (default to 1 if unknown)
  const ar = ICON_ASPECT[iconId] || 1;
  const wFactor = Math.max(1, ar);      // wide icons stretch horizontally
  const hFactor = Math.max(1, 1 / ar);  // tall icons stretch vertically

  const spacingRatio = 0.05;

  // Dynamic maxPerRow: try every candidate and pick the one that yields the largest iconSize
  let bestCols, bestRows, bestSize = 0;
  const minPerRow = 2;
  for (let tryMax = minPerRow; tryMax <= count; tryMax++) {
    let cols, rows;
    if (count <= tryMax) {
      cols = count;
      rows = 1;
    } else {
      cols = tryMax;
      rows = Math.ceil(count / tryMax);
    }
    // Compute iconSize given aspect-aware cell dimensions
    const sizeByW = aW / (cols * wFactor + (cols - 1) * spacingRatio);
    const sizeByH = aH / (rows * hFactor + (rows - 1) * spacingRatio);
    const candidateSize = Math.min(sizeByW, sizeByH);
    if (candidateSize > bestSize) {
      bestSize = candidateSize;
      bestCols = cols;
      bestRows = rows;
    }
  }

  let iconSize = Math.max(18, bestSize);
  const iconW = iconSize * wFactor;
  const iconH = iconSize * hFactor;
  const spacing = iconSize * spacingRatio;
  const gridW = bestCols * iconW + (bestCols - 1) * spacing;
  const gridH = bestRows * iconH + (bestRows - 1) * spacing;
  const startX = aX + (aW - gridW) / 2;
  const startY = aY + (aH - gridH) / 2;

  let idx = 0;
  for (let r = 0; r < bestRows && idx < count; r++) {
    for (let c = 0; c < bestCols && idx < count; c++) {
      const ix = startX + c * (iconW + spacing);
      const iy = startY + r * (iconH + spacing);
      problemGroup.appendChild(svgEl("use", {
        href: `#${iconId}`,
        x: ix, y: iy,
        width: iconW, height: iconH
      }));
      idx++;
    }
  }

  svg.appendChild(problemGroup);
}

function placeObjectsRow(svg, { iconId, count, x, y, w, h }) {
  // Calculate size with guaranteed spacing
  const availableWidth = w - (count + 1) * 8; // 8px spacing minimum
  const maxItemWidth = availableWidth / count;
  
  let size = Math.min(h * 0.85, maxItemWidth);
  size = Math.max(20, Math.min(50, size));
  
  const totalWidth = size * count;
  const spacing = (w - totalWidth) / (count + 1);
  
  for (let i = 0; i < count; i++) {
    const cx = x + spacing + i * (size + spacing) + size / 2;
    const cy = y + h / 2;

    svg.appendChild(svgEl("use", {
      href: `#${iconId}`,
      x: cx - size / 2,
      y: cy - size / 2,
      width: size,
      height: size
    }));
  }
}

function placeObjectsRowLeftAligned(svg, { iconId, count, x, y, w, h, maxCount, perRowMax = 5 }) {
  const spacing = 6;
  const startX = x + 18;
  const needsWrap = count > perRowMax;

  const leftPad = 18;
  const rightPad = 5;
  const availW = w - leftPad - rightPad;

  if (needsWrap) {
    // Two rows
    const perRow = perRowMax;
    const sizeByW = (availW - (perRow - 1) * spacing) / perRow;
    const sizeByH = (h - spacing) / 2 * 0.9;
    let size = Math.min(sizeByW, sizeByH);
    size = Math.max(20, size);

    const rowH = size + spacing;
    const totalH = rowH * 2 - spacing;
    const startY = y + (h - totalH) / 2;

    for (let i = 0; i < count; i++) {
      const row = Math.floor(i / perRow);
      const col = i % perRow;
      const cx = startX + col * (size + spacing) + size / 2;
      const cy = startY + row * rowH + size / 2;
      svg.appendChild(svgEl("use", {
        href: `#${iconId}`,
        x: cx - size / 2, y: cy - size / 2,
        width: size, height: size
      }));
    }
  } else {
    // Single row - size based on actual count to fill the space
    const sizeByW = (availW - (count - 1) * spacing) / count;
    const sizeByH = h * 0.85;
    let size = Math.min(sizeByW, sizeByH);
    size = Math.max(20, size);

    for (let i = 0; i < count; i++) {
      const cx = startX + i * (size + spacing) + size / 2;
      const cy = y + h / 2;
      svg.appendChild(svgEl("use", {
        href: `#${iconId}`,
        x: cx - size / 2, y: cy - size / 2,
        width: size, height: size
      }));
    }
  }
}

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}
