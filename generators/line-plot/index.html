  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elDataTheme = document.getElementById("dataTheme");
    const elNumberRange = document.getElementById("numberRange");
    const elMaxFrequency = document.getElementById("maxFrequency");
    const elTotalDataPoints = document.getElementById("totalDataPoints");
    const elNumQuestions = document.getElementById("numQuestions");
    const elNumSheets = document.getElementById("numWorksheets");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const elAnswerKey = document.getElementById("answerKey");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle(autoTitle) {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return autoTitle || "";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Use the line plot above to answer the questions.";
    }

    // ===== Theme data =====
    const themes = {
      books: {
        title: "Number of Books Read This Week",
        subject: "students",
        item: "books",
        valueLabel: function(v) { return v + (v === 1 ? " book" : " books"); }
      },
      sleep: {
        title: "Hours of Sleep Last Night",
        subject: "students",
        item: "hours of sleep",
        valueLabel: function(v) { return v + (v === 1 ? " hour of sleep" : " hours of sleep"); }
      },
      shoes: {
        title: "Shoe Sizes in Our Class",
        subject: "students",
        item: "shoe size",
        valueLabel: function(v) { return "a shoe size of " + v; }
      },
      pets: {
        title: "Number of Pets at Home",
        subject: "students",
        item: "pets",
        valueLabel: function(v) { return v + (v === 1 ? " pet" : " pets"); }
      },
      pencils: {
        title: "Pencils in Each Desk",
        subject: "students",
        item: "pencils",
        valueLabel: function(v) { return v + (v === 1 ? " pencil" : " pencils"); }
      },
      random: {
        title: "Survey Results",
        subject: "people",
        item: "items",
        valueLabel: function(v) { return v + (v === 1 ? " item" : " items"); }
      }
    };

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Data generation =====
    function parseRange(rangeStr) {
      const parts = rangeStr.split("-");
      return { min: parseInt(parts[0], 10), max: parseInt(parts[1], 10) };
    }

    function generateLinePlotData(opts) {
      const { rangeMin, rangeMax, maxFreq, totalPoints } = opts;
      const values = [];
      for (let v = rangeMin; v <= rangeMax; v++) values.push(v);

      // Cap total points to what is actually possible
      const maxPossible = values.length * maxFreq;
      const actualTotal = Math.min(totalPoints, maxPossible);

      // Build frequency map - distribute points across the values
      const freq = {};
      for (const v of values) freq[v] = 0;

      // Ensure at least some values have 0 for interesting questions
      // by not forcing all values to have data
      let remaining = actualTotal;
      let attempts = 0;
      while (remaining > 0 && attempts < 5000) {
        attempts++;
        const v = values[Math.floor(Math.random() * values.length)];
        if (freq[v] < maxFreq) {
          freq[v]++;
          remaining--;
        }
      }

      // Force-fill if random placement stalled
      if (remaining > 0) {
        for (const v of values) {
          while (freq[v] < maxFreq && remaining > 0) {
            freq[v]++;
            remaining--;
          }
        }
      }

      return { values, freq };
    }

    function getThemeInfo(themeKey) {
      if (themeKey === "random") {
        const allThemes = ["books", "sleep", "pets", "pencils", "shoes"];
        const pick = allThemes[Math.floor(Math.random() * allThemes.length)];
        return { ...themes[pick], valueLabel: themes[pick].valueLabel };
      }
      return { ...themes[themeKey], valueLabel: themes[themeKey].valueLabel };
    }

    // ===== Question generation =====
    function generateQuestions(numQ, data, theme) {
      const { values, freq } = data;
      const { subject, item, valueLabel } = theme;

      // Compute derived values
      const totalCount = Object.values(freq).reduce((a, b) => a + b, 0);
      const maxFreqVal = Math.max(...Object.values(freq));
      const minFreqVal = Math.min(...Object.values(freq));
      const modeValues = values.filter(v => freq[v] === maxFreqVal);
      const leastValues = values.filter(v => freq[v] === minFreqVal);
      const isShoes = item === "shoe size";

      function readingQ() {
        // Pick a random value (including zero-frequency for variety)
        const v = values[Math.floor(Math.random() * values.length)];
        const qText = "How many " + subject + " have " + valueLabel(v) + "?";
        return { question: qText, answer: freq[v] };
      }

      function modeQ() {
        const qText = isShoes
          ? "What is the most common shoe size?"
          : "What is the most common number of " + item + "?";
        const ans = modeValues.length === 1 ? String(modeValues[0]) : modeValues.join(" and ");
        return { question: qText, answer: ans };
      }

      function leastQ() {
        const qText = isShoes
          ? "What is the least common shoe size?"
          : "What is the least common number of " + item + "?";
        const ans = leastValues.length === 1 ? String(leastValues[0]) : leastValues.join(" and ");
        return { question: qText, answer: ans };
      }

      function totalQ() {
        const qText = "How many " + subject + " were surveyed in total?";
        return { question: qText, answer: totalCount };
      }

      function comparisonQ() {
        // Pick two values with different frequencies, both > 0
        const nonZero = values.filter(v => freq[v] > 0);
        if (nonZero.length < 2) return null;
        let a, b;
        let tries = 0;
        do {
          a = nonZero[Math.floor(Math.random() * nonZero.length)];
          b = nonZero[Math.floor(Math.random() * nonZero.length)];
          tries++;
        } while ((a === b || freq[a] === freq[b]) && tries < 100);
        if (a === b) return null;
        // Ensure a has more than b
        if (freq[a] < freq[b]) { const t = a; a = b; b = t; }
        const diff = freq[a] - freq[b];
        const qText = "How many more " + subject + " have " + valueLabel(a) + " than " + valueLabel(b) + "?";
        return { question: qText, answer: diff };
      }

      const questions = [];

      // Ensure variety: try to include different types first
      const diverseOrder = [totalQ, modeQ, readingQ, comparisonQ, leastQ];
      for (const gen of diverseOrder) {
        if (questions.length >= numQ) break;
        const q = gen();
        if (q && !questions.some(existing => existing.question === q.question)) {
          questions.push(q);
        }
      }

      // Fill remaining with reading questions for different values
      let safetyCounter = 0;
      while (questions.length < numQ && safetyCounter < 100) {
        safetyCounter++;
        const q = readingQ();
        if (q && !questions.some(existing => existing.question === q.question)) {
          questions.push(q);
        }
      }

      // Shuffle questions
      for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
      }

      return questions.slice(0, numQ);
    }

    // ===== Generate a complete sheet =====
    function generateSheet(opts) {
      const range = parseRange(opts.numberRange);
      const data = generateLinePlotData({
        rangeMin: range.min,
        rangeMax: range.max,
        maxFreq: opts.maxFrequency,
        totalPoints: opts.totalDataPoints
      });
      const themeInfo = getThemeInfo(opts.dataTheme);
      const questions = generateQuestions(opts.numQuestions, data, themeInfo);
      return { data, themeInfo, questions };
    }

      const numQ = questions.length;

      const xMarkGap = Math.max(1, Math.floor(xMarkSize * 0.15));

          let splitIdx = qStr.lastIndexOf(" ", maxChars);
          if (splitIdx < 0) splitIdx = maxChars;
          const line1 = qStr.substring(0, splitIdx);
          const line2 = qStr.substring(splitIdx + 1);
          const qTextEl1 = svgEl("text", {
            x: qTextX, y: qY,

        const isExample = (q === 0 && includeExample && !showAnswers);

        const ansLineY = qY + 24;

        const lineEndX = margin + 180;
        svg.appendChild(svgEl("line", {

          stroke: isExample ? "#22c55e" : "#a0aec0", "stroke-width": 1, "stroke-dasharray": "4,3"
        }));

        // Show answer if example or answer key mode
        if (isExample) {
          const ansEl = svgEl("text", {
            x: (lineStartX + lineEndX) / 2, y: ansLineY - 5,
            "font-family": "Fredoka, sans-serif", "font-size": qFontSize + 1, "font-weight": 700, "text-anchor": "middle", fill: "#16a34a"
          });

          const badgeText = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "font-family": "Fredoka, sans-serif", "font-size": 8, "font-weight": 600, "text-anchor": "middle", fill: "#16a34a" });
          badgeText.textContent = "Example";
          svg.appendChild(badgeText);
        } else if (showAnswers) {
          const ansEl = svgEl("text", {
            x: (lineStartX + lineEndX) / 2, y: ansLineY - 5,

          });

          svg.appendChild(ansEl);

        qY += qLineHeight;

      // ---- Branding ----
      if (branded) {

        });

      }

      return svg;
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateSheet(opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateSheet(opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const t = getTitle(currentState.sheets[s].themeInfo.title);
          const st = getSubtitle();
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: t, subtitle: st, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      // Desktop: grid layout with calculated sizing
      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cols - 1) * gap) / cols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const t = getTitle(currentState.sheets[s].themeInfo.title);
          const st = getSubtitle();
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: t, subtitle: st, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const t = getTitle(currentState.sheets[0].themeInfo.title);
        const st = getSubtitle();
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: t, subtitle: st, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                const t = getTitle(currentState.sheets[i].themeInfo.title);
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: t, subtitle: "", branded: opts.branded, showAnswers: true, numbered: opts.numbered, includeExample: false, isAnswerKey: true }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
    let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();
  
    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
<script src="../../favorites.js"></script>
</body>
