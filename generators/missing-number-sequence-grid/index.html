  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elWithin = document.getElementById("withinSelect");
    const elCustomWithinGroup = document.getElementById("customWithinGroup");
    const elCustomWithin = document.getElementById("customWithin");
    const elMissingPercent = document.getElementById("missingPercent");
    const elNumSheets = document.getElementById("numWorksheets");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elAnswerKey = document.getElementById("answerKey");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");
    const elNoNumbers = document.getElementById("noNumbers");
    const elAllNumbers = document.getElementById("allNumbers");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    // ===== Within dropdown =====
    function getWithinValue() {
      return elWithin.value === "custom" ? (parseInt(elCustomWithin.value, 10) || 10) : parseInt(elWithin.value, 10);
    }

    elWithin.addEventListener("change", () => {
      elCustomWithinGroup.style.display = elWithin.value === "custom" ? "block" : "none";
      renderWithNewRandomization();
    });
    elCustomWithin.addEventListener("input", () => renderWithNewRandomization());

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      const w = getWithinValue();
      return "Number Chart 1\u2013" + w;
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Fill in the missing numbers on the grid.";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      const within = getWithinValue();
      return {
        within,
        start: 1,
        missingPercent: parseInt(elMissingPercent.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        showHeader,
        title,
        subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        noNumbers: elNoNumbers.checked,
        allNumbers: elAllNumbers.checked,
      };
    }

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Grid data generation =====
    function generateMissingSet(totalNumbers, missingPercent) {
      const missingCount = Math.max(1, Math.round(totalNumbers * missingPercent / 100));
      const indices = [];
      for (let i = 0; i < totalNumbers; i++) indices.push(i);
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      return new Set(indices.slice(0, missingCount));
    }

    // Calculate page layout metrics
    function getPageMetrics(opts) {
      const pageW = 612, pageH = 792, margin = 36;
      const topGridY = (opts.showHeader === "both" || opts.showHeader === "name") ? 100 : 75;
      const bottomMargin = opts.branded ? 56 : 24;
      return { pageW, pageH, margin, topGridY, bottomMargin, availH: pageH - bottomMargin - topGridY, availW: pageW - margin * 2 };
    }

    // How many small grids fit on a page
    function getSmallGridCount(totalNumbers, opts) {
      const { availH, availW } = getPageMetrics(opts);
      const cols = totalNumbers;
      const rawCellW = availW / cols;
      const cellSize = Math.min(rawCellW, 65);
      const gap = Math.max(12, cellSize * 0.35);
      const blockH = cellSize + gap;
      let count = Math.max(2, Math.floor((availH + gap) / blockH));
      // Cap counts for small ranges so grids spread out with more breathing room
      if (totalNumbers <= 5) count = Math.min(count, 6);
      if (totalNumbers >= 6 && totalNumbers <= 10) count = Math.min(count, 8);
      return count;
    }

    // A "sheet" is an array of grids
    function generateSheet(opts) {
      const { within, start, missingPercent, noNumbers, allNumbers } = opts;
      const totalNumbers = within - start + 1;

      // Override missing set for "No numbers" or "All numbers"
      function getMissingSet() {
        if (noNumbers) {
          // All indices are missing (blank grid)
          const all = new Set();
          for (let i = 0; i < totalNumbers; i++) all.add(i);
          return all;
        }
        if (allNumbers) {
          // No indices are missing (full grid)
          return new Set();
        }
        return generateMissingSet(totalNumbers, missingPercent);
      }

      if (totalNumbers <= 10) {
        const gridCount = getSmallGridCount(totalNumbers, opts);
        const grids = [];
        for (let i = 0; i < gridCount; i++) {
          grids.push({ start, within, totalNumbers, missingSet: getMissingSet() });
        }
        return grids;
      } else {
        return [{ start, within, totalNumbers, missingSet: getMissingSet() }];
      }
    }

    // ===== Grid dimensions for >= 11 numbers =====
    // Prefer standard educational column counts (5, 10) when numbers
    // divide evenly — these reinforce place-value and counting by 5s/10s.
    // Otherwise, find the best-fitting layout for the page.
    function getSquareGridDimensions(totalNumbers, availW, availH) {
      // Check if 5 or 10 columns divide evenly, and pick whichever fills
      // the portrait page better (larger resulting grid area).
      const candidates = [];
      if (totalNumbers % 5 === 0) candidates.push({ cols: 5, rows: totalNumbers / 5 });
      if (totalNumbers % 10 === 0) candidates.push({ cols: 10, rows: totalNumbers / 10 });

      if (candidates.length > 0) {
        let best = candidates[0];
        let bestArea = 0;
        for (const cand of candidates) {
          const cell = Math.min(availW / cand.cols, availH / cand.rows);
          const area = cell * cand.cols * cell * cand.rows;
          if (area > bestArea) { bestArea = area; best = cand; }
        }
        return best;
      }

      // Otherwise: find the layout that best fills the portrait page
      const pageAspect = availW / availH;
      let bestCols = Math.round(Math.sqrt(totalNumbers));
      let bestRows = Math.ceil(totalNumbers / bestCols);
      let bestScore = -1;

      for (let c = 2; c <= totalNumbers; c++) {
        const r = Math.ceil(totalNumbers / c);
        if (r < 1) continue;
        const cell = Math.min(availW / c, availH / r);
        const gridW = cell * c;
        const gridH = cell * r;
        const gridAspect = gridW / gridH;
        const aspectMatch = Math.min(gridAspect / pageAspect, pageAspect / gridAspect);
        const fill = (gridW / availW) * (gridH / availH);
        const waste = 1 - (c * r - totalNumbers) / (c * r) * 0.3;
        const eduBonus = (c === 10 || c === 5) ? 2.5 : 1.0;
        const score = fill * aspectMatch * waste * eduBonus;
        if (score > bestScore) {
          bestScore = score;
          bestCols = c;
          bestRows = r;
        }
      }
      return { cols: bestCols, rows: bestRows };
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(sheetGrids, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, includeExample, isAnswerKey } = options;
      const color = "#2d3748";
      const pageW = 612, pageH = 792, margin = 36;

      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));
      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", { x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af" }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.svg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const bottomMargin = branded ? 56 : 24;
      const availH = pageH - bottomMargin - topGridY;
      const availW = pageW - margin * 2;
      const firstGrid = sheetGrids[0];
      const totalNumbers = firstGrid.totalNumbers;

      if (totalNumbers <= 10) {
        // ===== SMALL RANGE: multiple single-row grids =====
        const gridCount = sheetGrids.length;
        const cols = totalNumbers;

        const rawCellW = availW / cols;
        const cellSize = Math.min(rawCellW, 65);

        const gridW = cellSize * cols;
        // Distribute remaining vertical space evenly as gaps
        const totalGridH = gridCount * cellSize;
        const gap = gridCount > 1 ? (availH - totalGridH) / (gridCount + 1) : 0;

        const totalH = totalGridH + (gridCount - 1) * gap;
        const startY = topGridY + gap;
        const startX = margin + (availW - gridW) / 2;

        const maxDigits = String(firstGrid.within).length;
        const fontSize = Math.min(cellSize * 0.5, cellSize * 0.75 / Math.max(1, maxDigits * 0.55));

        for (let g = 0; g < gridCount; g++) {
          const gridData = sheetGrids[g];
          const gridY = startY + g * (cellSize + gap);
          const gridX = startX;

          // Outer border
          svg.appendChild(svgEl("rect", {
            x: gridX, y: gridY, width: gridW, height: cellSize,
            fill: "none", stroke: color, "stroke-width": "2", rx: 0, ry: 0
          }));

          // Vertical lines
          for (let c = 1; c < cols; c++) {
            svg.appendChild(svgEl("line", {
              x1: gridX + c * cellSize, y1: gridY,
              x2: gridX + c * cellSize, y2: gridY + cellSize,
              stroke: color, "stroke-width": "1"
            }));
          }

          // Find the first (lowest index) missing number in first grid for example
          const exampleMissingIdx = (g === 0 && includeExample && !showAnswers)
            ? Math.min(...sheetGrids[0].missingSet) : -1;

          // Numbers
          for (let i = 0; i < gridData.totalNumbers; i++) {
            const num = gridData.start + i;
            const cx = gridX + i * cellSize + cellSize / 2;
            const cy = gridY + cellSize / 2 + fontSize * 0.35;
            const isMissing = gridData.missingSet.has(i);
            const isExNum = (i === exampleMissingIdx);
            if (isMissing && !showAnswers && !isExNum) continue;

            const textColor = isExNum ? "#16a34a" : (isMissing && showAnswers) ? "#3182ce" : "#1a202c";
            const fontWeight = (isMissing && (showAnswers || isExNum)) ? "700" : "600";

            const el = svgEl("text", {
              x: cx, y: cy, "text-anchor": "middle",
              "font-family": "'Google Sans Flex', sans-serif",
              "font-size": String(fontSize), "font-weight": fontWeight, fill: textColor
            });
            el.textContent = String(num);
            svg.appendChild(el);

            if (isExNum) {
              const badgeX = cx - 21;
              const badgeY = gridY - 16;
              svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": 0.75 }));
              const badgeText = svgEl("text", { x: cx, y: badgeY + 9.5, "font-family": "Fredoka, sans-serif", "font-size": 8, "font-weight": 600, "text-anchor": "middle", fill: "#16a34a" });
              badgeText.textContent = "Example";
              svg.appendChild(badgeText);
            }
          }
        }

      } else {
        // ===== LARGE RANGE: single square-ish grid =====
        const gridData = sheetGrids[0];
        const { cols, rows } = getSquareGridDimensions(totalNumbers, availW, availH);

        // Scale down slightly for Within 50 to add breathing room
        const gridScale = (totalNumbers <= 50) ? 0.90 : 1;
        const maxCellW = (availW * gridScale) / cols;
        const maxCellH = (availH * gridScale) / rows;
        const cellSize = Math.floor(Math.min(maxCellW, maxCellH));

        const gridW = cellSize * cols;
        const gridH = cellSize * rows;
        const gridX = margin + (availW - gridW) / 2;
        const gridY = topGridY + (availH - gridH) / 2;

        const maxDigits = String(gridData.within).length;
        const fontSize = Math.min(cellSize * 0.5, cellSize * 0.75 / Math.max(1, maxDigits * 0.55));

        // Outer border
        svg.appendChild(svgEl("rect", {
          x: gridX, y: gridY, width: gridW, height: gridH,
          fill: "none", stroke: color, "stroke-width": "2.5", rx: 0, ry: 0
        }));

        // Vertical lines
        for (let c = 1; c < cols; c++) {
          svg.appendChild(svgEl("line", {
            x1: gridX + c * cellSize, y1: gridY,
            x2: gridX + c * cellSize, y2: gridY + gridH,
            stroke: color, "stroke-width": "1.2"
          }));
        }
        // Horizontal lines
        for (let r = 1; r < rows; r++) {
          svg.appendChild(svgEl("line", {
            x1: gridX, y1: gridY + r * cellSize,
            x2: gridX + gridW, y2: gridY + r * cellSize,
            stroke: color, "stroke-width": "1.2"
          }));
        }

        // Find the first (lowest index) missing number for example
        const exampleMissingIdx = (includeExample && !showAnswers)
          ? Math.min(...gridData.missingSet) : -1;

        // Numbers
        for (let i = 0; i < totalNumbers; i++) {
          const num = gridData.start + i;
          const col = i % cols;
          const row = Math.floor(i / cols);
          const cx = gridX + col * cellSize + cellSize / 2;
          const cy = gridY + row * cellSize + cellSize / 2 + fontSize * 0.35;
          const isMissing = gridData.missingSet.has(i);
          const isExNum = (i === exampleMissingIdx);
          if (isMissing && !showAnswers && !isExNum) continue;

          const textColor = isExNum ? "#16a34a" : (isMissing && showAnswers) ? "#3182ce" : "#1a202c";
          const fontWeight = (isMissing && (showAnswers || isExNum)) ? "700" : "600";

          const el = svgEl("text", {
            x: cx, y: cy, "text-anchor": "middle",
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(fontSize), "font-weight": fontWeight, fill: textColor
          });
          el.textContent = String(num);
          svg.appendChild(el);

          if (isExNum) {
            const badgeX = cx - 21;
            const badgeY = gridY + row * cellSize - 1;
            svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": 0.75 }));
            const badgeText = svgEl("text", { x: cx, y: badgeY + 9.5, "font-family": "Fredoka, sans-serif", "font-size": 8, "font-weight": 600, "text-anchor": "middle", fill: "#16a34a" });
            badgeText.textContent = "Example";
            svg.appendChild(badgeText);
          }
        }

        // Gray out trailing empty cells
        const totalCells = cols * rows;
        for (let i = totalNumbers; i < totalCells; i++) {
          const col = i % cols;
          const row = Math.floor(i / cols);
          svg.appendChild(svgEl("rect", {
            x: gridX + col * cellSize, y: gridY + row * cellSize,
            width: cellSize, height: cellSize,
            fill: "#f0f0f0", stroke: color, "stroke-width": "1.2"
          }));
        }
      }

      return svg;
    }

    // ===== Render logic =====
    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateSheet(opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateSheet(opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: false, includeExample: false }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cols - 1) * gap) / cols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: false, includeExample: false }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: false, includeExample: false }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: true, numbered: false, includeExample: false, isAnswerKey: true }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

    // ===== Event Listeners =====
    elMissingPercent.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elNoNumbers.addEventListener("change", () => {
      if (elNoNumbers.checked) elAllNumbers.checked = false;
      renderWithNewRandomization();
    });
    elAllNumbers.addEventListener("change", () => {
      if (elAllNumbers.checked) elNoNumbers.checked = false;
      renderWithNewRandomization();
    });
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => { });
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
    let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
