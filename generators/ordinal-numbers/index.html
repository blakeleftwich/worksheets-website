  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }

    // ===== Ordinal data =====
    const ORDINAL_WORDS = [
      "", "first", "second", "third", "fourth", "fifth",
      "sixth", "seventh", "eighth", "ninth", "tenth",
      "eleventh", "twelfth", "thirteenth", "fourteenth", "fifteenth",
      "sixteenth", "seventeenth", "eighteenth", "nineteenth", "twentieth"
    ];

    const ORDINAL_ABBR = [
      "", "1st", "2nd", "3rd", "4th", "5th",
      "6th", "7th", "8th", "9th", "10th",
      "11th", "12th", "13th", "14th", "15th",
      "16th", "17th", "18th", "19th", "20th"
    ];

    // ===== Shape drawing helpers =====
    function drawCircle(svg, cx, cy, r, fill, stroke) {
      svg.appendChild(svgEl("circle", { cx, cy, r, fill: fill || "none", stroke: stroke || "#4a5568", "stroke-width": "1.5" }));
    }

    function drawSquare(svg, cx, cy, r, fill, stroke) {
      const s = r * 1.6;
      svg.appendChild(svgEl("rect", { x: cx - s/2, y: cy - s/2, width: s, height: s, rx: 2, ry: 2, fill: fill || "none", stroke: stroke || "#4a5568", "stroke-width": "1.5" }));
    }

    function drawTriangle(svg, cx, cy, r, fill, stroke) {
      const s = r * 1.1;
      const pts = [
        (cx) + "," + (cy - s),
        (cx - s * 0.95) + "," + (cy + s * 0.7),
        (cx + s * 0.95) + "," + (cy + s * 0.7)
      ].join(" ");
      svg.appendChild(svgEl("polygon", { points: pts, fill: fill || "none", stroke: stroke || "#4a5568", "stroke-width": "1.5" }));
    }

    function drawStar(svg, cx, cy, r, fill, stroke) {
      const outerR = r * 1.05;
      const innerR = outerR * 0.4;
      let pts = [];
      for (let i = 0; i < 5; i++) {
        const outerAngle = (Math.PI / 2) + (2 * Math.PI * i / 5);
        const innerAngle = outerAngle + Math.PI / 5;
        pts.push((cx + outerR * Math.cos(-outerAngle)).toFixed(1) + "," + (cy - outerR * Math.sin(outerAngle)).toFixed(1));
        pts.push((cx + innerR * Math.cos(-innerAngle)).toFixed(1) + "," + (cy - innerR * Math.sin(innerAngle)).toFixed(1));
      }
      svg.appendChild(svgEl("polygon", { points: pts.join(" "), fill: fill || "none", stroke: stroke || "#4a5568", "stroke-width": "1.5" }));
    }

    function drawDiamond(svg, cx, cy, r, fill, stroke) {
      const s = r * 1.1;
      const pts = [
        cx + "," + (cy - s),
        (cx + s * 0.75) + "," + cy,
        cx + "," + (cy + s),
        (cx - s * 0.75) + "," + cy
      ].join(" ");
      svg.appendChild(svgEl("polygon", { points: pts, fill: fill || "none", stroke: stroke || "#4a5568", "stroke-width": "1.5" }));
    }

    const SHAPE_DRAWERS = [drawCircle, drawSquare, drawTriangle, drawStar, drawDiamond];
    const SHAPE_NAMES = ["circle", "square", "triangle", "star", "diamond"];

    function drawShape(svg, shapeIndex, cx, cy, r, fill, stroke) {
      SHAPE_DRAWERS[shapeIndex % SHAPE_DRAWERS.length](svg, cx, cy, r, fill, stroke);
    }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elMode = document.getElementById("modeSelect");
    const elRange = document.getElementById("rangeSelect");
    const elProblems = document.getElementById("problemsPerSheet");
    const elNumSheets = document.getElementById("numWorksheets");
    const elAnswerKey = document.getElementById("answerKey");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Shuffle helper =====
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    // ===== Problem generation =====
    function generateProblems(count, mode, range) {
      const maxPos = parseInt(range, 10);
      const problems = [];

      if (mode === "color") {
        // Each problem: a row of shapes, student colors one specific position
        for (let i = 0; i < count; i++) {
          const shapeType = Math.floor(Math.random() * SHAPE_DRAWERS.length);
          const targetPos = Math.floor(Math.random() * maxPos) + 1; // 1-based
          const numShapes = maxPos;
          problems.push({ type: "color", shapeType, targetPos, numShapes });
        }
      } else if (mode === "write") {
        // Row of shapes, one is highlighted, student writes ordinal
        for (let i = 0; i < count; i++) {
          const shapeType = Math.floor(Math.random() * SHAPE_DRAWERS.length);
          const targetPos = Math.floor(Math.random() * maxPos) + 1;
          const numShapes = maxPos;
          problems.push({ type: "write", shapeType, targetPos, numShapes });
        }
      } else if (mode === "match") {
        // Generate pairs of ordinal words and abbreviations
        // Pick 'count' ordinals from range, shuffle the right column
        const positions = [];
        for (let p = 1; p <= maxPos; p++) positions.push(p);
        const selected = shuffle(positions).slice(0, Math.min(count, maxPos));
        selected.sort((a, b) => a - b);
        const shuffledAbbr = shuffle(selected.map(p => ({ pos: p, abbr: ORDINAL_ABBR[p] })));
        problems.push({ type: "match", left: selected, right: shuffledAbbr });
      }

      return problems;
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, mode, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", { x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af" }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.jpg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const bottomMargin = branded ? 56 : 24;

      if (mode === "color" || mode === "write") {
        renderShapeProblems(svg, problems, { topGridY, pageW, pageH, margin, bottomMargin, showAnswers, mode, numbered, includeExample });
      } else if (mode === "match") {
        renderMatchProblem(svg, problems[0], { topGridY, pageW, pageH, margin, bottomMargin, showAnswers, numbered, includeExample });
      }

      return svg;
    }

    function renderShapeProblems(svg, problems, opts) {
      const { topGridY, pageW, pageH, margin, bottomMargin, showAnswers, mode, numbered, includeExample } = opts;
      const count = problems.length;
      const availH = pageH - bottomMargin - topGridY;
      const rowH = availH / count;
      const availW = pageW - margin * 2;

      for (let i = 0; i < count; i++) {
        const prob = problems[i];
        const rowTop = topGridY + i * rowH;
        const numShapes = prob.numShapes;
        const isExample = (i === 0 && includeExample && !showAnswers);

        // Problem number
        if (numbered !== false) {
          const probNumSize = 11;
          const probNumEl = svgEl("text", { x: margin, y: rowTop + 18, "font-family": "Fredoka, sans-serif", "font-size": probNumSize, "font-weight": "600", fill: "#a0aec0" });
          probNumEl.textContent = (i + 1) + "."; svg.appendChild(probNumEl);
        }

        // Instruction text area
        const instrY = rowTop + 18;
        const instrFontSize = Math.min(13, Math.max(10, rowH * 0.14));

        // Example badge
        if (isExample) {
          const badgeX = pageW - margin - 44, badgeY = instrY - 13;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
          const bt = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          bt.textContent = "Example"; svg.appendChild(bt);
        }

        if (mode === "color") {
          const instrEl = svgEl("text", { x: margin + 22, y: instrY, "font-family": "Fredoka, sans-serif", "font-size": instrFontSize, "font-weight": "600", fill: "#2d3748" });
          instrEl.textContent = "Color the " + ORDINAL_ABBR[prob.targetPos] + " " + SHAPE_NAMES[prob.shapeType] + ".";
          svg.appendChild(instrEl);
        } else {
          const instrEl = svgEl("text", { x: margin + 22, y: instrY, "font-family": "Fredoka, sans-serif", "font-size": instrFontSize, "font-weight": "600", fill: "#2d3748" });
          instrEl.textContent = "What position is the colored " + SHAPE_NAMES[prob.shapeType] + "?";
          svg.appendChild(instrEl);
        }

        // Shapes row
        const shapesY = rowTop + 18 + (rowH - 18) * 0.5;
        const maxShapeR = Math.min((rowH - 30) * 0.28, 14);
        const shapeSpacing = Math.min(availW / (numShapes + 1), maxShapeR * 3.2);
        const totalShapesW = shapeSpacing * (numShapes - 1);
        const startX = margin + (availW - totalShapesW) / 2;

        for (let s = 0; s < numShapes; s++) {
          const cx = startX + s * shapeSpacing;
          const cy = shapesY;
          const pos = s + 1;
          let fill = "none";
          let stroke = "#4a5568";

          if (isExample && mode === "color" && pos === prob.targetPos) {
            fill = "#16a34a";
            stroke = "#16a34a";
          } else if (mode === "color" && showAnswers && pos === prob.targetPos) {
            fill = "#f59e0b";
            stroke = "#f59e0b";
          } else if (mode === "write" && pos === prob.targetPos) {
            fill = "#f59e0b";
            stroke = "#f59e0b";
          }

          drawShape(svg, prob.shapeType, cx, cy, maxShapeR, fill, stroke);

          // Position numbers below shapes
          const numEl = svgEl("text", { x: cx, y: cy + maxShapeR + 12, "font-family": "Fredoka, sans-serif", "font-size": 8, "text-anchor": "middle", fill: "#a0aec0" });
          numEl.textContent = pos;
          svg.appendChild(numEl);
        }

        // Answer area for "write" mode
        if (mode === "write") {
          const answerY = shapesY + maxShapeR + 28;
          if (answerY < rowTop + rowH - 5) {
            const ansLabel = svgEl("text", { x: margin + 22, y: answerY, "font-family": "Fredoka, sans-serif", "font-size": instrFontSize, fill: "#2d3748" });
            ansLabel.textContent = "Answer:";
            svg.appendChild(ansLabel);
            const lineStroke = isExample ? "#22c55e" : "#000";
            svg.appendChild(svgEl("line", { x1: margin + 75, y1: answerY + 2, x2: margin + 200, y2: answerY + 2, stroke: lineStroke, "stroke-width": 1 }));

            if (isExample) {
              const ansEl = svgEl("text", { x: margin + 85, y: answerY, "font-family": "Fredoka, sans-serif", "font-size": instrFontSize, "font-weight": "700", fill: "#16a34a" });
              ansEl.textContent = ORDINAL_ABBR[prob.targetPos] + " (" + ORDINAL_WORDS[prob.targetPos] + ")";
              svg.appendChild(ansEl);
            } else if (showAnswers) {
              const ansEl = svgEl("text", { x: margin + 85, y: answerY, "font-family": "Fredoka, sans-serif", "font-size": instrFontSize, "font-weight": "700", fill: "#3182ce" });
              ansEl.textContent = ORDINAL_ABBR[prob.targetPos] + " (" + ORDINAL_WORDS[prob.targetPos] + ")";
              svg.appendChild(ansEl);
            }
          }
        }
      }
    }

    function renderMatchProblem(svg, problem, opts) {
      const { topGridY, pageW, pageH, margin, bottomMargin, showAnswers, includeExample } = opts;
      const { left, right } = problem;
      const count = left.length;
      const availH = pageH - bottomMargin - topGridY;
      const rowH = Math.min(availH / count, 50);
      const totalH = rowH * count;
      const startY = topGridY + (availH - totalH) / 2;

      // Instruction
      const instrEl = svgEl("text", { x: pageW / 2, y: topGridY + 10, "font-family": "Fredoka, sans-serif", "font-size": 13, "font-weight": "600", fill: "#2d3748", "text-anchor": "middle" });
      instrEl.textContent = "Draw a line to match each word to its ordinal number.";
      svg.appendChild(instrEl);

      const actualStartY = topGridY + 30;
      const actualAvailH = pageH - bottomMargin - actualStartY;
      const actualRowH = Math.min(actualAvailH / count, 50);
      const actualTotalH = actualRowH * count;
      const yStart = actualStartY + (actualAvailH - actualTotalH) / 2;

      const leftCol = margin + 60;
      const rightCol = pageW - margin - 60;
      const dotLeftX = leftCol + 100;
      const dotRightX = rightCol - 60;

      const fontSize = Math.min(16, Math.max(11, actualRowH * 0.35));

      for (let i = 0; i < count; i++) {
        const cy = yStart + i * actualRowH + actualRowH / 2;
        const pos = left[i];

        // Left side: ordinal word
        const wordEl = svgEl("text", { x: leftCol, y: cy + fontSize * 0.35, "font-family": "Fredoka, sans-serif", "font-size": fontSize, "font-weight": "600", fill: "#2d3748" });
        wordEl.textContent = ORDINAL_WORDS[pos];
        svg.appendChild(wordEl);

        // Left dot
        svg.appendChild(svgEl("circle", { cx: dotLeftX, cy: cy, r: 3, fill: "#4a5568" }));

        // Right side: shuffled abbreviation
        const abbrEl = svgEl("text", { x: rightCol, y: cy + fontSize * 0.35, "font-family": "Fredoka, sans-serif", "font-size": fontSize, "font-weight": "700", fill: "#2d3748", "text-anchor": "end" });
        abbrEl.textContent = right[i].abbr;
        svg.appendChild(abbrEl);

        // Right dot
        svg.appendChild(svgEl("circle", { cx: dotRightX, cy: cy, r: 3, fill: "#4a5568" }));
      }

      // Example: draw first matching line in green
      if (includeExample && !showAnswers) {
        const leftCy = yStart + 0 * actualRowH + actualRowH / 2;
        const pos = left[0];
        const rightIdx = right.findIndex(r => r.pos === pos);
        const rightCy = yStart + rightIdx * actualRowH + actualRowH / 2;
        svg.appendChild(svgEl("line", { x1: dotLeftX + 5, y1: leftCy, x2: dotRightX - 5, y2: rightCy, stroke: "#22c55e", "stroke-width": 1.5, "stroke-dasharray": "4,3" }));
        // Badge near first left word
        const badgeX = pageW - margin - 44, badgeY = leftCy - 8;
        svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
        const bt = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
        bt.textContent = "Example"; svg.appendChild(bt);
      }

      // Answer lines
      if (showAnswers) {
        for (let i = 0; i < count; i++) {
          const leftCy = yStart + i * actualRowH + actualRowH / 2;
          const pos = left[i];
          // Find the matching right item
          const rightIdx = right.findIndex(r => r.pos === pos);
          const rightCy = yStart + rightIdx * actualRowH + actualRowH / 2;
          svg.appendChild(svgEl("line", { x1: dotLeftX + 5, y1: leftCy, x2: dotRightX - 5, y2: rightCy, stroke: "#3182ce", "stroke-width": 1.5, "stroke-dasharray": "4,3" }));
        }
      }
    }

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return "Ordinal Numbers";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Identify the ordinal position.";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        mode: elMode.value,
        range: elRange.value,
        numWorksheets: parseInt(elNumSheets.value, 10),
        problemsPerSheet: parseInt(elProblems.value, 10),
        showHeader,
        title,
        subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
      };
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.mode, opts.range));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.mode, opts.range));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols-1)*gap)/cols < mrw) cols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols-1)*gap)/cols < mrw) cols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        const msw = (aw - (cols-1)*gap)/cols, msh = numSheets <= 3 ? ah : ah*0.8;
        const scale = Math.min(msw/sheetWidth, msh/sheetHeight);
        const sw = Math.floor(sheetWidth*scale), sh = Math.floor(sheetHeight*scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw+24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const opts = gatherOptions();
      const sH = sheetWrap.innerHTML, sC = sheetWrap.className, sS = sheetWrap.style.cssText;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      for (let i = 0; i < currentState.sheets.length; i++) {
        const p = document.createElement("div"); p.className = "worksheet-page";
        p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, mode: opts.mode, numbered: opts.numbered, includeExample: opts.includeExample }, wsCodes[i]));
        sheetWrap.appendChild(p);
      }
      const answerKeyPages = [];
      if (opts.answerKey) {
        for (let i = 0; i < currentState.sheets.length; i++) {
          const p = document.createElement("div"); p.className = "worksheet-page ak-print-only";
          p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: true, mode: opts.mode, numbered: opts.numbered, isAnswerKey: true, includeExample: false }, wsCodes[i]));
          sheetWrap.appendChild(p);
          answerKeyPages.push(p);
        }
      }
      window.print();
      setTimeout(() => { answerKeyPages.forEach(p => p.remove()); sheetWrap.innerHTML = sH; sheetWrap.className = sC; sheetWrap.style.cssText = sS; }, 500);
    }
    // ===== Event Listeners =====
    elMode.addEventListener("change", () => renderWithNewRandomization());
    elRange.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);
let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
