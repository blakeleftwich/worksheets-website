  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elMaxMinuend = document.getElementById("maxMinuend");
    const elObjectType = document.getElementById("objectType");
    const elProblems = document.getElementById("problemsPerSheet");
    const elAnswerFormat = document.getElementById("answerFormat");
    const elNumSheets = document.getElementById("numWorksheets");
    const elAnswerKey = document.getElementById("answerKey");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return "Subtraction with Pictures";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";

      return "Count the pictures and solve each subtraction problem.";

        // ===== State =====
    let currentState = { sheets: [] };

    // ===== Object drawing functions =====
    // Each function draws one object centered at (cx, cy) with given size
    // Returns an SVG group element

    function drawStar(cx, cy, size, color) {
      const g = svgEl("g", {});
      const pts = [];
      for (let i = 0; i < 5; i++) {
        const outerAngle = (i * 72 - 90) * Math.PI / 180;
        const innerAngle = ((i * 72) + 36 - 90) * Math.PI / 180;
        pts.push((cx + size * 0.48 * Math.cos(outerAngle)).toFixed(1) + "," + (cy + size * 0.48 * Math.sin(outerAngle)).toFixed(1));
        pts.push((cx + size * 0.2 * Math.cos(innerAngle)).toFixed(1) + "," + (cy + size * 0.2 * Math.sin(innerAngle)).toFixed(1));
      }
      g.appendChild(svgEl("polygon", { points: pts.join(" "), fill: color, stroke: darken(color), "stroke-width": "1" }));
      return g;
    }

    function drawHeart(cx, cy, size, color) {
      const g = svgEl("g", {});
      const s = size * 0.45;
      const d = "M " + cx + " " + (cy + s * 0.35) +
                " C " + (cx - s * 0.6) + " " + (cy - s * 0.5) + " " + (cx - s) + " " + (cy - s * 0.15) + " " + cx + " " + (cy + s * 0.85) +
                " C " + (cx + s) + " " + (cy - s * 0.15) + " " + (cx + s * 0.6) + " " + (cy - s * 0.5) + " " + cx + " " + (cy + s * 0.35) + " Z";
      g.appendChild(svgEl("path", { d: d, fill: color, stroke: darken(color), "stroke-width": "1" }));
      return g;
    }

    function drawCircle(cx, cy, size, color) {
      const g = svgEl("g", {});
      g.appendChild(svgEl("circle", { cx: cx, cy: cy, r: size * 0.4, fill: color, stroke: darken(color), "stroke-width": "1" }));
      return g;
    }

    function drawDiamond(cx, cy, size, color) {
      const g = svgEl("g", {});
      const s = size * 0.42;
      const pts = cx + "," + (cy - s) + " " + (cx + s * 0.7) + "," + cy + " " + cx + "," + (cy + s) + " " + (cx - s * 0.7) + "," + cy;
      g.appendChild(svgEl("polygon", { points: pts, fill: color, stroke: darken(color), "stroke-width": "1" }));
      return g;
    }

    function drawTriangle(cx, cy, size, color) {
      const g = svgEl("g", {});
      const s = size * 0.44;
      const pts = cx + "," + (cy - s) + " " + (cx + s * 0.9) + "," + (cy + s * 0.7) + " " + (cx - s * 0.9) + "," + (cy + s * 0.7);
      g.appendChild(svgEl("polygon", { points: pts, fill: color, stroke: darken(color), "stroke-width": "1" }));
      return g;
    }

    // Animal drawings - simple cute SVG shapes
    function drawCat(cx, cy, size, color) {
      const g = svgEl("g", {});
      const s = size * 0.38;
      // Body (circle)
      g.appendChild(svgEl("circle", { cx: cx, cy: cy + s * 0.15, r: s * 0.75, fill: color, stroke: darken(color), "stroke-width": "1" }));
      // Left ear
      const le = cx - s * 0.5 + "," + (cy - s * 0.9) + " " + (cx - s * 0.75) + "," + (cy - s * 0.15) + " " + (cx - s * 0.2) + "," + (cy - s * 0.3);
      g.appendChild(svgEl("polygon", { points: le, fill: color, stroke: darken(color), "stroke-width": "1" }));
      // Right ear
      const re = cx + s * 0.5 + "," + (cy - s * 0.9) + " " + (cx + s * 0.75) + "," + (cy - s * 0.15) + " " + (cx + s * 0.2) + "," + (cy - s * 0.3);
      g.appendChild(svgEl("polygon", { points: re, fill: color, stroke: darken(color), "stroke-width": "1" }));
      // Eyes
      g.appendChild(svgEl("circle", { cx: cx - s * 0.25, cy: cy, r: s * 0.1, fill: "#2d3748" }));
      g.appendChild(svgEl("circle", { cx: cx + s * 0.25, cy: cy, r: s * 0.1, fill: "#2d3748" }));
      // Nose
      g.appendChild(svgEl("circle", { cx: cx, cy: cy + s * 0.18, r: s * 0.07, fill: "#e53e3e" }));
      // Whiskers
      g.appendChild(svgEl("line", { x1: cx - s * 0.15, y1: cy + s * 0.22, x2: cx - s * 0.7, y2: cy + s * 0.12, stroke: "#4a5568", "stroke-width": "0.8" }));
      g.appendChild(svgEl("line", { x1: cx - s * 0.15, y1: cy + s * 0.28, x2: cx - s * 0.7, y2: cy + s * 0.35, stroke: "#4a5568", "stroke-width": "0.8" }));
      g.appendChild(svgEl("line", { x1: cx + s * 0.15, y1: cy + s * 0.22, x2: cx + s * 0.7, y2: cy + s * 0.12, stroke: "#4a5568", "stroke-width": "0.8" }));
      g.appendChild(svgEl("line", { x1: cx + s * 0.15, y1: cy + s * 0.28, x2: cx + s * 0.7, y2: cy + s * 0.35, stroke: "#4a5568", "stroke-width": "0.8" }));
      return g;
    }

    function drawFish(cx, cy, size, color) {
      const g = svgEl("g", {});
      const s = size * 0.4;
      // Body (ellipse)
      g.appendChild(svgEl("ellipse", { cx: cx, cy: cy, rx: s * 0.85, ry: s * 0.55, fill: color, stroke: darken(color), "stroke-width": "1" }));
      // Tail
      const tail = (cx + s * 0.7) + "," + cy + " " + (cx + s * 1.15) + "," + (cy - s * 0.45) + " " + (cx + s * 1.15) + "," + (cy + s * 0.45);
      g.appendChild(svgEl("polygon", { points: tail, fill: color, stroke: darken(color), "stroke-width": "1" }));
      // Eye

      g.appendChild(svgEl("circle", { cx: cx - s * 0.35, cy: cy - s * 0.1, r: s * 0.06, fill: "#2d3748" }));
      return g;
    }

    function drawBird(cx, cy, size, color) {

      const beak = (cx - s * 0.45) + "," + (cy - s * 0.55) + " " + (cx - s * 0.85) + "," + (cy - s * 0.45) + " " + (cx - s * 0.45) + "," + (cy - s * 0.4);
      g.appendChild(svgEl("polygon", { points: beak, fill: "#ed8936", stroke: "#c05621", "stroke-width": "0.8" }));

      g.appendChild(svgEl("ellipse", { cx: cx + s * 0.2, cy: cy + s * 0.1, rx: s * 0.4, ry: s * 0.28, fill: darken(color), stroke: darken(color), "stroke-width": "0.8", opacity: "0.5" }));

    function drawBunny(cx, cy, size, color) {
      const g = svgEl("g", {});
      const s = size * 0.36;
      // Body
      g.appendChild(svgEl("circle", { cx: cx, cy: cy + s * 0.25, r: s * 0.7, fill: color, stroke: darken(color), "stroke-width": "1" }));
      // Left ear
      g.appendChild(svgEl("ellipse", { cx: cx - s * 0.28, cy: cy - s * 0.75, rx: s * 0.18, ry: s * 0.52, fill: color, stroke: darken(color), "stroke-width": "1" }));
      g.appendChild(svgEl("ellipse", { cx: cx - s * 0.28, cy: cy - s * 0.75, rx: s * 0.1, ry: s * 0.38, fill: "#feb2b2" }));
      // Right ear
      g.appendChild(svgEl("ellipse", { cx: cx + s * 0.28, cy: cy - s * 0.75, rx: s * 0.18, ry: s * 0.52, fill: color, stroke: darken(color), "stroke-width": "1" }));
      g.appendChild(svgEl("ellipse", { cx: cx + s * 0.28, cy: cy - s * 0.75, rx: s * 0.1, ry: s * 0.38, fill: "#feb2b2" }));
      // Eyes
      g.appendChild(svgEl("circle", { cx: cx - s * 0.22, cy: cy + s * 0.05, r: s * 0.08, fill: "#2d3748" }));
      g.appendChild(svgEl("circle", { cx: cx + s * 0.22, cy: cy + s * 0.05, r: s * 0.08, fill: "#2d3748" }));
      // Nose
      const nose = cx + "," + (cy + s * 0.2) + " " + (cx - s * 0.08) + "," + (cy + s * 0.3) + " " + (cx + s * 0.08) + "," + (cy + s * 0.3);
      g.appendChild(svgEl("polygon", { points: nose, fill: "#feb2b2" }));

    // Color palette for objects
    const objectColors = {
      animals: ["#FC8181", "#F6AD55", "#68D391", "#63B3ED", "#B794F4", "#F687B3"],
      stars:   ["#F6E05E", "#FBD38D", "#F6AD55", "#FC8181", "#68D391", "#63B3ED"],
      hearts:  ["#FC8181", "#F687B3", "#ED64A6", "#B794F4", "#F6AD55", "#FEB2B2"],
      shapes:  ["#63B3ED", "#68D391", "#F6E05E", "#FC8181", "#B794F4", "#F6AD55"]
    };

    function darken(hex) {
      // Simple darken by converting hex to slightly darker shade
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const factor = 0.7;
      return "#" + Math.round(r * factor).toString(16).padStart(2, "0") +
             Math.round(g * factor).toString(16).padStart(2, "0") +
             Math.round(b * factor).toString(16).padStart(2, "0");
    }

    // Object type to drawing function map
    const animalDrawers = [drawCat, drawFish, drawBird, drawBunny];
    const shapeDrawers = [drawCircle, drawDiamond, drawTriangle];

    function getDrawerForType(type, seed) {
      if (type === "stars") return drawStar;
      if (type === "hearts") return drawHeart;
      if (type === "shapes") return shapeDrawers[seed % shapeDrawers.length];
      if (type === "animals") return animalDrawers[seed % animalDrawers.length];
      // mixed
      const allDrawers = [drawStar, drawHeart, drawCircle, drawDiamond, drawTriangle, drawCat, drawFish, drawBird, drawBunny];
      return allDrawers[seed % allDrawers.length];
    }

    function getColorForType(type, seed) {
      const palette = type === "mixed"
        ? [...objectColors.animals, ...objectColors.stars, ...objectColors.hearts, ...objectColors.shapes]
        : objectColors[type] || objectColors.animals;
      return palette[seed % palette.length];
    }

    // Draw X over an object
    function drawCrossOut(cx, cy, size) {
      const g = svgEl("g", {});
      const s = size * 0.42;
      g.appendChild(svgEl("line", { x1: cx - s, y1: cy - s, x2: cx + s, y2: cy + s, stroke: "#E53E3E", "stroke-width": "2.5", "stroke-linecap": "round" }));
      g.appendChild(svgEl("line", { x1: cx + s, y1: cy - s, x2: cx - s, y2: cy + s, stroke: "#E53E3E", "stroke-width": "2.5", "stroke-linecap": "round" }));
      return g;
    }

    // ===== Problem generation =====
    function generateProblems(count, opts) {
      const { maxMinuend, objectType } = opts;
      const problems = [];
      const seen = new Set();
      let attempts = 0;

      while (problems.length < count && attempts < count * 200) {
        attempts++;
        // Total (minuend): at least 2 so we can subtract at least 1
        const total = 2 + Math.floor(Math.random() * (maxMinuend - 1));
        if (total > maxMinuend) continue;
        // Subtracted: at least 1, at most total - 1 (so answer is at least 1)
        const subtracted = 1 + Math.floor(Math.random() * (total - 1));
        const answer = total - subtracted;

        const key = total + "-" + subtracted;
        if (seen.has(key)) continue;
        seen.add(key);

        // Pick a drawing type/color seed for this problem
        const drawSeed = problems.length;
        problems.push({ total, subtracted, answer, drawSeed });
      }

      // Fill remaining if needed
      while (problems.length < count) {
        const total = 2 + Math.floor(Math.random() * (maxMinuend - 1));
        const safe = Math.min(total, maxMinuend);
        const subtracted = 1 + Math.floor(Math.random() * Math.max(1, safe - 1));
        problems.push({ total, subtracted, answer: total - subtracted, drawSeed: problems.length });
      }

      // Shuffle
      for (let i = problems.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [problems[i], problems[j]] = [problems[j], problems[i]];
      }

      return problems;
    }

    // ===== Auto title =====
    function generateAutoTitle() {
      const max = parseInt(elMaxMinuend.value, 10);
      return "Subtraction with Pictures (Within " + max + ")";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        maxMinuend: parseInt(elMaxMinuend.value, 10),
        objectType: elObjectType.value,
        numWorksheets: parseInt(elNumSheets.value, 10),
        problemsPerSheet: parseInt(elProblems.value, 10),
        answerFormat: elAnswerFormat.value,
        showHeader: showHeader,
        title: title,
        subtitle: subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        numbered: elNumbered.checked,
      };
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, answerFormat, objectType, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.jpg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const count = problems.length;
      const bottomMargin = branded ? 56 : 24;
      const gridTop = topGridY + 10;
      const availH = pageH - bottomMargin - gridTop;
      const availW = pageW - margin * 2;

      // Layout: each problem gets a row
      const rowH = availH / count;
      // Clamp object size to fit nicely
      const maxObjPerRow = 20;

      for (let i = 0; i < count; i++) {
        const p = problems[i];
        const cellTop = gridTop + i * rowH;
        const cellLeft = margin;

        // Problem number
        const probNumSize = 11;
        if (numbered !== false) {
          const numEl = svgEl("text", { x: cellLeft, y: cellTop + 14, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numEl.textContent = (i + 1) + "."; svg.appendChild(numEl);
        }

        // Region for objects
        const objAreaLeft = cellLeft + 22;
        const objAreaWidth = availW - 22;

        // Calculate object size based on total and available space
        // Objects shown in a grid-like row
        const maxObjSize = Math.min(rowH * 0.52, 36);
        const objGap = 3;
        // Determine how many objects can fit in a row
        const maxPerRow = Math.min(p.total, Math.floor(objAreaWidth / (maxObjSize + objGap)));
        const objRows = Math.ceil(p.total / maxPerRow);
        const objSize = Math.min(maxObjSize, (rowH * 0.52) / objRows);

        // Center the objects area vertically in the top portion of the cell
        const objBlockH = objRows * (objSize + objGap) - objGap;
        const equationH = 28;
        const totalContentH = objBlockH + 10 + equationH;
        const contentStartY = cellTop + (rowH - totalContentH) / 2;

        // Draw separator line between problems (except first)
        if (i > 0) {
          svg.appendChild(svgEl("line", {
            x1: cellLeft, y1: cellTop - 1,
            x2: cellLeft + availW, y2: cellTop - 1,
            stroke: "#e2e8f0", "stroke-width": "1", "stroke-dasharray": "4,3"
          }));
        }

        // Get the drawer and color for this problem
        const drawer = getDrawerForType(objectType, p.drawSeed);
        const color = getColorForType(objectType, p.drawSeed);

        // Draw all objects
        // Remaining objects first, then crossed out ones
        for (let obj = 0; obj < p.total; obj++) {
          const row = Math.floor(obj / maxPerRow);
          const col = obj % maxPerRow;

          // Center the objects row within the available width
          const objsInThisRow = Math.min(maxPerRow, p.total - row * maxPerRow);
          const rowWidth = objsInThisRow * (objSize + objGap) - objGap;
          const rowStartX = objAreaLeft + (objAreaWidth - rowWidth) / 2;

          const cx = rowStartX + col * (objSize + objGap) + objSize / 2;
          const cy = contentStartY + row * (objSize + objGap) + objSize / 2;

          // Draw the object
          const objEl = drawer(cx, cy, objSize, color);
          svg.appendChild(objEl);

          // Cross out the last 'subtracted' objects
          const isCrossedOut = obj >= (p.total - p.subtracted);
          if (isCrossedOut) {
            svg.appendChild(drawCrossOut(cx, cy, objSize));
          }
        }

        // Draw equation below the objects
        const eqY = contentStartY + objBlockH + 10 + equationH * 0.7;
        const eqFontSize = Math.min(22, equationH * 0.85);
        const blankW = eqFontSize * 2;

        if (answerFormat === "equation") {
          // Write full equation: ___ - ___ = ___
          // Show blanks for all three parts, or show the equation with answer blank
          const eqCenterX = cellLeft + availW / 2;

          if (showAnswers) {
            // Show full equation with answer
            const eqStr = p.total + " \u2212 " + p.subtracted + " = " + p.answer;
            const ansEl = svgEl("text", { x: eqCenterX, y: eqY, "font-family": "Fredoka, sans-serif", "font-size": String(eqFontSize), "font-weight": "700", "text-anchor": "middle", fill: "#3182ce" });
            ansEl.textContent = eqStr; svg.appendChild(ansEl);
          } else {
            // Show: ____ - ____ = ____
            // Each blank is an underline with space for writing
            const charW = eqFontSize * 0.6;
            const opW = charW * 2;
            const totalEqW = blankW * 3 + opW * 2 + charW * 2;
            let eqX = eqCenterX - totalEqW / 2;

            // First blank (minuend)
            svg.appendChild(svgEl("line", { x1: eqX, y1: eqY + 4, x2: eqX + blankW, y2: eqY + 4, stroke: "#2d3748", "stroke-width": "1.5" }));
            eqX += blankW + charW;

            // Minus sign
            const minusEl = svgEl("text", { x: eqX, y: eqY, "font-family": "Fredoka, sans-serif", "font-size": String(eqFontSize), "font-weight": "700", fill: "#2d3748" });
            minusEl.textContent = "\u2212"; svg.appendChild(minusEl);
            eqX += opW;

            // Second blank (subtrahend)
            svg.appendChild(svgEl("line", { x1: eqX, y1: eqY + 4, x2: eqX + blankW, y2: eqY + 4, stroke: "#2d3748", "stroke-width": "1.5" }));
            eqX += blankW + charW;

            // Equals sign
            const eqEl = svgEl("text", { x: eqX, y: eqY, "font-family": "Fredoka, sans-serif", "font-size": String(eqFontSize), "font-weight": "700", fill: "#2d3748" });
            eqEl.textContent = "="; svg.appendChild(eqEl);
            eqX += opW;

            // Third blank (answer)
            svg.appendChild(svgEl("line", { x1: eqX, y1: eqY + 4, x2: eqX + blankW, y2: eqY + 4, stroke: "#2d3748", "stroke-width": "1.5" }));
          }
        } else {
          // Fill in answer only: show "7 - 3 = ___"
          const eqCenterX = cellLeft + availW / 2;

          if (showAnswers) {
            const eqStr = p.total + " \u2212 " + p.subtracted + " = " + p.answer;
            const ansEl = svgEl("text", { x: eqCenterX, y: eqY, "font-family": "Fredoka, sans-serif", "font-size": String(eqFontSize), "font-weight": "700", "text-anchor": "middle", fill: "#3182ce" });
            ansEl.textContent = eqStr; svg.appendChild(ansEl);
          } else {
            const charW = eqFontSize * 0.6;
            const prefix = p.total + " \u2212 " + p.subtracted + " = ";
            const prefixW = prefix.length * charW * 0.58;
            const totalW = prefixW + blankW;
            let eqX = eqCenterX - totalW / 2;

            // Equation text
            const textEl = svgEl("text", { x: eqX, y: eqY, "font-family": "Fredoka, sans-serif", "font-size": String(eqFontSize), "font-weight": "700", fill: "#2d3748" });
            textEl.textContent = prefix; svg.appendChild(textEl);
            eqX += prefixW;

            // Answer blank
            svg.appendChild(svgEl("line", { x1: eqX, y1: eqY + 4, x2: eqX + blankW, y2: eqY + 4, stroke: "#2d3748", "stroke-width": "1.5" }));
          }
        }
      }

      return svg;
    }

    // ===== Render logic =====
    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, answerFormat: opts.answerFormat, objectType: opts.objectType, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cols - 1) * gap) / cols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, answerFormat: opts.answerFormat, objectType: opts.objectType, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, answerFormat: opts.answerFormat, objectType: opts.objectType, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const opts = gatherOptions();
      const sH = sheetWrap.innerHTML, sC = sheetWrap.className, sS = sheetWrap.style.cssText;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      for (let i = 0; i < currentState.sheets.length; i++) {
        const p = document.createElement("div"); p.className = "worksheet-page";
        p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, answerFormat: opts.answerFormat, objectType: opts.objectType, numbered: opts.numbered, includeExample: opts.includeExample }, wsCodes[i]));
        sheetWrap.appendChild(p);
      }
      const answerKeyPages = [];
      if (opts.answerKey) {
        for (let i = 0; i < currentState.sheets.length; i++) {
          const p = document.createElement("div"); p.className = "worksheet-page ak-print-only";
          p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: true, isAnswerKey: true, includeExample: false, answerFormat: opts.answerFormat, objectType: opts.objectType, numbered: opts.numbered }, wsCodes[i]));
          sheetWrap.appendChild(p);
          answerKeyPages.push(p);
        }
      }
      window.print();
      setTimeout(() => { answerKeyPages.forEach(p => p.remove()); sheetWrap.innerHTML = sH; sheetWrap.className = sC; sheetWrap.style.cssText = sS; }, 500);
    }
    // ===== Event Listeners =====
    elMaxMinuend.addEventListener("change", () => renderWithNewRandomization());
    elObjectType.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elAnswerFormat.addEventListener("change", () => renderWithoutRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);
let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
<script src="../../favorites.js"></script>
</body>
