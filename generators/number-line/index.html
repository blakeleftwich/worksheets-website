  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elMode = document.getElementById("modeSelect");
    const elRange = document.getElementById("rangeSelect");
    const elProblems = document.getElementById("problemsPerSheet");
    const elNumSheets = document.getElementById("numWorksheets");
    const elAnswerKey = document.getElementById("answerKey");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elStartWithZero = document.getElementById("startWithZero");
    const elShowJumps = document.getElementById("showJumps");
    const elNumbered = document.getElementById("numbered");
    const elAnswerPositions = document.getElementById("answerPositions");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Problem generation =====
    // Compute the tick step for a given range (must match rendering logic)
    function getTickStep(rangeMax) {
      if (rangeMax > 50) return 10;
      if (rangeMax > 20) return 5;
      if (rangeMax > 10) return 2;
      return 1;
    }

    // Build array of tick-mark values for a range
    function getTickValues(rangeMax) {
      const step = getTickStep(rangeMax);
      const vals = [];
      for (let v = 0; v <= rangeMax; v += step) vals.push(v);
      return vals;
    }

    // Check whether a value falls on a tick mark
    function isOnTick(val, rangeMax) {
      const step = getTickStep(rangeMax);
      return val % step === 0 && val >= 0 && val <= rangeMax;
    }

    // For "between" mode: generate a value that is NOT on a tick mark
    function randBetweenTicks(rangeMax) {
      const step = getTickStep(rangeMax);
      if (step === 1) {
        // Every integer is a tick mark, so "between" isn't possible with integers.
        // Return a random integer anyway (fall back to on-tick).
        return randInt(1, rangeMax - 1);
      }
      // Pick a value that doesn't land on a tick
      let attempts = 0;
      while (attempts < 200) {
        const v = randInt(1, rangeMax - 1);
        if (v % step !== 0) return v;
        attempts++;
      }
      return randInt(1, rangeMax - 1);
    }

    function generateProblems(count, opts) {
      const { mode, rangeMax, answerPositions = "on", startWithZero = false } = opts;
      const lineStartVal = startWithZero ? 0 : 1;
      const problems = [];
      const seen = new Set();
      let attempts = 0;
      const step = getTickStep(rangeMax);
      // Tick values excluding endpoints (candidates for on-tick answers)
      const ticksInner = [];
      for (let v = Math.max(step, lineStartVal); v < rangeMax; v += step) ticksInner.push(v);
      // All tick values including endpoints (starting from lineStartVal)
      const ticksAll = getTickValues(rangeMax).filter(v => v >= lineStartVal);

      while (problems.length < count && attempts < count * 200) {
        attempts++;
        let problem = null;

        // For "mixed" mode, randomly decide per-problem whether answer is on or between ticks
        let posMode = answerPositions; // "on", "between", "mixed"
        if (posMode === "mixed") {
          posMode = Math.random() < 0.5 ? "on" : "between";
        }

        if (mode === "addition") {
          let a, b, answer;

          if (posMode === "on" || step === 1) {
            // Both operands and answer must be on tick marks
            // Pick two tick values for a and answer, where a < answer
            if (ticksAll.length < 3) { // Need at least 0, one middle, and rangeMax
              a = randInt(1, rangeMax - 1);
              b = randInt(1, rangeMax - a);
              answer = a + b;
            } else {
              // Pick 'a' from tick values (not the last one)
              const aIdx = randInt(0, ticksAll.length - 2);
              a = ticksAll[aIdx];
              // Pick 'answer' from tick values that are greater than a
              const validAnswers = ticksAll.filter(v => v > a);
              if (validAnswers.length === 0) continue;
              answer = validAnswers[randInt(0, validAnswers.length - 1)];
              b = answer - a;
              if (a === 0 || b === 0) continue; // Skip trivial problems
            }
          } else {
            // "between" mode: answer should NOT be on a tick mark
            if (step === 1) {
              // Can't do between for step=1, just do normal
              a = randInt(1, rangeMax - 1);
              b = randInt(1, rangeMax - a);
              answer = a + b;
            } else {
              answer = randBetweenTicks(rangeMax);
              // Pick a such that b = answer - a > 0 and a > 0
              a = randInt(1, answer - 1);
              b = answer - a;
            }
          }

          const key = "add:" + a + "+" + b;
          if (seen.has(key)) continue;
          seen.add(key);
          problem = { mode: "addition", a, b, answer, lineStart: lineStartVal, lineEnd: rangeMax };

        } else if (mode === "subtraction") {
          let a, b, answer;

          if (posMode === "on" || step === 1) {
            // Both operands and answer must be on tick marks
            if (ticksAll.length < 3) {
              a = randInt(2, rangeMax);
              b = randInt(1, a);
              answer = a - b;
            } else {
              // Pick 'a' from tick values (not 0)
              const validA = ticksAll.filter(v => v > 0);
              if (validA.length < 1) continue;
              a = validA[randInt(0, validA.length - 1)];
              // Pick 'answer' from tick values less than a
              const validAnswers = ticksAll.filter(v => v < a);
              if (validAnswers.length === 0) continue;
              answer = validAnswers[randInt(0, validAnswers.length - 1)];
              b = a - answer;
              if (b === 0) continue;
            }
          } else {
            // "between" mode: answer should NOT be on a tick
            if (step === 1) {
              a = randInt(2, rangeMax);
              b = randInt(1, a);
              answer = a - b;
            } else {
              answer = randBetweenTicks(rangeMax);
              // a must be > answer and <= rangeMax
              a = randInt(answer + 1, rangeMax);
              b = a - answer;
            }
          }

          const key = "sub:" + a + "-" + b;
          if (seen.has(key)) continue;
          seen.add(key);
          problem = { mode: "subtraction", a, b, answer, lineStart: lineStartVal, lineEnd: rangeMax };

        } else if (mode === "place") {
          let target;

          if (posMode === "on" || step === 1) {
            // Target must be on a tick mark (not an endpoint)
            if (ticksInner.length === 0) {
              target = randInt(1, rangeMax - 1);
            } else {
              target = ticksInner[randInt(0, ticksInner.length - 1)];
            }
          } else {
            // "between" mode: target should NOT be on a tick
            target = randBetweenTicks(rangeMax);
          }

          const key = "place:" + target;
          if (seen.has(key)) continue;
          seen.add(key);
          problem = { mode: "place", target, lineStart: lineStartVal, lineEnd: rangeMax };

        } else if (mode === "missing") {
          // Missing mode: blanks are always from tick label positions (this is inherent to the mode)
          // The answerPositions setting doesn't change missing mode since blanks
          // must be at visible tick positions for the student to see the blank line.
          const candidates = [...ticksInner];
          if (candidates.length === 0) continue;
          // Choose how many blanks
          const numBlanks = candidates.length <= 5 ? randInt(1, 2) : rangeMax <= 10 ? randInt(1, 3) : randInt(2, 4);
          // Shuffle and pick
          for (let i = candidates.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [candidates[i], candidates[j]] = [candidates[j], candidates[i]];
          }
          const blanks = candidates.slice(0, Math.min(numBlanks, candidates.length));
          blanks.sort((a, b) => a - b);
          const key = "miss:" + blanks.join(",");
          if (seen.has(key)) continue;
          seen.add(key);
          problem = { mode: "missing", blanks, lineStart: lineStartVal, lineEnd: rangeMax };
        }

        if (problem) problems.push(problem);
      }

      // Fill remainder if needed
      while (problems.length < count) {
        if (mode === "addition") {
          if (ticksAll.length >= 3) {
            const aIdx = randInt(0, ticksAll.length - 2);
            const a = ticksAll[aIdx];
            const validAnswers = ticksAll.filter(v => v > a && v > 0);
            if (validAnswers.length > 0) {
              const answer = validAnswers[randInt(0, validAnswers.length - 1)];
              const b = answer - a;
              if (a > 0 && b > 0) {
                problems.push({ mode: "addition", a, b, answer, lineStart: lineStartVal, lineEnd: rangeMax });
                continue;
              }
            }
          }
          const a = randInt(1, Math.max(1, rangeMax - 1));
          const b = randInt(1, Math.max(1, rangeMax - a));
          problems.push({ mode: "addition", a, b, answer: a + b, lineStart: lineStartVal, lineEnd: rangeMax });
        } else if (mode === "subtraction") {
          if (ticksAll.length >= 3) {
            const validA = ticksAll.filter(v => v > 0);
            if (validA.length > 0) {
              const a = validA[randInt(0, validA.length - 1)];
              const validAnswers = ticksAll.filter(v => v < a);
              if (validAnswers.length > 0) {
                const answer = validAnswers[randInt(0, validAnswers.length - 1)];
                problems.push({ mode: "subtraction", a, b: a - answer, answer, lineStart: lineStartVal, lineEnd: rangeMax });
                continue;
              }
            }
          }
          const a = randInt(2, rangeMax);
          const b = randInt(1, a);
          problems.push({ mode: "subtraction", a, b, answer: a - b, lineStart: lineStartVal, lineEnd: rangeMax });
        } else if (mode === "place") {
          const target = ticksInner.length > 0 ? ticksInner[randInt(0, ticksInner.length - 1)] : randInt(1, rangeMax - 1);
          problems.push({ mode: "place", target, lineStart: lineStartVal, lineEnd: rangeMax });
        } else {
          const blank = ticksInner.length > 0 ? ticksInner[randInt(0, ticksInner.length - 1)] : 1;
          problems.push({ mode: "missing", blanks: [blank], lineStart: lineStartVal, lineEnd: rangeMax });
        }
      }

      return problems;
    }

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      const mode = elMode.value;
      const rangeMax = parseInt(elRange.value, 10);
      const names = {
        addition: "Number Line Addition",
        subtraction: "Number Line Subtraction",
        place: "Place the Number",
        missing: "Missing Numbers"
      };
      const rangeStart = elStartWithZero.checked ? 0 : 1;
      return (names[mode] || "Number Line") + " (" + rangeStart + "\u2013" + rangeMax + ")";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Use the number line to answer each question.";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        mode: elMode.value,
        rangeMax: parseInt(elRange.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        problemsPerSheet: parseInt(elProblems.value, 10),
        showHeader,
        title,
        subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        answerPositions: elAnswerPositions.value, // "on", "between", "mixed"
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
        startWithZero: elStartWithZero.checked,
        showJumps: elShowJumps.checked,
      };
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, numbered, includeExample, isAnswerKey, showJumps } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));
      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", { x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af" }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 28;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.svg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const count = problems.length;
      const bottomMargin = branded ? 56 : 40;
      const gridTop = topGridY;
      const availH = pageH - bottomMargin - gridTop;
      const availW = pageW - margin * 2;

      // Each problem gets a vertical slot
      const slotH = availH / count;

      for (let i = 0; i < count; i++) {
        const prob = problems[i];
        const slotTop = gridTop + i * slotH;

        // Determine number line parameters
        const lineStart = prob.lineStart;
        const lineEnd = prob.lineEnd;
        const totalRange = lineEnd - lineStart;

        // Decide tick step for large ranges (based on rangeMax to match generation)
        let step = 1;
        if (lineEnd > 50) step = 10;
        else if (lineEnd > 20) step = 5;
        else if (lineEnd > 10) step = 2;

        // Build tick values aligned to multiples of step, starting from lineStart
        const tickValues = [];
        // First tick at lineStart (or next multiple of step if lineStart isn't aligned)
        const firstTick = lineStart === 0 ? 0 : (Math.ceil(lineStart / step) * step === lineStart ? lineStart : Math.ceil(lineStart / step) * step);
        // If lineStart itself should be shown (e.g. 1 on a step-2 line), include it
        if (lineStart < firstTick) tickValues.push(lineStart);
        for (let v = firstTick; v <= lineEnd; v += step) tickValues.push(v);
        if (tickValues[tickValues.length - 1] !== lineEnd) tickValues.push(lineEnd);
        const tickCount = tickValues.length;

        // Layout within slot
        const lineLeftPad = 24;
        const lineRightPad = 24;
        const lineX1 = margin + lineLeftPad;
        const lineX2 = margin + availW - lineRightPad;
        const lineW = lineX2 - lineX1;

        // Vertical positioning within slot — equation closer to number line, tighter spacing
        const instructionY = slotTop + slotH * 0.35;
        const lineY = slotTop + slotH * 0.58;
        const tickH = 8;
        const labelY = lineY + tickH + 14;

        const isExample = (i === 0 && includeExample && !showAnswers);

        // Problem number
        if (numbered !== false) {
          const probNumEl = svgEl("text", { x: margin, y: instructionY, "font-family": "Fredoka, sans-serif", "font-size": "10", "font-weight": "600", fill: "#a0aec0" });
          probNumEl.textContent = (i + 1) + ".";
          svg.appendChild(probNumEl);
        }

        // Example badge
        if (isExample) {
          const badgeX = pageW - margin - 44, badgeY = instructionY - 13;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
          const bt = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          bt.textContent = "Example"; svg.appendChild(bt);
        }

        // Instruction text above the line — scale font based on problem count
        const instrX = margin + 18;
        const eqFontSize = count <= 4 ? 28 : count <= 5 ? 24 : 21;
        const textFontSize = count <= 4 ? 20 : count <= 5 ? 18 : 16;
        // Measure text width: digits ~0.55em, spaces ~0.28em, operators ~0.55em
        function approxTextW(text, fs) {
          let w = 0;
          for (const ch of text) {
            if (ch === ' ') w += fs * 0.28;
            else w += fs * 0.55;
          }
          return w;
        }

        if (prob.mode === "addition") {
          const eqText = prob.a + " + " + prob.b + " = ";
          const instrEl = svgEl("text", { x: instrX, y: instructionY, "font-family": "'Google Sans Flex', sans-serif", "font-size": eqFontSize, "font-weight": "700", fill: "#1a202c" });
          instrEl.textContent = eqText;
          svg.appendChild(instrEl);
          const ulStartX = instrX + approxTextW(eqText, eqFontSize) - eqFontSize * 0.125;
          svg.appendChild(svgEl("line", { x1: ulStartX, y1: instructionY + 4, x2: ulStartX + 50, y2: instructionY + 4, stroke: "#cbd5e1", "stroke-width": 1.5 }));
        } else if (prob.mode === "subtraction") {
          const eqText = prob.a + " \u2212 " + prob.b + " = ";
          const instrEl = svgEl("text", { x: instrX, y: instructionY, "font-family": "'Google Sans Flex', sans-serif", "font-size": eqFontSize, "font-weight": "700", fill: "#1a202c" });
          instrEl.textContent = eqText;
          svg.appendChild(instrEl);
          const ulStartX = instrX + approxTextW(eqText, eqFontSize) - eqFontSize * 0.125;
          svg.appendChild(svgEl("line", { x1: ulStartX, y1: instructionY + 4, x2: ulStartX + 50, y2: instructionY + 4, stroke: "#cbd5e1", "stroke-width": 1.5 }));
        } else if (prob.mode === "place") {
          const instrEl = svgEl("text", { x: instrX, y: instructionY, "font-family": "Fredoka, sans-serif", "font-size": textFontSize, "font-weight": "600", fill: "#1a202c" });
          instrEl.textContent = "Mark " + prob.target + " on the number line with an X.";
          svg.appendChild(instrEl);
        } else if (prob.mode === "missing") {
          const instrEl = svgEl("text", { x: instrX, y: instructionY, "font-family": "Fredoka, sans-serif", "font-size": textFontSize, "font-weight": "600", fill: "#1a202c" });
          instrEl.textContent = "Fill in the missing numbers on the number line.";
          svg.appendChild(instrEl);
        }

        // Draw number line with arrow tips
        // Main horizontal line
        const lineColor = "#94a3b8";
        svg.appendChild(svgEl("line", { x1: lineX1, y1: lineY, x2: lineX2, y2: lineY, stroke: lineColor, "stroke-width": "1.5" }));

        // Left arrowhead
        const arrowSize = 6;
        const leftArrow = svgEl("polygon", {
          points: (lineX1) + "," + lineY + " " + (lineX1 + arrowSize) + "," + (lineY - arrowSize/1.5) + " " + (lineX1 + arrowSize) + "," + (lineY + arrowSize/1.5),
          fill: lineColor
        });
        svg.appendChild(leftArrow);

        // Right arrowhead
        const rightArrow = svgEl("polygon", {
          points: (lineX2) + "," + lineY + " " + (lineX2 - arrowSize) + "," + (lineY - arrowSize/1.5) + " " + (lineX2 - arrowSize) + "," + (lineY + arrowSize/1.5),
          fill: lineColor
        });
        svg.appendChild(rightArrow);

        // Tick marks and labels
        // Compute label font size based on number of ticks
        const labelFontSize = tickCount > 26 ? 7 : tickCount > 15 ? 9 : 11;

        for (let t = 0; t < tickCount; t++) {
          const val = tickValues[t];
          const x = lineX1 + ((val - lineStart) / totalRange) * lineW;

          // Tick mark
          svg.appendChild(svgEl("line", { x1: x, y1: lineY - tickH, x2: x, y2: lineY + tickH, stroke: lineColor, "stroke-width": "1" }));

          // Label below tick
          if (prob.mode === "missing") {
            // Check if this value is blanked
            const isBlanked = prob.blanks.includes(val);
            if (isBlanked && !showAnswers && !isExample) {
              // Show blank line
              const blankW = labelFontSize * 1.8;
              svg.appendChild(svgEl("line", {
                x1: x - blankW/2, y1: labelY + 2,
                x2: x + blankW/2, y2: labelY + 2,
                stroke: lineColor, "stroke-width": "1"
              }));
            } else {
              // Show number (in green if example, blue if answer key and was blanked)
              const lbl = svgEl("text", {
                x: x, y: labelY, "font-family": "Fredoka, sans-serif",
                "font-size": labelFontSize, "font-weight": "500",
                "text-anchor": "middle",
                fill: (isExample && isBlanked) ? "#16a34a" : (showAnswers && isBlanked) ? "#3182ce" : "#1a202c"
              });
              lbl.textContent = val;
              svg.appendChild(lbl);
            }
          } else {
            // Normal: show all labels
            const lbl = svgEl("text", {
              x: x, y: labelY, "font-family": "Fredoka, sans-serif",
              "font-size": labelFontSize, "font-weight": "500",
              "text-anchor": "middle", fill: "#1a202c"
            });
            lbl.textContent = val;
            svg.appendChild(lbl);
          }
        }

        // Answer key drawings (or example pre-fill)
        if (isExample) {
          if (prob.mode === "addition") {
            drawHops(svg, prob.a, prob.a + prob.b, 1, lineX1, lineY, lineW, totalRange, lineStart, step, "#16a34a");
            const ansEl = svgEl("text", {
              x: instrX + String(prob.a + " + " + prob.b + " = ").length * eqFontSize * 0.55,
              y: instructionY, "font-family": "Fredoka, sans-serif", "font-size": eqFontSize, "font-weight": "700", fill: "#16a34a"
            });
            ansEl.textContent = prob.answer;
            svg.appendChild(ansEl);
          } else if (prob.mode === "subtraction") {
            drawHops(svg, prob.a, prob.a - prob.b, -1, lineX1, lineY, lineW, totalRange, lineStart, step, "#16a34a");
            const ansEl = svgEl("text", {
              x: instrX + String(prob.a + " \u2212 " + prob.b + " = ").length * eqFontSize * 0.55,
              y: instructionY, "font-family": "Fredoka, sans-serif", "font-size": eqFontSize, "font-weight": "700", fill: "#16a34a"
            });
            ansEl.textContent = prob.answer;
            svg.appendChild(ansEl);
          } else if (prob.mode === "place") {
            const targetX = lineX1 + ((prob.target - lineStart) / (lineEnd - lineStart)) * lineW;
            const xSize = 7;
            svg.appendChild(svgEl("line", { x1: targetX - xSize, y1: lineY - xSize - 4, x2: targetX + xSize, y2: lineY + xSize - 4, stroke: "#16a34a", "stroke-width": "2.5" }));
            svg.appendChild(svgEl("line", { x1: targetX + xSize, y1: lineY - xSize - 4, x2: targetX - xSize, y2: lineY + xSize - 4, stroke: "#16a34a", "stroke-width": "2.5" }));
          }
          // missing mode: answers already shown inline in green above
        } else if (showAnswers) {
          if (prob.mode === "addition") {
            // Draw hops from a to a+b
            drawHops(svg, prob.a, prob.a + prob.b, 1, lineX1, lineY, lineW, totalRange, lineStart, step, "#3182ce");
            // Show answer next to equation
            const ansEl = svgEl("text", {
              x: instrX + String(prob.a + " + " + prob.b + " = ").length * eqFontSize * 0.55,
              y: instructionY, "font-family": "Fredoka, sans-serif", "font-size": eqFontSize, "font-weight": "700", fill: "#3182ce"
            });
            ansEl.textContent = prob.answer;
            svg.appendChild(ansEl);

          } else if (prob.mode === "subtraction") {
            // Draw hops from a backwards to a-b
            drawHops(svg, prob.a, prob.a - prob.b, -1, lineX1, lineY, lineW, totalRange, lineStart, step, "#e53e3e");
            // Show answer
            const ansEl = svgEl("text", {
              x: instrX + String(prob.a + " \u2212 " + prob.b + " = ").length * eqFontSize * 0.55,
              y: instructionY, "font-family": "Fredoka, sans-serif", "font-size": eqFontSize, "font-weight": "700", fill: "#3182ce"
            });
            ansEl.textContent = prob.answer;
            svg.appendChild(ansEl);

          } else if (prob.mode === "place") {
            // Draw an X at the target position
            const targetX = lineX1 + ((prob.target - lineStart) / (lineEnd - lineStart)) * lineW;
            const xSize = 7;
            svg.appendChild(svgEl("line", { x1: targetX - xSize, y1: lineY - xSize - 4, x2: targetX + xSize, y2: lineY + xSize - 4, stroke: "#3182ce", "stroke-width": "2.5" }));
            svg.appendChild(svgEl("line", { x1: targetX + xSize, y1: lineY - xSize - 4, x2: targetX - xSize, y2: lineY + xSize - 4, stroke: "#3182ce", "stroke-width": "2.5" }));
          }
          // missing mode answers are handled inline above (blue numbers)
        }

        // Show Jumps: draw arc jumps above the number line for addition/subtraction
        if (showJumps && !showAnswers && !isExample) {
          const jumpColor = "#1a202c";
          const dotR = 4;
          if (prob.mode === "addition") {
            const hopCount = prob.b;
            // Open circle at start
            const startX = lineX1 + ((prob.a - lineStart) / totalRange) * lineW;
            svg.appendChild(svgEl("circle", { cx: startX, cy: lineY, r: dotR, fill: "#fff", stroke: jumpColor, "stroke-width": "1.5" }));
            for (let h = 0; h < hopCount; h++) {
              const hopFrom = prob.a + h;
              const hopTo = prob.a + h + 1;
              const x1 = lineX1 + ((hopFrom - lineStart) / totalRange) * lineW;
              const x2 = lineX1 + ((hopTo - lineStart) / totalRange) * lineW;
              const arcH = Math.min(22, Math.abs(x2 - x1) * 0.7);
              const midArcX = (x1 + x2) / 2;
              const pathD = "M " + x1 + " " + lineY + " Q " + midArcX + " " + (lineY - arcH - 8) + " " + x2 + " " + lineY;
              svg.appendChild(svgEl("path", { d: pathD, fill: "none", stroke: jumpColor, "stroke-width": "1.5" }));
            }
            // Filled circle at end
            const endX = lineX1 + ((prob.a + prob.b - lineStart) / totalRange) * lineW;
            svg.appendChild(svgEl("circle", { cx: endX, cy: lineY, r: dotR, fill: jumpColor }));
          } else if (prob.mode === "subtraction") {
            const hopCount = prob.b;
            // Open circle at start
            const startX = lineX1 + ((prob.a - lineStart) / totalRange) * lineW;
            svg.appendChild(svgEl("circle", { cx: startX, cy: lineY, r: dotR, fill: "#fff", stroke: jumpColor, "stroke-width": "1.5" }));
            for (let h = 0; h < hopCount; h++) {
              const hopFrom = prob.a - h;
              const hopTo = prob.a - h - 1;
              const x1 = lineX1 + ((hopFrom - lineStart) / totalRange) * lineW;
              const x2 = lineX1 + ((hopTo - lineStart) / totalRange) * lineW;
              const arcH = Math.min(22, Math.abs(x2 - x1) * 0.7);
              const midArcX = (x1 + x2) / 2;
              const pathD = "M " + x1 + " " + lineY + " Q " + midArcX + " " + (lineY - arcH - 8) + " " + x2 + " " + lineY;
              svg.appendChild(svgEl("path", { d: pathD, fill: "none", stroke: jumpColor, "stroke-width": "1.5" }));
            }
            // Filled circle at end
            const endX = lineX1 + ((prob.a - prob.b - lineStart) / totalRange) * lineW;
            svg.appendChild(svgEl("circle", { cx: endX, cy: lineY, r: dotR, fill: jumpColor }));
          }
        }
      }

      return svg;
    }

    // Draw hop arcs on number line
    function drawHops(svg, from, to, direction, lineX1, lineY, lineW, totalRange, lineStart, step, color) {
      const hopCount = Math.abs(to - from);

      // For large ranges with step > 1, draw grouped hops
      if (step > 1) {
        // Draw one big arc
        const startX = lineX1 + ((from - lineStart) / totalRange) * lineW;
        const endX = lineX1 + ((to - lineStart) / totalRange) * lineW;
        const arcH = Math.min(25, Math.abs(endX - startX) * 0.3);

        const pathD = "M " + startX + " " + lineY + " Q " + ((startX + endX) / 2) + " " + (lineY - arcH - 10) + " " + endX + " " + lineY;
        svg.appendChild(svgEl("path", { d: pathD, fill: "none", stroke: color, "stroke-width": "1.5" }));

        // Arrowhead at end
        const arrSize = 4;
        if (direction > 0) {
          svg.appendChild(svgEl("polygon", {
            points: endX + "," + lineY + " " + (endX - arrSize) + "," + (lineY - arrSize) + " " + (endX - arrSize) + "," + (lineY + arrSize - 1),
            fill: color
          }));
        } else {
          svg.appendChild(svgEl("polygon", {
            points: endX + "," + lineY + " " + (endX + arrSize) + "," + (lineY - arrSize) + " " + (endX + arrSize) + "," + (lineY + arrSize - 1),
            fill: color
          }));
        }

        // Label the hop
        const midX = (startX + endX) / 2;
        const lblEl = svgEl("text", {
          x: midX, y: lineY - arcH - 14, "font-family": "Fredoka, sans-serif",
          "font-size": "9", "font-weight": "600",
          "text-anchor": "middle", fill: color
        });
        lblEl.textContent = (direction > 0 ? "+" : "\u2212") + hopCount;
        svg.appendChild(lblEl);
        return;
      }

      // For step=1, draw individual hop arcs
      const maxIndividualHops = 12;
      if (hopCount <= maxIndividualHops) {
        for (let h = 0; h < hopCount; h++) {
          const hopFrom = direction > 0 ? from + h : from - h;
          const hopTo = direction > 0 ? from + h + 1 : from - h - 1;
          const x1 = lineX1 + ((hopFrom - lineStart) / totalRange) * lineW;
          const x2 = lineX1 + ((hopTo - lineStart) / totalRange) * lineW;
          const arcH = Math.min(18, Math.abs(x2 - x1) * 0.6);
          const midX = (x1 + x2) / 2;

          const pathD = "M " + x1 + " " + lineY + " Q " + midX + " " + (lineY - arcH - 6) + " " + x2 + " " + lineY;
          svg.appendChild(svgEl("path", { d: pathD, fill: "none", stroke: color, "stroke-width": "1.2" }));

          // Small arrowhead on the last hop
          if (h === hopCount - 1) {
            const arrSize = 3;
            if (direction > 0) {
              svg.appendChild(svgEl("polygon", {
                points: x2 + "," + lineY + " " + (x2 - arrSize) + "," + (lineY - arrSize) + " " + (x2 - arrSize) + "," + (lineY + arrSize - 1),
                fill: color
              }));
            } else {
              svg.appendChild(svgEl("polygon", {
                points: x2 + "," + lineY + " " + (x2 + arrSize) + "," + (lineY - arrSize) + " " + (x2 + arrSize) + "," + (lineY + arrSize - 1),
                fill: color
              }));
            }
          }
        }
      } else {
        // Too many hops; draw one big arc with label
        const startX = lineX1 + ((from - lineStart) / totalRange) * lineW;
        const endX = lineX1 + ((to - lineStart) / totalRange) * lineW;
        const arcH = Math.min(25, Math.abs(endX - startX) * 0.3);
        const midX = (startX + endX) / 2;

        const pathD = "M " + startX + " " + lineY + " Q " + midX + " " + (lineY - arcH - 10) + " " + endX + " " + lineY;
        svg.appendChild(svgEl("path", { d: pathD, fill: "none", stroke: color, "stroke-width": "1.5" }));

        const arrSize = 4;
        if (direction > 0) {
          svg.appendChild(svgEl("polygon", {
            points: endX + "," + lineY + " " + (endX - arrSize) + "," + (lineY - arrSize) + " " + (endX - arrSize) + "," + (lineY + arrSize - 1),
            fill: color
          }));
        } else {
          svg.appendChild(svgEl("polygon", {
            points: endX + "," + lineY + " " + (endX + arrSize) + "," + (lineY - arrSize) + " " + (endX + arrSize) + "," + (lineY + arrSize - 1),
            fill: color
          }));
        }

        const lblEl = svgEl("text", {
          x: midX, y: lineY - arcH - 14, "font-family": "Fredoka, sans-serif",
          "font-size": "9", "font-weight": "600",
          "text-anchor": "middle", fill: color
        });
        lblEl.textContent = (direction > 0 ? "+" : "\u2212") + hopCount;
        svg.appendChild(lblEl);
      }
    }

    // ===== Render orchestration =====
    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample, showJumps: opts.showJumps }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols-1)*gap)/cols < mrw) cols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols-1)*gap)/cols < mrw) cols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        const msw = (aw - (cols-1)*gap)/cols, msh = numSheets <= 3 ? ah : ah*0.8;
        const scale = Math.min(msw/sheetWidth, msh/sheetHeight);
        const sw = Math.floor(sheetWidth*scale), sh = Math.floor(sheetHeight*scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw+24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample, showJumps: opts.showJumps }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample, showJumps: opts.showJumps }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }


    // Load and register TTF fonts with jsPDF for embedded vector text in PDFs
    let _fontCache = {};
    // Preload font files on page load so PDF generation is faster
    (function preloadFonts() {
      ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
        fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
          var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
        }).catch(function() {});
      });
    })();
    async function registerPdfFonts(pdf) {
      // svg2pdf strips quotes and fallbacks, so register with clean names only
      // Also register "normal" for undefined-style calls
      const fontDefs = [
        { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
        { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
        { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
      ];
      let idx = 0;
      for (const f of fontDefs) {
        try {
          let b64;
          if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
          else {
            const resp = await fetch(f.file);
            const buf = await resp.arrayBuffer();
            const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
            _fontCache[f.file] = b64;
          }
          for (const style of f.styles) {
            const vfsName = "f" + (idx++) + ".ttf";
            pdf.addFileToVFS(vfsName, b64);
            pdf.addFont(vfsName, f.name, style);
          }
        } catch(e) { console.warn("Font load failed:", f.file, e); }
      }
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: true, numbered: opts.numbered, isAnswerKey: true, includeExample: false, showJumps: opts.showJumps }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      // Register embedded fonts
      await registerPdfFonts(pdf);

      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }


    // ===== Event Listeners =====
    elMode.addEventListener("change", () => renderWithNewRandomization());
    elRange.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elStartWithZero.addEventListener("change", () => renderWithNewRandomization());
    elShowJumps.addEventListener("change", () => renderWithoutRandomization());
    // elProblems removed — always 4 problems
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    elAnswerPositions.addEventListener("change", () => renderWithNewRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
    let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
