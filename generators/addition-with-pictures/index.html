  <script>
    // ===== Helpers =====

    // Icons, aspect ratios, getIconDims, and buildIconDefs are in ../shared/icons.js

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elRange = document.getElementById("rangeSelect");
    const elProblems = document.getElementById("problemsPerSheet");
    const elModeSelect = document.getElementById("modeSelect");
    const elWorksheetMode = document.getElementById("worksheetMode");
    const elShowEquation = { get checked() { return elWorksheetMode.value === "equations" || elWorksheetMode.value === "stories"; }, addEventListener: function(){} };
    const elNumSheets = document.getElementById("numWorksheets");
    const elAnswerKey = document.getElementById("answerKey");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elNumbered = document.getElementById("numbered");
    const elBranded = document.getElementById("branded");
    const elObjectVariety = document.getElementById("objectVariety");
    const elRowsOf5 = document.getElementById("rowsOf5");
    const elLargerFirst = document.getElementById("largerFirst");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => {
      advPanel.classList.toggle("open");
      advArrow.classList.toggle("open");
    });

    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return "Picture Addition";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Count the pictures and solve each addition problem.";
    }

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Draw icon group (aspect-aware) =====
    function drawIconGroup(svg, x, y, count, iconId, iconSize, maxPerRow, useDots, fixedDotR) {
      if (count === 0) return;
      maxPerRow = maxPerRow || 5;
      let cellW, cellH, gapX, gapY;
      if (useDots && fixedDotR) {
        const dotDiam = fixedDotR * 2;
        cellW = dotDiam * 1.2;
        cellH = dotDiam * 1.2;
        gapX = cellW * 0.15;
        gapY = cellH * 0.15;
      } else {
        const dims = getIconDims(iconId, iconSize);
        cellW = dims.w;
        cellH = dims.h;
        gapX = dims.w * 0.05;
        gapY = dims.h * 0.05;
      }
      const cols = Math.min(count, maxPerRow);
      const rows = Math.ceil(count / maxPerRow);
      let drawn = 0;
      for (let r = 0; r < rows && drawn < count; r++) {
        const inThisRow = Math.min(maxPerRow, count - drawn);
        for (let c = 0; c < inThisRow; c++) {
          const ix = x + c * (cellW + gapX);
          const iy = y + r * (cellH + gapY);
          if (useDots && fixedDotR) {
            svg.appendChild(svgEl("circle", { cx: ix + cellW / 2, cy: iy + cellH / 2, r: fixedDotR, fill: "#4a5568" }));
          } else if (useDots) {
            const dims = getIconDims(iconId, iconSize);
            const dotR = Math.min(dims.w, dims.h) * 0.4;
            svg.appendChild(svgEl("circle", { cx: ix + cellW / 2, cy: iy + cellH / 2, r: dotR, fill: "#4a5568" }));
          } else {
            svg.appendChild(svgEl("use", { href: "#" + iconId, x: ix, y: iy, width: cellW, height: cellH }));
          }
          drawn++;
        }
      }
    }
    // Get group bounding box (for centering)
    function getGroupDims(count, iconId, iconSize, maxPerRow, useDots, fixedDotR) {
      maxPerRow = maxPerRow || 5;
      let cellW, cellH, gapX, gapY;
      if (useDots && fixedDotR) {
        const dotDiam = fixedDotR * 2;
        cellW = dotDiam * 1.2;
        cellH = dotDiam * 1.2;
        gapX = cellW * 0.15;
        gapY = cellH * 0.15;
      } else {
        const dims = getIconDims(iconId, iconSize);
        cellW = dims.w;
        cellH = dims.h;
        gapX = dims.w * 0.05;
        gapY = dims.h * 0.05;
      }
      const cols = Math.min(count, maxPerRow);
      const rows = Math.ceil(count / maxPerRow);
      return { w: cols * cellW + (cols - 1) * gapX, h: rows * cellH + (rows - 1) * gapY };
    }

    // ===== Problem generation =====
    function generateProblems(count, rangeMode, variety) {
      const problems = [];
      const seen = new Set();
      let attempts = 0;
      while (problems.length < count && attempts < count * 200) {
        attempts++;
        let a, b;
        if (rangeMode === "make10") {
          a = 1 + Math.floor(Math.random() * 9);
          b = 10 - a;
        } else if (rangeMode === "10to20") {
          const sum = 10 + 1 + Math.floor(Math.random() * 10); // 11-20
          a = 1 + Math.floor(Math.random() * (sum - 1));
          b = sum - a;
          if (a < 1 || b < 1) continue;
        } else {
          const maxSum = parseInt(rangeMode, 10) || 10;
          a = 1 + Math.floor(Math.random() * (maxSum - 1));
          b = 1 + Math.floor(Math.random() * (maxSum - a));
          if (a + b > maxSum) continue;
        }
        const key = Math.min(a,b) + "+" + Math.max(a,b);
        if (seen.has(key)) continue;
        seen.add(key);
        problems.push({ a, b, answer: a + b });
      }
      // Fill if needed
      while (problems.length < count) {
        let a, b;
        if (rangeMode === "make10") { a = 1 + Math.floor(Math.random() * 9); b = 10 - a; }
        else if (rangeMode === "10to20") { const s = 11 + Math.floor(Math.random() * 10); a = 1 + Math.floor(Math.random() * (s-1)); b = s - a; }
        else { const m = parseInt(rangeMode,10)||10; a = 1+Math.floor(Math.random()*Math.max(1,m-1)); b = 1+Math.floor(Math.random()*Math.max(1,m-a)); }
        problems.push({ a, b, answer: a + b });
      }
      // Enforce larger number first if option is checked
      if (elLargerFirst.checked) {
        for (const p of problems) {
          if (p.a < p.b) { const tmp = p.a; p.a = p.b; p.b = tmp; }
        }
      }
      // Shuffle
      for (let i = problems.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [problems[i], problems[j]] = [problems[j], problems[i]];
      }

      // Shuffle icons to ensure no duplicates on same page
      function shuffleArray(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      // In stories mode, exclude icons with complex/multi-word names
      const storyExclude = ["icon-pizza", "icon-watermelon", "icon-icecream", "icon-corn", "icon-broccoli"];
      const isStories = elWorksheetMode && elWorksheetMode.value === "stories";
      const iconPool = isStories
        ? ICON_LIST.filter(id => !storyExclude.includes(id))
        : ICON_LIST;

      // Assign icons based on variety mode — no icon reused on the same page
      if (variety === "same") {
        const icon = iconPool[Math.floor(Math.random() * iconPool.length)];
        for (const p of problems) { p.group1Icon = icon; p.group2Icon = icon; }
      } else if (variety === "mixed") {
        // Each problem gets 2 unique icons, no icon repeated across problems
        const shuffled = shuffleArray(iconPool);
        for (let i = 0; i < problems.length; i++) {
          problems[i].group1Icon = shuffled[i * 2 % shuffled.length];
          problems[i].group2Icon = shuffled[(i * 2 + 1) % shuffled.length];
        }
      } else {
        // variety === "row" (default) — each problem gets a unique icon
        const shuffled = shuffleArray(iconPool);
        for (let i = 0; i < problems.length; i++) {
          const icon = shuffled[i % shuffled.length];
          problems[i].group1Icon = icon;
          problems[i].group2Icon = icon;
        }
      }

      return problems;
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, showEquation, worksheetMode, numbered, includeExample, isAnswerKey, useDots } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", {
        width: pageW, height: pageH,
        viewBox: "0 0 " + pageW + " " + pageH,
        xmlns: "http://www.w3.org/2000/svg"
      });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      // Append icon defs
      svg.appendChild(buildIconDefs());

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      // ===== Branding =====
      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.svg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      // ===== Grid layout (based on fill-in-the-blank pattern) =====
      const count = problems.length;
      const bottomMargin = branded ? 56 : 24;
      const gridTop = topGridY;
      const availH = pageH - bottomMargin - gridTop;
      const availW = pageW - margin * 2;

      // Always 1 column, problems stacked vertically (like mockup)
      const cols = 1;
      const rows = count;
      const colW = availW;
      const rowH = availH / rows;
      const rowSpacing = rowH * 0.94; // tighter vertical spacing between problems

      const fontSize = Math.min(28, Math.max(14, Math.floor(rowH * 0.2)));
      const charW = fontSize * 0.62;
      const boxW = fontSize * 2.0;

      const probNumSize = 10;
      const probNumW = probNumSize * 1.6;

      // Equation row height when showEquation is on
      const eqRowH = showEquation ? fontSize * 1.8 : 0;

      // Icon sizing — large to fill the area
      const maxNum = parseInt(elRange.value, 10);
      const useRowsOf5 = elRowsOf5.checked;
      // Determine max icons per row — flexible layout finds optimal fit
      let maxPerRow;
      if (useRowsOf5) {
        maxPerRow = 5;
      } else {
        // Find optimal cols for the largest group: try to keep 2 rows max for a balanced look
        // For counts ≤ 4: single row. For 5-8: 2 rows. For 9+: 3 rows with more cols
        if (maxNum <= 4) maxPerRow = maxNum;
        else if (maxNum <= 8) maxPerRow = Math.ceil(maxNum / 2);
        else maxPerRow = Math.ceil(maxNum / 3);
      }
      // Available height for icons per problem (excluding equation row)
      const pictureH = rowH - eqRowH;
      // Operator (+) and equals (=) column widths
      const opW = fontSize * 1.8;
      const eqW = fontSize * 1.8;
      const ansW = boxW + 8;
      // Available width for both groups
      const groupsAvailW = colW - probNumW - 8 - opW - eqW - ansW;
      const halfGroupW = groupsAvailW / 2;
      const gapRatio = 0.05;

      // Pre-calculate global minimum dot radius for dots mode
      let globalDotR = null;
      if (useDots) {
        let minIconSize = Infinity;
        for (let pi = 0; pi < problems.length; pi++) {
          const { a: pa, b: pb, group1Icon: g1i, group2Icon: g2i } = problems[pi];
          function preCalcSize(cnt, iid, mpr) {
            const ar = ICON_ASPECT[iid] || 1;
            const cc = Math.min(cnt, mpr);
            const rr = Math.ceil(Math.max(cnt, 1) / mpr);
            const wf = Math.max(1, ar);
            const hf = Math.max(1, 1/ar);
            const sw = (halfGroupW - 8) / (cc * wf + (cc - 1) * gapRatio);
            const sh = (pictureH * 0.85) / (rr * hf + (rr - 1) * gapRatio);
            return Math.min(sw, sh);
          }
          if (useRowsOf5) {
            minIconSize = Math.min(minIconSize, preCalcSize(pa, g1i, 5), preCalcSize(pb, g2i, 5));
          } else {
            for (let m1 = Math.min(2, Math.max(pa,1)); m1 <= Math.max(pa,1); m1++) {
              for (let m2 = Math.min(2, Math.max(pb,1)); m2 <= Math.max(pb,1); m2++) {
                minIconSize = Math.min(minIconSize, preCalcSize(pa, g1i, m1), preCalcSize(pb, g2i, m2));
              }
            }
          }
        }
        minIconSize = Math.max(12, Math.floor(minIconSize));
        globalDotR = minIconSize * 0.4;
      }

      for (let i = 0; i < problems.length; i++) {
        const cellLeft = margin;
        const cellTop = gridTop + i * rowSpacing;

        // Divider line between problems
        if (i > 0) {
          const divY = cellTop - (rowSpacing - rowH) / 2;
          svg.appendChild(svgEl("line", { x1: margin, y1: divY, x2: pageW - margin, y2: divY, stroke: "#cbd5e1", "stroke-width": "1" }));
        }

        const { a, b, answer, group1Icon, group2Icon } = problems[i];
        const isExample = (i === 0 && includeExample && !showAnswers);

        // Per-problem icon sizing
        const bigger = Math.max(a, b, 1);

        // Calculate max icon size for a given count, icon, and maxPerRow
        function calcIconSizeForMPR(count, iconId, mpr) {
          const ar = ICON_ASPECT[iconId] || 1;
          const cols = Math.min(count, mpr);
          const rows = Math.ceil(Math.max(count, 1) / mpr);
          const wFactor = Math.max(1, ar);
          const hFactor = Math.max(1, 1/ar);
          const sw = (halfGroupW - 8) / (cols * wFactor + (cols - 1) * gapRatio);
          const sh = (pictureH * 0.85) / (rows * hFactor + (rows - 1) * gapRatio);
          return Math.min(sw, sh);
        }

        // Find optimal maxPerRow for each group (or fixed 5 if useRowsOf5)
        let mpr1, mpr2, iconSize;
        if (useRowsOf5) {
          mpr1 = 5; mpr2 = 5;
          const s1 = calcIconSizeForMPR(a, group1Icon, 5);
          const s2 = calcIconSizeForMPR(b, group2Icon, 5);
          iconSize = Math.max(12, Math.floor(Math.min(s1, s2)));
        } else {
          // Try all maxPerRow combos (1..count) for each group, find combo that maximizes icon size
          let bestSize = 0;
          mpr1 = 1; mpr2 = 1;
          const maxTry1 = Math.max(a, 1);
          const maxTry2 = Math.max(b, 1);
          for (let m1 = Math.min(2, maxTry1); m1 <= maxTry1; m1++) {
            const s1 = calcIconSizeForMPR(a, group1Icon, m1);
            for (let m2 = Math.min(2, maxTry2); m2 <= maxTry2; m2++) {
              const s2 = calcIconSizeForMPR(b, group2Icon, m2);
              const combined = Math.min(s1, s2);
              if (combined > bestSize) {
                bestSize = combined;
                mpr1 = m1; mpr2 = m2;
              }
            }
          }
          iconSize = Math.max(12, Math.floor(bestSize));
        }
        // Scale up icons in stories mode
        if (worksheetMode === "stories") iconSize = Math.floor(iconSize * 1.14);
        const iconGap = iconSize * gapRatio;

        // Vertical center of the picture area
        const picCenterY = cellTop + (pictureH) / 2 + pictureH * 0.06;

        // Center the whole problem horizontally
        const totalProbW = probNumW + halfGroupW + opW + halfGroupW + eqW + ansW;
        let cx = cellLeft + (colW - totalProbW) / 2;

        // -- Problem number --
        if (numbered !== false) {
          const numEl = svgEl("text", { x: cx, y: picCenterY - (pictureH * 0.3), "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numEl.textContent = (i + 1) + "."; svg.appendChild(numEl);
        }
        cx += probNumW;

        // -- Group 1 icons --
        const grp1Left = cx;
        const group1CenterX = grp1Left + halfGroupW / 2;
        {
          const grpDims = getGroupDims(a, group1Icon, iconSize, mpr1, useDots, globalDotR);
          // Left-align groups in stories mode, center otherwise
          const gx = worksheetMode === "stories"
            ? grp1Left
            : grp1Left + (halfGroupW - grpDims.w) / 2;
          const gy = picCenterY - grpDims.h / 2;
          drawIconGroup(svg, gx, gy, a, group1Icon, iconSize, mpr1, useDots, globalDotR);
        }
        cx += halfGroupW;

        // -- Plus sign (only when no equations below) --
        const plusCenterX = cx + opW / 2;
        if (!showEquation) {
          const opEl = svgEl("text", { x: plusCenterX, y: picCenterY + fontSize * 0.35, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "700", fill: "#1a202c" });
          opEl.textContent = "+"; svg.appendChild(opEl);
        }
        cx += opW;

        // -- Group 2 icons --
        const grp2Left = cx;
        const group2CenterX = grp2Left + halfGroupW / 2;
        {
          const grpDims = getGroupDims(b, group2Icon, iconSize, mpr2, useDots, globalDotR);
          const gx = worksheetMode === "stories"
            ? grp2Left
            : grp2Left + (halfGroupW - grpDims.w) / 2;
          const gy = picCenterY - grpDims.h / 2;
          drawIconGroup(svg, gx, gy, b, group2Icon, iconSize, mpr2, useDots, globalDotR);
        }
        cx += halfGroupW;

        // -- Equals sign and answer (only in Pictures mode) --
        const equalsCenterX = cx + eqW / 2;
        const ansLeft = cx + eqW;
        const ansCenter = ansLeft + boxW / 2;
        if (!showEquation) {
          const eqEl = svgEl("text", { x: equalsCenterX, y: picCenterY + fontSize * 0.35, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "700", fill: "#1a202c" });
          eqEl.textContent = "="; svg.appendChild(eqEl);
          cx += eqW;

          // Answer underline
          const blankY = picCenterY + fontSize * 1.2;
          svg.appendChild(svgEl("line", {
            x1: ansLeft, y1: blankY, x2: ansLeft + boxW, y2: blankY,
            stroke: isExample ? "#22c55e" : "#cbd5e1", "stroke-width": "1.5"
          }));

          if (isExample) {
            const badgeX = ansLeft + boxW - 42, badgeY = blankY - fontSize * 1.5;
            svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
            const bt = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
            bt.textContent = "Example"; svg.appendChild(bt);
            const ansEl = svgEl("text", { x: ansCenter, y: picCenterY + fontSize * 0.35, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize * 0.9), "font-weight": "500", fill: "#16a34a" });
            ansEl.textContent = String(answer); svg.appendChild(ansEl);
          } else if (showAnswers) {
            const ansEl = svgEl("text", { x: ansCenter, y: picCenterY + fontSize * 0.35, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize * 0.9), "font-weight": "500", fill: "#3182ce" });
            ansEl.textContent = String(answer); svg.appendChild(ansEl);
          }
        }
        cx += eqW + boxW;

        // ===== Content below pictures =====
        if (showEquation) {
          const eqLineY = cellTop + pictureH + eqRowH * 0.5;
          const eqFontSize = fontSize;
          const underlineW = eqFontSize * 2.2;
          const underlineStroke = 1.2;
          const eqColor = "#4a5568";
          const ansColor = "#3182ce";

          if (worksheetMode === "stories") {
            // Icon name mapping is in ../shared/icons.js (ICON_NAMES)
            const iconName1 = ICON_NAMES[group1Icon] || "item";
            const iconName2 = ICON_NAMES[group2Icon] || "item";
            const pluralize = (name) => {
              const same = ["fish", "broccoli"];
              if (same.includes(name)) return name;
              if (name === "corn cob") return "corn cobs";
              if (name === "watermelon slice") return "watermelon slices";
              if (name === "ice cream") return "ice creams";
              if (name.endsWith("y") && !/[aeiou]y$/i.test(name)) return name.slice(0, -1) + "ies";
              if (/(?:s|sh|ch|x|z)$/i.test(name)) return name + "es";
              if (name.endsWith("o")) return name + "es";
              return name + "s";
            };
            const plural1 = (n) => n === 1 ? iconName1 : pluralize(iconName1);
            const plural2 = (n) => n === 1 ? iconName2 : pluralize(iconName2);
            // Use the answer icon name (group1's name since answer represents the combined total)
            const answerIconName = iconName1 === iconName2 ? iconName1 : "item";
            const pluralAns = (n) => n === 1 ? answerIconName : pluralize(answerIconName);
            const storyFontSize = Math.min(eqFontSize * 0.85, 18);
            const storyLeftX = cellLeft + (colW - totalProbW) / 2 + probNumW;
            const storyY = eqLineY - storyFontSize * 0.2;
            const storyUnderW = storyFontSize * 2.0;
            const storyUnderY = storyY + storyFontSize * 0.5;
            const pluralLabel = pluralAns(answer) + ".";
            // Build single sentence with spaces for the blank gap
            const leftPart = a + " " + plural1(a) + " and " + b + " " + plural2(b) + " make";
            const gapSpaces = "\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0"; // 10 non-breaking spaces
            const fullSentence = leftPart + gapSpaces + pluralLabel;
            const gapStartIdx = leftPart.length;
            const gapEndIdx = leftPart.length + gapSpaces.length;
            // Single text element for entire sentence
            const storyEl = svgEl("text", { x: storyLeftX, y: storyY, "text-anchor": "start", "font-family": "Fredoka, sans-serif", "font-size": String(storyFontSize), "font-weight": "500", fill: eqColor });
            storyEl.textContent = fullSentence;
            svg.appendChild(storyEl);
            // Find the gap center: measure the full text, then measure without the gap+label
            // to find where the gap starts. The gap is always 10 chars of equal width,
            // so its center is always at gapStart + 5 * spaceWidth.
            const fullLen = storyEl.getComputedTextLength();
            // Temporarily set text to just the left part to measure its width
            storyEl.textContent = leftPart;
            const leftLen = storyEl.getComputedTextLength();
            // Measure one space width
            storyEl.textContent = leftPart + "\u00A0";
            const leftPlusOneSpace = storyEl.getComputedTextLength();
            const spaceW = leftPlusOneSpace - leftLen;
            // Restore full sentence
            storyEl.textContent = fullSentence;
            // Gap center = end of left text + half the gap (5 spaces)
            const gapCenterX = storyLeftX + leftLen + spaceW * 5;
            const underStartX = gapCenterX - storyUnderW / 2;
            const underEndX = gapCenterX + storyUnderW / 2;
            svg.appendChild(svgEl("line", { x1: underStartX, y1: storyUnderY, x2: underEndX, y2: storyUnderY, stroke: "#cbd5e1", "stroke-width": underlineStroke }));
            if (showAnswers) {
              const ansEl = svgEl("text", { x: gapCenterX, y: storyY, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(storyFontSize * 1.1), "font-weight": "700", fill: ansColor });
              ansEl.textContent = String(answer);
              svg.appendChild(ansEl);
            }
          } else {
            // Equations mode
            // Underline under group 1
            svg.appendChild(svgEl("line", { x1: group1CenterX - underlineW/2, y1: eqLineY + eqFontSize * 0.35, x2: group1CenterX + underlineW/2, y2: eqLineY + eqFontSize * 0.35, stroke: "#cbd5e1", "stroke-width": underlineStroke }));
            if (showAnswers) {
              const numA = svgEl("text", { x: group1CenterX, y: eqLineY, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(eqFontSize), "font-weight": "700", fill: ansColor });
              numA.textContent = String(a); svg.appendChild(numA);
            }

            // Plus sign between groups
            const eqPlusEl = svgEl("text", { x: plusCenterX, y: eqLineY, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(eqFontSize), "font-weight": "700", fill: eqColor });
            eqPlusEl.textContent = "+"; svg.appendChild(eqPlusEl);

            // Underline under group 2
            svg.appendChild(svgEl("line", { x1: group2CenterX - underlineW/2, y1: eqLineY + eqFontSize * 0.35, x2: group2CenterX + underlineW/2, y2: eqLineY + eqFontSize * 0.35, stroke: "#cbd5e1", "stroke-width": underlineStroke }));
            if (showAnswers) {
              const numB = svgEl("text", { x: group2CenterX, y: eqLineY, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(eqFontSize), "font-weight": "700", fill: ansColor });
              numB.textContent = String(b); svg.appendChild(numB);
            }

            // Equals sign
            const eqEqualsEl = svgEl("text", { x: equalsCenterX, y: eqLineY, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(eqFontSize), "font-weight": "700", fill: eqColor });
            eqEqualsEl.textContent = "="; svg.appendChild(eqEqualsEl);

            // Answer underline after equals
            const ansEqX = equalsCenterX + eqFontSize * 1.5;
            svg.appendChild(svgEl("line", { x1: ansEqX - underlineW/2, y1: eqLineY + eqFontSize * 0.35, x2: ansEqX + underlineW/2, y2: eqLineY + eqFontSize * 0.35, stroke: "#cbd5e1", "stroke-width": underlineStroke }));
            if (showAnswers) {
              const ansNum = svgEl("text", { x: ansEqX, y: eqLineY, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(eqFontSize), "font-weight": "700", fill: ansColor });
              ansNum.textContent = String(answer); svg.appendChild(ansNum);
            }
          }
        }

        // (no separator lines between problems)
      }

      return svg;
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        rangeMode: elRange.value,
        maxSum: parseInt(elRange.value, 10) || 10,
        variety: elObjectVariety.value,
        problemsPerSheet: parseInt(elProblems.value, 10),
        showEquation: elWorksheetMode.value === "equations" || elWorksheetMode.value === "stories",
        worksheetMode: elWorksheetMode.value,
        useDots: elModeSelect.value === "dots",
        numWorksheets: parseInt(elNumSheets.value, 10),
        answerKey: elAnswerKey.checked,
        showHeader: showHeader,
        title: title,
        subtitle: subtitle,
        numbered: elNumbered.checked,
        branded: elBranded.checked,
        includeExample: elIncludeExample.checked
      };
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.rangeMode, opts.variety));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.rangeMode, opts.variety));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = "";
      sheetWrap.className = "";
      sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], {
            showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded,
            showAnswers: false, showEquation: opts.showEquation, worksheetMode: opts.worksheetMode, useDots: opts.useDots, numbered: opts.numbered,
            includeExample: opts.includeExample
          });
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let gridCols;
        if (numSheets <= 3) { gridCols = numSheets; if ((aw - (gridCols - 1) * gap) / gridCols < mrw) gridCols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { gridCols = Math.min(3, numSheets); if ((aw - (gridCols - 1) * gap) / gridCols < mrw) gridCols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (gridCols - 1) * gap) / gridCols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + gridCols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], {
            showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded,
            showAnswers: false, showEquation: opts.showEquation, worksheetMode: opts.worksheetMode, useDots: opts.useDots, numbered: opts.numbered,
            includeExample: opts.includeExample
          });
          v.setAttribute("width", sw); v.setAttribute("height", sh);
          p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], {
          showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded,
          showAnswers: false, showEquation: opts.showEquation, worksheetMode: opts.worksheetMode, useDots: opts.useDots, numbered: opts.numbered,
          includeExample: opts.includeExample
        });
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }

    // Load and register TTF fonts with jsPDF for embedded vector text in PDFs
    let _fontCache = {};
    // Preload font files on page load so PDF generation is faster
    (function preloadFonts() {
      ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
        fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
          var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
        }).catch(function() {});
      });
    })();
    async function registerPdfFonts(pdf) {
      // svg2pdf strips quotes and fallbacks, so register with clean names only
      // Also register "normal" for undefined-style calls
      const fontDefs = [
        { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
        { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
        { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
      ];
      let idx = 0;
      for (const f of fontDefs) {
        try {
          let b64;
          if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
          else {
            const resp = await fetch(f.file);
            const buf = await resp.arrayBuffer();
            const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
            _fontCache[f.file] = b64;
          }
          for (const style of f.styles) {
            const vfsName = "f" + (idx++) + ".ttf";
            pdf.addFileToVFS(vfsName, b64);
            pdf.addFont(vfsName, f.name, style);
          }
        } catch(e) { console.warn("Font load failed:", f.file, e); }
      }
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], {
                  showHeader: "none", title: opts.title, subtitle: "", branded: opts.branded,
                  showAnswers: true, isAnswerKey: true, showEquation: opts.showEquation, worksheetMode: opts.worksheetMode, useDots: opts.useDots, numbered: opts.numbered,
                  includeExample: false
                }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });

      // Register embedded fonts
      await registerPdfFonts(pdf);

      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

    // ===== Event Listeners =====
    elRange.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elModeSelect.addEventListener("change", () => renderWithNewRandomization());
    elWorksheetMode.addEventListener("change", () => renderWithoutRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elObjectVariety.addEventListener("change", () => renderWithNewRandomization());
    elLargerFirst.addEventListener("change", () => renderWithNewRandomization());
    elRowsOf5.addEventListener("change", () => renderWithoutRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
    let resizeTimeout;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150);
    });

    // ===== Init (wait for fonts so text measurements are accurate) =====
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => renderWithNewRandomization());
    } else {
      renderWithNewRandomization();
    }

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
