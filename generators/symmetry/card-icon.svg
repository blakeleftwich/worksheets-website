<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f7f8fc"/>
  <!-- Symmetry line -->
  <line x1="100" y1="15" x2="100" y2="125" stroke="#2d3748" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Left half (filled) -->
  <path d="M100,35 C100,25 80,15 70,30 C60,45 70,65 100,95" fill="#FCE4EC" stroke="#d63384" stroke-width="2"/>
  <!-- Right half (dashed outline) -->
  <path d="M100,35 C100,25 120,15 130,30 C140,45 130,65 100,95" fill="none" stroke="#a0aec0" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>