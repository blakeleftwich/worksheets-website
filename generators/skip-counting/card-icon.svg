  <text x="132" y="72" text-anchor="middle" font-size="14" font-weight="400" fill="#718096" font-family="Fredoka, sans-serif">,</text>
  <text x="148" y="72" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c" font-family="'Google Sans Flex', sans-serif">8</text>
