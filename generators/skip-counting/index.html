  <style>

      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

    /* ===== Site Header ===== */

      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {

    }

    .site-logo {

      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .site-logo-img {
      height: 44px;
      width: auto;
      display: block;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 600;

      text-decoration: none;
      padding: 8px 14px;
      border-radius: 8px;

    .nav-links a:hover {

      color: #1a1a2e;
    }

    .nav-links a.active {
      background: #fef3c7;
      color: #92400e;
    }


    .main-container {
      display: grid;
      grid-template-columns: 340px 1fr;
      }

    /* ===== Sidebar ===== */
    .sidebar {
      background: white;
      padding: 32px 24px;
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
    }

    .sidebar h2 {
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: left;
    }

    .control-group {

    }

    .control-group > label {
      display: block;

      font-weight: 600;
      color: #2d3748;

    }

    .control-group input[type="number"],

        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
        background: white !important;

        padding: 0 !important;
        margin: 0 !important;
        display: block !important;
        background: white !important;

      .worksheet-page {

        margin: 0 !important;
        box-shadow: none !important;

        break-inside: avoid !important;

  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elSkipBy = document.getElementById("skipBy");
    const elStartNum = document.getElementById("startNum");
    const elNumsPerSeq = document.getElementById("numsPerSeq");
    const elBlanksPerSeq = document.getElementById("blanksPerSeq");
    const elSeqPerSheet = document.getElementById("seqPerSheet");
    const elNumSheets = document.getElementById("numWorksheets");
    const elAnswerKey = document.getElementById("answerKey");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => {
      advPanel.classList.toggle("open");
      advArrow.classList.toggle("open");
    });

    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "none";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return "Skip Counting";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Fill in the missing numbers.";
    }

        // ===== State =====
    let currentState = { sheets: [] };

    // ===== Sequence generation =====
    function generateSequences(count, opts) {
      const { skipBy, startNum, numsPerSeq, blanksPerSeq } = opts;
      const sequences = [];

      for (let s = 0; s < count; s++) {
        // Generate the full sequence of numbers
        const numbers = [];
        // Each sequence on the same sheet starts from a different offset
        // to add variety: sequence 0 starts at startNum, sequence 1 at startNum + skipBy, etc.
        const seqStart = startNum + s * skipBy * numsPerSeq;
        for (let i = 0; i < numsPerSeq; i++) {
          numbers.push(seqStart + i * skipBy);
        }

        // Choose which positions to blank out
        // Ensure first and last are usually shown (only blank them if blanksPerSeq is high)
        const blankCount = Math.min(blanksPerSeq, numsPerSeq - 2);
        const blanks = new Set();

        // Inner positions (not first or last)
        const innerPositions = [];
        for (let i = 1; i < numsPerSeq - 1; i++) {
          innerPositions.push(i);
        }

        // Shuffle inner positions
        for (let i = innerPositions.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [innerPositions[i], innerPositions[j]] = [innerPositions[j], innerPositions[i]];
        }

        // Pick blanks from inner positions first
        let blanksNeeded = blankCount;
        for (let i = 0; i < innerPositions.length && blanksNeeded > 0; i++) {
          blanks.add(innerPositions[i]);
          blanksNeeded--;
        }

        // If we still need more blanks (very high blank count), allow first/last
        if (blanksNeeded > 0 && blanksPerSeq > numsPerSeq - 2) {
          // Add remaining blanks from all positions
          const allPositions = [];
          for (let i = 0; i < numsPerSeq; i++) {
            if (!blanks.has(i)) allPositions.push(i);
          }
          for (let i = allPositions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allPositions[i], allPositions[j]] = [allPositions[j], allPositions[i]];
          }
          for (let i = 0; i < allPositions.length && blanksNeeded > 0; i++) {
            blanks.add(allPositions[i]);
            blanksNeeded--;
          }
        }

        sequences.push({ numbers, blanks });
      }

      return sequences;
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(sequences, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../branding/emma-logo.jpg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const seqCount = sequences.length;
      const bottomMargin = branded ? 56 : 24;
      const availH = pageH - bottomMargin - topGridY;
      const availW = pageW - margin * 2;
      const rowH = availH / seqCount;

      // Determine sizing based on numbers per sequence
      const numsPerSeq = sequences[0].numbers.length;

      // Find the max number width across all sequences to size boxes uniformly
      let maxNumStr = 0;
      for (const seq of sequences) {
        for (const n of seq.numbers) {
          maxNumStr = Math.max(maxNumStr, String(n).length);
        }
      }

      // Problem number width
      const probNumSize = 10;
      const probNumW = probNumSize * (seqCount >= 10 ? 2.0 : 1.6);

      // Calculate box size based on available space
      // Scale comma/gap spacing based on number of items to fit better
      const commaSpace = numsPerSeq >= 12 ? 5 : 8;
      const boxGap = numsPerSeq >= 12 ? 2 : 4;
      const leftPad = probNumW + 8; // space for sequence number
      const totalGapSpace = (numsPerSeq - 1) * (commaSpace + boxGap);
      const maxBoxW = (availW - leftPad - totalGapSpace) / numsPerSeq;

      // Box dimensions - scale width based on max digit count
      const minBoxW = Math.max(maxNumStr * 8 + 8, 28);
      const boxW = Math.max(minBoxW, Math.min(maxBoxW, 48));
      const boxH = Math.min(rowH * 0.55, 36);
      // Scale font to fit within the box, considering digit count
      const maxFontForBox = (boxW - 6) / (maxNumStr * 0.62);
      const fontSize = Math.min(boxH * 0.6, 18, maxFontForBox);
      const commaSize = fontSize * 0.9;

      // Recalculate total row width to center it
      const totalRowW = leftPad + numsPerSeq * boxW + (numsPerSeq - 1) * (commaSpace + boxGap);
      const rowLeftOffset = margin + Math.max(0, (availW - totalRowW) / 2);

      for (let s = 0; s < seqCount; s++) {
        const seq = sequences[s];
        const rowTop = topGridY + s * rowH;
        const cy = rowTop + rowH / 2;

        // Sequence number
        if (numbered !== false) {
          const numEl = svgEl("text", {
            x: rowLeftOffset,
            y: cy + probNumSize * 0.35,
            "font-family": "Fredoka, sans-serif",
            "font-size": String(probNumSize),
            "font-weight": "600",
            fill: "#a0aec0"
          });
          numEl.textContent = (s + 1) + ".";
          svg.appendChild(numEl);
        }

        // For include example: track first blank drawn in seq 0
        let firstBlankDrawn = false;

        // Draw each number in the sequence
        for (let i = 0; i < seq.numbers.length; i++) {
          const x = rowLeftOffset + leftPad + i * (boxW + commaSpace + boxGap);
          const isBlank = seq.blanks.has(i);
          const numValue = seq.numbers[i];
          const numStr = String(numValue);

          // Draw box
          const boxX = x;
          const boxY = cy - boxH / 2;

          const isExample = (s === 0 && isBlank && !firstBlankDrawn && includeExample && !showAnswers);
          if (isBlank && isExample) firstBlankDrawn = true;

          if (isBlank && !showAnswers && !isExample) {
            // Empty box for student to fill in
            svg.appendChild(svgEl("rect", {
              x: boxX, y: boxY, width: boxW, height: boxH,
              rx: 4, ry: 4,
              fill: "#f7fafc",
              stroke: "#2d3748",
              "stroke-width": "1.5"
            }));
          } else if (isExample) {
            // Example: green-filled box with answer
            svg.appendChild(svgEl("rect", {
              x: boxX, y: boxY, width: boxW, height: boxH,
              rx: 4, ry: 4,
              fill: "#f0fdf4",
              stroke: "#22c55e",
              "stroke-width": "1.5"
            }));
            const txt = svgEl("text", {
              x: boxX + boxW / 2,
              y: cy + fontSize * 0.35,
              "text-anchor": "middle",
              "font-family": "'Google Sans Flex', sans-serif",
              "font-size": String(fontSize),
              "font-weight": "500",
              fill: "#16a34a"
            });
            txt.textContent = numStr;
            svg.appendChild(txt);
            // Example badge above box
            const badgeW = 42, badgeH = 13, badgeX = boxX + boxW - badgeW, badgeY = boxY - 15;
            svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: badgeW, height: badgeH, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
            const bt = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
            bt.textContent = "Example"; svg.appendChild(bt);
          } else {
            // Filled number (either not blank, or answer key)
            if (isBlank && showAnswers) {
              // Answer key: show with blue color and light background
              svg.appendChild(svgEl("rect", {
                x: boxX, y: boxY, width: boxW, height: boxH,
                rx: 4, ry: 4,
                fill: "#ebf8ff",
                stroke: "#3182ce",
                "stroke-width": "1.5"
              }));
              const txt = svgEl("text", {
                x: boxX + boxW / 2,
                y: cy + fontSize * 0.35,
                "text-anchor": "middle",
                "font-family": "'Google Sans Flex', sans-serif",
                "font-size": String(fontSize),
                "font-weight": "500",
                fill: "#3182ce"
              });
              txt.textContent = numStr;
              svg.appendChild(txt);
            } else {
              // Normal shown number
              svg.appendChild(svgEl("rect", {
                x: boxX, y: boxY, width: boxW, height: boxH,
                rx: 4, ry: 4,
                fill: "none",
                stroke: "#cbd5e0",
                "stroke-width": "1"
              }));
              const txt = svgEl("text", {
                x: boxX + boxW / 2,
                y: cy + fontSize * 0.35,
                "text-anchor": "middle",
                "font-family": "'Google Sans Flex', sans-serif",
                "font-size": String(fontSize),
                "font-weight": "500",
                fill: "#1a202c"
              });
              txt.textContent = numStr;
              svg.appendChild(txt);
            }
          }

          // Draw comma separator (except after last number)
          if (i < seq.numbers.length - 1) {
            const commaX = boxX + boxW + commaSpace / 2 + boxGap / 2;
            const comma = svgEl("text", {
              x: commaX,
              y: cy + commaSize * 0.35,
              "text-anchor": "middle",
              "font-family": "Fredoka, sans-serif",
              "font-size": String(commaSize),
              "font-weight": "400",
              fill: "#718096"
            });
            comma.textContent = ",";
            svg.appendChild(comma);
          }
        }
      }

      return svg;
    }

    // ===== Auto title =====
    function generateAutoTitle() {
      const skipBy = parseInt(elSkipBy.value, 10);
      return "Skip Counting by " + skipBy + "s";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        skipBy: parseInt(elSkipBy.value, 10),
        startNum: parseInt(elStartNum.value, 10) || 0,
        numsPerSeq: parseInt(elNumsPerSeq.value, 10),
        blanksPerSeq: parseInt(elBlanksPerSeq.value, 10),
        seqPerSheet: parseInt(elSeqPerSheet.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        showHeader: showHeader,
        title: title,
        subtitle: subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
      };
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateSequences(opts.seqPerSheet, opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateSequences(opts.seqPerSheet, opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cols - 1) * gap) / cols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const opts = gatherOptions();
      const sH = sheetWrap.innerHTML, sC = sheetWrap.className, sS = sheetWrap.style.cssText;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      for (let i = 0; i < currentState.sheets.length; i++) {
        const p = document.createElement("div"); p.className = "worksheet-page";
        p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, numbered: opts.numbered, includeExample: opts.includeExample }, wsCodes[i]));
        sheetWrap.appendChild(p);
      }
      const answerKeyPages = [];
      if (opts.answerKey) {
        for (let i = 0; i < currentState.sheets.length; i++) {
          const p = document.createElement("div"); p.className = "worksheet-page ak-print-only";
          p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: true, isAnswerKey: true, includeExample: false, numbered: opts.numbered }, wsCodes[i]));
          sheetWrap.appendChild(p);
          answerKeyPages.push(p);
        }
      }
      window.print();
      setTimeout(() => { answerKeyPages.forEach(p => p.remove()); sheetWrap.innerHTML = sH; sheetWrap.className = sC; sheetWrap.style.cssText = sS; }, 500);
    }

    // ===== Event Listeners =====
    elSkipBy.addEventListener("change", () => renderWithNewRandomization());
    elStartNum.addEventListener("input", () => renderWithNewRandomization());
    elNumsPerSeq.addEventListener("change", () => renderWithNewRandomization());
    elBlanksPerSeq.addEventListener("change", () => renderWithNewRandomization());
    elSeqPerSheet.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);
let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
<script src="../../favorites.js"></script>
</body>
