<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <rect width="200" height="140" fill="#f7f8fc"/>
  <!-- Right-aligned column equation: 12 + 5 -->
  <text x="140" y="48" text-anchor="end" font-size="40" font-weight="700" fill="#2d3748" font-family="'Google Sans Flex', sans-serif">12</text>
  <text x="140" y="90" text-anchor="end" font-size="40" font-weight="700" fill="#2d3748" font-family="'Google Sans Flex', sans-serif">5</text>
  <text x="76" y="90" text-anchor="start" font-size="40" font-weight="700" fill="#2d3748" font-family="'Google Sans Flex', sans-serif">+</text>
  <!-- Thick line spanning from + sign to right edge of numbers -->
  <line x1="74" y1="100" x2="144" y2="100" stroke="#2d3748" stroke-width="2.5"/>
</svg>
