  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elClockType = document.getElementById("clockType");
    const elNumSheets = document.getElementById("numWorksheets");
    const elShowHeaderEnabled = document.getElementById("showHeaderEnabled");
    const elHeaderMode = document.getElementById("headerMode");
    const elHeaderModeOptions = document.getElementById("headerModeOptions");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const elAnswerKey = document.getElementById("answerKey");
    const elCustomTitleEnabled = document.getElementById("customTitleEnabled");
    const elCustomTitleOptions = document.getElementById("customTitleOptions");
    const elHeaderText = document.getElementById("headerText");
    const elSubtitleText = document.getElementById("subtitleText");
    const elShowTitle = document.getElementById("showTitle");
    const elShowSubtitle = document.getElementById("showSubtitle");
    const elTitleInputWrap = document.getElementById("titleInputWrap");
    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");
    const elShowTickMarks = document.getElementById("showTickMarks");
    const elTickStyle = document.getElementById("tickStyle");
    const elTickStyleOptions = document.getElementById("tickStyleOptions");

    const elMinuteIncrement = document.getElementById("minuteIncrement");
    const elProblemsPerSheet = document.getElementById("problemsPerSheet");
    const elMinuteIncrementGroup = document.getElementById("minuteIncrementGroup");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };

    // ===== Advanced panel toggle =====
    advToggle.addEventListener("click", () => { advPanel.classList.toggle("open"); advArrow.classList.toggle("open"); });

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      return elClockType.value === "hours" ? "Telling Time by Hours" : "Telling Time by Minutes";
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Write the time shown on each clock.";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();

      const showTicks = elShowTickMarks.checked;
      const tickStyle = showTicks ? elTickStyle.value : "none"; // "none", "hours", "minutes"

      return {
        clockType: elClockType.value,
        numWorksheets: parseInt(elNumSheets.value, 10),
        showHeader,
        title,
        subtitle,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        tickStyle,
        showArrows: true,
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
        minuteIncrement: parseInt(elMinuteIncrement.value, 10),
        problemsPerSheet: parseInt(elProblemsPerSheet.value, 10),
      };
    }

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Generate random times =====
    function generateRandomTime(clockType, minuteIncrement) {
      const hour = Math.floor(Math.random() * 12) + 1;
      let minute;
      if (clockType === "hours") {
        minute = 0;
      } else {
        const inc = minuteIncrement || 1;
        const steps = Math.floor(60 / inc);
        minute = Math.floor(Math.random() * steps) * inc;
      }
      return { hour, minute };
    }

    function generateSheet(opts) {
      const times = [];
      const numProblems = opts.problemsPerSheet || 9;
      for (let i = 0; i < numProblems; i++) {
        times.push(generateRandomTime(opts.clockType, opts.minuteIncrement));
      }
      return times;
    }

    // ===== Draw a single clock face =====
    function drawClock(svg, cx, cy, radius, hour, minute, tickStyle, showArrows) {
      const color = "#2d3748";
      const hasTicks = tickStyle !== "none";
      const hasMinuteTicks = tickStyle === "minutes";

      // Clock circle
      svg.appendChild(svgEl("circle", {
        cx, cy, r: radius,
        fill: "none", stroke: color, "stroke-width": "2"
      }));

      // Tick marks and numbers
      for (let i = 1; i <= 12; i++) {
        const angle = (i * 30 - 90) * Math.PI / 180;

        // Hour tick marks
        if (hasTicks) {
          const tickOuter = radius * 0.93;
          const tickInner = radius * 0.86;
          svg.appendChild(svgEl("line", {
            x1: cx + Math.cos(angle) * tickInner,
            y1: cy + Math.sin(angle) * tickInner,
            x2: cx + Math.cos(angle) * tickOuter,
            y2: cy + Math.sin(angle) * tickOuter,
            stroke: color, "stroke-width": "1.5"
          }));
        }

        // Minute tick marks (between hours)
        if (hasMinuteTicks) {
          for (let m = 1; m <= 4; m++) {
            const mAngle = ((i - 1) * 30 + m * 6 - 90) * Math.PI / 180;
            const mTickOuter = radius * 0.93;
            const mTickInner = radius * 0.88;
            svg.appendChild(svgEl("line", {
              x1: cx + Math.cos(mAngle) * mTickInner,
              y1: cy + Math.sin(mAngle) * mTickInner,
              x2: cx + Math.cos(mAngle) * mTickOuter,
              y2: cy + Math.sin(mAngle) * mTickOuter,
              stroke: color, "stroke-width": "0.7"
            }));
          }
        }

        // Numbers — closer to edge when no ticks, inward when ticks present
        const numR = hasTicks ? radius * 0.72 : radius * 0.84;
        const fontSize = radius * 0.22;
        const numX = cx + Math.cos(angle) * numR;
        const numY = cy + Math.sin(angle) * numR;
        const el = svgEl("text", {
          x: numX, y: numY + fontSize * 0.35,
          "text-anchor": "middle",
          "font-family": "'Google Sans Flex', sans-serif",
          "font-size": String(fontSize),
          "font-weight": "500",
          fill: color
        });
        el.textContent = String(i);
        svg.appendChild(el);
      }

      // Hand angles
      const hourAngle = ((hour % 12) * 30 + minute * 0.5 - 90) * Math.PI / 180;
      const minuteAngle = (minute * 6 - 90) * Math.PI / 180;

      // Hand lengths — stop well before numbers
      // With ticks: numbers at 0.72r, inner edge ~0.59r → minute to 0.57, hour to 0.38
      // No ticks: numbers at 0.84r, inner edge ~0.71r → minute to 0.68, hour to 0.42
      const minuteLen = hasTicks ? radius * 0.57 : radius * 0.68;
      const hourLen = hasTicks ? radius * 0.44 : radius * 0.48;

      // Arrowhead helper — wide triangular arrowheads
      function drawArrow(x2, y2, angle, size) {
        const ux = Math.cos(angle), uy = Math.sin(angle);
        const ax = -ux * size, ay = -uy * size;
        const px = -uy * size * 0.7, py = ux * size * 0.7;
        svg.appendChild(svgEl("polygon", {
          points: [
            x2 + "," + y2,
            (x2 + ax + px) + "," + (y2 + ay + py),
            (x2 + ax - px) + "," + (y2 + ay - py)
          ].join(" "),
          fill: color
        }));
      }

      // Hour hand (shorter, thicker)
      const hourArrowPullback = showArrows ? radius * 0.1 : 0;
      const hx2 = cx + Math.cos(hourAngle) * (hourLen - hourArrowPullback);
      const hy2 = cy + Math.sin(hourAngle) * (hourLen - hourArrowPullback);
      svg.appendChild(svgEl("line", {
        x1: cx, y1: cy, x2: hx2, y2: hy2,
        stroke: color, "stroke-width": "3.5", "stroke-linecap": "round"
      }));
      if (showArrows) {
        const htx = cx + Math.cos(hourAngle) * hourLen;
        const hty = cy + Math.sin(hourAngle) * hourLen;
        drawArrow(htx, hty, hourAngle, radius * 0.12);
      }

      // Minute hand (longer, thinner)
      const minArrowPullback = showArrows ? radius * 0.08 : 0;
      const mx2 = cx + Math.cos(minuteAngle) * (minuteLen - minArrowPullback);
      const my2 = cy + Math.sin(minuteAngle) * (minuteLen - minArrowPullback);
      svg.appendChild(svgEl("line", {
        x1: cx, y1: cy, x2: mx2, y2: my2,
        stroke: color, "stroke-width": "2", "stroke-linecap": "round"
      }));
      if (showArrows) {
        const mtx = cx + Math.cos(minuteAngle) * minuteLen;
        const mty = cy + Math.sin(minuteAngle) * minuteLen;
        drawArrow(mtx, mty, minuteAngle, radius * 0.1);
      }

      // Center dot on top
      svg.appendChild(svgEl("circle", {
        cx, cy, r: radius * 0.04,
        fill: color
      }));
    }

    // ===== Draw answer box below a clock =====
    function drawAnswerBox(svg, cx, boxTopY, boxH, showAnswer, time) {
      const color = "#2d3748";
      const boxW = boxH * 3.2;
      const startX = cx - boxW / 2;
      const yShift = 16;

      // Underlines on each side of the colon
      const lineY = boxTopY + boxH - yShift;
      const underlineGap = 3;
      svg.appendChild(svgEl("line", { x1: startX, y1: lineY, x2: cx - underlineGap, y2: lineY, stroke: "#cbd5e1", "stroke-width": "1.5" }));
      svg.appendChild(svgEl("line", { x1: cx + underlineGap, y1: lineY, x2: startX + boxW, y2: lineY, stroke: "#cbd5e1", "stroke-width": "1.5" }));

      // Colon
      const colonY = boxTopY + boxH / 2 - yShift;
      const colonGap = boxH * 0.08;
      const dotR = boxH * 0.07;
      svg.appendChild(svgEl("circle", { cx, cy: colonY - boxH * 0.15, r: dotR, fill: color }));
      svg.appendChild(svgEl("circle", { cx, cy: colonY + boxH * 0.15, r: dotR, fill: color }));

      if (showAnswer) {
        const fontSize = boxH * 0.55;
        const hourStr = String(time.hour);
        const minStr = String(time.minute).padStart(2, "0");

        const hEl = svgEl("text", {
          x: cx - colonGap, y: boxTopY + boxH / 2 - yShift + fontSize * 0.35,
          "text-anchor": "end", "font-family": "'Google Sans Flex', sans-serif",
          "font-size": String(fontSize), "font-weight": "500", fill: "#3182ce"
        });
        hEl.textContent = hourStr;
        svg.appendChild(hEl);

        const mEl = svgEl("text", {
          x: cx + colonGap, y: boxTopY + boxH / 2 - yShift + fontSize * 0.35,
          "text-anchor": "start", "font-family": "'Google Sans Flex', sans-serif",
          "font-size": String(fontSize), "font-weight": "500", fill: "#3182ce"
        });
        mEl.textContent = minStr;
        svg.appendChild(mEl);
      }
    }

      const sixProbScale = totalProbs <= 6 ? 0.98 : 1;

          svg.appendChild(svgEl("circle", { cx: ccx, cy: colonY - boxH * 0.15, r: dotR, fill: "#16a34a" }));
          svg.appendChild(svgEl("circle", { cx: ccx, cy: colonY + boxH * 0.15, r: dotR, fill: "#16a34a" }));
          const fontSize = boxH * 0.55;

          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: badgeW, height: badgeH, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));

          bt.textContent = "Example"; svg.appendChild(bt);

    // ===== Render helpers =====
    function buildRenderOptions(opts, showAnswers) {

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateSheet(opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateSheet(opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const ro = buildRenderOptions(opts, false);
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          p.appendChild(renderWorksheetSVG(currentState.sheets[s], ro, '(' + (s + 1) + ')'));
          sheetWrap.appendChild(p);
        }
        return;
      }

      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cs;
        if (numSheets <= 3) { cs = numSheets; if ((aw - (cs - 1) * gap) / cs < mrw) cs = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cs = Math.min(3, numSheets); if ((aw - (cs - 1) * gap) / cs < mrw) cs = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cs - 1) * gap) / cs, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cs + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], ro, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        p.appendChild(renderWorksheetSVG(currentState.sheets[0], ro, '(1)'));
        sheetWrap.appendChild(p);
      }
    }

    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }


    // Load and register TTF fonts with jsPDF for embedded vector text in PDFs
    let _fontCache = {};
    // Preload font files on page load so PDF generation is faster
    (function preloadFonts() {
      ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
        fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
          var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
        }).catch(function() {});
      });
    })();
    async function registerPdfFonts(pdf) {
      // svg2pdf strips quotes and fallbacks, so register with clean names only
      // Also register "normal" for undefined-style calls
      const fontDefs = [
        { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
        { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
        { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
      ];
      let idx = 0;
      for (const f of fontDefs) {
        try {
          let b64;
          if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
          else {
            const resp = await fetch(f.file);
            const buf = await resp.arrayBuffer();
            const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
            _fontCache[f.file] = b64;
          }
          for (const style of f.styles) {
            const vfsName = "f" + (idx++) + ".ttf";
            pdf.addFileToVFS(vfsName, b64);
            pdf.addFont(vfsName, f.name, style);
          }
        } catch(e) { console.warn("Font load failed:", f.file, e); }
      }
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              const roAns = buildRenderOptions(opts, true);
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], roAns, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      // Register embedded fonts
      await registerPdfFonts(pdf);

      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
    let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    elProblemsPerSheet.addEventListener("change", () => renderWithNewRandomization());
    elMinuteIncrement.addEventListener("change", () => renderWithNewRandomization());

    // Init
    syncTickMarksUI();
    syncMinuteIncrementUI();
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
<script src="../../favorites.js"></script>
</body>
