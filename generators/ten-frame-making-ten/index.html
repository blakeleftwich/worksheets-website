  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function randInt(lo, hi) { return lo + Math.floor(Math.random() * (hi - lo + 1)); }

    const elShowSubtitle = document.getElementById("showSubtitle");

    const elSubtitleInputWrap = document.getElementById("subtitleInputWrap");
    const elBranded = document.getElementById("branded");
    const elNumbered = document.getElementById("numbered");
    const elIncludeExample = document.getElementById("includeExample") || { checked: false, addEventListener: function(){} };
    const advToggle = document.getElementById("advToggle");
    const advPanel = document.getElementById("advPanel");
    const advArrow = document.getElementById("advArrow");

    // ===== Advanced panel toggle =====

    // ===== State =====
    let currentState = { sheets: [] };

    // ===== Problem generation =====
    function generateProblems(count, target) {
      const problems = [];
      // Valid dot counts: 1 to (target - 1) so the missing addend is always >= 1
      const lo = 1, hi = target - 1;
      const range = hi - lo + 1;

      if (count <= range) {
        // Pick unique values from [lo..hi]
        const pool = [];
        for (let n = lo; n <= hi; n++) pool.push(n);
        for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
        for (let i = 0; i < count; i++) {
          const dots = pool[i];
          const missing = target - dots;
          const blankFirst = Math.random() < 0.5;
          problems.push({ dots, missing, target, blankFirst });
        }
      } else {
        // More problems than range: fill with full shuffled sets + remainder
        const fullSets = Math.floor(count / range);
        const remainder = count % range;
        for (let s = 0; s < fullSets; s++) {
          const pool = [];
          for (let n = lo; n <= hi; n++) pool.push(n);
          for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
          for (const dots of pool) {
            const missing = target - dots;
            const blankFirst = Math.random() < 0.5;
            problems.push({ dots, missing, target, blankFirst });
          }
        }
        if (remainder > 0) {
          const pool = [];
          for (let n = lo; n <= hi; n++) pool.push(n);
          for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
          for (let i = 0; i < remainder; i++) {
            const dots = pool[i];
            const missing = target - dots;
            const blankFirst = Math.random() < 0.5;
            problems.push({ dots, missing, target, blankFirst });
          }
        }
      }

      // Final shuffle
      for (let i = problems.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [problems[i], problems[j]] = [problems[j], problems[i]]; }
      return problems;
    }

    // ===== Draw a ten frame =====
    // rows x cols grid with thick borders, filled dots as solid black circles
    function drawTenFrame(svg, x, y, cellSize, rows, cols, filledCount) {
      const frameW = cols * cellSize;
      const frameH = rows * cellSize;
      const strokeW = 2.5;

      // Outer border - thick
      svg.appendChild(svgEl("rect", {
        x: x, y: y, width: frameW, height: frameH,
        fill: "none", stroke: "#000", "stroke-width": String(strokeW), rx: 2, ry: 2
      }));

      // Grid cells and dots
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cx = x + c * cellSize;
          const cy = y + r * cellSize;
          svg.appendChild(svgEl("rect", {
            x: cx, y: cy, width: cellSize, height: cellSize,
            fill: "none", stroke: "#000", "stroke-width": "1.5"
          }));

          const cellIndex = r * cols + c;
          if (cellIndex < filledCount) {
            const dotR = cellSize * 0.30;
            svg.appendChild(svgEl("circle", {
              cx: cx + cellSize / 2, cy: cy + cellSize / 2, r: dotR, fill: "#000"
            }));
          }
        }
      }
    }

    // ===== Get frame dimensions for a target =====
    function getFrameConfig(target) {
      if (target === 5) return { rows: 1, cols: 5, frames: 1 };
      if (target === 10) return { rows: 2, cols: 5, frames: 1 };
      // target === 20: two 2x5 frames side by side
      return { rows: 2, cols: 5, frames: 2 };
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, target, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", { x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af" }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      // Branding
      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../branding/emma-logo.jpg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      // Layout grid
      const count = problems.length;
      const bottomMargin = branded ? 56 : 40;
      const gridTop = topGridY;
      const availH = pageH - bottomMargin - gridTop;
      const availW = pageW - margin * 2;

      const cols = 2;
      const rows = Math.ceil(count / cols);
      const colW = availW / cols;
      const rowH = availH / rows;

      const frameConfig = getFrameConfig(target);

      // Calculate cell size for ten frame to fit well in the available space
      // Frame needs to be LARGE and clear for young children
      const maxFrameW = colW - 40; // horizontal room
      const maxFrameH = rowH * 0.55; // vertical room for frame (leave room for equation below)

      let cellSize;
      if (frameConfig.frames === 2) {
        // Two frames side by side: total width = 2 * (5 * cell) + gap
        const doubleGap = 10;
        cellSize = Math.min(
          Math.floor((maxFrameW - doubleGap) / 10),
          Math.floor(maxFrameH / frameConfig.rows)
        );
      } else {
        cellSize = Math.min(
          Math.floor(maxFrameW / frameConfig.cols),
          Math.floor(maxFrameH / frameConfig.rows)
        );
      }
      cellSize = clamp(cellSize, 14, 50);

      const singleFrameW = frameConfig.cols * cellSize;
      const singleFrameH = frameConfig.rows * cellSize;
      const doubleGap = 10;
      const totalFrameW = frameConfig.frames === 2 ? singleFrameW * 2 + doubleGap : singleFrameW;

      // Equation font size - LARGE for young children
      const eqFontSize = Math.min(28, Math.max(16, Math.floor(rowH * 0.18)));
      const probNumSize = 11;

      for (let i = 0; i < problems.length; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cellLeft = margin + col * colW;
        const cellTop = gridTop + row * rowH;
        const prob = problems[i];

        // Problem number
        if (numbered !== false) {
          const pnX = cellLeft + 4;
          const pnY = cellTop + 16;
          const numLabel = svgEl("text", { x: pnX, y: pnY, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numLabel.textContent = (i + 1) + "."; svg.appendChild(numLabel);
        }

        // Center the frame horizontally in the cell
        const contentCenterX = cellLeft + colW / 2;
        const frameStartX = contentCenterX - totalFrameW / 2;

        // Vertical layout: frame on top, equation below
        // Position frame in upper portion of cell, equation in lower portion
        const gapBetween = Math.max(12, rowH * 0.06);
        const totalContentH = singleFrameH + gapBetween + eqFontSize;
        const contentStartY = cellTop + (rowH - totalContentH) / 2;
        const frameY = contentStartY;

        // Draw the ten frame(s)
        if (frameConfig.frames === 2) {
          // For target 20: two frames side by side
          const dotsInFirst = Math.min(prob.dots, 10);
          const dotsInSecond = Math.max(0, prob.dots - 10);
          drawTenFrame(svg, frameStartX, frameY, cellSize, frameConfig.rows, frameConfig.cols, dotsInFirst);
          drawTenFrame(svg, frameStartX + singleFrameW + doubleGap, frameY, cellSize, frameConfig.rows, frameConfig.cols, dotsInSecond);
        } else {
          drawTenFrame(svg, frameStartX, frameY, cellSize, frameConfig.rows, frameConfig.cols, prob.dots);
        }

        // Draw the equation below the frame
        const eqY = frameY + singleFrameH + gapBetween + eqFontSize * 0.8;

        // Build the equation string parts
        // blankFirst: ___ + dots = target
        // !blankFirst: dots + ___ = target
        const isExample = (i === 0 && includeExample && !showAnswers);
        const dotsStr = String(prob.dots);
        const missingStr = String(prob.missing);
        const targetStr = String(prob.target);
        const blankW = eqFontSize * 2.0; // width of the blank underline

        // Measure approximate equation width to center it
        const charW = eqFontSize * 0.62;
        const spaceW = eqFontSize * 0.35;
        const plusW = charW;
        const equalsW = charW;

        let eqTotalW;
        if (prob.blankFirst) {
          // ___ + dotsStr = targetStr
          eqTotalW = blankW + spaceW + plusW + spaceW + dotsStr.length * charW + spaceW + equalsW + spaceW + targetStr.length * charW;
        } else {
          // dotsStr + ___ = targetStr
          eqTotalW = dotsStr.length * charW + spaceW + plusW + spaceW + blankW + spaceW + equalsW + spaceW + targetStr.length * charW;
        }

        let eqX = contentCenterX - eqTotalW / 2;

        if (prob.blankFirst) {
          // Draw blank (underline) or answer
          if (showAnswers || isExample) {
            const ansColor = showAnswers ? "#3182ce" : "#16a34a";
            const ansEl = svgEl("text", {
              x: eqX + blankW / 2, y: eqY,
              "text-anchor": "middle",
              "font-family": "'Google Sans Flex', sans-serif",
              "font-size": String(eqFontSize), "font-weight": "500", fill: ansColor
            });
            ansEl.textContent = missingStr; svg.appendChild(ansEl);
          } else {
            // Underline for blank
            const lineY2 = eqY + 4;
            svg.appendChild(svgEl("line", {
              x1: eqX + 2, y1: lineY2, x2: eqX + blankW - 2, y2: lineY2,
              stroke: "#000", "stroke-width": "2.5"
            }));
          }
          eqX += blankW + spaceW;

          // Plus sign
          const plusEl = svgEl("text", {
            x: eqX, y: eqY,
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(eqFontSize), "font-weight": "500", fill: "#1a202c"
          });
          plusEl.textContent = "+"; svg.appendChild(plusEl);
          eqX += plusW + spaceW;

          // Dots number
          const dotsEl = svgEl("text", {
            x: eqX, y: eqY,
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(eqFontSize), "font-weight": "500", fill: "#1a202c"
          });
          dotsEl.textContent = dotsStr; svg.appendChild(dotsEl);
          eqX += dotsStr.length * charW + spaceW;

          // Equals sign
          const eqEl = svgEl("text", {
            x: eqX, y: eqY,
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(eqFontSize), "font-weight": "500", fill: "#1a202c"
          });
          eqEl.textContent = "="; svg.appendChild(eqEl);
          eqX += equalsW + spaceW;

          // Target number
          const tgtEl = svgEl("text", {
            x: eqX, y: eqY,
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(eqFontSize), "font-weight": "500", fill: "#1a202c"
          });
          tgtEl.textContent = targetStr; svg.appendChild(tgtEl);

        } else {
          // dotsStr + ___ = targetStr

          // Dots number
          const dotsEl = svgEl("text", {
            x: eqX, y: eqY,
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(eqFontSize), "font-weight": "500", fill: "#1a202c"
          });
          dotsEl.textContent = dotsStr; svg.appendChild(dotsEl);
          eqX += dotsStr.length * charW + spaceW;

          // Plus sign
          const plusEl = svgEl("text", {
            x: eqX, y: eqY,
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(eqFontSize), "font-weight": "500", fill: "#1a202c"
          });
          plusEl.textContent = "+"; svg.appendChild(plusEl);
          eqX += plusW + spaceW;

          // Draw blank (underline) or answer
          if (showAnswers || isExample) {
            const ansColor = showAnswers ? "#3182ce" : "#16a34a";
            const ansEl = svgEl("text", {
              x: eqX + blankW / 2, y: eqY,
              "text-anchor": "middle",
              "font-family": "'Google Sans Flex', sans-serif",
              "font-size": String(eqFontSize), "font-weight": "500", fill: ansColor
            });
            ansEl.textContent = missingStr; svg.appendChild(ansEl);
          } else {
            // Underline for blank
            const lineY2 = eqY + 4;
            svg.appendChild(svgEl("line", {
              x1: eqX + 2, y1: lineY2, x2: eqX + blankW - 2, y2: lineY2,
              stroke: "#000", "stroke-width": "2.5"
            }));
          }
          eqX += blankW + spaceW;

          // Equals sign
          const eqEl = svgEl("text", {
            x: eqX, y: eqY,
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(eqFontSize), "font-weight": "500", fill: "#1a202c"
          });
          eqEl.textContent = "="; svg.appendChild(eqEl);
          eqX += equalsW + spaceW;

          // Target number
          const tgtEl = svgEl("text", {
            x: eqX, y: eqY,
            "font-family": "'Google Sans Flex', sans-serif",
            "font-size": String(eqFontSize), "font-weight": "500", fill: "#1a202c"
          });
          tgtEl.textContent = targetStr; svg.appendChild(tgtEl);
        }

        // Example badge
        if (isExample) {
          const badgeW = 42, badgeH = 13;
          const badgeX = contentCenterX - badgeW / 2;
          const badgeY = cellTop + 4;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: badgeW, height: badgeH, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "1" }));
          const badgeText = svgEl("text", {
            x: contentCenterX, y: badgeY + badgeH * 0.75,
            "text-anchor": "middle", "font-family": "Fredoka, sans-serif",
            "font-size": "8", "font-weight": "600", fill: "#16a34a"
          });
          badgeText.textContent = "Example";
          svg.appendChild(badgeText);
        }
      }
      return svg;
    }

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "none";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      const target = parseInt(elTarget.value, 10);
      return "Making " + target;
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Find the missing number to make ten.";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        target: parseInt(elTarget.value, 10),
        problemsPerSheet: parseInt(elProblems.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        answerKey: elAnswerKey.checked,
        showHeader,
        title,
        subtitle,
        branded: elBranded.checked,
        numbered: elNumbered.checked,
        includeExample: elIncludeExample.checked,
      };
    }

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.target));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts.target));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, target: opts.target, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      // Desktop: grid layout with calculated sizing
      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let gridCols;
        if (numSheets <= 3) { gridCols = numSheets; if ((aw - (gridCols - 1) * gap) / gridCols < mrw) gridCols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { gridCols = Math.min(3, numSheets); if ((aw - (gridCols - 1) * gap) / gridCols < mrw) gridCols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (gridCols - 1) * gap) / gridCols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + gridCols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, target: opts.target, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, target: opts.target, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const opts = gatherOptions();
      const sH = sheetWrap.innerHTML, sC = sheetWrap.className, sS = sheetWrap.style.cssText;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      for (let i = 0; i < currentState.sheets.length; i++) {
        const p = document.createElement("div"); p.className = "worksheet-page";
        p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, target: opts.target, numbered: opts.numbered, includeExample: opts.includeExample }, wsCodes[i]));
        sheetWrap.appendChild(p);
      }
      const answerKeyPages = [];
      if (opts.answerKey) {
        for (let i = 0; i < currentState.sheets.length; i++) {
          const p = document.createElement("div"); p.className = "worksheet-page ak-print-only";
          p.appendChild(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: "", branded: opts.branded, showAnswers: true, isAnswerKey: true, target: opts.target, numbered: opts.numbered, includeExample: false }, wsCodes[i]));
          sheetWrap.appendChild(p);
          answerKeyPages.push(p);
        }
      }
      window.print();
      setTimeout(() => { answerKeyPages.forEach(p => p.remove()); sheetWrap.innerHTML = sH; sheetWrap.className = sC; sheetWrap.style.cssText = sS; }, 500);
    }


    // ===== Event Listeners =====
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    elTarget.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);
    let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();

    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
<script src="../../favorites.js"></script>
</body>
