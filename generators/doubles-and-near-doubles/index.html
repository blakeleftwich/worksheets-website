    // ===== Helpers =====
    function svgEl(tag, attrs, children) {

    // ===== Problem generation =====
    function generateProblems(count, opts) {
      const { mode, range } = opts;
      const maxNum = parseInt(range, 10);
      const problems = [];
      const seen = new Set();

      // Build pool of valid doubles/near-doubles facts
      const pool = [];

      if (mode === "doubles" || mode === "mixed") {
        // Doubles: n + n where n is 0..maxNum
        for (let n = 0; n <= maxNum; n++) {
          pool.push({ a: n, b: n, type: "double" });
        }
      }

      if (mode === "near" || mode === "mixed") {
        // Near doubles: n + (n+1) where both addends are within range
        for (let n = 0; n < maxNum; n++) {
          if (n + 1 <= maxNum) {
            pool.push({ a: n, b: n + 1, type: "near" });
          }
        }
      }

      // Shuffle pool
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }

      // Pick from pool, avoiding duplicates
      let idx = 0;
      let passes = 0;
      while (problems.length < count && passes < 3) {
        const item = pool[idx % pool.length];
        // Randomly swap order for near doubles to get both n+(n+1) and (n+1)+n
        let a = item.a, b = item.b;
        if (item.type === "near" && Math.random() < 0.5) {
          [a, b] = [b, a];
        }
        const key = a + "+" + b;
        if (!seen.has(key)) {
          seen.add(key);
          problems.push({ a, b, answer: a + b, type: item.type });
        }
        idx++;
        if (idx % pool.length === 0) passes++;
      }

      // If we still need more, allow repeats with different ordering
      let attempts = 0;
      while (problems.length < count && attempts < count * 100) {
        attempts++;
        const item = pool[Math.floor(Math.random() * pool.length)];
        let a = item.a, b = item.b;
        if (item.type === "near" && Math.random() < 0.5) {
          [a, b] = [b, a];
        }
        problems.push({ a, b, answer: a + b, type: item.type });
      }

      // Final shuffle
      for (let i = problems.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [problems[i], problems[j]] = [problems[j], problems[i]];
      }

      return problems.slice(0, count);
    }

    // ===== SVG Rendering =====
    function renderDotGroup(svg, cx, cy, count, dotR, color) {
      // Arrange dots in a grid pattern: up to 5 columns wide
      const maxCols = 5;
      const cols = Math.min(count, maxCols);
      const rows = Math.ceil(count / cols);
      const spacing = dotR * 2.6;
      const startX = cx - ((cols - 1) * spacing) / 2;
      const startY = cy - ((rows - 1) * spacing) / 2;

      let placed = 0;
      for (let r = 0; r < rows && placed < count; r++) {
        const colsInRow = Math.min(cols, count - placed);
        const rowStartX = cx - ((colsInRow - 1) * spacing) / 2;
        for (let c = 0; c < colsInRow && placed < count; c++) {
          svg.appendChild(svgEl("circle", {
            cx: rowStartX + c * spacing,
            cy: startY + r * spacing,
            r: dotR,
            fill: color
          }));
          placed++;
        }
      }
    }

    function renderWorksheetSVG(problems, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, showDots, numbered, includeExample, isAnswerKey } = options;

      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });

        } else if (showHeader === "both") {

            x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", {
            x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568"
          }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", {
            x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18,
            stroke: "#718096", "stroke-width": 0.75
          }));
          curY += 28;

        if (title) {
          svg.appendChild(svgEl("text", {
            x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af"
          }, [document.createTextNode(title)]));
          curY += 46;

          }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;

        svg.appendChild(svgEl("image", {

          x: margin, y: brandY,

        }));
        const bLine1 = svgEl("text", {

          fill: "#4a5568", "text-anchor": "end"
        });

        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const count = problems.length;
      const bottomMargin = branded ? 56 : 24;
      const gridTop = topGridY;
      const availH = pageH - bottomMargin - gridTop;
      const availW = pageW - margin * 2;

      // Layout (matching fill-in-the-blank style)
      let cols;
      if (count <= 4) { cols = 1; }
      else { cols = 2; }
      const rows = Math.ceil(count / cols);
      const colW = availW / cols;
      const rowH = availH / rows;

      // Size text to fit
      const maxTextH = rowH * (showDots ? 0.45 : 0.8);
      const maxTextW = colW * 0.09;
      const fontSize = Math.min(36, Math.max(14, Math.floor(Math.min(maxTextH, maxTextW))));
      const charW = fontSize * 0.62;
      const boxH = fontSize * 1.7;
      const boxW = fontSize * 2.0;

      // Fixed problem number size
      const probNumSize = 10;
      const probNumW = probNumSize * (count >= 10 ? 2.0 : 1.6);

      // Dot rendering parameters
      const dotR = Math.min(6, Math.max(3, rowH * 0.04));
      const dotAreaH = showDots ? rowH * 0.38 : 0;

      // Fixed-column layout (matching fill-in-the-blank)
      const opColW = charW * 2.0;
      const eqColW = charW * 2.0;

      // Calculate max widths for each slot per column
      const colMaxSlot1W = [], colMaxSlot2W = [], colMaxAnsW = [];
      for (let c = 0; c < cols; c++) {
        let maxS1 = 0, maxS2 = 0, maxA = 0;
        for (let i = c; i < problems.length; i += cols) {
          maxS1 = Math.max(maxS1, String(problems[i].a).length * charW);
          maxS2 = Math.max(maxS2, String(problems[i].b).length * charW);
          maxA = Math.max(maxA, String(problems[i].answer).length * charW);
        }
        colMaxSlot1W.push(maxS1); colMaxSlot2W.push(maxS2); colMaxAnsW.push(maxA);
      }
      const colSlot1W = colMaxSlot1W.map(w => Math.max(boxW, w) + charW * 0.4);
      const colSlot2W = colMaxSlot2W.map(w => Math.max(boxW, w) + charW * 0.4);
      const colAnsSlotW = colMaxAnsW.map(w => Math.max(boxW, w) + charW * 0.4);

      for (let i = 0; i < problems.length; i++) {
        const col = i % cols, row = Math.floor(i / cols);
        const cellLeft = margin + col * colW;
        const cellTop = gridTop + row * rowH;
        const { a, b, answer, type } = problems[i];
        const ansStr = String(answer);
        const isExample = (i === 0 && includeExample && !showAnswers);

        // Vertical position for equation text
        const eqZoneH = showDots ? rowH * 0.5 : rowH;
        const cy = cellTop + eqZoneH / 2 + fontSize * 0.35;

        let cx = cellLeft + 8;

        // Problem number
        if (numbered !== false) {
          const probNumY = cy - 0.72 * (fontSize - probNumSize);
          const numEl = svgEl("text", { x: cx, y: probNumY, "font-family": "Fredoka, sans-serif", "font-size": String(probNumSize), "font-weight": "600", fill: "#a0aec0" });
          numEl.textContent = (i + 1) + "."; svg.appendChild(numEl);
        }
        cx += probNumW;

        // Fixed column positions
        const slot1Left = cx;
        const slot1Center = slot1Left + colSlot1W[col] / 2;
        const opLeft = slot1Left + colSlot1W[col];
        const opCenter = opLeft + opColW / 2;
        const slot2Left = opLeft + opColW;
        const slot2Center = slot2Left + colSlot2W[col] / 2;
        const eqLeft = slot2Left + colSlot2W[col];
        const eqCenter = eqLeft + eqColW / 2;
        const ansLeft = eqLeft + eqColW;
        const ansCenter = ansLeft + colAnsSlotW[col] / 2;

        // Slot 1: first number
        const topEl = svgEl("text", { x: slot1Center, y: cy, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
        topEl.textContent = String(a); svg.appendChild(topEl);

        // Operator (+)
        const opEl = svgEl("text", { x: opCenter, y: cy, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
        opEl.textContent = "+"; svg.appendChild(opEl);

        // Slot 2: second number
        const botEl = svgEl("text", { x: slot2Center, y: cy, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
        botEl.textContent = String(b); svg.appendChild(botEl);

        // Equals sign
        const eqEl = svgEl("text", { x: eqCenter, y: cy, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize), "font-weight": "500", fill: "#1a202c" });
        eqEl.textContent = "="; svg.appendChild(eqEl);

        // Answer blank (underline style)
        const bx = ansCenter - boxW / 2;
        const blY = cy + fontSize * 0.15;
        svg.appendChild(svgEl("line", { x1: bx, y1: blY, x2: bx + boxW, y2: blY, stroke: isExample ? "#22c55e" : "#2d3748", "stroke-width": "1.5" }));

        if (isExample) {
          const ansEl = svgEl("text", { x: ansCenter, y: cy, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize * 0.9), "font-weight": "500", fill: "#16a34a" });
          ansEl.textContent = ansStr; svg.appendChild(ansEl);
          const badgeX = bx + boxW - 42, badgeY = cy - boxH * 0.7 - 15;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
          const badgeText = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          badgeText.textContent = "Example"; svg.appendChild(badgeText);
        } else if (showAnswers) {
          const ansEl = svgEl("text", { x: ansCenter, y: cy, "text-anchor": "middle", "font-family": "'Google Sans Flex', sans-serif", "font-size": String(fontSize * 0.9), "font-weight": "500", fill: "#3182ce" });
          ansEl.textContent = ansStr; svg.appendChild(ansEl);
        }

        // Visual dots
        if (showDots && !showAnswers) {
          const dotY = cellTop + eqZoneH + dotAreaH / 2;
          const dotZoneW = colW - 20;
          const dotCenterX = cellLeft + 8 + dotZoneW / 2;

          // Two groups side by side
          const groupGap = dotR * 4;
          const leftGroupX = dotCenterX - groupGap / 2;
          const rightGroupX = dotCenterX + groupGap / 2;

          // Left group (first addend) in blue
          if (a > 0) {
            renderDotGroup(svg, leftGroupX - dotR * 3, dotY, a, dotR, "#4299e1");
          }

          // Right group (second addend) in green/teal
          if (b > 0) {
            renderDotGroup(svg, rightGroupX + dotR * 3, dotY, b, dotR, "#48bb78");
          }

          // Separator line between groups
          if (a > 0 && b > 0) {
            svg.appendChild(svgEl("line", {
              x1: dotCenterX, y1: dotY - dotAreaH * 0.35,
              x2: dotCenterX, y2: dotY + dotAreaH * 0.35,
              stroke: "#cbd5e0", "stroke-width": "1", "stroke-dasharray": "3,3"
            }));
          }
        }
      }
      return svg;
    }

    // ===== Auto title =====
    function generateAutoTitle() {
      const mode = elMode.value;
      const range = elRange.value;
      if (mode === "doubles") return "Doubles Within " + range;
      if (mode === "near") return "Near Doubles Within " + range;
      return "Doubles & Near Doubles Within " + range;

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        mode: elMode.value,
        range: elRange.value,
        problemsPerSheet: parseInt(elProblems.value, 10),

    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        currentState.sheets.push(generateProblems(opts.problemsPerSheet, opts));
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = ""; sheetWrap.className = ""; sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, showDots: opts.showDots, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          p.appendChild(v); sheetWrap.appendChild(p);
        }
        return;
      }

      // Desktop: grid layout with calculated sizing
      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let gridCols;
        if (numSheets <= 3) { gridCols = numSheets; if ((aw - (gridCols-1)*gap)/gridCols < mrw) gridCols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        else { gridCols = Math.min(3, numSheets); if ((aw - (gridCols-1)*gap)/gridCols < mrw) gridCols = Math.max(1, Math.floor((aw+gap)/(mrw+gap))); }
        const msw = (aw - (gridCols-1)*gap)/gridCols, msh = numSheets <= 3 ? ah : ah*0.8;
        const scale = Math.min(msw/sheetWidth, msh/sheetHeight);
        const sw = Math.floor(sheetWidth*scale), sh = Math.floor(sheetHeight*scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + gridCols + ", " + (sw+24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, showDots: opts.showDots, numbered: opts.numbered, includeExample: opts.includeExample }, '(' + (s + 1) + ')');
          v.setAttribute("width", sw); v.setAttribute("height", sh); p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0], { showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: false, showDots: opts.showDots, numbered: opts.numbered, includeExample: opts.includeExample }, '(1)');
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }


    // Load and register TTF fonts with jsPDF for embedded vector text in PDFs
    let _fontCache = {};
    // Preload font files on page load so PDF generation is faster
    (function preloadFonts() {
      ["../../fonts/googlesansflex-700.ttf","../../fonts/fredoka-400.ttf","../../fonts/fredoka-600.ttf","../../fonts/dmsans-700.ttf","../../fonts/inter-500.ttf"].forEach(function(file) {
        fetch(file).then(function(r) { return r.arrayBuffer(); }).then(function(buf) {
          var bytes = new Uint8Array(buf); var binary = ''; for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); _fontCache[file] = btoa(binary);
        }).catch(function() {});
      });
    })();
    async function registerPdfFonts(pdf) {
      // svg2pdf strips quotes and fallbacks, so register with clean names only
      // Also register "normal" for undefined-style calls
      const fontDefs = [
        { file: "../../fonts/googlesansflex-700.ttf", name: "Google Sans Flex", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/fredoka-400.ttf", name: "Fredoka", styles: ["normal", "400", "400normal", "500normal"] },
        { file: "../../fonts/fredoka-600.ttf", name: "Fredoka", styles: ["bold", "600", "700", "800", "600normal", "600bold", "700normal", "700bold", "800normal"] },
        { file: "../../fonts/dmsans-700.ttf", name: "DM Sans", styles: ["normal", "bold", "500", "600", "700", "500normal", "600normal", "700normal", "700bold"] },
        { file: "../../fonts/inter-500.ttf", name: "Inter", styles: ["normal", "bold", "400", "500", "600", "700", "400normal", "500normal", "600normal", "700normal"] },
      ];
      let idx = 0;
      for (const f of fontDefs) {
        try {
          let b64;
          if (_fontCache[f.file]) { b64 = _fontCache[f.file]; }
          else {
            const resp = await fetch(f.file);
            const buf = await resp.arrayBuffer();
            const bytes = new Uint8Array(buf); let binary = ''; for (let j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]); b64 = btoa(binary);
            _fontCache[f.file] = b64;
          }
          for (const style of f.styles) {
            const vfsName = "f" + (idx++) + ".ttf";
            pdf.addFileToVFS(vfsName, b64);
            pdf.addFont(vfsName, f.name, style);
          }
        } catch(e) { console.warn("Font load failed:", f.file, e); }
      }
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i], { showHeader: "none", title: opts.title, subtitle: opts.subtitle, branded: opts.branded, showAnswers: true, showDots: false, numbered: opts.numbered, isAnswerKey: true, includeExample: false }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      // Register embedded fonts
      await registerPdfFonts(pdf);

      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }

    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
let resizeTimeout;
    window.addEventListener("resize", () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150); });

    // Init
    renderWithNewRandomization();
  
    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>

<script>
(function(){
  var btn=document.querySelector('.hamburger-btn');
  var nav=document.querySelector('.nav-links');
  if(btn&&nav){
    btn.addEventListener('click',function(){
      btn.classList.toggle('open');
      nav.classList.toggle('open');
    });
    document.addEventListener('click',function(e){
      if(!btn.contains(e.target)&&!nav.contains(e.target)){
        btn.classList.remove('open');
        nav.classList.remove('open');
      }
    });
  }
})();
</script>
