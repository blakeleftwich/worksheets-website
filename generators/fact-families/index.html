  <script>
    // ===== Helpers =====
    function svgEl(tag, attrs, children) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      if (children) children.forEach(c => el.appendChild(c));
      return el;
    }

    // ===== Element refs =====
    const sheetWrap = document.getElementById("sheetWrap");
    const elOpAddSub = document.getElementById("opAddSub");
    const elOpMulDiv = document.getElementById("opMulDiv");
    function getOperation() {
      const as = elOpAddSub.checked, md = elOpMulDiv.checked;
      if (as && md) return "mixed";
      if (md) return "muldiv";
      return "addsub";
    }
    function guardOps(changed) {
      if (!elOpAddSub.checked && !elOpMulDiv.checked) changed.checked = true;
    }
    elOpAddSub.addEventListener("change", () => { guardOps(elOpAddSub); renderWithNewRandomization(); });
    elOpMulDiv.addEventListener("change", () => { guardOps(elOpMulDiv); renderWithNewRandomization(); });
    const elRange = document.getElementById("rangeSelect");
    const elDifficulty = document.getElementById("difficultySelect");
    const elProblems = document.getElementById("problemsPerSheet");
    const elNumSheets = document.getElementById("numWorksheets");

    const elShowSubtitle = document.getElementById("showSubtitle");

    // ===== Generate fact family triplets =====
    function generateFactFamilies(count, operation, range) {
      const families = [];
      const seen = new Set();
      const maxVal = parseInt(range, 10);
      let attempts = 0;

      while (families.length < count && attempts < count * 500) {
        attempts++;
        let a, b, c;
        let famOp = operation;
        if (famOp === "mixed") famOp = Math.random() < 0.5 ? "addsub" : "muldiv";

        if (famOp === "addsub") {
          // a + b = c, where a >= 1, b >= 1, c <= maxVal
          c = 2 + Math.floor(Math.random() * (maxVal - 1));
          if (c > maxVal) continue;
          a = 1 + Math.floor(Math.random() * (c - 1));
          b = c - a;
          if (b < 1) continue;
        } else {
          // multiplication & division: factors within range, a >= 2, b >= 2
          a = 2 + Math.floor(Math.random() * (maxVal - 2 + 1));
          if (a > maxVal) continue;
          b = 2 + Math.floor(Math.random() * (maxVal - 2 + 1));
          if (b > maxVal) continue;
          c = a * b;
        }

        // Ensure a <= b for canonical form to avoid duplicates
        if (a > b) { const t = a; a = b; b = t; }
        const key = famOp + ":" + a + "," + b;
        if (seen.has(key)) continue;
        seen.add(key);
        families.push({ a, b, c, op: famOp });
      }

      // Fallback fill
      while (families.length < count) {
        const fallbackOp = operation === "mixed" ? (Math.random() < 0.5 ? "addsub" : "muldiv") : operation;
        if (fallbackOp === "addsub") {
          families.push({ a: 1, b: 2, c: 3, op: "addsub" });
        } else {
          families.push({ a: 2, b: 3, c: 6, op: "muldiv" });
        }
      }

      // Shuffle
      for (let i = families.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [families[i], families[j]] = [families[j], families[i]];
      }

      return families;
    }

    // ===== Generate missing number masks =====
    // For each fact family in "missing" mode, decide which numbers to blank.
    // Each equation has 3 slots. We blank 1-2 slots per equation randomly.
    function generateMissingMask() {
      // 4 equations, each has 3 positions (left, right, result)
      // For each equation, blank exactly 1 position
      const mask = [];
      for (let eq = 0; eq < 4; eq++) {
        const blanks = [false, false, false];
        const pos = Math.floor(Math.random() * 3);
        blanks[pos] = true;
        mask.push(blanks);
      }
      return mask;
    }

    // ===== SVG Rendering =====
    function renderWorksheetSVG(families, options, wsCode) {
      const { showHeader, title, subtitle, branded, showAnswers, operation, difficulty, masks, numbered, includeExample, isAnswerKey } = options;
      const pageW = 612, pageH = 792, margin = 36;
      const svg = svgEl("svg", { width: pageW, height: pageH, viewBox: "0 0 " + pageW + " " + pageH, xmlns: "http://www.w3.org/2000/svg" });
      svg.appendChild(svgEl("rect", { x: 0, y: 0, width: pageW, height: pageH, fill: "#fff" }));

      const midX = pageW / 2;
      let topGridY;
      {
        let curY = 10;
        if (isAnswerKey) {
          const akLabel = svgEl("text", {
            x: pageW - margin, y: curY + 16,
            "font-family": "'Google Sans Flex', sans-serif", "font-size": 12, "font-weight": 700,
            fill: "#000", "text-anchor": "end", "letter-spacing": "2"
          });
          akLabel.textContent = "ANSWER KEY";
          svg.appendChild(akLabel);
          curY += 28;
        } else if (showHeader === "both") {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: margin + 38, y1: curY + 18, x2: midX - 30, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Date")]));
          svg.appendChild(svgEl("line", { x1: midX + 54, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        } else if (showHeader === "name") {
          svg.appendChild(svgEl("text", { x: midX + 20, y: curY + 16, "font-family": "Fredoka, sans-serif", "font-size": 12, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode("Name")]));
          svg.appendChild(svgEl("line", { x1: midX + 58, y1: curY + 18, x2: pageW - margin, y2: curY + 18, stroke: "#718096", "stroke-width": 0.75 }));
          curY += 28;
        }
        if (title) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 38, "font-family": "'Google Sans Flex', sans-serif", "font-size": 40, "font-weight": 700, fill: "#9ca3af" }, [document.createTextNode(title)]));
          curY += 46;
        }
        if (subtitle) {
          svg.appendChild(svgEl("text", { x: margin, y: curY + 14, "font-family": "Fredoka, sans-serif", "font-size": 16, "font-weight": 400, fill: "#4a5568" }, [document.createTextNode(subtitle)]));
          curY += 20;
        }
        topGridY = curY + 6;
      }

      // Branding
      if (branded) {
        const brandY = pageH - 48;
        const logoH = 38;
        const logoW = Math.round(logoH * 2.79);
        svg.appendChild(svgEl("image", {
          href: "../../images/logo-watermark.svg",
          x: margin, y: brandY,
          width: logoW, height: logoH
        }));
        const bLine1 = svgEl("text", {
          x: pageW - margin, y: brandY + 14,
          "font-family": "Fredoka, sans-serif", "font-size": 11,
          fill: "#4a5568", "text-anchor": "end"
        });
        bLine1.textContent = "Find worksheets, teacher tools, and more at animalmath.com";
        svg.appendChild(bLine1);
        const bLine2 = svgEl("text", {
          x: pageW - margin, y: brandY + 26,
          "font-family": "Fredoka, sans-serif", "font-size": 9.5,
          fill: "#718096", "text-anchor": "end"
        });
        bLine2.textContent = "\u00A9 2026 Eggroll Games";
        svg.appendChild(bLine2);
        // Worksheet code — bottom center
        if (!wsCode) wsCode = '(1)';
        const wsCodeEl = svgEl("text", {
          x: pageW / 2, y: pageH - 4,
          "font-family": "Fredoka, sans-serif", "font-size": 8.5,
          fill: "#94a3b8", "text-anchor": "middle", "letter-spacing": "1"
        });
        wsCodeEl.textContent = wsCode;
        svg.appendChild(wsCodeEl);
      }

      const count = families.length;
      const bottomMargin = branded ? 56 : 24;
      const availH = pageH - bottomMargin - topGridY;
      const availW = pageW - margin * 2;

      // Layout: 1 column for 3 problems, 2 columns for 4 or 6
      const cols = count <= 3 ? 1 : 2;
      const rows = Math.ceil(count / cols);
      const colW = availW / cols;
      const cellH = availH / rows;

      // Dynamically size elements based on available cell height
      // Budget: padding(8%) + triangle(40%) + gap(5%) + equations(42%) + bottom pad(5%)
      const triScale = Math.min(1, cellH / 220);
      const triPadTop = Math.round(10 * triScale) + 10;

      for (let i = 0; i < count; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const cellX = margin + col * colW;
        const cellY = topGridY + row * cellH;
        const { a, b, c } = families[i];
        const mask = masks ? masks[i] : null;
        const isExample = (i === 0 && includeExample && !showAnswers);

        // Problem number
        if (numbered !== false) {
          const probNumSize = 11;
          const probNum = svgEl("text", { x: cellX + 4, y: cellY + triPadTop + 4, "font-family": "Fredoka, sans-serif", "font-size": probNumSize, "font-weight": 600, fill: "#a0aec0" });
          probNum.textContent = (i + 1) + "."; svg.appendChild(probNum);
        }

        // Triangle dimensions - scale with cell size
        const triW = Math.round((cols === 1 ? 140 : 110) * triScale);
        const triH = Math.round((cols === 1 ? 90 : 72) * triScale);
        const triCX = cellX + colW / 2;
        const triTopYPos = cellY + triPadTop;

        // Draw triangle (roof shape)
        const topX = triCX;
        const topY = triTopYPos;
        const leftX = triCX - triW / 2;
        const leftY = triTopYPos + triH;
        const rightX = triCX + triW / 2;
        const rightY = triTopYPos + triH;

        // Triangle outline
        const triPath = svgEl("polygon", {
          points: topX + "," + topY + " " + leftX + "," + leftY + " " + rightX + "," + rightY,
          fill: "none", stroke: "#2d3748", "stroke-width": 2, "stroke-linejoin": "round"
        });
        svg.appendChild(triPath);

        // Dividing line between the two bottom numbers
        svg.appendChild(svgEl("line", {
          x1: triCX, y1: leftY - triH * 0.38,
          x2: triCX, y2: leftY,
          stroke: "#2d3748", "stroke-width": 1.5
        }));

        // Numbers in triangle
        const numFontSize = Math.round((cols === 1 ? 22 : 18) * triScale);

        // Top number (sum/product) - positioned inside triangle near top
        const topNum = svgEl("text", {
          x: topX, y: topY + triH * 0.42,
          "font-family": "Fredoka, sans-serif", "font-size": numFontSize, "font-weight": 700,
          "text-anchor": "middle", fill: "#1a202c"
        });
        topNum.textContent = String(c); svg.appendChild(topNum);

        // Bottom-left number
        const blNum = svgEl("text", {
          x: leftX + triW * 0.22, y: leftY - Math.round(8 * triScale),
          "font-family": "Fredoka, sans-serif", "font-size": numFontSize, "font-weight": 700,
          "text-anchor": "middle", fill: "#1a202c"
        });
        blNum.textContent = String(a); svg.appendChild(blNum);

        // Bottom-right number
        const brNum = svgEl("text", {
          x: rightX - triW * 0.22, y: rightY - Math.round(8 * triScale),
          "font-family": "Fredoka, sans-serif", "font-size": numFontSize, "font-weight": 700,
          "text-anchor": "middle", fill: "#1a202c"
        });
        brNum.textContent = String(b); svg.appendChild(brNum);

        // Example badge (above equations)
        if (isExample) {
          const eqBadgeGap = Math.round(16 * triScale);
          const badgeX = cellX + colW / 2 - 21;
          const badgeY = leftY + eqBadgeGap - 14;
          svg.appendChild(svgEl("rect", { x: badgeX, y: badgeY, width: 42, height: 13, rx: 3, ry: 3, fill: "#dcfce7", stroke: "#22c55e", "stroke-width": "0.75" }));
          const badgeText = svgEl("text", { x: badgeX + 21, y: badgeY + 9.5, "text-anchor": "middle", "font-family": "Fredoka, sans-serif", "font-size": "8", "font-weight": "600", fill: "#16a34a" });
          badgeText.textContent = "Example"; svg.appendChild(badgeText);
        }

        // Equations below triangle
        const eqGapFromTri = Math.round(16 * triScale);
        const eqStartY = leftY + eqGapFromTri;
        const remainH = cellH - (eqStartY - cellY) - 8;
        const eqLineH = Math.min(cols === 1 ? 30 : 23, remainH / 4);
        const eqFontSize = Math.min(cols === 1 ? 16 : 13, Math.round(eqLineH * 0.6));
        const blankW = Math.round(eqFontSize * 2);
        const blankGap = Math.round(eqFontSize * 0.35);

        // Build the 4 equations
        // eq0: a + b = c
        // eq1: b + a = c
        // eq2: c - a = b
        // eq3: c - b = a
        let equations;
        const famOp = families[i].op || operation;
        if (famOp === "addsub") {
          equations = [
            { left: a, op: "+", right: b, result: c },
            { left: b, op: "+", right: a, result: c },
            { left: c, op: "\u2212", right: a, result: b },
            { left: c, op: "\u2212", right: b, result: a }
          ];
        } else {
          equations = [
            { left: a, op: "\u00d7", right: b, result: c },
            { left: b, op: "\u00d7", right: a, result: c },
            { left: c, op: "\u00f7", right: a, result: b },
            { left: c, op: "\u00f7", right: b, result: a }
          ];
        }

        for (let eq = 0; eq < 4; eq++) {
          const eqY = eqStartY + eq * eqLineH;
          const { left, op, right, result } = equations[eq];
          const eqMask = mask ? mask[eq] : null;

          // Center the equation in the cell
          const totalEqW = blankW * 3 + eqFontSize * 2.4 + blankGap * 4;
          let ex = cellX + (colW - totalEqW) / 2;
          const ey = eqY + eqFontSize * 0.35;

          // Determine blanking
          const isWriteAll = difficulty === "writeall";
          const leftBlank = isWriteAll ? true : (eqMask ? eqMask[0] : false);
          const rightBlank = isWriteAll ? true : (eqMask ? eqMask[1] : false);
          const resultBlank = isWriteAll ? true : (eqMask ? eqMask[2] : false);

          // Draw slot helper
          function drawSlot(x, y, value, isBlank) {
            if (isExample) {
              // Always show answer in green
              const numText = svgEl("text", {
                x: x + blankW / 2, y: y,
                "font-family": "Fredoka, sans-serif", "font-size": eqFontSize, "font-weight": 700,
                "text-anchor": "middle", fill: "#16a34a"
              });
              numText.textContent = String(value);
              svg.appendChild(numText);
            } else if (isBlank && !showAnswers) {
              svg.appendChild(svgEl("line", {
                x1: x, y1: y + 3,
                x2: x + blankW, y2: y + 3,
                stroke: "#2d3748", "stroke-width": 1.5
              }));
            } else {
              const color = (isBlank && showAnswers) ? "#3182ce" : "#1a202c";
              const numText = svgEl("text", {
                x: x + blankW / 2, y: y,
                "font-family": "Fredoka, sans-serif", "font-size": eqFontSize, "font-weight": 700,
                "text-anchor": "middle", fill: color
              });
              numText.textContent = String(value);
              svg.appendChild(numText);
            }
          }

          // Left slot
          drawSlot(ex, ey, left, leftBlank);
          ex += blankW + blankGap;

          // Operator
          const opText = svgEl("text", {
            x: ex + eqFontSize * 0.4, y: ey,
            "font-family": "Fredoka, sans-serif", "font-size": eqFontSize, "font-weight": 700,
            "text-anchor": "middle", fill: "#1a202c"
          });
          opText.textContent = op; svg.appendChild(opText);
          ex += eqFontSize * 0.8 + blankGap;

          // Right slot
          drawSlot(ex, ey, right, rightBlank);
          ex += blankW + blankGap;

          // Equals sign
          const eqSign = svgEl("text", {
            x: ex + eqFontSize * 0.4, y: ey,
            "font-family": "Fredoka, sans-serif", "font-size": eqFontSize, "font-weight": 700,
            "text-anchor": "middle", fill: "#1a202c"
          });
          eqSign.textContent = "="; svg.appendChild(eqSign);
          ex += eqFontSize * 0.8 + blankGap;

          // Result slot
          drawSlot(ex, ey, result, resultBlank);
        }
      }

      return svg;
    }

    // ===== Helper functions =====
    function getHeaderMode() {
      return elShowHeaderEnabled.checked ? elHeaderMode.value : "both";
    }

    function getTitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowTitle.checked ? elHeaderText.value : "";
      }
      const op = getOperation();
      const range = elRange.value;
      if (op === "addsub") return "Fact Families: Addition & Subtraction Within " + range;
      if (op === "muldiv") return "Fact Families: Multiplication & Division Within " + range;
      return "Fact Families Within " + range;
    }

    function getSubtitle() {
      if (elCustomTitleEnabled.checked) {
        return elShowSubtitle.checked ? elSubtitleText.value : "";
      }
      return "Complete each fact family.";
    }

    // ===== Gather options =====
    function gatherOptions() {
      const showHeader = getHeaderMode();
      const title = getTitle();
      const subtitle = getSubtitle();
      return {
        operation: getOperation(),
        range: elRange.value,
        difficulty: elDifficulty.value,
        problemsPerSheet: parseInt(elProblems.value, 10),
        numWorksheets: parseInt(elNumSheets.value, 10),
        showHeader,
        title,
        subtitle,
        numbered: elNumbered.checked,
        branded: elBranded.checked,
        answerKey: elAnswerKey.checked,
        includeExample: elIncludeExample.checked,
      };
    }

    // ===== Render logic =====
    function renderWithNewRandomization() {
      const opts = gatherOptions();
      currentState.sheets = [];
      for (let s = 0; s < opts.numWorksheets; s++) {
        const families = generateFactFamilies(opts.problemsPerSheet, opts.operation, opts.range);
        // Generate masks for missing mode
        const masks = [];
        for (let f = 0; f < families.length; f++) {
          masks.push(generateMissingMask());
        }
        currentState.sheets.push({ families, masks });
      }
      renderWorksheet();
    }

    function renderWithoutRandomization() {
      const opts = gatherOptions();
      while (currentState.sheets.length < opts.numWorksheets) {
        const families = generateFactFamilies(opts.problemsPerSheet, opts.operation, opts.range);
        const masks = [];
        for (let f = 0; f < families.length; f++) {
          masks.push(generateMissingMask());
        }
        currentState.sheets.push({ families, masks });
      }
      if (currentState.sheets.length > opts.numWorksheets) currentState.sheets.length = opts.numWorksheets;
      renderWorksheet();
    }

    function isMobile() { return window.innerWidth <= 900; }

    function renderWorksheet() {
      const opts = gatherOptions();
      const numSheets = currentState.sheets.length;
      sheetWrap.innerHTML = "";
      sheetWrap.className = "";
      sheetWrap.style.cssText = "";
      const sheetWidth = 612, sheetHeight = 792;

      if (isMobile()) {
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div");
          p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s].families, {
            showHeader: opts.showHeader, title: opts.title, branded: opts.branded,
            showAnswers: false, operation: opts.operation, difficulty: opts.difficulty,
            masks: currentState.sheets[s].masks, numbered: opts.numbered, includeExample: opts.includeExample
          });
          p.appendChild(v);
          sheetWrap.appendChild(p);
        }
        return;
      }

      // Desktop: grid layout
      if (numSheets > 1) {
        sheetWrap.classList.add("grid-view");
        const ep = numSheets >= 3 ? 12 : 0;
        const aw = window.innerWidth - 340 - 80 - ep * 2, ah = window.innerHeight - 80, gap = 24, mrw = 180;
        let cols;
        if (numSheets <= 3) { cols = numSheets; if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        else { cols = Math.min(3, numSheets); if ((aw - (cols - 1) * gap) / cols < mrw) cols = Math.max(1, Math.floor((aw + gap) / (mrw + gap))); }
        const msw = (aw - (cols - 1) * gap) / cols, msh = numSheets <= 3 ? ah : ah * 0.8;
        const scale = Math.min(msw / sheetWidth, msh / sheetHeight);
        const sw = Math.floor(sheetWidth * scale), sh = Math.floor(sheetHeight * scale);
        sheetWrap.style.gridTemplateColumns = "repeat(" + cols + ", " + (sw + 24) + "px)";
        sheetWrap.style.padding = numSheets >= 3 ? "0 " + ep + "px" : "0";
        for (let s = 0; s < numSheets; s++) {
          const p = document.createElement("div"); p.className = "worksheet-page";
          const v = renderWorksheetSVG(currentState.sheets[s].families, {
            showHeader: opts.showHeader, title: opts.title, branded: opts.branded,
            showAnswers: false, operation: opts.operation, difficulty: opts.difficulty,
            masks: currentState.sheets[s].masks, numbered: opts.numbered, includeExample: opts.includeExample
          });
          v.setAttribute("width", sw); v.setAttribute("height", sh);
          p.appendChild(v); sheetWrap.appendChild(p);
        }
      } else {
        const p = document.createElement("div"); p.className = "worksheet-page";
        const v = renderWorksheetSVG(currentState.sheets[0].families, {
          showHeader: opts.showHeader, title: opts.title, subtitle: opts.subtitle, branded: opts.branded,
          showAnswers: false, operation: opts.operation, difficulty: opts.difficulty,
          masks: currentState.sheets[0].masks, numbered: opts.numbered, includeExample: opts.includeExample
        });
        p.appendChild(v); sheetWrap.appendChild(p);
      }
    }

    // ===== Print =====
    let _fontCSSCache = null;
    async function buildFontCSS() {
      if (_fontCSSCache) return _fontCSSCache;
      let fontCSS = "";
      for (const link of document.querySelectorAll('link[rel="stylesheet"]')) {
        if (!link.href.includes('fonts')) continue;
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            const absUrl = new URL(fontUrl, link.href).href;
            try {
              const fr = await fetch(absUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      for (const link of document.querySelectorAll('link[href*="fonts.googleapis"]')) {
        try {
          const resp = await fetch(link.href);
          const css = await resp.text();
          let inlined = css;
          for (const m of [...css.matchAll(/url\(([^)]+)\)/g)]) {
            const fontUrl = m[1].replace(/['"]/g, "");
            try {
              const fr = await fetch(fontUrl);
              const blob = await fr.blob();
              const b64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(blob); });
              inlined = inlined.replace(m[0], 'url(' + b64 + ')');
            } catch(e) {}
          }
          fontCSS += inlined;
        } catch(e) {}
      }
      _fontCSSCache = fontCSS;
      return fontCSS;
    }

    async function generatePdfBlob() {
      const opts = gatherOptions();
      const svgPages = [];
      sheetWrap.querySelectorAll(".worksheet-page:not(.ak-print-only) svg").forEach(s => svgPages.push(s.cloneNode(true)));
      const wsCodes = currentState.sheets.map((_, i) => '(' + (i + 1) + ')');
      if (opts.answerKey) {
              for (let i = 0; i < currentState.sheets.length; i++) {
                svgPages.push(renderWorksheetSVG(currentState.sheets[i].families, {
                  showHeader: "none", title: opts.title, subtitle: "", branded: opts.branded,
                  showAnswers: true, operation: opts.operation, difficulty: opts.difficulty,
                  masks: currentState.sheets[i].masks, numbered: opts.numbered, includeExample: false, isAnswerKey: true
                }, wsCodes[i]));
              }
            }
      const fontCSS = await buildFontCSS();
      let logoB64 = "";
      try {
        const logoResp = await fetch("../../images/logo-watermark.svg");
        const logoBlob = await logoResp.blob();
        logoB64 = await new Promise(r => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(logoBlob); });
      } catch(e) {}
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({ orientation: "portrait", unit: "pt", format: "letter" });
      for (let i = 0; i < svgPages.length; i++) {
        if (i > 0) pdf.addPage("letter", "portrait");
        const svgEl = svgPages[i];
        const styleEl = document.createElementNS("http://www.w3.org/2000/svg", "style");
        styleEl.textContent = fontCSS;
        svgEl.insertBefore(styleEl, svgEl.firstChild);
        if (logoB64) {
          svgEl.querySelectorAll("image").forEach(img => {
            const href = img.getAttribute("href") || img.getAttributeNS("http://www.w3.org/1999/xlink", "href");
            if (href && href.includes("logo-watermark")) img.setAttribute("href", logoB64);
          });
        }
        svgEl.style.cssText = "position:fixed;top:-9999px;left:-9999px;";
        document.body.appendChild(svgEl);
        try { await pdf.svg(svgEl, { x: 0, y: 0, width: 612, height: 792 }); } finally { document.body.removeChild(svgEl); }
      }
      return pdf.output("blob");
    }

    async function handlePrint() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnPrint");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Preparing...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const iframe = document.createElement("iframe");
        iframe.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;";
        iframe.src = url;
        document.body.appendChild(iframe);
        iframe.onload = function() {
          setTimeout(() => {
            iframe.contentWindow.print();
            setTimeout(() => { document.body.removeChild(iframe); URL.revokeObjectURL(url); }, 1000);
          }, 300);
        };
      } catch(e) { console.error("Print error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    // ===== Event Listeners =====
    elRange.addEventListener("change", () => renderWithNewRandomization());
    elDifficulty.addEventListener("change", () => renderWithNewRandomization());
    elProblems.addEventListener("change", () => renderWithNewRandomization());
    elNumSheets.addEventListener("change", () => renderWithNewRandomization());
    elShowHeaderEnabled.addEventListener("change", () => {
      elHeaderModeOptions.style.display = elShowHeaderEnabled.checked ? "block" : "none";
      renderWithoutRandomization();
    });
    elHeaderMode.addEventListener("change", () => renderWithoutRandomization());
    elNumbered.addEventListener("change", () => renderWithoutRandomization());
    elBranded.addEventListener("change", () => renderWithoutRandomization());
    elCustomTitleEnabled.addEventListener("change", () => {
      elCustomTitleOptions.style.display = elCustomTitleEnabled.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowTitle.addEventListener("change", () => {
      elTitleInputWrap.style.display = elShowTitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elShowSubtitle.addEventListener("change", () => {
      elSubtitleInputWrap.style.display = elShowSubtitle.checked ? "" : "none";
      renderWithoutRandomization();
    });
    elHeaderText.addEventListener("input", () => renderWithoutRandomization());
    elSubtitleText.addEventListener("input", () => renderWithoutRandomization());
    elAnswerKey.addEventListener("change", () => {});
    elIncludeExample.addEventListener("change", () => renderWithoutRandomization());
    document.getElementById("btnGenerate").addEventListener("click", () => renderWithNewRandomization());
    document.getElementById("btnPrint").addEventListener("click", handlePrint);

    async function handleDownloadPdf() {
      if (!currentState.sheets.length) { alert("Generate a worksheet first!"); return; }
      const btn = document.getElementById("btnDownloadPdf");
      const origText = btn.innerHTML;
      btn.innerHTML = "&#9203; Generating PDF...";
      btn.disabled = true;
      try {
        const blob = await generatePdfBlob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.title.split("\u2014")[0] || "worksheet").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".pdf";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      } catch(e) { console.error("Download error:", e); }
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    document.getElementById("btnDownloadPdf").addEventListener("click", handleDownloadPdf);
let resizeTimeout;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => { if (currentState.sheets.length > 1) renderWorksheet(); }, 150);
    });

    // ===== Init =====
    renderWithNewRandomization();
  
    // Expose answer key capture for favorites pack system
    window._amCaptureAnswerKeys = function() {
      if (!currentState.sheets || !currentState.sheets.length) return [];
      var opts = gatherOptions();
      return currentState.sheets.map(function(sheet, idx) {
        try {
          var sv = renderWorksheetSVG(sheet, Object.assign({}, opts, { showAnswers: true, isAnswerKey: true, includeExample: false }), '(' + (idx + 1) + ')');
          return sv.outerHTML;
        } catch(e) { return ''; }
      }).filter(Boolean);
    };
  </script>
