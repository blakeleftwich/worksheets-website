  <line x1="17" y1="10" x2="17" y2="100" stroke="#555" stroke-width="0.3"/>
  <line x1="26" y1="10" x2="26" y2="100" stroke="#555" stroke-width="0.3"/>
  <line x1="35" y1="10" x2="35" y2="100" stroke="#555" stroke-width="0.3"/>
  <line x1="44" y1="10" x2="44" y2="100" stroke="#555" stroke-width="0.3"/>
  <line x1="53" y1="10" x2="53" y2="100" stroke="#555" stroke-width="0.3"/>
  <line x1="62" y1="10" x2="62" y2="100" stroke="#555" stroke-width="0.3"/>
  <line x1="71" y1="10" x2="71" y2="100" stroke="#555" stroke-width="0.3"/>
  <line x1="80" y1="10" x2="80" y2="100" stroke="#555" stroke-width="0.3"/>
  <line x1="89" y1="10" x2="89" y2="100" stroke="#555" stroke-width="0.3"/>
  <line x1="8" y1="19" x2="98" y2="19" stroke="#555" stroke-width="0.3"/>
  <line x1="8" y1="28" x2="98" y2="28" stroke="#555" stroke-width="0.3"/>
  <line x1="8" y1="37" x2="98" y2="37" stroke="#555" stroke-width="0.3"/>
  <line x1="8" y1="46" x2="98" y2="46" stroke="#555" stroke-width="0.3"/>
  <line x1="8" y1="55" x2="98" y2="55" stroke="#555" stroke-width="0.3"/>
  <line x1="8" y1="64" x2="98" y2="64" stroke="#555" stroke-width="0.3"/>
  <line x1="8" y1="73" x2="98" y2="73" stroke="#555" stroke-width="0.3"/>
  <line x1="8" y1="82" x2="98" y2="82" stroke="#555" stroke-width="0.3"/>
  <line x1="8" y1="91" x2="98" y2="91" stroke="#555" stroke-width="0.3"/>

  <!-- Two tens rods: 9x90, gap of 14px from flat, 4px between rods, bottom at 115 -->
  <rect x="112" y="10" width="9" height="90" fill="none" stroke="#555" stroke-width="0.8"/>
  <line x1="112" y1="19" x2="121" y2="19" stroke="#555" stroke-width="0.3"/>
  <line x1="112" y1="28" x2="121" y2="28" stroke="#555" stroke-width="0.3"/>
  <line x1="112" y1="37" x2="121" y2="37" stroke="#555" stroke-width="0.3"/>
  <line x1="112" y1="46" x2="121" y2="46" stroke="#555" stroke-width="0.3"/>
  <line x1="112" y1="55" x2="121" y2="55" stroke="#555" stroke-width="0.3"/>
  <line x1="112" y1="64" x2="121" y2="64" stroke="#555" stroke-width="0.3"/>
  <line x1="112" y1="73" x2="121" y2="73" stroke="#555" stroke-width="0.3"/>
  <line x1="112" y1="82" x2="121" y2="82" stroke="#555" stroke-width="0.3"/>
  <line x1="112" y1="91" x2="121" y2="91" stroke="#555" stroke-width="0.3"/>

  <rect x="125" y="10" width="9" height="90" fill="none" stroke="#555" stroke-width="0.8"/>
  <line x1="125" y1="19" x2="134" y2="19" stroke="#555" stroke-width="0.3"/>
  <line x1="125" y1="28" x2="134" y2="28" stroke="#555" stroke-width="0.3"/>
  <line x1="125" y1="37" x2="134" y2="37" stroke="#555" stroke-width="0.3"/>
  <line x1="125" y1="46" x2="134" y2="46" stroke="#555" stroke-width="0.3"/>
  <line x1="125" y1="55" x2="134" y2="55" stroke="#555" stroke-width="0.3"/>
  <line x1="125" y1="64" x2="134" y2="64" stroke="#555" stroke-width="0.3"/>
  <line x1="125" y1="73" x2="134" y2="73" stroke="#555" stroke-width="0.3"/>
  <line x1="125" y1="82" x2="134" y2="82" stroke="#555" stroke-width="0.3"/>
  <line x1="125" y1="91" x2="134" y2="91" stroke="#555" stroke-width="0.3"/>

  <!-- Four ones cubes: 9x9, 16px gap from rods, 3px vertical spacing, bottom cube at 115 -->
  <!-- Bottom cube: y=106, then 106-12=94, 94-12=82, 82-12=70 -->
  <rect x="150" y="55" width="9" height="9" fill="none" stroke="#555" stroke-width="0.8"/>
  <rect x="150" y="67" width="9" height="9" fill="none" stroke="#555" stroke-width="0.8"/>
  <rect x="150" y="79" width="9" height="9" fill="none" stroke="#555" stroke-width="0.8"/>
  <rect x="150" y="91" width="9" height="9" fill="none" stroke="#555" stroke-width="0.8"/>

  <!-- Answer line lower -->
  <line x1="8" y1="134" x2="68" y2="134" stroke="#cbd5e1" stroke-width="1.5"/>
</svg>
