<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Printable Worksheets — Animal Math</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- PDF.js only used for hover preview of full packs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    .site-header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      padding: 0 24px;
    }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: #64748b;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .nav-links a:hover { background: #f1f5f9; color: #1e293b; }
    .nav-links a.active { background: #fef3c7; color: #92400e; }

    /* ===== Hero ===== */
    .hero {
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      padding: 40px 24px 36px;
      text-align: center;
    }
    .hero h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 20px;
    }
    .hero p { display: none; }
    .hero .search-bar {
      max-width: 560px; margin: 0 auto 20px; position: relative;
    }
    .hero .search-bar input {
      width: 100%; padding: 14px 20px 14px 46px; font-size: 15px;
      border: 2px solid #e2e8f0; border-radius: 14px; background: white;
      color: #2d3748; outline: none; font-family: 'Inter', sans-serif; transition: all 0.2s;
    }
    .hero .search-bar input:focus { border-color: #f59e0b; box-shadow: 0 0 0 4px rgba(245,158,11,0.1); }
    .hero .search-bar .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      font-size: 20px; color: #94a3b8; pointer-events: none;
    }
    .hero .topic-chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .hero .topic-chip {
      padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; border: 1px solid #e2e8f0; background: white; color: #475569; text-decoration: none;
    }
    .hero .topic-chip:hover { border-color: #f59e0b; background: #fffbeb; color: #92400e; }
    .hero .topic-chip.active { border-color: #f59e0b; background: #fef3c7; color: #92400e; }
    .hero .grade-chips { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .hero .grade-chip {
      padding: 4px 10px 8px; font-size: 12px; font-weight: 600; color: #94a3b8;
      text-decoration: none; cursor: pointer; transition: all 0.15s; position: relative;
      border: none; background: none; border-radius: 0;
    }
    .hero .grade-chip:hover { color: #475569; }
    .hero .grade-chip.active { color: #1a202c; }
    .hero .grade-chip.active::after {
      content: ''; position: absolute; bottom: 0; left: 8px; right: 8px;
      height: 2px; background: #f59e0b; border-radius: 1px;
    }
    .category-label {
      font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700;
      color: #2d3748; margin-top: 36px; margin-bottom: 16px;
    }
    .category-label:first-child { margin-top: 24px; }

    /* ===== Category Grid ===== */
    .section { max-width: 1200px; margin: 0 auto; padding: 40px 24px 60px; }
    .section-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
    }
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }
    .cat-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 24px 20px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
    }
    .cat-card:hover {
      border-color: #fbbf24;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .cat-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .cat-card h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
    }
    .cat-card .count {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 500;
    }

    /* ===== Lesson Page Header ===== */
    .lesson-header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 32px 24px;
    }
    .lesson-header-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .breadcrumb {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 12px;
    }
    .breadcrumb a { color: #f59e0b; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .lesson-header h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .lesson-header p {
      font-size: 15px;
      color: #64748b;
      max-width: 600px;
      line-height: 1.6;
    }
    .generator-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      transition: all 0.15s;
    }
    .generator-link:hover { border-color: #f59e0b; color: #92400e; background: #fffbeb; }
    .generator-link .arrow { font-size: 14px; transition: transform 0.15s; }
    .generator-link:hover .arrow { transform: translateX(2px); }

    /* ===== Toolbar ===== */
    .toolbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toolbar-left { font-size: 14px; color: #64748b; }

    /* ===== Worksheet Cards ===== */
    .ws-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 24px 60px;
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(3, 1fr);
    }

    .ws-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.25s;
      display: flex;
      flex-direction: column;
    }
    .ws-card:hover {
      border-color: #fbbf24;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      transform: translateY(-3px);
    }

    /* Preview area */
    .ws-preview {
      position: relative;
      background: #f8fafc;
      border-bottom: 1px solid #f1f5f9;
      overflow: hidden;
      cursor: pointer;
      height: 220px;
    }
    .ws-preview img {
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    /* Pack badge */
    .pack-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #1e293b;
      color: white;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 2;
    }
    .pack-badge svg { width: 12px; height: 12px; }

    .ws-body {
      padding: 16px 18px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .ws-body h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 4px;
      line-height: 1.35;
    }
    .ws-meta {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 14px;
    }
    .ws-meta .grade {
      background: #fef3c7;
      color: #92400e;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
    }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 16px;
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: auto;
    }
    .download-btn:hover {
      box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);
      transform: translateY(-1px);
    }
    .download-btn.downloading { background: #16a34a; pointer-events: none; }
    .download-btn svg { width: 16px; height: 16px; }

    /* ===== Hover Preview Overlay — 5-page grid ===== */
    .hover-preview {
      display: none;
      position: fixed;
      z-index: 150;
      background: white;
      border-radius: 12px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.06);
      padding: 16px;
      pointer-events: auto;
      width: calc(100vw / 3);
      min-width: 320px;
      max-width: 90vw;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
    }
    .hover-preview.visible { display: block; }
    .hover-preview-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 10px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .hover-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      justify-items: center;
    }
    .hover-grid canvas {
      width: 100%;
      height: auto;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      background: #f8fafc;
    }
    .hover-grid canvas:nth-child(5) { grid-column: 1 / -1; justify-self: center; max-width: calc(50% - 5px); }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .ws-grid { grid-template-columns: repeat(2, 1fr); }
      .cat-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .ws-grid { grid-template-columns: repeat(2, 1fr); }
      .cat-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .site-logo { display: flex; align-items: center; text-decoration: none; }
    .site-logo-img { height: 44px; width: auto; display: block; }
    @media print { .site-header { display: none !important; } }
  </style>
</head>
<body class="page-home">

  <!-- ===== Header ===== -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="site-logo">
        <img src="../generators/branding/emma-logo-filled-no-stroke3.png" alt="Animal Math" class="site-logo-img">
      </a>
      <nav class="nav-links">
        <a href="#" class="active" onclick="showHome(); return false;">Printables</a>
        <a href="../generators.html">Generators</a>
        <a href="../tools/index.html">Tools</a>
        <a href="https://apps.apple.com/us/app/animal-math-games-for-kids/id799973028" target="_blank">Mobile App</a>
        <a href="../about.html">About</a>
        <a href="../my-packs/index.html">My Worksheet Sets</a>
      </nav>
    </div>
  </header>

  <!-- ===== Hero ===== -->
  <div class="hero">
    <h1>Free Printable Math Worksheets</h1>
    <div class="search-bar">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="printableSearch" placeholder="Search printable worksheets...">
    </div>
    <div class="topic-chips" id="topicChips"></div>
    <div class="grade-chips" id="gradeChips">
      <a class="grade-chip active" href="#" data-grade="">All Grades</a>
      <a class="grade-chip" href="#" data-grade="Pre-K">Pre-K</a>
      <a class="grade-chip" href="#" data-grade="K">K</a>
      <a class="grade-chip" href="#" data-grade="1st">1st</a>
      <a class="grade-chip" href="#" data-grade="2nd">2nd</a>
    </div>
  </div>

  <!-- ===== Printables Grid ===== -->
  <div id="printablesContainer" style="max-width:1200px;margin:0 auto;padding:0 24px 60px;"></div>

  <!-- ===== Hover Preview — 5-page grid ===== -->
  <div class="hover-preview" id="hoverPreview">
    <div class="hover-preview-title" id="hoverTitle"></div>
    <div class="hover-grid" id="hoverGrid"></div>
  </div>

  <script>
    // ===== Configure PDF.js worker (for hover preview only) =====
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // ===== Printable folder registry =====
    // Each folder must contain: info.json, pack.pdf, preview.png
    const printableFolders = [
      'count-and-write-1-to-5',
      'count-and-write-1-to-10',
      'count-and-write-1-to-20',
      'count-and-write-10-to-20',
    ];

    // Category display config (icon, color, description)
    const categoryConfig = {
      'Count & Write': {
        icon: '🔢',
        color: '#fef3c7',
        desc: 'Count the objects and write the number. Each pack includes 5 unique worksheets with different objects and quantities, plus an answer key.',
      },
    };

    // ===== Data loading =====
    let allPrintables = []; // { folder, title, description, grades, category, worksheetCount, relatedGenerator }
    let categories = {};    // category name → { items: [...], config: {...} }

    async function loadAllPrintables() {
      const results = await Promise.all(
        printableFolders.map(async (folder) => {
          try {
            const resp = await fetch(folder + '/info.json');
            const info = await resp.json();
            return { folder, ...info };
          } catch (e) {
            console.warn('Failed to load ' + folder + '/info.json', e);
            return null;
          }
        })
      );
      allPrintables = results.filter(Boolean);

      // Group by category
      categories = {};
      allPrintables.forEach(p => {
        if (!categories[p.category]) {
          categories[p.category] = {
            items: [],
            config: categoryConfig[p.category] || { icon: '📄', color: '#f1f5f9', desc: '' },
          };
        }
        categories[p.category].items.push(p);
      });

      renderAllPrintables();
    }

    // ===== Render All Printables (flat, grouped by category) =====
    function renderAllPrintables() {
      var container = document.getElementById('printablesContainer');
      container.innerHTML = '';

      // Build topic chips dynamically from categories
      var topicChipsDiv = document.getElementById('topicChips');
      topicChipsDiv.innerHTML = '';
      var allChip = document.createElement('a');
      allChip.className = 'topic-chip active';
      allChip.href = '#';
      allChip.dataset.cat = '';
      allChip.textContent = 'All Topics';
      topicChipsDiv.appendChild(allChip);
      Object.keys(categories).forEach(function(catName) {
        var chip = document.createElement('a');
        chip.className = 'topic-chip';
        chip.href = '#';
        chip.dataset.cat = catName;
        chip.textContent = catName;
        topicChipsDiv.appendChild(chip);
      });

      // Category order
      var catOrder = Object.keys(categories);

      catOrder.forEach(function(catName) {
        var cat = categories[catName];
        if (!cat || !cat.items.length) return;

        // Category header
        var label = document.createElement('div');
        label.className = 'category-label';
        label.textContent = catName;
        container.appendChild(label);

        // Grid for this category
        var grid = document.createElement('div');
        grid.className = 'ws-grid';
        grid.style.padding = '0 0 40px';

        cat.items.forEach(function(p, i) {
          var card = document.createElement('div');
          card.className = 'ws-card';
          card.setAttribute('data-category', catName);
          card.addEventListener('mouseenter', function(e) { showHover(e, p, i); });
          card.addEventListener('mouseleave', hideHover);

          var wsCount = p.worksheetCount || 5;

          card.innerHTML =
            '<div class="ws-preview">' +
              '<img src="' + p.folder + '/preview.png" alt="' + p.title + ' preview" onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'<div style=\\\'display:flex;align-items:center;justify-content:center;height:100%;color:#cbd5e0;font-size:13px;font-weight:500;\\\'>Preview not available</div>\'">' +
              '<div class="pack-badge">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M2 8h20"/></svg>' +
                wsCount + ' worksheets' +
              '</div>' +
            '</div>' +
            '<div class="ws-body">' +
              '<h3>' + p.title + '</h3>' +
              '<div class="ws-meta"><span class="grade">' + p.grades + '</span></div>' +
              '<button class="download-btn" data-folder="' + p.folder + '" data-title="' + p.title + '">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
                'Download ' + wsCount + ' Worksheets' +
              '</button>' +
            '</div>';
          grid.appendChild(card);

          var btn = card.querySelector('.download-btn');
          btn.addEventListener('click', function() { doDownload(p, this); });
        });

        container.appendChild(grid);
      });

      // ===== Popular Section =====
      var popularLabel = document.createElement('div');
      popularLabel.className = 'category-label';
      popularLabel.textContent = 'Popular';
      popularLabel.id = 'popularLabel';
      var popularGrid = document.createElement('div');
      popularGrid.className = 'ws-grid';
      popularGrid.id = 'popularGrid';
      popularGrid.style.padding = '0 0 40px';

      var top3 = allPrintables.slice(0, 3);
      top3.forEach(function(p, i) {
        var card = document.createElement('div');
        card.className = 'ws-card';
        card.addEventListener('mouseenter', function(e) { showHover(e, p, i); });
        card.addEventListener('mouseleave', hideHover);
        var wsCount = p.worksheetCount || 5;
        card.innerHTML =
          '<div class="ws-preview">' +
            '<img src="' + p.folder + '/preview.png" alt="' + p.title + ' preview" onerror="this.style.display=\'none\'">' +
            '<div class="pack-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="18" rx="2"/><path d="M2 8h20"/></svg>' + wsCount + ' worksheets</div>' +
          '</div>' +
          '<div class="ws-body"><h3>' + p.title + '</h3><div class="ws-meta"><span class="grade">' + p.grades + '</span></div>' +
            '<button class="download-btn" data-folder="' + p.folder + '" data-title="' + p.title + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download ' + wsCount + ' Worksheets</button></div>';
        popularGrid.appendChild(card);
        card.querySelector('.download-btn').addEventListener('click', function() { doDownload(p, this); });
      });

      container.insertBefore(popularGrid, container.firstChild);
      container.insertBefore(popularLabel, container.firstChild);

      // ===== Search & Filter =====
      var searchInput = document.getElementById('printableSearch');
      var allCards = container.querySelectorAll('.ws-card');
      var allLabels = container.querySelectorAll('.category-label');
      var allGrids = container.querySelectorAll('.ws-grid');
      var popularHidden = false;

      function filterCards() {
        var query = searchInput.value.toLowerCase().trim();
        var activeTopicChip = document.querySelector('.topic-chip.active');
        var activeCat = activeTopicChip ? activeTopicChip.dataset.cat : '';
        var activeGradeChip = document.querySelector('.grade-chip.active');
        var activeGrade = activeGradeChip ? activeGradeChip.dataset.grade : '';

        var isFiltered = query || activeCat || activeGrade;
        if (isFiltered && !popularHidden) {
          popularLabel.style.display = 'none';
          popularGrid.style.display = 'none';
          popularHidden = true;
        }

        allCards.forEach(function(card) {
          if (card.closest('#popularGrid')) {
            card.style.display = isFiltered ? 'none' : '';
            return;
          }
          var title = card.querySelector('h3').textContent.toLowerCase();
          var matchesSearch = !query || title.indexOf(query) !== -1;
          var cardCat = card.getAttribute('data-category');
          var matchesCat = !activeCat || cardCat === activeCat;
          var gradeEl = card.querySelector('.grade');
          var gradeText = gradeEl ? gradeEl.textContent : '';
          var matchesGrade = !activeGrade || gradeText.indexOf(activeGrade) !== -1;
          card.style.display = (matchesSearch && matchesCat && matchesGrade) ? '' : 'none';
        });

        allLabels.forEach(function(label, i) {
          if (label.id === 'popularLabel') return;
          var grid = allGrids[i];
          if (!grid || grid.id === 'popularGrid') return;
          var visible = grid.querySelectorAll('.ws-card:not([style*="display: none"])');
          label.style.display = visible.length > 0 ? '' : 'none';
          grid.style.display = visible.length > 0 ? '' : 'none';
        });
      }

      searchInput.addEventListener('input', filterCards);
      searchInput.addEventListener('keyup', filterCards);

      document.querySelectorAll('.topic-chip').forEach(function(chip) {
        chip.addEventListener('click', function(e) {
          e.preventDefault();
          document.querySelectorAll('.topic-chip').forEach(function(c) { c.classList.remove('active'); });
          this.classList.add('active');
          filterCards();
        });
      });

      document.querySelectorAll('.grade-chip').forEach(function(chip) {
        chip.addEventListener('click', function(e) {
          e.preventDefault();
          document.querySelectorAll('.grade-chip').forEach(function(c) { c.classList.remove('active'); });
          this.classList.add('active');
          filterCards();
        });
      });
    }

    // ===== Direct PDF Download =====
    function doDownload(printable, btn) {
      var orig = btn.innerHTML;
      btn.innerHTML = '<div style="width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;"></div> Preparing...';
      btn.classList.add('downloading');

      var a = document.createElement('a');
      a.href = printable.folder + '/pack.pdf';
      a.download = printable.title.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '-pack.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><polyline points="20 6 9 17 4 12"/></svg> Downloaded!';
      btn.style.background = '#16a34a';
      setTimeout(function() {
        btn.innerHTML = orig;
        btn.style.background = '';
        btn.classList.remove('downloading');
      }, 1500);
    }

    // ===== Hover Preview — 5-page grid (uses PDF.js) =====
    var hoverTimer = null;
    var hideTimer = null;
    var activeHoverCard = null;
    var popupHovered = false;
    var pdfCache = {};
    var hoverCanvasCache = {};

    function renderPdfPage(pdfDoc, pageNum, canvas, maxWidth) {
      return pdfDoc.getPage(pageNum).then(function(page) {
        var viewport = page.getViewport({ scale: 1 });
        var scale = maxWidth / viewport.width;
        var scaledViewport = page.getViewport({ scale: scale });
        canvas.width = scaledViewport.width;
        canvas.height = scaledViewport.height;
        return page.render({
          canvasContext: canvas.getContext('2d'),
          viewport: scaledViewport
        }).promise.then(function() { return canvas; });
      });
    }

    function showHover(e, printable, index) {
      var key = printable.folder;
      if (popupHovered) return;
      clearTimeout(hideTimer);
      clearTimeout(hoverTimer);

      hoverTimer = setTimeout(function() {
        var preview = document.getElementById('hoverPreview');
        var grid = document.getElementById('hoverGrid');
        var title = document.getElementById('hoverTitle');

        activeHoverCard = e.target.closest('.ws-card');
        title.textContent = printable.title + ' — Set Preview';
        grid.innerHTML = '';

        var pdfUrl = printable.folder + '/pack.pdf';
        var wsCount = printable.worksheetCount || 5;

        function renderPages(pdfDoc) {
          for (var p = 1; p <= wsCount; p++) {
            var cacheKey = key + '-p' + p;
            if (hoverCanvasCache[cacheKey]) {
              grid.appendChild(hoverCanvasCache[cacheKey]);
            } else {
              var canvas = document.createElement('canvas');
              grid.appendChild(canvas);
              (function(c, ck) {
                renderPdfPage(pdfDoc, p, c, 600).then(function() {
                  hoverCanvasCache[ck] = c;
                });
              })(canvas, cacheKey);
            }
          }
        }

        if (pdfCache[key]) {
          renderPages(pdfCache[key]);
        } else {
          pdfjsLib.getDocument(pdfUrl).promise.then(function(pdfDoc) {
            pdfCache[key] = pdfDoc;
            renderPages(pdfDoc);
          });
        }

        // Position near the card
        var rect = activeHoverCard.getBoundingClientRect();
        var popupW = Math.round(window.innerWidth / 3);
        var margin = 12;
        var header = document.querySelector('.site-header');
        var headerBottom = header ? header.getBoundingClientRect().bottom : 0;
        var top = headerBottom + 4;
        var left = rect.right - 20;
        if (left + popupW > window.innerWidth - margin) {
          left = rect.left - popupW + 20;
        }
        left = Math.max(margin, Math.min(left, window.innerWidth - popupW - margin));

        preview.style.left = left + 'px';
        preview.style.top = top + 'px';
        preview.classList.add('visible');
      }, 200);
    }

    function hideHover() {
      clearTimeout(hoverTimer);
      if (popupHovered) return;
      hideTimer = setTimeout(function() {
        if (popupHovered) return;
        document.getElementById('hoverPreview').classList.remove('visible');
        activeHoverCard = null;
      }, 150);
    }

    // Keep popup open when mouse is over it
    (function() {
      var preview = document.getElementById('hoverPreview');
      preview.addEventListener('mouseenter', function() {
        popupHovered = true;
        clearTimeout(hideTimer);
        clearTimeout(hoverTimer);
      });
      preview.addEventListener('mouseleave', function() {
        popupHovered = false;
        hideTimer = setTimeout(function() {
          preview.classList.remove('visible');
          activeHoverCard = null;
        }, 150);
      });
      document.addEventListener('click', function(e) {
        if (!preview.classList.contains('visible')) return;
        if (preview.contains(e.target)) return;
        if (activeHoverCard && activeHoverCard.contains(e.target)) return;
        preview.classList.remove('visible');
        activeHoverCard = null;
      });
    })();

    // ===== Init =====
    loadAllPrintables();
  </script>
</body>
</html>
